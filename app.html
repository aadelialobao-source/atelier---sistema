const CF_LABELS = {
  salario:'Salário / Pró-labore', aluguel:'Aluguel', energia:'Energia Elétrica',
  agua:'Água', internet:'Internet', contador:'Contador', seguranca:'Segurança',
  faxina:'Limpeza', lanches:'Lanches / Copa', outros:'Outros'
};

function renderResultado(c){
  if(SESS.role!=='admin'){
    c.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🔒</div><p>Acesso restrito à administradora</p></div>`;
    return;
  }
  const periodo=window._drePeriodo||'mes_atual';
  const hoje=new Date();
  const anoAtual=hoje.getFullYear(), mesAtual=hoje.getMonth();

  function dentroDoPerido(dataStr){
    if(!dataStr)return false;
    const d=new Date(dataStr+'T00:00:00');
    if(periodo==='mes_atual') return d.getFullYear()===anoAtual&&d.getMonth()===mesAtual;
    if(periodo==='mes_ant'){const ma=mesAtual===0?11:mesAtual-1,aa=mesAtual===0?anoAtual-1:anoAtual;return d.getFullYear()===aa&&d.getMonth()===ma;}
    if(periodo==='ano_atual') return d.getFullYear()===anoAtual;
    return true;
  }

  const vendasP=DB.vendas.filter(v=>dentroDoPerido(v.data));
  const receitaBruta=vendasP.reduce((a,v)=>a+(v.valor_total||0),0);
  const orcsAprov=DB.orcamentos.filter(o=>o.status==='aprovado'&&dentroDoPerido(o.data));
  const custoTotal=orcsAprov.reduce((a,o)=>a+(o.custo_total_calc||0),0);

  let totalDespPct=0,countOrc=0;
  orcsAprov.forEach(o=>{const b3=o.bloco3||{};totalDespPct+=((b3.cartao||0)+(b3.marketing||0)+(b3.comissao||0)+(b3.cashback||0)+(b3.tributos||0))/100;countOrc++;});
  const avgDespPct=countOrc>0?totalDespPct/countOrc:0.25;
  const despVariaveis=receitaBruta*avgDespPct;

  const finP=DB.financeiro.filter(f=>dentroDoPerido(f.data));
  const saidasFin=finP.filter(f=>f.tipo==='saida').reduce((a,f)=>a+(f.valor||0),0);
  const saidasPorCat={};
  finP.filter(f=>f.tipo==='saida').forEach(f=>{const cat=f.categoria||'Outros';saidasPorCat[cat]=(saidasPorCat[cat]||0)+f.valor;});

  // Despesas do módulo Despesas
  const despPagas=(DB.despesas||[]).filter(d=>d.status==='pago'&&dentroDoPerido(d.data_pagamento||d.vencimento)).reduce((a,d)=>a+d.valor,0);

  const cf=DB.params_custos_fixos||{};
  let mesesNoPeriodo=1;
  if(periodo==='ano_atual') mesesNoPeriodo=mesAtual+1;
  const totalCustosFixos=Object.values(cf).reduce((a,v)=>a+(v||0),0)*mesesNoPeriodo;

  const lucroBruto=receitaBruta-custoTotal;
  const lucroLiquido=lucroBruto-despVariaveis-saidasFin-totalCustosFixos-despPagas;
  const margemLiquida=receitaBruta>0?(lucroLiquido/receitaBruta)*100:0;
  const resultado_ok=lucroLiquido>0;

  const meses6=[];
  for(let i=5;i>=0;i--){
    const d=new Date(anoAtual,mesAtual-i,1);const y=d.getFullYear(),m=d.getMonth();
    const label=d.toLocaleString('pt-BR',{month:'short',year:'2-digit'});
    const rec=DB.vendas.filter(v=>{const dd=new Date(v.data+'T00:00:00');return dd.getFullYear()===y&&dd.getMonth()===m;}).reduce((a,v)=>a+(v.valor_total||0),0);
    const sai=DB.financeiro.filter(f=>f.tipo==='saida'&&(()=>{const dd=new Date(f.data+'T00:00:00');return dd.getFullYear()===y&&dd.getMonth()===m;})()).reduce((a,f)=>a+(f.valor||0),0);
    const cfMes=Object.values(cf).reduce((a,v)=>a+(v||0),0);
    meses6.push({label,rec,lucro:rec-sai-cfMes});
  }
  const maxVal=Math.max(...meses6.map(m=>Math.max(m.rec,1)));
  const periodoLabel={mes_atual:'Este Mês',mes_ant:'Mês Anterior',ano_atual:'Este Ano',tudo:'Todo o Período'};

  c.innerHTML=`
  <div class="page-header">
    <div><p class="page-title">◑ Resultado · DRE</p>
      <p class="page-sub">Demonstração de Resultado · ${periodoLabel[periodo]}</p></div>
    <select onchange="window._drePeriodo=this.value;renderResultado(document.getElementById('content'))"
      style="padding:9px 14px;border:1.5px solid var(--borda);border-radius:6px;background:var(--fundo-input);font-family:Jost,sans-serif;font-size:14px">
      <option value="mes_atual" ${periodo==='mes_atual'?'selected':''}>Este Mês</option>
      <option value="mes_ant" ${periodo==='mes_ant'?'selected':''}>Mês Anterior</option>
      <option value="ano_atual" ${periodo==='ano_atual'?'selected':''}>Este Ano</option>
      <option value="tudo" ${periodo==='tudo'?'selected':''}>Todo o Período</option>
    </select>
  </div>

  <div style="background:${resultado_ok?'linear-gradient(135deg,#1a4a2e,#0f2e1a)':'linear-gradient(135deg,#4a1a1a,#2e0f0f)'};border:2px solid ${resultado_ok?'#6fcf97':'#eb5757'};border-radius:14px;padding:28px 24px;margin-bottom:24px;text-align:center">
    <p style="font-size:48px;margin-bottom:8px">${resultado_ok?'📈':'📉'}</p>
    <p style="font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:${resultado_ok?'#6fcf97':'#eb5757'};font-weight:700;margin-bottom:8px">${resultado_ok?'ATELIER COM LUCRO':'ATELIER COM PREJUÍZO'}</p>
    <p style="font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;color:#fff;margin-bottom:4px">${fmt(Math.abs(lucroLiquido))}</p>
    <p style="font-size:13px;color:rgba(255,255,255,.6)">${resultado_ok?'lucro líquido estimado':'prejuízo estimado'} · margem ${fmtN(Math.abs(margemLiquida),1)}%</p>
  </div>

  <div class="kpi-grid" style="margin-bottom:24px">
    <div class="kpi ouro"><div class="kpi-label">Receita Bruta</div><div class="kpi-value">${fmt(receitaBruta)}</div><div style="font-size:11px;color:var(--texto-suave)">${vendasP.length} vendas</div></div>
    <div class="kpi" style="border-left:3px solid #eb5757"><div class="kpi-label">Custo Produtos</div><div class="kpi-value" style="color:#eb5757">${fmt(custoTotal)}</div></div>
    <div class="kpi verde"><div class="kpi-label">Lucro Bruto</div><div class="kpi-value" style="color:${lucroBruto>=0?'var(--verde)':'#eb5757'}">${fmt(lucroBruto)}</div></div>
    <div class="kpi" style="border-left:3px solid #eb5757"><div class="kpi-label">Custos Fixos</div><div class="kpi-value" style="color:#eb5757">${fmt(totalCustosFixos)}</div></div>
    <div class="kpi" style="border-left:3px solid #b0a259"><div class="kpi-label">Desp. Variáveis</div><div class="kpi-value" style="color:#b0a259">${fmt(despVariaveis)}</div></div>
    <div class="kpi" style="border-left:3px solid #eb5757"><div class="kpi-label">Saídas + Despesas</div><div class="kpi-value" style="color:#eb5757">${fmt(saidasFin+despPagas)}</div></div>
  </div>

  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><span class="card-title">DRE Simplificada</span></div>
    <div class="card-body" style="padding:0">
      <table style="width:100%;border-collapse:collapse">
        ${[
          {label:'(+) Receita Bruta de Vendas',val:receitaBruta,bold:false,cor:''},
          {label:'(−) Custo dos Produtos',val:-custoTotal,bold:false,cor:'#eb5757'},

// MODULE: RELATÓRIOS

function renderRelatorios(c){
  // Lê o mês selecionado (default: mês atual)
  const anoMes = (window._relMes && window._relMes.match(/^\d{4}-\d{2}$/))
    ? window._relMes
    : today().substring(0,7);
  const hoje = today();
  const [ano, mes] = anoMes.split('-').map(Number);

  // === DRE — Demonstrativo de Resultado ===
  function calcDRE(ini, fim){
    const vendas    = DB.vendas.filter(v=>v.data>=ini&&v.data<=fim);
    const fin       = DB.financeiro.filter(f=>f.data>=ini&&f.data<=fim);
    const despesas  = DB.despesas ? DB.despesas.filter(d=>d.data>=ini&&d.data<=fim) : [];
    const recBruta  = vendas.reduce((a,v)=>a+(v.valor_total||0),0);
    const emCaixa   = vendas.reduce((a,v)=>a+(v.valor_em_caixa||0),0);
    const gcUsado   = vendas.reduce((a,v)=>a+(v.credito_ouro_aplic||0),0);
    const cbUsado   = vendas.reduce((a,v)=>a+(v.cashback_usado||0),0);
    const saidas    = fin.filter(f=>f.tipo==='saida').reduce((a,f)=>a+(f.valor||0),0);
    const entradas  = fin.filter(f=>f.tipo==='entrada').reduce((a,f)=>a+(f.valor||0),0);
    const despTotal = despesas.reduce((a,d)=>a+(d.valor||0),0);
    const lucro     = emCaixa - saidas - despTotal;
    const margem    = recBruta>0 ? (lucro/recBruta*100) : 0;
    return {recBruta,emCaixa,gcUsado,cbUsado,saidas,entradas,despTotal,lucro,margem,
            qtdVendas:vendas.length};
  }

  // === RANKING DE CLIENTES — filtrado pelo período ===
  function rankingClientes(){
    return DB.clientes.map(cl=>{
      const vs = DB.vendas.filter(v=>v.cliente_id===cl.id&&v.data>=ini&&v.data<=fim);
      const vsTotal = DB.vendas.filter(v=>v.cliente_id===cl.id); // LTV histórico
      const total  = vs.reduce((a,v)=>a+(v.valor_total||0),0);
      const ticket = vs.length>0 ? total/vs.length : 0;
      const ltv    = vsTotal.reduce((a,v)=>a+(v.valor_total||0),0);
      return {...cl, _total:total, _qtd:vs.length, _ticket:ticket, _ltv:ltv,
              _gc:calcSaldoCliente(cl.id), _cb:calcCashbackCliente(cl.id)};
    }).filter(cl=>cl._qtd>0).sort((a,b)=>b._total-a._total);
  }

  // === PRODUÇÃO ===
  function statsProducao(ini, fim){
    const osP  = DB.os.filter(o=>(o.data_conclusao||o.prazo||'')>=ini||(o.status!=='cancelado'));
    const conc = DB.etapas.filter(e=>e.status==='concluida'&&e.data_fim>=ini&&e.data_fim<=fim);
    const retr = conc.filter(e=>e.cobravel===false&&e.origem_qc);
    const byResp = {};
    conc.filter(e=>e.cobravel!==false).forEach(e=>{
      byResp[e.responsavel||'—'] = (byResp[e.responsavel||'—']||0)+1;
    });
    const tempos = conc.filter(e=>e.data_ini&&e.data_fim).map(e=>
      Math.floor((new Date(e.data_fim+'T00:00:00')-new Date(e.data_ini+'T00:00:00'))/86400000)
    );
    const tempoMedio = tempos.length ? tempos.reduce((a,b)=>a+b,0)/tempos.length : 0;
    return {totalEtapas:conc.length, retrabalhos:retr.length, byResp, tempoMedio};
  }

  // === QC ===
  function statsQC(ini, fim){
    const qcs   = DB.qc.filter(q=>q.data>=ini&&q.data<=fim);
    const aprov = qcs.filter(q=>q.resultado==='aprovado').length;
    const reprov= qcs.filter(q=>q.resultado==='reprovado').length;
    const preA  = qcs.filter(q=>q.tipo_qc==='pre_analise');
    const final = qcs.filter(q=>q.tipo_qc==='final'||!q.tipo_qc);
    const taxaAprov = qcs.length>0 ? (aprov/qcs.length*100) : 0;
    // Reprovações por responsável original (via etapa)
    const reprovPorEtapa = {};
    DB.qc.filter(q=>q.data>=ini&&q.data<=fim&&q.resultado==='reprovado'&&q.etapa_origem_id).forEach(q=>{
      const et = DB.etapas.find(e=>e.id===q.etapa_origem_id);
      const resp = et?.responsavel||'—';
      reprovPorEtapa[resp] = (reprovPorEtapa[resp]||0)+1;
    });
    return {total:qcs.length,aprov,reprov,taxaAprov,preA:preA.length,final:final.length,reprovPorEtapa};
  }

  // === Período ===
  const ini = anoMes+'-01';
  const fim = anoMes+'-31';
  const dre = calcDRE(ini, fim);
  const ranking = rankingClientes().slice(0,10);
  const prod = statsProducao(ini, fim);
  const qc   = statsQC(ini, fim);

  // === Meses disponíveis ===
  const mesesDisp = [...new Set([...DB.vendas.map(v=>v.data.substring(0,7)),
    ...DB.financeiro.map(f=>f.data.substring(0,7))])].sort().reverse().slice(0,12);

  c.innerHTML = `
  <div class="page-header">
    <div><p class="page-title">📊 Relatórios</p>
      <p class="page-sub">Análise completa do Atelier</p></div>
    <div style="display:flex;gap:8px;align-items:center">
      <select id="rel-mes" onchange="renderRelatorios(document.getElementById('content'))"
        style="padding:9px 12px;border:1.5px solid var(--borda);border-radius:6px;
          font-family:Jost,sans-serif;font-size:13px;background:var(--fundo-input)">
        ${mesesDisp.map(m=>`<option value="${m}" ${m===anoMes?'selected':''}>${m}</option>`).join('')}
      </select>
      <button class="btn btn-outline" onclick="exportarRelatorioCSV()">📥 Exportar</button>
    </div>
  </div>

  <!-- DRE -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-header">
      <span class="card-title">💰 DRE — Demonstrativo de Resultado · ${anoMes}</span>
    </div>
    <div class="card-body">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px">
        <div class="kpi ouro"><div class="kpi-label">Faturamento Bruto</div>
          <div class="kpi-value">${fmt(dre.recBruta)}</div>
          <div class="kpi-sub">${dre.qtdVendas} venda(s)</div></div>
        <div class="kpi verde"><div class="kpi-label">Em Caixa</div>
          <div class="kpi-value">${fmt(dre.emCaixa)}</div>
          <div class="kpi-sub">Após Gold Credit e Cashback</div></div>
        <div class="kpi"><div class="kpi-label">Saídas / Custos</div>
          <div class="kpi-value">${fmt(dre.saidas+dre.despTotal)}</div>
          <div class="kpi-sub">Financeiro + Despesas</div></div>
        <div class="kpi ${dre.lucro>=0?'verde':'danger'}">
          <div class="kpi-label">Resultado Líquido</div>
          <div class="kpi-value">${fmt(dre.lucro)}</div>
          <div class="kpi-sub">Margem: ${dre.margem.toFixed(1)}%</div></div>
      </div>
      <div style="background:var(--fundo);border-radius:8px;padding:14px 16px">
        <table style="width:100%;font-size:13px;border-collapse:collapse">
          <tbody>
            ${[
              ['Receita Bruta', dre.recBruta, ''],
              ['(−) Gold Credit aplicado', -dre.gcUsado, 'color:var(--texto-suave)'],
              ['(−) Cashback utilizado', -dre.cbUsado, 'color:var(--texto-suave)'],
              ['= Receita Líquida em Caixa', dre.emCaixa, 'font-weight:700'],
              ['(−) Custos / Saídas financeiro', -dre.saidas, ''],
              ['(−) Despesas do período', -dre.despTotal, ''],
              ['= Resultado do Período', dre.lucro, 'font-weight:700;font-size:15px;color:'+(dre.lucro>=0?'var(--verde)':'#A60000')],
            ].map(([label,val,style])=>`<tr style="border-bottom:1px solid var(--borda)">
              <td style="padding:8px 4px;${style}">${label}</td>
              <td style="padding:8px 4px;text-align:right;${style}">${fmt(Math.abs(val))}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Ranking Clientes -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-header">
      <span class="card-title">👑 Ranking de Clientes · Top 10 · ${anoMes}</span>
      <button class="btn btn-outline btn-sm" onclick="exportarClientesCSV()">📥 CSV</button>
    </div>
    <div class="card-body" style="padding:0">
      <div class="table-wrap"><table>
        <thead><tr>
          <th>#</th><th>Cliente</th><th>Compras</th>
          <th>No Período</th><th>Ticket Médio</th><th>LTV Total</th>
          <th>Gold Credit</th><th>Cashback</th>
        </tr></thead>
        <tbody>
          ${ranking.map((cl,i)=>`<tr>
            <td style="font-weight:700;color:var(--ouro)">${i+1}</td>
            <td style="font-weight:600">${esc(cl.nome)}</td>
            <td style="text-align:center">${cl._qtd}</td>
            <td class="fw-600">${fmt(cl._total)}</td>
            <td>${fmt(cl._ticket)}</td>
            <td style="color:var(--texto-suave);font-size:12px">${fmt(cl._ltv)}</td>
            <td style="color:var(--ouro)">${cl._gc>0?fmt(cl._gc):'—'}</td>
            <td style="color:var(--verde)">${cl._cb>0?fmt(cl._cb):'—'}</td>
          </tr>`).join('')||'<tr><td colspan="7" class="text-center text-suave" style="padding:24px">Sem dados de vendas</td></tr>'}
        </tbody>
      </table></div>
    </div>
  </div>

  <!-- Grid: Produção + QC -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">

    <!-- Produção -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">⚒ Produção · ${anoMes}</span>
      </div>
      <div class="card-body">

        <p style="font-size:11px;font-weight:700;color:var(--texto-suave);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">Por responsável</p>
        ${Object.entries(prod.byResp).sort((a,b)=>b[1]-a[1]).map(([resp,qtd])=>`
          <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--borda);font-size:13px">
            <span>${esc(resp)}</span>

    </div>

      <div class="card-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
          <div style="padding:12px;background:var(--fundo);border-radius:8px;text-align:center">
            <p style="font-size:22px;font-weight:700;color:var(--verde);font-family:'Cormorant Garamond',serif">${qc.aprov}</p>
            <p style="font-size:11px;color:var(--texto-suave)">Aprovados</p>
          </div>
          <div style="padding:12px;background:var(--fundo);border-radius:8px;text-align:center">

    return '<div class="card" style="margin-bottom:20px;border:1.5px solid rgba(176,142,86,.4)">'

      +'<tbody>'+alertaGC.map(e=>{
        const cl=DB.clientes.find(c=>c.id==e.cliente_id)||{};
        const meses=Math.floor((Date.now()-new Date(e.data))/(30*24*3600*1000));
        const restam=20-meses;
        return '<tr><td class="fw-600">'+esc(cl.nome||'—')+'</td>'
          +'<td>'+fmt(e.credito)+'</td>'
          +'<td>'+fmtDate(e.data)+'</td>'
          +'<td>'+meses+' meses</td>'
          +'<td><span style="color:var(--ouro);font-weight:600">⚠️ Vence em '+restam+' mês(es)</span></td></tr>';
      }).join('')+'</tbody></table></div></div></div>';
  })()}

  `;

  // Atualiza o mês selecionado e re-renderiza ao mudar
  const selMes = c.querySelector('#rel-mes');
  if(selMes){
    selMes.onchange = ()=>{
      // Atualiza variável local e re-renderiza
      const m = selMes.value;
      // Muda today para o período selecionado temporariamente
      window._relMes = m;
      renderRelatorios(c);
    };
    // Inicializa _relMes com o select atual (se já tinha valor)
    if(!window._relMes) window._relMes = selMes.value;
  }
}

// Exporta relatório consolidado do período em CSV
function exportarRelatorioCSV(){
  const mes = document.getElementById('rel-mes')?.value || today().substring(0,7);
  const ini = mes+'-01', fim = mes+'-31';

  // Seção vendas
  const vendas = DB.vendas.filter(v=>v.data>=ini&&v.data<=fim);
  const cab = ['Seção','Campo','Valor'];
  const dre_recBruta = vendas.reduce((a,v)=>a+(v.valor_total||0),0);
  const dre_emCaixa  = vendas.reduce((a,v)=>a+(v.valor_em_caixa||0),0);
  const dre_saidas   = DB.financeiro.filter(f=>f.data>=ini&&f.data<=fim&&f.tipo==='saida').reduce((a,f)=>a+(f.valor||0),0);

  const linhas = [
    ['DRE','Período',mes],
    ['DRE','Receita Bruta',fmtN(dre_recBruta,2)],
    ['DRE','Em Caixa',fmtN(dre_emCaixa,2)],
    ['DRE','Saídas',fmtN(dre_saidas,2)],
    ['DRE','Resultado',fmtN(dre_emCaixa-dre_saidas,2)],
    ['','',''],
    ...vendas.map(v=>['Venda',v.data+' — '+clienteNome(v.cliente_id)+' — '+v.descricao,fmtN(v.valor_total,2)]),
  ];
  exportarCSV('relatorio_'+mes, cab, linhas);
}

// Helper: painel de storage e backup para Gerenciar Acessos
function renderStoragePanel(){
  const usado=calcStorageUsado();

  const mb=(usado/1024/1024).toFixed(1);
  const cor=pct>=85?'var(--vermelho)':pct>=70?'var(--ouro)':'var(--verde)';
  const ultimo=localStorage.getItem(_BACKUP_KEY);
  const diasDesde=ultimo?Math.floor((Date.now()-new Date(ultimo).getTime())/86400000):null;
  const backupCor=diasDesde===null||diasDesde>=7?'var(--vermelho)':diasDesde>=4?'var(--ouro)':'var(--verde)';

async function saveUser(idx){
  const login=document.getElementById('uu-user')?.value.trim();
  const nome=document.getElementById('uu-nome')?.value.trim();
  const role=document.getElementById('uu-role')?.value||'comercial';
  const passRaw=document.getElementById('uu-pass')?.value||'';
  if(!login||!nome){showToast('Login e nome obrigatórios','danger');return;}
  if(idx===-1&&!passRaw){showToast('Senha obrigatória para novo usuário','danger');return;}
  if(idx===-1&&USERS.find(u=>u.user===login)){showToast('Login já existe','danger');return;}
  const perms={
    pode_abrir_caixa:document.getElementById('uu-caixa')?.checked||false,
    pode_override_reserva:document.getElementById('uu-reserva')?.checked||false,
    pode_excluir:document.getElementById('uu-excluir')?.checked||false,
    pode_editar_vendas:document.getElementById('uu-edvendas')?.checked||false,
    pode_orc_atelier:document.getElementById('uu-orc-atelier')?.checked||false,
    pode_fazer_qc:document.getElementById('uu-fazer-qc')?.checked||false,
    pode_aprovar_venda:document.getElementById('uu-aprovar-venda')?.checked||false,
    pode_dispensar_lab:document.getElementById('uu-dispensar-lab')?.checked||false,
  };
  if(idx===-1){
    const hash=await hashPass(passRaw,login);
    USERS.push({user:login,pass:hash,nome,role,ativo:true,...perms});
  } else {
    const u=USERS[idx];
    u.nome=nome;u.role=role;Object.assign(u,perms);
    if(passRaw) u.pass=await hashPass(passRaw,u.user);
  }
  saveUsers();fecharModal();showToast('Usuário salvo!');
  renderAcessos(document.getElementById('content'));
}

function inativarUser(idx){
  const u=USERS[idx];if(!u)return;
  if(u.role==='admin'){showToast('Administradora não pode ser inativada','danger');return;}
  if(u.ativo===false){showToast('Usuário já está inativo','warn');return;}
  const temVendas=DB.vendas.some(v=>v.colaborador===u.nome);
  const temOS=DB.os.some(o=>o.responsavel===u.nome);
  const msg=`<strong>${u.nome}</strong> — acesso será bloqueado.<br>${temVendas||temOS?'Histórico preservado.':'Pode ser excluída definitivamente depois.'}`;
  confirmarAcao('Inativar '+u.nome+'?',msg,'Inativar',function(){
    USERS[idx].ativo=false;saveUsers();
    const colab=DB.colaboradores.find(c=>c.nome===u.nome);
    if(colab)colab.ativo=false;saveDB();
    if(SESS&&SESS.usuario===u.user)doLogout();
    auditLog('usuario_inativado',{usuario:u.user,nome:u.nome});
    showToast(u.nome+' inativada');
    renderAcessos(document.getElementById('content'));
  });
}

function reativarUser(idx){
  const u=USERS[idx];if(!u)return;
  confirmarAcao('Reativar '+u.nome+'?','Voltará a ter acesso ao sistema.','Reativar',function(){
    USERS[idx].ativo=true;saveUsers();
    const colab=DB.colaboradores.find(c=>c.nome===u.nome);
    if(colab)colab.ativo=true;saveDB();
    auditLog('usuario_reativado',{usuario:u.user,nome:u.nome});
    showToast(u.nome+' reativada!');
    renderAcessos(document.getElementById('content'));
  });
}

function excluirUserDefinitivo(idx){
  const u=USERS[idx];if(!u||u.role==='admin'){showToast('Não permitido','danger');return;}
  if(DB.vendas.some(v=>v.colaborador===u.nome)||DB.os.some(o=>o.responsavel===u.nome)){
    showToast('Usuária tem histórico — use Inativar','danger');return;
  }
  confirmarAcao('Excluir definitivamente '+u.nome+'?','⚠️ Irreversível.','Excluir',function(){
    auditLog('usuario_excluido',{usuario:u.user,nome:u.nome});
    USERS.splice(idx,1);saveUsers();
    showToast('Usuário excluído');
    renderAcessos(document.getElementById('content'));
  });
}

let _cxvItens = [];

function cxvAutoFill(){
  const sel=document.getElementById('cxv-add-prod');
  if(!sel) return;
  const opt=sel.options[sel.selectedIndex];
  const preco=parseFloat(opt?.dataset?.preco)||0;
  const nome=opt?.dataset?.nome||'';
  if(nome) document.getElementById('cxv-add-desc').value=nome;
  if(preco) document.getElementById('cxv-add-preco').value=preco;
}

function cxvAddItem(){
  const pid=parseInt(document.getElementById('cxv-add-prod')?.value)||null;
  const desc=(document.getElementById('cxv-add-desc')?.value||'').trim();
  const preco=parseFloat(document.getElementById('cxv-add-preco')?.value)||0;
  const qtd=Math.max(1,parseInt(document.getElementById('cxv-add-qtd')?.value)||1);
  if(!desc){showToast('Informe a descrição do item','warn');return;}
  if(!preco){showToast('Informe o valor do item','warn');return;}
  if(pid){
    const prod=DB.colecao.find(p=>p.id===pid);
    if(!prod||prod.estoque<qtd){showToast('Estoque insuficiente','danger');return;}
    if(prod.origem_lote_id&&!prod.qc_aprovado){showToast('⛔ QC não aprovado: '+desc,'danger');return;}
  }
  _cxvItens.push({pid,desc,preco,qtd,subtotal:preco*qtd});
  document.getElementById('cxv-add-prod').value='';
  document.getElementById('cxv-add-desc').value='';
  document.getElementById('cxv-add-preco').value='';
  document.getElementById('cxv-add-qtd').value='1';
  cxvRenderItens();
}

function cxvRemoveItem(idx){
  _cxvItens.splice(idx,1);
  cxvRenderItens();
}

function cxvRenderItens(){
  const lista=document.getElementById('cxv-itens-lista');
  const valEl=document.getElementById('cxv-val');
  const descEl=document.getElementById('cxv-desc');
  if(!lista) return;
  const total=_cxvItens.reduce((a,it)=>a+it.subtotal,0);
  if(_cxvItens.length===0){
    lista.innerHTML='';
  } else {
    lista.innerHTML=`<div style="border:1px solid var(--borda);border-radius:8px;overflow:hidden;margin-bottom:6px">
      ${_cxvItens.map((it,i)=>`
        <div style="display:flex;align-items:center;gap:8px;padding:9px 12px;${i>0?'border-top:1px solid var(--borda)':''}">
          <div style="flex:1;min-width:0">
            <p style="font-size:13px;font-weight:600;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.desc}</p>
            <p style="font-size:11px;color:var(--texto-suave);margin:0">${it.qtd>1?it.qtd+'× de '+fmt(it.preco)+' = ':''}${fmt(it.subtotal)}</p>
          </div>
          <button onclick="cxvRemoveItem(${i})" style="background:none;border:none;color:#eb5757;font-size:18px;cursor:pointer;padding:4px">×</button>
        </div>`).join('')}
      <div style="padding:8px 12px;border-top:1px solid var(--borda);background:var(--fundo);display:flex;justify-content:space-between">
        <span style="font-size:12px;color:var(--texto-suave)">${_cxvItens.length} ${_cxvItens.length===1?'item':'itens'}</span>
        <span style="font-weight:700;color:var(--azul)">${fmt(total)}</span>
      </div>
    </div>`;
  }
  if(valEl&&total>0){valEl.value=total; calcCaixaVista();}
  if(descEl) descEl.value=_cxvItens.map(it=>it.qtd>1?it.qtd+'× '+it.desc:it.desc).join(' · ')||'';
}

function selecionarProdutoCaixa(){
  const sel=document.getElementById('cxv-prod');

  const infoBox=document.getElementById('cxv-prod-info');
  if(!pid){
    if(infoBox)infoBox.style.display='none';
    return;
  }
  const prod=DB.colecao.find(p=>p.id===pid);
  if(!prod)return;
  // Preenche campos automaticamente
  const descEl=document.getElementById('cxv-desc');
  const valEl=document.getElementById('cxv-val');
  if(descEl&&!descEl.value) descEl.value=prod.nome+(prod.metal?' · '+prod.metal:'');
  else if(descEl) descEl.value=prod.nome+(prod.metal?' · '+prod.metal:'');
  if(valEl&&prod.preco>0) valEl.value=prod.preco;
  // Mostra info do produto
  if(infoBox){
    infoBox.style.display='block';
    infoBox.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <strong style="color:var(--azul)">${prod.nome}</strong>
          ${prod.metal?`<span style="color:var(--texto-suave)"> · ${prod.metal}</span>`:''}
          ${prod.peso?`<span style="color:var(--texto-suave)"> · ${fmtN(prod.peso,2)}g</span>`:''}

      ${prod.descricao?`<p style="font-size:12px;color:var(--texto-suave);margin-top:4px">${prod.descricao}</p>`:''}`;

function calcCaixaVista(){
  const val=parseFloat(document.getElementById('cxv-val')?.value)||0;
  const forma=document.getElementById('cxv-forma')?.value||'PIX';
  const cid=parseInt(document.getElementById('cxv-cl')?.value)||0;
  const psId=parseInt(document.getElementById('cxv-ps')?.value)||null;
  const el=document.getElementById('cxv-info');
  const rsSection=document.getElementById('cxv-reserva-section');
  const mistoSection=document.getElementById('cxv-misto-section');
  const isMisto=forma==='Misto';
  const isGC=forma==='Gold Credit';
  const isCartaoCred=forma==='Cartão Crédito';
  const isCashback=forma==='Cashback';

  // — Cartão Crédito: parcelamento e taxa ────────────────────────
  const cartaoSection=document.getElementById('cxv-cartao-section');
  if(cartaoSection){
    if(isCartaoCred&&val>0){
      const prevParc=parseInt(document.getElementById('cxv-parc')?.value)||1;
      cartaoSection.style.display='block';
      const parcelLabel=prevParc>1?`${prevParc}× de ${fmt(val/prevParc)}`:'1× à vista';
      cartaoSection.innerHTML=`
        <div style="background:var(--fundo);border:1px solid var(--borda);border-radius:8px;padding:12px 14px">
          <div style="display:flex;align-items:center;gap:10px">
            <label style="font-size:12px;color:var(--texto-suave);white-space:nowrap;font-weight:600">Parcelamento</label>
            <select id="cxv-parc" onchange="calcCaixaVista()"
              style="flex:1;padding:8px 12px;font-size:15px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif;font-weight:700">
              ${Array.from({length:10},(_,i)=>i+1).filter(n=>n===1||(val/n)>=PARCELA_MIN).map(n=>`<option value="${n}" ${n===prevParc?'selected':''}>${n===1?'1× à vista':`${n}× de ${fmt(val/n)}`}</option>`).join('')}
            </select>
          </div>
          <p style="font-size:11px;color:var(--texto-suave);margin-top:6px">Total cobrado do cliente: <strong>${fmt(val)}</strong> ${prevParc>1?`· ${prevParc} parcelas de ${fmt(val/prevParc)}`:''}</p>
        </div>`;
    } else {
      cartaoSection.style.display='none';
      cartaoSection.innerHTML='';
    }
  }

  // — Gold Credit Section ————————————————————————————————
  if(rsSection){
    if(isGC||isMisto){
      const saldoCX=cid?calcSaldoCliente(cid):0;
      const pctCX=(DB.params_reserva&&DB.params_reserva.limite_uso_pct)||40;
      const limiteCX=cid?calcLimiteReserva(val,saldoCX):0;
      const prevGC=parseFloat(document.getElementById('cxv-reserva')?.value)||0;
      rsSection.style.display='block';
      rsSection.innerHTML=`
        <div style="background:${saldoCX>0?'rgba(176,142,86,.07)':'rgba(235,87,87,.07)'};border:1px solid ${saldoCX>0?'rgba(176,142,86,.3)':'rgba(235,87,87,.3)'};border-radius:8px;padding:12px 14px">
          <p style="font-size:12px;font-weight:700;color:${saldoCX>0?'var(--ouro)':'#eb5757'};margin-bottom:8px">
            ${cid?(saldoCX>0?'💎 Saldo Gold Credit: '+fmt(saldoCX):'⚠️ Cliente sem saldo Gold Credit'):'⚠️ Selecione um cliente para usar Gold Credit'}
          </p>
          ${cid&&saldoCX>0?`
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;align-items:end">
            <div>
              <label style="font-size:12px;color:var(--texto-suave);display:block;margin-bottom:3px">Gold Credit (R$)</label>
              <input id="cxv-reserva" type="number" step="10" min="0" max="${limiteCX.toFixed(2)}"
                value="${Math.min(prevGC||limiteCX,limiteCX).toFixed(2)}"
                oninput="clampReserva(this,'cxv-val',calcSaldoCliente(parseInt(document.getElementById('cxv-cl')?.value)||0));calcCaixaVista()"
                style="width:100%;padding:7px 10px;font-size:16px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif;text-align:right;font-weight:700">
            </div>
            <div>
              <label style="font-size:12px;color:var(--texto-suave);display:block;margin-bottom:3px">Restante em caixa via</label>
              <select id="cxv-forma-restante" onchange="calcCaixaVista()"
                style="width:100%;padding:8px 10px;font-size:13px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif">
                <option value="PIX">PIX</option>
                <option value="Cartão Crédito">Cartão Crédito à vista</option>
                <option value="Cartão Débito">Cartão Débito</option>
                <option value="Dinheiro">Dinheiro</option>
              </select>
            </div>
          </div>
          <p style="font-size:10px;color:var(--texto-suave)">Limite ${pctCX}% de ${fmt(val)} = <strong>${fmt(limiteCX)}</strong></p>
          `:''}
        </div>`;
    } else {
      rsSection.style.display='none';
      rsSection.innerHTML='';
    }
  }

  // — Cashback Section ──────────────────────────────────────────
  const cbSection=document.getElementById('cxv-cashback-section');
  if(cbSection){
    if(isCashback&&val>0){
      const saldoCBcx=cid?calcCashbackCliente(cid):0;
      const prevCBcx=parseFloat(document.getElementById('cxv-cb-val')?.value)||0;
      const usarCBcx=prevCBcx>0?Math.min(prevCBcx,saldoCBcx,val):Math.min(saldoCBcx,val);
      cbSection.style.display='block';
      const saldoOk=cid&&saldoCBcx>0;
      const bg=saldoOk?'rgba(46,125,50,.07)':'rgba(235,87,87,.07)';
      const bd=saldoOk?'rgba(46,125,50,.3)':'rgba(235,87,87,.3)';
      const tcolor=saldoOk?'#2e7d32':'#eb5757';
      const title=cid?(saldoOk?'↺ Cashback disponível: '+fmt(saldoCBcx):'⚠️ Cliente sem saldo de cashback'):'⚠️ Selecione um cliente para usar cashback';
      let cbHtml='<div style="background:'+bg+';border:1px solid '+bd+';border-radius:8px;padding:12px 14px">'
        +'<p style="font-size:12px;font-weight:700;color:'+tcolor+';margin-bottom:'+(saldoOk?'10':'0')+'px">'+title+'</p>';
      if(saldoOk){
        const prevFR=document.getElementById('cxv-cb-forma-restante')?.value||'PIX';
        const maxCB=Math.min(saldoCBcx,val).toFixed(2);
        cbHtml+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:end">'
          +'<div>'
          +'<label style="font-size:12px;color:var(--texto-suave);display:block;margin-bottom:4px">Cashback a usar (R$)</label>'
          +'<input id="cxv-cb-val" type="number" step="0.01" min="0" max="'+maxCB+'"'
          +' value="'+usarCBcx.toFixed(2)+'" oninput="calcCaixaVista()"'
          +' style="width:100%;padding:9px 10px;font-size:17px;border:1.5px solid #81c784;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif;text-align:right;font-weight:700">'
          +'<p style="font-size:10px;color:var(--texto-suave);margin-top:3px">Máximo: '+fmt(Math.min(saldoCBcx,val))+'</p>'
          +'</div>'
          +'<div>'
          +'<label style="font-size:12px;color:var(--texto-suave);display:block;margin-bottom:4px">Restante pago via</label>'
          +'<select id="cxv-cb-forma-restante" onchange="calcCaixaVista()" style="width:100%;padding:8px 10px;font-size:13px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif">'
          +'<option value="PIX"'+(prevFR==='PIX'?' selected':'')+'>PIX</option>'
          +'<option value="Cartão Crédito"'+(prevFR==='Cartão Crédito'?' selected':'')+'>Cartão Crédito</option>'
          +'<option value="Cartão Débito"'+(prevFR==='Cartão Débito'?' selected':'')+'>Cartão Débito</option>'
          +'<option value="Dinheiro"'+(prevFR==='Dinheiro'?' selected':'')+'>Dinheiro</option>'
          +'<option value=""'+(prevFR===''?' selected':'')+'>Apenas Cashback</option>'
          +'</select>'
          +'</div>'
          +'</div>';
      }
      cbHtml+='</div>';
      cbSection.innerHTML=cbHtml;
    } else {
      cbSection.style.display='none';
      cbSection.innerHTML='';
    }
  }

  // — Misto: breakdown de como entra em caixa ————————————————
  if(mistoSection){
    if(isMisto&&val>0){
      const reservaCXm=parseFloat(document.getElementById('cxv-reserva')?.value)||0;
      const restante=Math.max(0,val-reservaCXm);
      const prevPix=parseFloat(document.getElementById('cxv-mx-pix')?.value)||0;
      const prevCred=parseFloat(document.getElementById('cxv-mx-cred')?.value)||0;
      const prevDeb=parseFloat(document.getElementById('cxv-mx-deb')?.value)||0;
      const prevDin=parseFloat(document.getElementById('cxv-mx-din')?.value)||0;
      const somaAtual=prevPix+prevCred+prevDeb+prevDin;
      const sobra=restante-somaAtual;
      const cor=Math.abs(sobra)<0.5?'var(--verde)':sobra>0?'#eb5757':'#eb5757';
      const msg=Math.abs(sobra)<0.5?'✅ Completo':sobra>0?`⚠️ Faltam ${fmt(sobra)}`:`⚠️ Excede ${fmt(Math.abs(sobra))}`;
      mistoSection.style.display='block';
      mistoSection.innerHTML=`
        <div style="background:var(--fundo);border:1px solid var(--borda);border-radius:8px;padding:12px 14px">
          <p style="font-size:11px;font-weight:700;color:var(--texto-suave);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px">
            Como entra em caixa: <strong style="color:var(--azul)">${fmt(restante)}</strong>
          </p>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
            <div>
              <label style="font-size:11px;color:var(--texto-suave)">PIX (R$)</label>
              <input id="cxv-mx-pix" type="number" step="10" min="0" value="${prevPix||0}" oninput="calcCaixaVista()"
                style="width:100%;padding:7px 10px;font-size:15px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif;text-align:right">
            </div>
            <div>
              <label style="font-size:11px;color:var(--texto-suave)">Cartão Crédito à vista (R$)</label>
              <input id="cxv-mx-cred" type="number" step="10" min="0" value="${prevCred||0}" oninput="calcCaixaVista()"
                style="width:100%;padding:7px 10px;font-size:15px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif;text-align:right">
            </div>
            <div>
              <label style="font-size:11px;color:var(--texto-suave)">Cartão Débito (R$)</label>
              <input id="cxv-mx-deb" type="number" step="10" min="0" value="${prevDeb||0}" oninput="calcCaixaVista()"
                style="width:100%;padding:7px 10px;font-size:15px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif;text-align:right">
            </div>
            <div>
              <label style="font-size:11px;color:var(--texto-suave)">Dinheiro (R$)</label>
              <input id="cxv-mx-din" type="number" step="10" min="0" value="${prevDin||0}" oninput="calcCaixaVista()"
                style="width:100%;padding:7px 10px;font-size:15px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif;text-align:right">
            </div>
          </div>
          <p style="font-size:12px;font-weight:600;color:${cor}">${msg}</p>
        </div>`;
    } else {
      mistoSection.style.display='none';
      mistoSection.innerHTML='';
    }
  }

  if(!el)return;
  if(!val){el.textContent='Preencha o valor.';return;}

  const reservaCX=parseFloat(document.getElementById('cxv-reserva')?.value)||0;
  const emCaixaCX=Math.max(0,val-reservaCX);
  const psObj=psId?(DB.personal_stylers||[]).find(p=>p.id===psId):null;
  const psInfo=psObj?` · PS: ${fmt(val*(psObj.comissao_pct/100))} → ${psObj.nome}`:'';

  // Resumo final
  if(isMisto&&val>0){
    const pix=parseFloat(document.getElementById('cxv-mx-pix')?.value)||0;
    const cred=parseFloat(document.getElementById('cxv-mx-cred')?.value)||0;
    const deb=parseFloat(document.getElementById('cxv-mx-deb')?.value)||0;
    const din=parseFloat(document.getElementById('cxv-mx-din')?.value)||0;
    const soma=pix+cred+deb+din+reservaCX;
    const cor=Math.abs(soma-val)<0.5?'var(--verde)':'#eb5757';
    const ok=Math.abs(soma-val)<0.5;
    const parts=[];
    if(reservaCX>0)parts.push(`Gold Credit: ${fmt(reservaCX)}`);
    if(pix>0)parts.push(`PIX: ${fmt(pix)}`);
    if(cred>0)parts.push(`Crédito: ${fmt(cred)}`);
    if(deb>0)parts.push(`Débito: ${fmt(deb)}`);
    if(din>0)parts.push(`Dinheiro: ${fmt(din)}`);
    el.innerHTML=`<div style="font-size:13px">
      ${parts.map(p=>`<span style="margin-right:8px;color:var(--texto-suave)">${p}</span>`).join('')}
      <br><span style="font-size:12px;color:${cor};font-weight:600">${ok?'✅ Total: '+fmt(val):'⚠️ Soma: '+fmt(soma)+' / Total: '+fmt(val)}</span>
      ${psInfo?`<br><span style="font-size:11px;color:var(--texto-suave)">${psInfo}</span>`:''}
    </div>`;
  } // fecha if(isMisto)
  // ── Resumo visual para demais formas ─────────────────────────────
  if(!isMisto) _cxvResumoVisual(val,forma,reservaCX,isCashback,isCashback,isCartaoCred,psInfo,el);
}

function salvarVendaCaixa(){
  if(_cxvItens.length===0){showToast('Adicione pelo menos um item','warn');return;}
  const desc  = _cxvItens.map(it=>it.qtd>1?it.qtd+'× '+it.desc:it.desc).join(' · ');
  const val   = parseFloat(document.getElementById('cxv-val')?.value)||0;
  const forma = document.getElementById('cxv-forma')?.value||'PIX';
  const colab = document.getElementById('cxv-colab')?.value||'';
  const cid   = parseInt(document.getElementById('cxv-cl')?.value)||null;
  const psId  = parseInt(document.getElementById('cxv-ps')?.value)||null;
  if(!val){showToast('Valor obrigatório','danger');return;}

  // ── Misto: validação da soma ──────────────────────────────────
  let pgtoMisto=null;
  if(forma==='Misto'){
    const _pix  = parseFloat(document.getElementById('cxv-mx-pix')?.value)||0;
    const _cred = parseFloat(document.getElementById('cxv-mx-cred')?.value)||0;
    const _deb  = parseFloat(document.getElementById('cxv-mx-deb')?.value)||0;
    const _din  = parseFloat(document.getElementById('cxv-mx-din')?.value)||0;
    const _gc   = parseFloat(document.getElementById('cxv-reserva')?.value)||0;
    const soma  = _pix+_cred+_deb+_din+_gc;
    if(Math.abs(soma-val)>0.5){
      showToast('A soma dos pagamentos ('+fmt(soma)+') difere do total ('+fmt(val)+')','danger');
      return;
    }
    pgtoMisto={pix:_pix,cred:_cred,deb:_deb,din:_din,gc:_gc};
  }

  // ── Validações Gold Credit ─────────────────────────────────────
  const reservaGC = parseFloat(document.getElementById('cxv-reserva')?.value)||0;
  if((forma==='Gold Credit'||forma==='Misto')&&reservaGC>0){
    if(!cid){showToast('Selecione um cliente para usar Gold Credit','danger');return;}
    const saldo=calcSaldoCliente(cid);
    if(saldo<=0){showToast('Cliente sem saldo Gold Credit','danger');return;}
    if(reservaGC>saldo+0.5){showToast('Saldo insuficiente — disponível: '+fmt(saldo),'danger');return;}
    const limite=calcLimiteReserva(val,saldo);
    if(reservaGC>limite+0.5){
      solicitarOverrideReserva(reservaGC,limite,function(){salvarVendaCaixa();});
      return;
    }
  }

  // ── Validações Cashback ────────────────────────────────────────
  const cbUsado = parseFloat(document.getElementById('cxv-cb-val')?.value)||0;
  if(forma==='Cashback'&&cbUsado>0){
    if(!cid){showToast('Selecione um cliente para usar cashback','danger');return;}
    const saldoCB=calcCashbackCliente(cid);
    if(saldoCB<=0){showToast('Cliente sem saldo de cashback','danger');return;}
    if(cbUsado>saldoCB+0.01){showToast('Cashback insuficiente — disponível: '+fmt(saldoCB),'danger');return;}
  }

  // ── Forma restante (pós GC ou CB) ─────────────────────────────
  const formaRestCB = document.getElementById('cxv-cb-forma-restante')?.value||'PIX';
  const formaRestGC = document.getElementById('cxv-forma-restante')?.value||forma;
  const formaRestante = forma==='Cashback'?(formaRestCB==='—'?'Cashback':formaRestCB)
                      : (reservaGC>0?formaRestGC:forma);
  const parc = parseInt(document.getElementById('cxv-parc')?.value)||null;

  const r = registrarVenda({
    cid, desc, valor_total:val, forma_pgto:forma, colab,
    data:        today(),
    origem:      'caixa',
    itens:       _cxvItens.slice(),
    reserva_gc:  reservaGC,
    cashback_usado: forma==='Cashback'?cbUsado:0,
    pgto_misto:  pgtoMisto,
    parcelas:    forma==='Cartão Crédito'?parc:null,
    forma_restante: formaRestante,
    personal_styler_id: psId||null,
    registrar_caixa: true
  });

  if(!r.ok){showToast(r.msg,'danger');return;}
  const cbUsadoMsg = (forma==='Cashback'&&cbUsado>0)?` · ↺ Cashback ${fmt(cbUsado)} usado`:'';
  const cbGeradoMsg = r.cb_gerado>0?` · 💎 +${fmt(r.cb_gerado)} gerado!`:'';
  fecharModal();
  showToast(`✅ ${fmt(val)} registrado!`+cbUsadoMsg+cbGeradoMsg);
  renderCaixa(document.getElementById('content'));
}


function excluirMovCaixa(movId){
  if(!podeExcluir()){showToast('Sem permissão','danger');return;}
  const mov=DB.caixa.movimentos.find(m=>m.id==movId);if(!mov)return;
  const prod=mov.produto_id?DB.colecao.find(p=>p.id===mov.produto_id):null;
  const impacto=[];
  if(prod)impacto.push(`Estoque de <strong>${prod.nome}</strong>: ${prod.estoque} → ${prod.estoque+1}`);
  const venda=DB.vendas.find(v=>v.origem==='caixa'&&v.data===mov.data&&Math.abs(v.valor_total-mov.valor)<0.01&&v.descricao===mov.descricao);
  if(venda&&venda.credito_ouro_aplic>0)impacto.push(`Gold Credit utilizado (${fmt(venda.credito_ouro_aplic)}) será <strong>restituída</strong>`);
  const detalhe=`${mov.descricao} — ${fmt(mov.valor)}${impacto.length?'<br><br>'+impacto.join('<br>'):''}`;
  confirmarAcao('Remover movimento?',detalhe,'Remover',function(){
    DB.caixa.movimentos=DB.caixa.movimentos.filter(m=>m.id!=movId);
    const vendaIdx=DB.vendas.findIndex(v=>v.origem==='caixa'&&v.data===mov.data&&Math.abs(v.valor_total-mov.valor)<0.01&&v.descricao===mov.descricao);
    let vendaRem=null;
    if(vendaIdx>=0){vendaRem=DB.vendas[vendaIdx];DB.vendas.splice(vendaIdx,1);}
    if(mov.produto_id){const produto=DB.colecao.find(p=>p.id===mov.produto_id);if(produto)produto.estoque+=1;}
    if(vendaRem&&vendaRem.credito_ouro_aplic>0&&vendaRem.cliente_id){
      DB.vendas_credito=DB.vendas_credito.filter(vc=>!(vc.cliente_id==vendaRem.cliente_id&&Math.abs(vc.valor_usado-vendaRem.credito_ouro_aplic)<0.01&&vc.descricao===vendaRem.descricao));
    }
    DB.financeiro=DB.financeiro.filter(f=>!(f.tipo==='entrada'&&f.data===mov.data&&Math.abs(f.valor-mov.valor)<0.01&&f.descricao===mov.descricao));
    if(vendaRem)recalcLTV(vendaRem.cliente_id);
    // ── Snapshot + remove cashback ──────────────────────────────
    if(vendaRem){
      if(!DB.vendas_excluidas) DB.vendas_excluidas=[];
      DB.vendas_excluidas.push({...vendaRem,excluido_em:new Date().toISOString(),excluido_por:SESS?.usuario||'sistema',excluido_por_nome:SESS?.nome||'sistema'});
      const lim90=new Date(); lim90.setDate(lim90.getDate()-90);
      DB.vendas_excluidas=DB.vendas_excluidas.filter(x=>new Date(x.excluido_em)>=lim90);
    }
    if(vendaRem&&vendaRem.cliente_id){
      const cbCx=DB.cashback.find(x=>x.cliente_id==vendaRem.cliente_id);
      if(cbCx&&cbCx.historico){
        const removCB=cbCx.historico.filter(h=>
          h.valor>0&&h.data===mov.data&&
          (h.descricao||'').includes((vendaRem.descricao||'').substring(0,20)));
        const totalRemCB=removCB.reduce((a,h)=>a+h.valor,0);
        cbCx.historico=cbCx.historico.filter(h=>
          !(h.valor>0&&h.data===mov.data&&
            (h.descricao||'').includes((vendaRem.descricao||'').substring(0,20))));
        cbCx.saldo=Math.round(Math.max(0,cbCx.saldo-totalRemCB)*100)/100;
        const clCBcx=DB.clientes.find(c=>c.id==vendaRem.cliente_id);
      }
    }
    auditLog('movimento_caixa_excluido',{descricao:mov.descricao,valor:mov.valor,data:mov.data});
    saveDB();
    showToast('Movimento removido · cashback removido · dados restaurados');
    renderCaixa(document.getElementById('content'));
  });
}

function confirmarFecharCaixa(){
  const cx=DB.caixa;
  const movHoje=(cx.movimentos||[]).filter(m=>m.data===today());
  const totalVendas=movHoje.reduce((a,m)=>a+(m.valor||0),0);
  const saldoFinal=(cx.valor_abertura||0)+totalVendas;
  confirmarAcao('Fechar Caixa?',
    `<strong>${movHoje.length} venda(s)</strong> · Total: <strong>${fmt(totalVendas)}</strong><br>Saldo final: <strong>${fmt(saldoFinal)}</strong>`,
    'Fechar Caixa',
    function(){
      const fech={data:today(),hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
        data_abertura:cx.data_abertura,hora_abertura:cx.hora_abertura,
        valor_abertura:cx.valor_abertura,total_vendas:totalVendas,saldo_final:saldoFinal,
        responsavel:cx.responsavel,usuario:SESS.usuario,qtd_vendas:movHoje.length,
        formas:movHoje.reduce((acc,m)=>{acc[m.forma]=(acc[m.forma]||0)+m.valor;return acc;},{})};
      const hist=(cx.fechamentos||[]);
      hist.push(fech);
      if(hist.length>90)hist.splice(0,hist.length-90);
      auditLog('caixa_fechado',{data:today(),total:totalVendas,vendas:movHoje.length,responsavel:cx.responsavel});
      DB.caixa={status:'fechado',data_abertura:null,hora_abertura:null,valor_abertura:0,
        responsavel:'',movimentos:[],fechamentos:hist,ultimo_fechamento:fech};
      saveDB();showToast('Caixa fechado!');
      renderCaixa(document.getElementById('content'));
    });
}


function exportarBackup(){
  const snap={_version:2,_exported:new Date().toISOString(),db:{},users:USERS};
  DB_KEYS.forEach(k=>{if(DB[k]!==undefined)snap.db[k]=DB[k];});
  DB_OBJ_KEYS.forEach(k=>{if(DB[k]!==undefined)snap.db[k]=DB[k];});
  snap.db._ids=JSON.parse(JSON.stringify(DB._ids));
  if(DB.caixa&&Array.isArray(DB.caixa.movimentos))snap.db.caixa=DB.caixa;
  const blob=new Blob([JSON.stringify(snap,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='backup_atelier_'+today()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  auditLog('backup_exportado',{data:today()});
  marcarBackupFeito();  // Registra data para o alerta semanal
  saveDB();
  showToast('✅ Backup exportado e registrado!');
}

function importarBackup(input){
  if(SESS?.role!=='admin'){showToast('Apenas a administradora pode importar backups','danger');return;}
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const snap=JSON.parse(e.target.result);
      if(!snap._version||!snap.db){showToast('Arquivo invalido','danger');return;}
      confirmarAcao('Restaurar Backup?',
        'Os dados atuais serao substituidos.',
        'Restaurar',function(){
          DB_KEYS.forEach(k=>{if(Array.isArray(snap.db[k]))DB[k]=snap.db[k];});
          DB_OBJ_KEYS.forEach(k=>{
            if(snap.db[k]&&typeof snap.db[k]==='object'&&!Array.isArray(snap.db[k])){
              Object.assign(DB[k],snap.db[k]);
              if(k==='caixa'){
                if(Array.isArray(snap.db[k].movimentos))DB[k].movimentos=snap.db[k].movimentos;
                if(Array.isArray(snap.db[k].fechamentos))DB[k].fechamentos=snap.db[k].fechamentos;
              }
            }
          });
          if(snap.db._ids&&typeof snap.db._ids==='object'){
            Object.keys(snap.db._ids).forEach(k=>{DB._ids[k]=snap.db._ids[k];});
          }
          if(Array.isArray(snap.users)){
            USERS.length=0;snap.users.forEach(u=>USERS.push(u));
            migrateUsers();saveUsers();
          }
          auditLog('backup_importado',{data:today()});
          saveDB();showToast('Backup restaurado!');
          renderAcessos(document.getElementById('content'));
        });
    }catch(err){showToast('Erro: '+err.message,'danger');}
  };
  reader.readAsText(file);input.value='';
}

  // Logo
  const loginLogo=document.getElementById('login-logo-img');
  if(loginLogo)try{loginLogo.src=LOGO_B64;}catch(e){}

  if(sbLogo)try{sbLogo.src=LOGO_B64;}catch(e){}
  // Tenta restaurar sessão com verificação de fingerprint
  (async()=>{
    try{
      const s=localStorage.getItem('atelier_sessao');
      if(s){
        const parsed=JSON.parse(s);
        const age=(Date.now()-parsed.ts)/(1000*60*60);
        if(age<8){ // 8 horas — equivale a um turno de trabalho
          const u=USERS.find(x=>x.user===parsed.usuario);
          if(u&&u.ativo!==false){
            // Verifica fingerprint (proteção contra uso em outro aparelho)
            if(parsed.fp){
              const currentFp=await getDeviceFingerprint();
              if(currentFp!==parsed.fp){
                localStorage.removeItem('atelier_sessao');
                document.getElementById('login-screen').style.display='flex';
                return;
              }
            }
            startSession(u);return;
          }
        }
      }
    }catch(e){}
    document.getElementById('login-screen').style.display='flex';
  })();
});
