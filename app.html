// ENGINE DE PRÉ-ANÁLISE
// Regras: quem faz a pré-análise baseado em setor + responsável
// ══════════════════════════════════════════════════════════════════
const PRE_ANALISE_REGRAS = {
  // [setor]: { [responsavel_execucao]: pre_analista }
  // Peça não especificada em fundicao usa Ana como fallback (responsavel_execucao varia)
  ourivesaria: { 'Mateus': 'Deborah', 'Luiz': 'Deborah' },
  montagem:    { 'Natasha': 'Deborah', 'Deborah': 'Natasha' },
  fundicao:    { '__qualquer__': 'Deborah' }  // Fundição SP → Déborah faz pré-análise ao receber
};

// Retorna quem deve fazer a pré-análise (ou null se não precisar)
// Normaliza o responsável: aceita nome ou login
function getPreAnalistaParaEtapa(setor, responsavel){
  const regras = PRE_ANALISE_REGRAS[setor];
  if(!regras) return null;
  // Tentativa direta pelo nome
  if(regras[responsavel]) return regras[responsavel];
  // Tentativa pelo primeiro nome (ex: "Mateus Costa" → "Mateus")
  const primeiroNome = (responsavel||'').split(' ')[0];
  if(regras[primeiroNome]) return regras[primeiroNome];
  // Fallback para setores com regra genérica (ex: fundição — qualquer responsavel)
  if(regras['__qualquer__']) return regras['__qualquer__'];
  return null;
}

// Cria automaticamente a pré-análise ao concluir uma etapa
function criarPreAnaliseSeNecessario(etapa){
  let preAnalista = getPreAnalistaParaEtapa(etapa.setor, etapa.responsavel);
  if(!preAnalista) return null;
  // Verifica se a responsável está em licença — se sim, Ana assume
  const colab = DB.colaboradores.find(c=>c.nome===preAnalista);
  if(colab && colab.em_licenca){
    // Fallback: usa o nome do admin em vez de hardcoded
    const adminUser = USERS.find(u=>u.role==='admin'&&u.ativo!==false);
    const adminNome = adminUser?.nome || 'Ana Lobão';
    console.warn('Pré-analista '+preAnalista+' em licença — atribuindo a '+adminNome);
    preAnalista = adminNome;
  }

  // Verifica se já existe pré-análise pendente/aprovada para esta etapa
  const jaExiste = DB.qc.find(q=>
    q.os_id===etapa.os_id &&
    q.tipo_qc==='pre_analise' &&
    q.etapa_origem_id===etapa.id &&
    q.resultado!=='reprovado'
  );
  if(jaExiste) return null;

  const preQC = {
    id:              DB.nextId('qc'),
    os_id:           etapa.os_id,
    data:            today(),
    resultado:       '',            // pendente — não preenchido ainda
    tipo_peca:       etapa.setor==='ourivesaria'?'ouro':'outro',
    tipo_qc:         'pre_analise',
    etapa_origem_id: etapa.id,
    responsavel:     preAnalista,
    responsavel_original: preAnalista,
    qc_criterios:    [],
    obs:             '',
    fotos:           []
  };
  DB.qc.push(preQC);
  auditLog('pre_analise_criada',{
    os_id:etapa.os_id, etapa_id:etapa.id,
    responsavel:preAnalista, setor:etapa.setor
  });
  return preQC;
}

// Verifica se a OS tem pré-análise pendente ou reprovada
function osTemPreAnaliseBlockante(osId){
  return DB.qc.some(q=>
    q.os_id===osId &&
    q.tipo_qc==='pre_analise' &&
    (q.resultado===''||q.resultado==='reprovado')
  );
}

// Ana assume uma pré-análise (substitui responsável original)
function anaAssumirPreAnalise(qcId){
  if(SESS?.role!=='admin'){showToast('Apenas Ana Lobão pode assumir uma pré-análise','danger');return;}
  confirmarAcao(
    'Assumir esta pré-análise?',
    'Você substituirá a responsável original e realizará a análise diretamente.',
    'Assumir',
    function(){
      const q = DB.qc.find(x=>x.id==qcId);
      if(!q) return;
      q.responsavel = SESS.nome;
      saveDB();
      showToast('Pré-análise assumida por '+SESS.nome);
      renderQC(document.getElementById('content'));
    }
  );
}

            <select id="qc-retornar" style="width:100%;padding:9px 10px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif">
              <option value="">— Selecione —</option>
              ${DB.colaboradores.filter(c=>c.ativo&&!c.em_licenca).map(c=>`<option value="${c.nome}" ${q&&q.retornar_para===c.nome?'selected':''}>${c.nome}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Etapa a refazer</label>
            <input id="qc-etapa-ref" value="${q?q.etapa_retorno||'':''}" placeholder="ex: Cravação, Polimento…">
          </div>
        </div>
        <div class="form-group mt-12">
          <label>Instruções de retrabalho</label>
          <textarea id="qc-obs-ret" rows="2" placeholder="Descreva o que precisa ser corrigido…">${q?q.obs_retorno||'':''}</textarea>
        </div>
      </fieldset>

      <!-- 5. FOTOS -->
      <fieldset>
        <legend>📎 Fotos do QC</legend>
        <div id="qc-midia-container"></div>
      </fieldset>
    </div>
    <div class="modal-footer">
      ${id&&podeExcluir()?`<button class="btn btn-danger" onclick="excluirQC(${id})">Excluir</button>`:''}
      <button class="btn btn-outline" onclick="closeModal('modal-qc')">Cancelar</button>
      <button class="btn btn-primary" id="qc-salvar-btn" onclick="saveQC(${id||0})">✦ Salvar QC</button>
    </div>
  </div>`;
  document.body.appendChild(div);
  const qcMc=document.getElementById('qc-midia-container');
  if(qcMc){qcMc.innerHTML=midiaWidget('qc',6,'Inserir Imagem / Vídeo');midiaRenderPreview('qc');}
  qcShowOsInfo();
  // Inicializa respostas (edição: carrega do registro salvo)
  window._qcRespostasModal = q&&q.qc_criterios ? q.qc_criterios.map(c=>({id:c.id,resp:c.resultado,obs:c.obs||''})) : [];
  qcRenderChecklist();
}


// ─── QC: renderiza checklist dinâmico ─────────────────────────────
function qcRenderChecklist(){
  const tipo=document.getElementById('qc-tipo')?.value||'pedra';
  const criterios=QC_CRITERIOS[tipo]||QC_CRITERIOS.outro;
  const area=document.getElementById('qc-checklist-area');
  if(!area)return;

  // Inicializa respostas por ID (robusto a mudança de tipo)
  if(!window._qcRespostasModal||window._qcRespostasModal.length!==criterios.length){
    window._qcRespostasModal=criterios.map(c=>({id:c.id,resp:null,obs:''}));
  }

  const respondidos=window._qcRespostasModal.filter(r=>r&&r.resp!==null).length;
  const total=criterios.length;
  const temFalha=window._qcRespostasModal.some(r=>r&&r.resp==='nao');
  const barColor=respondidos===total?(temFalha?'#eb5757':'var(--verde)'):'var(--ouro)';
  const barPct=total>0?Math.round(respondidos/total*100):0;

  area.innerHTML=`
  <div style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--texto-suave);margin-bottom:6px">
      <span>Progresso do questionário</span>
      <span style="font-weight:600;color:${barColor}">${respondidos}/${total} respondidos</span>
    </div>
    <div style="background:var(--borda);border-radius:10px;height:8px">
      <div style="background:${barColor};height:8px;border-radius:10px;width:${barPct}%;transition:width .3s"></div>
    </div>
  </div>
  `+criterios.map((c,i)=>{
    const r=window._qcRespostasModal[i]||{resp:null,obs:''};
    const simSel=r.resp==='sim';
    const naoSel=r.resp==='nao';
    const semResp=r.resp===null;
    return`<div id="qcm-item-${i}" style="border:1.5px solid ${naoSel?'#eb5757':simSel?'var(--verde)':'var(--borda)'};border-radius:8px;padding:12px 14px;margin-bottom:8px;background:${naoSel?'rgba(235,87,87,.04)':simSel?'rgba(39,174,96,.04)':'var(--fundo-input)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div style="flex:1">
          <p style="font-size:14px;font-weight:600;margin:0 0 2px">${i+1}. ${c.label}</p>
          <p style="font-size:11px;color:var(--texto-suave);margin:0">${c.detalhe}</p>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;margin-top:2px">
          <button onclick="qcSetResposta(${i},'sim')"
            style="min-width:46px;padding:8px 14px;border:2px solid ${simSel?'var(--verde)':'var(--borda)'};border-radius:6px;background:${simSel?'var(--verde)':'#fff'};color:${simSel?'#fff':'var(--texto-suave)'};font-family:Jost,sans-serif;font-size:15px;font-weight:700;cursor:pointer">✓</button>
          <button onclick="qcSetResposta(${i},'nao')"
            style="min-width:46px;padding:8px 14px;border:2px solid ${naoSel?'#eb5757':'var(--borda)'};border-radius:6px;background:${naoSel?'#eb5757':'#fff'};color:${naoSel?'#fff':'var(--texto-suave)'};font-family:Jost,sans-serif;font-size:15px;font-weight:700;cursor:pointer">✗</button>
        </div>
      </div>
      ${naoSel?`<div style="margin-top:10px"><input id="qcm-obs-${i}" value="${r.obs||''}" placeholder="Descreva o problema encontrado…" oninput="window._qcRespostasModal[${i}].obs=this.value" style="width:100%;padding:8px 10px;border:1.5px solid #eb5757;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif;font-size:13px"></div>`:''}
    </div>`;
  }).join('');

  qcAtualizarResultado();
}

function qcSetResposta(idx, valor){
  if(!window._qcRespostasModal) return;
  if(!window._qcRespostasModal[idx]) window._qcRespostasModal[idx]={resp:null,obs:''};
  // Salva obs antes de re-renderizar
  const obsEl=document.getElementById('qcm-obs-'+idx);
  if(obsEl) window._qcRespostasModal[idx].obs=obsEl.value;
  window._qcRespostasModal[idx].resp=valor;
  qcRenderChecklist();
  // Scroll suave para o próximo item sem resposta
  const prox=window._qcRespostasModal.findIndex((r,i)=>i>idx&&(r===null||r.resp===null));
  if(prox>=0) setTimeout(()=>document.getElementById('qcm-item-'+prox)?.scrollIntoView({behavior:'smooth',block:'nearest'}),120);
}

function qcAtualizarResultado(){
  const tipo=document.getElementById('qc-tipo')?.value||'pedra';
  const criterios=QC_CRITERIOS[tipo]||QC_CRITERIOS.outro;
  const resps=window._qcRespostasModal||[];
  const respondidos=resps.filter(r=>r&&r.resp!==null).length;
  const box=document.getElementById('qc-resultado-geral');
  const txt=document.getElementById('qc-res-texto');
  const sub=document.getElementById('qc-res-sub');
  const hiddenRes=document.getElementById('qc-res');
  const retArea=document.getElementById('qc-retorno-area');

  if(respondidos<criterios.length){
    if(box)box.style.display='none';
    if(hiddenRes) hiddenRes.value='';
    return;
  }

  // Mapeia falhas com labels corretos (por índice, sem bug)
  const falhas=criterios.filter((_,i)=>resps[i]&&resps[i].resp==='nao');
  const aprovado=falhas.length===0;

  if(box&&txt&&sub){
    box.style.display='block';
    box.style.background=aprovado?'rgba(39,174,96,.08)':'rgba(235,87,87,.08)';
    box.style.border=`2px solid ${aprovado?'var(--verde)':'#eb5757'}`;
    txt.textContent=aprovado?'✅ APROVADA — Todos os critérios atendidos':'⚠️ REPROVADA — Precisa de ajustes';
    txt.style.color=aprovado?'var(--verde)':'#eb5757';
    sub.innerHTML=aprovado
      ?`<span style="color:var(--verde)">${criterios.length}/${criterios.length} critérios aprovados ✓</span>`
      :`<strong style="color:#eb5757;display:block;margin-bottom:4px">${falhas.length} critério(s) não atendido(s):</strong>`+
       falhas.map(c=>`<span style="display:inline-block;margin:2px 4px 2px 0;padding:2px 8px;background:rgba(235,87,87,.1);border-radius:4px;font-size:11px;color:#eb5757">${c.label}</span>`).join('');
  }
  if(hiddenRes) hiddenRes.value=aprovado?'aprovado':'reprovado';
  if(retArea) retArea.style.display=aprovado?'none':'block';
}

function qcShowOsInfo(){
  const sel=document.getElementById('qc-os');
  const el=document.getElementById('qc-os-info');
  if(!sel||!el)return;
  const os=DB.os.find(o=>o.id==parseInt(sel.value));
  if(!os){el.innerHTML='';return;}
  const etapas=DB.etapas.filter(e=>e.os_id==os.id);
  // Sugere tipo de QC baseado no tipo da OS
  const tipoSugerido=os.tipo==='conserto'?'conserto':os.tipo==='reforma'?'conserto':'ouro';
  const tipoEl=document.getElementById('qc-tipo');
  if(tipoEl&&!tipoEl.dataset.manualSet) tipoEl.value=tipoSugerido;
  el.innerHTML=`<div style="background:var(--fundo);border-radius:5px;padding:10px 14px;font-size:12px;color:var(--texto-suave)">
    <strong style="color:var(--azul)">OS #${os.id}</strong> · ${clienteNome(os.cliente_id)} · 
    Status: <span class="badge badge-blue" style="font-size:10px">${os.status}</span> · 
    ${etapas.length} etapa(s) · Prazo: ${fmtDate(os.prazo)||'—'}
    ${os.responsavel?`· Resp.: ${os.responsavel}`:''}
  </div>`;
  // Re-renderiza checklist com tipo sugerido
  if(tipoEl&&!tipoEl.dataset.manualSet) qcRenderChecklist();
}

function qcToggleRetorno(){
  const res=document.getElementById('qc-res')?.value;
  const area=document.getElementById('qc-retorno-area');
  if(area)area.style.display=res==='reprovado'?'block':'none';
}

function saveQC(id){
  if(!podeFazerQC()){showToast('⛔ Sem permissão para realizar QC','danger');return;}
  const os_id=parseInt(document.getElementById('qc-os')?.value);
  const resultado=document.getElementById('qc-res')?.value;
  const data=document.getElementById('qc-data')?.value;
  const tipo=document.getElementById('qc-tipo')?.value||'pedra';
  const criterios=QC_CRITERIOS[tipo]||QC_CRITERIOS.outro;
  const resps=window._qcRespostasModal||[];

  if(!os_id){showToast('Selecione uma OS','danger');return;}
  if(!data){showToast('Data obrigatória','danger');return;}
  // Dupla verificação: OS não pode estar entregue no momento do save
  const _osEntregue=DB.os.find(o=>o.id===os_id);
  if(_osEntregue&&_osEntregue.status==='entregue'){
    showToast('OS já entregue — não é possível registrar QC','danger');return;
  }
  // Bloqueia QC Final se há pré-análise pendente ou reprovada
  // (Pré-análises têm id passado como parâmetro — não bloqueiam a si mesmas)
  const _ehPreAnalise = id && DB.qc.find(q=>q.id==id&&q.tipo_qc==='pre_analise');
  if(!_ehPreAnalise && osTemPreAnaliseBlockante(os_id)){
    showToast('⛔ Há pré-análise pendente ou reprovada — resolva antes de realizar o QC Final','danger');
    return;
  }
  if(!resultado){showToast('Complete o questionário de qualidade antes de salvar','warn');return;}
  // Verifica se todos os critérios foram respondidos
  const respondidos=resps.filter(r=>r&&r.resp!==null).length;
  if(respondidos<criterios.length){
    showToast(`Responda todos os ${criterios.length} critérios antes de salvar (${respondidos}/${criterios.length})','warn`);return;
  }

  // Monta critérios detalhados
  const qcCriterios=criterios.map((c,i)=>({
    id:c.id,
    label:c.label,
    resultado:resps[i]?.resp||'nao',
    obs:resps[i]?.obs||''
  }));

  // Obs automático das falhas
  const falhas=qcCriterios.filter(c=>c.resultado==='nao');
  const obsAuto=falhas.map(c=>c.label+(c.obs?' — '+c.obs:'')).join(' · ');
  const obsManual=document.getElementById('qc-obs')?.value||'';
  const obsFinal=[obsAuto,obsManual].filter(Boolean).join(' | ');

  const obj={
    id:id||DB.nextId('qc'),
    os_id, data, resultado,
    tipo_peca:tipo,
    qc_criterios:qcCriterios,
    responsavel:document.getElementById('qc-resp')?.value||'',
    obs:obsFinal,
    retornar_para: resultado==='reprovado'?(document.getElementById('qc-retornar')?.value||''):'',
    etapa_retorno: resultado==='reprovado'?(document.getElementById('qc-etapa-ref')?.value||''):'',
    obs_retorno:   resultado==='reprovado'?(document.getElementById('qc-obs-ret')?.value||''):'',
    fotos: midiaGet('qc').slice()
  };
  if(id){const i=DB.qc.findIndex(q=>q.id==id);if(i>=0)DB.qc[i]=obj;else DB.qc.push(obj);}
  else DB.qc.push(obj);
  // Atualiza status da OS
  const os=DB.os.find(o=>o.id==os_id);
  if(os){
    if(resultado==='aprovado') os.status='concluido';
    else if(resultado==='reprovado'&&obj.retornar_para) os.status='producao';
  }
  auditLog('qc_salvo',{os_id,resultado,tipo,falhas:falhas.length});
  saveDB();closeModal('modal-qc');

  if(resultado==='aprovado'){
    // Verifica se há etapas pendentes desta OS que agora podem ser concluídas
    const etapasPendentes=DB.etapas.filter(e=>e.os_id===os_id&&e.status!=='concluida');
    if(etapasPendentes.length>0){
      showToast('✅ QC Aprovado! Agora você pode marcar as etapas como concluídas.','success');
      // Destaca visualmente as etapas que podem ser concluídas
      setTimeout(()=>{
        abrirModalGenerico('✅ QC Aprovado',`
          <div style="padding:20px;text-align:center">
            <p style="font-size:32px;margin-bottom:8px">✅</p>
            <p style="font-size:16px;font-weight:700;color:var(--verde);margin-bottom:8px">Controle de Qualidade Aprovado!</p>
            <p style="font-size:13px;color:var(--texto-suave);margin-bottom:18px">
              OS #${os_id} tem <strong>${etapasPendentes.length} etapa(s) pendente(s)</strong>.<br>
              Acesse as etapas para marcá-las como concluídas.
            </p>
            <div style="display:flex;gap:10px;justify-content:center">
              <button class="btn btn-outline" onclick="fecharModal()">Fechar</button>
              <button class="btn btn-primary" onclick="fecharModal();navTo('etapas')">→ Ir para Etapas</button>
            </div>
          </div>`);
      },300);
    } else {
      // Todas etapas já concluídas
      const os=DB.os.find(o=>o.id===os_id);
      if(os&&os.status!=='entregue') os.status='concluido';
      saveDB();
      showToast('✅ QC Aprovado — OS concluída!','success');
    }
  } else {
    // ── Cria etapa de retrabalho automaticamente ──────────────────
    // Herda o setor da etapa que originou o QC (se pré-análise) ou da OS
    const _setorOrigem = (()=>{
      if(obj.tipo_qc==='pre_analise'&&obj.etapa_origem_id){
        const etOrig=DB.etapas.find(e=>e.id===obj.etapa_origem_id);
        return etOrig?.setor||'ourivesaria';
      }
      return 'ourivesaria';
    })();
    const etapaRetrabalho = {
      id:             DB.nextId('etapas'),
      os_id:          os_id,
      setor:          _setorOrigem,
      descricao:      'Retrabalho — '+(obj.tipo_qc==='pre_analise'?'Pré-análise':'QC')+' reprovado: ' + (falhas.map(f=>f.label).join(', ').substring(0,80)),
      responsavel:    obj.retornar_para || (os?.responsavel||''),
      status:         'aguardando',
      origem_qc:      obj.id,
      cobravel:       false,       // ⚠️ retrabalho por reprovação NÃO é cobrado
      data_ini:       null,
      data_fim:       null,
      inclui_acabamento: false,
      obs_acabamento: '',
      obs:            obj.obs_retorno||''
    };
    DB.etapas.push(etapaRetrabalho);
    saveDB();
    showToast('⚠️ QC Reprovado — Etapa de retrabalho criada para ' + (etapaRetrabalho.responsavel||'equipe'),'warn');
    // Modal informativo com botão para ir às etapas
    setTimeout(()=>{
      const falhasHtml = falhas.map(f=>
        '<span style="display:inline-block;margin:2px 4px 2px 0;padding:3px 8px;background:rgba(235,87,87,.1);border:1px solid rgba(235,87,87,.3);border-radius:4px;font-size:12px;color:#eb5757">'+f.label+'</span>'
      ).join('');
      abrirModalGenerico('⚠️ QC Reprovado', `
        <div style="padding:20px">
          <div style="text-align:center;margin-bottom:16px">
            <p style="font-size:36px;margin-bottom:8px">⚠️</p>
            <p style="font-size:16px;font-weight:700;color:#eb5757;margin-bottom:4px">Controle de Qualidade Reprovado</p>
            <p style="font-size:13px;color:var(--texto-suave)">OS #${os_id}</p>
          </div>
          <div style="background:rgba(235,87,87,.05);border:1px solid rgba(235,87,87,.2);border-radius:8px;padding:12px 14px;margin-bottom:16px">
            <p style="font-size:12px;font-weight:700;color:#eb5757;margin-bottom:8px">${falhas.length} critério(s) reprovado(s):</p>
            <div>${falhasHtml}</div>
          </div>
          <div style="background:var(--fundo);border:1px solid var(--borda);border-radius:8px;padding:12px 14px;margin-bottom:20px">
            <p style="font-size:12px;font-weight:700;color:var(--azul);margin-bottom:4px">✓ Etapa de retrabalho criada</p>
            <p style="font-size:12px;color:var(--texto-suave)">Responsável: <strong>${etapaRetrabalho.responsavel||'—'}</strong></p>
            ${obj.obs_retorno?'<p style="font-size:12px;color:var(--texto-suave);margin-top:4px">Instruções: '+obj.obs_retorno+'</p>':''}
          </div>
          <div style="display:flex;gap:10px;justify-content:center">
            <button class="btn btn-outline" onclick="fecharModal()">Fechar</button>
            <button class="btn btn-primary" onclick="fecharModal();navTo('etapas')">→ Ver Etapas</button>
          </div>
        </div>`);
    }, 300);
  }
  renderQC(document.getElementById('content'));
}

function excluirQC(id){
  if(!podeExcluir()){showToast('Sem permissão','danger');return;}
  confirmarAcao('Excluir registro de QC?','Este registro será removido permanentemente.','Excluir',function(){
    DB.qc=DB.qc.filter(q=>q.id!==id);
    saveDB();showToast('Registro excluído');closeModal('modal-qc');
    renderQC(document.getElementById('content'));
  });
}

function renderInsumosOS(c){
  c.innerHTML=`
  <div class="page-header">
    <div><p class="page-title">Insumos por OS</p><p class="page-sub">Consumo de materiais por ordem</p></div>

  <tbody>${DB.uso_insumos_os.map(u=>{
    const ins=DB.insumos.find(i=>i.id==u.insumo_id);

  }).join('')||'<tr><td colspan="5" class="text-center text-suave" style="padding:32px">Nenhum registro</td></tr>'}
  </tbody></table></div>`;
}
function openInsOSModal(){
  const div=document.createElement('div');div.className='modal-overlay';div.id='modal-ins-os';
  div.innerHTML=`<div class="modal">
    <div class="modal-header"><span class="modal-title">Registrar Consumo de Insumo</span><button class="modal-close" onclick="closeModal('modal-ins-os')">×</button></div>
    <div class="modal-body">
      <div class="form-grid" style="gap:14px">
        <div class="form-group"><label>OS</label><select id="ios-os">
          ${DB.os.map(o=>`<option value="${o.id}">#${o.id} — ${o.descricao.substring(0,30)}</option>`).join('')}
        </select></div>
        <div class="form-group"><label>Insumo</label><select id="ios-ins" onchange="calcInsOS()">
          ${DB.insumos.map(i=>`<option value="${i.id}" data-cu="${i.custo_unit}" data-un="${i.unidade}">${i.nome} (${fmt(i.custo_unit)}/${i.unidade})</option>`).join('')}
        </select></div>
        <div class="form-group"><label>Quantidade</label><input id="ios-qtd" type="number" value="1" step="0.01" oninput="calcInsOS()"></div>
        <div class="form-group"><label>Custo Total</label><input id="ios-custo" type="number" step="0.01" placeholder="Calculado auto" readonly style="background:#eee"></div>
        <div class="form-group"><label>Data</label><input id="ios-data" type="date" value="${today()}"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('modal-ins-os')">Cancelar</button><button class="btn btn-primary" onclick="saveInsOS()">Salvar</button></div>
  </div>`;
  document.body.appendChild(div);
}
function calcInsOS(){
  const sel=document.getElementById('ios-ins');
  const cu=parseFloat(sel.options[sel.selectedIndex]?.dataset.cu)||0;
  const qtd=parseFloat(document.getElementById('ios-qtd').value)||0;
  document.getElementById('ios-custo').value=(cu*qtd).toFixed(2);
}
function saveInsOS(){
  const obj={id:DB.nextId('uso_insumos_os'),os_id:parseInt(document.getElementById('ios-os').value),
    insumo_id:parseInt(document.getElementById('ios-ins').value),
    qtd:parseFloat(document.getElementById('ios-qtd').value),
    custo_total:parseFloat(document.getElementById('ios-custo').value),
    data:document.getElementById('ios-data').value};
  if(!obj.qtd||obj.qtd<=0){showToast('Quantidade inválida','danger');return;}
  // Decrementar estoque do insumo
  const ins=DB.insumos.find(i=>i.id==obj.insumo_id);
  if(ins){
    if(obj.qtd>ins.estoque){showToast(`Estoque insuficiente — disponível: ${fmtN(ins.estoque)} ${ins.unidade}`,'danger');return;}
    ins.estoque=Math.max(0,parseFloat((ins.estoque-obj.qtd).toFixed(4)));
  }
  DB.uso_insumos_os.push(obj);saveDB();closeModal('modal-ins-os');showToast('Consumo registrado e estoque atualizado');
  renderInsumosOS(document.getElementById('content'));
}

function saveIns(id){
  const obj={id:id||DB.nextId('insumos'),nome:document.getElementById('ins-nome').value,
    categoria:document.getElementById('ins-cat').value,unidade:document.getElementById('ins-un').value,
    estoque:parseFloat(document.getElementById('ins-est').value)||0,
    estoque_min:parseFloat(document.getElementById('ins-min').value)||0,
    custo_unit:parseFloat(document.getElementById('ins-cu').value)||0};
  obj.fotos = midiaGet('ins').slice();
  if(!obj.nome){showToast('Nome obrigatório','danger');return;}
  if(id){const i=DB.insumos.findIndex(x=>x.id==id);if(i>=0)DB.insumos[i]=obj;}else DB.insumos.push(obj);
  saveDB();closeModal('modal-ins');showToast('Insumo salvo');renderInsumos(document.getElementById('content'));
}
function excluirInsumo(id){
  const ins=DB.insumos.find(x=>x.id==id);if(!ins)return;
  // Verifica uso em OS
  const emUsoOS=DB.uso_insumos_os.some(u=>u.insumo_id==id);
  // Verifica uso em orçamentos ativos (bloco1)
  const orcsVinculados=DB.orcamentos.filter(o=>{
    const b1=o.bloco1||{};
    const ins_orc=b1.insumos_orc||[];
    return ins_orc.some(i=>i.insumo_id==id||i.id==id);
  });
  if(orcsVinculados.length>0){
    const nomes=orcsVinculados.map(o=>'#'+o.id+' '+o.descricao.substring(0,30)).join('<br>');
    abrirModalGenerico('Insumo em uso em Orçamentos',`
      <div style="padding:20px">
        <div class="alert alert-warn" style="margin-bottom:14px">
          <strong>${ins.nome}</strong> está referenciado em ${orcsVinculados.length} orçamento(s) ativo(s):
        </div>
        <p style="font-size:13px;color:var(--texto-suave);margin-bottom:16px">${nomes}</p>
        <p style="font-size:13px">Remova o insumo dos orçamentos antes de excluí-lo, para evitar distorções nos cálculos.</p>
        <div style="display:flex;justify-content:flex-end;margin-top:16px">
          <button class="btn btn-outline" onclick="fecharModal()">Entendido</button>
        </div>
      </div>`);
    return;
  }
  const msg=emUsoOS
    ?`<strong>${ins.nome}</strong> possui registros de consumo em OS vinculados. Excluir mesmo assim?`
    :`O insumo <strong>${ins.nome}</strong> será removido permanentemente do estoque.`;
  confirmarAcao('Excluir insumo?',msg,'Excluir',function(){
    auditLog('insumo_excluido',{id,nome:ins.nome});
    DB.insumos=DB.insumos.filter(x=>x.id!==id);
    saveDB();
    showToast('Insumo excluído');
    renderInsumos(document.getElementById('content'));
  });
}

function saveColecaoAtelier(id){
  const nome=(document.getElementById('col-nome')?.value||'').trim();
  if(!nome){showToast('Nome da coleção obrigatório','danger');return;}
  const obj={
    id:id||DB.nextId('colecoes_atelier'),
    nome,
    temporada:document.getElementById('col-temporada')?.value||'',
    data_lancamento:document.getElementById('col-lancamento')?.value||'',
    status:document.getElementById('col-status')?.value||'planejamento',
    descricao:document.getElementById('col-desc')?.value||'',
    fotos:midiaGet('col_capa').slice()
  };
  if(id){const i=DB.colecoes_atelier.findIndex(x=>x.id==id);if(i>=0)DB.colecoes_atelier[i]=obj;else DB.colecoes_atelier.push(obj);}
  else DB.colecoes_atelier.push(obj);
  saveDB();closeModal('modal-colecao');showToast(id?'Coleção atualizada':'Coleção criada ✦');
  renderColecao(document.getElementById('content'));
}

function excluirColecaoAtelier(id){
  const col=DB.colecoes_atelier.find(x=>x.id==id);if(!col)return;
  const pecasCount=DB.colecao.filter(p=>p.colecao_atelier_id==id).length;
  confirmarAcao(
    'Excluir coleção "'+col.nome+'"?',
    pecasCount>0?`Esta coleção possui ${pecasCount} peça(s) vinculada(s). As peças não serão excluídas, apenas desvinculadas da coleção.`:'A coleção será removida permanentemente.',
    'Excluir',
    function(){
      DB.colecao.forEach(p=>{if(p.colecao_atelier_id==id)p.colecao_atelier_id=null;});
      DB.os.forEach(o=>{if(o.colecao_atelier_id==id){o.colecao_atelier_id=null;o.origem='atelier';}});
      DB.colecoes_atelier=DB.colecoes_atelier.filter(x=>x.id!==id);
      saveDB();closeModal('modal-colecao');showToast('Coleção excluída');
      renderColecao(document.getElementById('content'));
    }
  );
}

function gerarCatalogoColecao(id){

  const pecas=DB.colecao.filter(p=>p.colecao_atelier_id==id);
  const atelier=DB.atelier;
  function fotoSrc(f){return typeof f==='string'?f:(f&&f.tipo==='img'?f.src:null);}

  // Monta HTML do catálogo
  const pecasPages=pecas.length===0
    ?`<div class="cat-pagina" style="display:flex;align-items:center;justify-content:center">

function excluirColecao(id){
  confirmarAcao('Excluir peça?','A peça será removida permanentemente.','Excluir',function(){
    DB.colecao=DB.colecao.filter(p=>p.id!==id);
    saveDB();showToast('Peça excluída');renderColecao(document.getElementById('content'));
  });
}

  div.innerHTML=`<div class="modal">

      <button class="modal-close" onclick="closeModal('modal-edit-col')">×</button></div>

        <div class="form-group"><label>Peso (g)</label><input id="ec-peso" type="number" step="0.01" value="${p.peso}"></div>
        <div class="form-group"><label>Metal</label><input id="ec-metal" type="text" value="${p.metal||'18k'}"></div>
        <div class="form-group"><label>Categoria da Peça</label>
          <select id="ec-categoria" onchange="ecToggleAtributo()" style="width:100%;padding:9px 10px;font-size:14px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif">
            ${Object.entries(PECA_CATEGORIAS).map(([k,v])=>`<option value="${k}" ${(p.categoria||'outro')===k?'selected':''}>${v.icon} ${v.label}</option>`).join('')}
          </select>
        </div>
        <div id="ec-atributo-box" class="form-group" style="${(()=>{const cat=p.categoria||'outro';return PECA_CATEGORIAS[cat]?.atributo?'':'display:none'})()}">
          <label id="ec-atributo-label">${PECA_CATEGORIAS[p.categoria||'outro']?.atributo||'Atributo'}</label>
          <input id="ec-atributo" type="text" value="${p.atributo_especifico||''}" placeholder="ex: 18, Tarracha borboleta, 42cm">
        </div>
        <div class="form-group" style="grid-column:1/-1"><label>Coleção do Atelier</label>
          <select id="ec-colecao">${colOpts}</select></div>
      </div>
    </div>
    <div class="modal-footer">
      ${podeExcluir()?`<button class="btn btn-danger" onclick="excluirColecao(${id});closeModal('modal-edit-col')">Excluir</button>`:''}
      <button class="btn btn-outline" onclick="closeModal('modal-edit-col')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEditColecao(${id})">Salvar</button>
    </div>
  </div>`;
  document.body.appendChild(div);
}

function ecToggleAtributo(){
  const cat=document.getElementById('ec-categoria')?.value||'outro';
  const info=PECA_CATEGORIAS[cat]||{};
  const box=document.getElementById('ec-atributo-box');
  const lbl=document.getElementById('ec-atributo-label');
  if(box) box.style.display=info.atributo?'block':'none';
  if(lbl) lbl.textContent=info.atributo||'Atributo';
}

function saveEditColecao(id){
  const i=DB.colecao.findIndex(p=>p.id==id);if(i<0)return;
  const nome=(document.getElementById('ec-nome')?.value||'').trim();
  if(!nome){showToast('Nome obrigatório','danger');return;}
  const colId=parseInt(document.getElementById('ec-colecao')?.value)||null;
  DB.colecao[i]={...DB.colecao[i],
    nome,
    descricao:document.getElementById('ec-desc')?.value||'',
    preco:parseFloat(document.getElementById('ec-preco')?.value)||0,
    estoque:parseInt(document.getElementById('ec-estoque')?.value)||0,
    peso:parseFloat(document.getElementById('ec-peso')?.value)||0,
    metal:document.getElementById('ec-metal')?.value||'18k',
    categoria:document.getElementById('ec-categoria')?.value||'outro',
    atributo_especifico:document.getElementById('ec-atributo')?.value||'',
    colecao_atelier_id:colId
  };
  saveDB();closeModal('modal-edit-col');
  showToast('Peça atualizada');renderColecao(document.getElementById('content'));
}

function switchTabById(e,target){
  const container=e.target.closest('.card-body');
  if(!container)return;
  container.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  container.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  e.target.classList.add('active');
  const pane=container.querySelector('#'+target);
  if(pane)pane.classList.add('active');
}

function confirmarRealizarVenda(orcId){
  const o=DB.orcamentos.find(x=>x.id==orcId);if(!o)return;
  const totalBruto = parseFloat(document.getElementById('rv-total')?.value)||0;
  const desconto   = parseFloat(document.getElementById('rv-desc')?.value)||0;
  const reservaGC  = parseFloat(document.getElementById('rv-reserva')?.value)||0;
  const forma      = document.getElementById('rv-forma')?.value||'PIX';
  const colab      = document.getElementById('rv-colab')?.value||'';
  const data       = document.getElementById('rv-data')?.value||today();
  const valorFinal = Math.max(0, totalBruto - desconto);
  if(!valorFinal){showToast('Informe o valor da venda','danger');return;}
  // Validações Gold Credit
  if(reservaGC>0){
    const saldo=calcSaldoCliente(o.cliente_id||0);
    if(reservaGC>saldo){showToast('Saldo Gold Credit insuficiente','danger');return;}
    const pctRV=(DB.params_reserva&&DB.params_reserva.limite_uso_pct)||40;
    const limiteRV=Math.round(valorFinal*(pctRV/100)*100)/100;
    if(reservaGC>limiteRV){
      solicitarOverrideReserva(reservaGC,limiteRV,function(){confirmarRealizarVenda(orcId);});
      return;
    }
  }
  const parcRV = forma==='Cartão'?(parseInt(document.getElementById('rv-parc')?.value)||1):null;
  const r = registrarVenda({
    cid:          o.cliente_id,
    desc:         o.descricao,
    valor_total:  valorFinal,
    forma_pgto:   forma,
    colab,
    data,
    origem:       'orcamento',
    itens:        [],
    reserva_gc:   reservaGC,
    parcelas:     parcRV,
    orcamento_id: o.id
  });
  if(!r.ok){showToast(r.msg,'danger');return;}
  // Marca orçamento como vendido
  o.status='vendido';
  saveDB(); // necessário para persistir o.status='vendido' após registrarVenda()
  const msg=`✅ Venda de ${fmt(valorFinal)} registrada!`+(r.cb_gerado>0?` · 💎 Cashback ${fmt(r.cb_gerado)} gerado!`:'');
  closeModal('modal-realizar-venda');
  showToast(msg);
  renderOrcamentos(document.getElementById('content'));
}


function excluirOrcamento(id){
  const o=DB.orcamentos.find(x=>x.id==id);if(!o)return;
  confirmarAcao(
    'Excluir orçamento?',
    (o.descricao||'Orçamento #'+id)+' será removido permanentemente, junto com as propostas vinculadas.',
    'Excluir',
    function(){
      auditLog('orcamento_excluido',{orc_id:id,descricao:o.descricao});
      DB.orcamentos=DB.orcamentos.filter(x=>x.id!==id);
      DB.propostas=DB.propostas.filter(p=>p.orcamento_id!==id);
      saveDB();
      showToast('Orçamento excluído');
      renderOrcamentos(document.getElementById('content'));
    }
  );
}

function setMarkup(v){document.getElementById('b3-markup').value=v;calcOrc();}

function calcOrc(){
  const p=ORC.params;
  const au18k_liq=p.au24k*p.conv18k*(1-p.perda/100);
  const pouro=parseFloat(document.getElementById('b1-pouro')?.value)||0;
  const custo_ouro=pouro*au18k_liq;
  const el=document.getElementById('b1-couro');if(el)el.value=fmt(custo_ouro);
  // MO Ourives: auto por peso (pode ser sobrescrito manualmente)
  const taxa_mo=ORC.params.taxa_mo||120;
  if(!ORC.b1._mdoManual){
    const autoMdo=Math.round(pouro*taxa_mo);
    ORC.b1.mao_obra=autoMdo;
    const mdoEl=document.getElementById('b1-mdo');
    if(mdoEl)mdoEl.value=autoMdo;
  }
  const mdo=parseFloat(document.getElementById('b1-mdo')?.value)||0;
  const mdo2=parseFloat(document.getElementById('b1-mdo2')?.value)||0;
  const custo_gemas=ORC.b1.gemas.reduce((a,g)=>a+g.qtd*g.custo*(g.moeda==='USD'?p.dolar:1),0);
  const custo_ins_orc=(ORC.b1.insumos_orc||[]).reduce((a,it)=>a+it.qtd*(it.custo_unit||0),0);
  const custo_b1=custo_ouro+mdo+mdo2+custo_gemas+custo_ins_orc;
  const custo_b2=(ORC.b2_items||[]).reduce((a,it)=>a+it.qtd*(it.custo_unit||0),0);
  const custo_total=custo_b1+custo_b2;

  const cartao=parseFloat(document.getElementById('b3-cartao')?.value)||0;
  const mkt=parseFloat(document.getElementById('b3-mkt')?.value)||0;
  const com=parseFloat(document.getElementById('b3-com')?.value)||0;
  const cash=parseFloat(document.getElementById('b3-cash')?.value)||0;
  const trib=parseFloat(document.getElementById('b3-trib')?.value)||0;
  const markup=parseFloat(document.getElementById('b3-markup')?.value)||3.2;
  const desc_max=parseFloat(document.getElementById('b3-desc')?.value)||10;
  const margem_alvo=parseFloat(document.getElementById('b3-margem-alvo')?.value)||25;
  const desp_pct=(cartao+mkt+com+cash+trib)/100;

  // ═══ FÓRMULA CORRETA (igual à planilha) ═══
  // Preço mínimo: cobre custo + despesas variáveis, margem zero
  const preco_minimo=desp_pct<1?custo_total/(1-desp_pct):custo_total*2;
  // Preço ideal: custo × markup (markup já embute a margem desejada)
  const preco_ideal=custo_total*markup;
  // Preço à vista: desconto sobre o ideal
  const preco_vista=preco_ideal*(1-desc_max/100);
  // Lucro e margem líquida
  const lucro=preco_ideal-custo_total-(preco_ideal*desp_pct);
  const margem=preco_ideal>0?(lucro/preco_ideal)*100:0;
  // Status automático
  const status_ok=custo_total>0&&margem>=margem_alvo;
  const status_zero=custo_total===0;

  // Preço manual (override)
  const manualChk=document.getElementById('orc-preco-manual');
  const useManual=manualChk&&manualChk.checked;
  const preco_final=useManual?(parseFloat(document.getElementById('orc-preco-manual-val')?.value)||preco_ideal):preco_ideal;
  const preco_vista_final=useManual?(parseFloat(document.getElementById('orc-preco-vista-val')?.value)||preco_vista):preco_vista;
  const lucro_final=preco_final-custo_total-(preco_final*desp_pct);
  const margem_final=preco_final>0?(lucro_final/preco_final)*100:0;
  const status_ok_final=!useManual?status_ok:(custo_total>0&&margem_final>=margem_alvo);

  // Guarda valores calculados para o botão Aprovar Venda acessar
  window._orcCalc={custo_total,preco_final,preco_vista_final,lucro_final,margem_final:useManual?margem_final:margem,markup,status_ok:status_ok_final};

  const res=document.getElementById('orc-prices');
  if(!res)return;

  // Nível de desejo pelo markup
  const nivelLabel=markup>=4?'Peça Especial / Cápsula':markup>=3.5?'Hero / Forte Desejo':markup>=3?'Desejo Médio':markup>=2.5?'Comercial / Giro':'Abaixo do Comercial';
  const nivelCor=markup>=3.5?'#b0a259':markup>=3?'#6fcf97':'#eb5757';

  const mg=useManual?margem_final:margem;

  // Badge de status — proeminente no topo
  const badgeHtml=status_zero?'':(status_ok_final
    ?`<div style="background:linear-gradient(135deg,#1a4a2e,#143820);border:2px solid #6fcf97;border-radius:10px;padding:14px 20px;display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <span style="font-size:28px">✅</span>
        <div>
          <p style="font-size:13px;letter-spacing:.14em;color:#6fcf97;font-weight:700;text-transform:uppercase;margin:0">Venda Aprovada</p>
          <p style="font-size:12px;color:rgba(255,255,255,.75);margin:3px 0 0">Margem ${fmtN(mg,1)}% ≥ alvo ${fmtN(margem_alvo,0)}%</p>
        </div>
        <span style="margin-left:auto;font-size:20px;font-weight:700;color:#6fcf97">${fmt(preco_final)}</span>

// ═══════════════════════════════════════════════════════════════════
// WIDGET DE MÍDIA — imagens + vídeos (reutilizável)
// ═══════════════════════════════════════════════════════════════════
var _MIDIA = {};

function midiaWidget(key, maxFiles, label) {
  maxFiles = maxFiles || 6;
  label = label || 'Adicionar Mídia';
  return '<div class="midia-widget" data-key="'+key+'" data-max="'+maxFiles+'">'
    +'<div class="midia-preview" id="midia-prev-'+key+'"></div>'
    +'<div class="midia-actions">'
    +'<input type="file" id="midia-input-'+key+'" accept="image/*,video/*" multiple style="display:none"'
    +' onchange="midiaAdicionarArquivos(event,\''+key+'\')">'
    +'<button type="button" class="btn btn-sm btn-outline midia-btn-add" onclick="document.getElementById(\'midia-input-'+key+'\').click()">📷 Inserir Imagem / Vídeo</button>'
    +'<span class="midia-hint">Imagens até 5 MB · Vídeos até 20 MB · máx. '+maxFiles+' arquivo(s)<br>Clique no <strong>×</strong> sobre a miniatura para excluir</span>'
    +'</div></div>';
}

function midiaInit(key, arr) {
  _MIDIA[key] = (arr && arr.length) ? arr.slice() : [];
}

function midiaGet(key) {
  return _MIDIA[key] || [];
}

function midiaAdicionarArquivos(e, key) {
  var files = Array.from(e.target.files);
  var widget = document.querySelector('.midia-widget[data-key="'+key+'"]');
  var max = widget ? parseInt(widget.getAttribute('data-max')) : 6;
  var atual = (_MIDIA[key]||[]).length;
  var restam = max - atual;
  if (restam <= 0) { showToast('Limite de '+max+' arquivos atingido','warn'); return; }
  files.slice(0, restam).forEach(function(f) {
    var tipo = f.type.startsWith('video/') ? 'vid' : 'img';
    var limMB = tipo === 'vid' ? 20 : 5;
    if (f.size > limMB * 1024 * 1024) { showToast(f.name+' excede '+limMB+'MB','warn'); return; }
    if (tipo === 'img') {
      var imgEl = new Image();
      var url = URL.createObjectURL(f);
      imgEl.onload = function() {
        URL.revokeObjectURL(url);
        var MAX = 1200, w = imgEl.naturalWidth, h = imgEl.naturalHeight;
        if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
        var cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(imgEl, 0, 0, w, h);
        var b64 = cv.toDataURL('image/jpeg', 0.82);
        if (!_MIDIA[key]) _MIDIA[key] = [];
        _MIDIA[key].push({tipo:'img', src:b64, nome:f.name});
        midiaRenderPreview(key);
      };
      imgEl.src = url;
    } else {
      var r = new FileReader();
      r.onload = function(ev) {
        if (!_MIDIA[key]) _MIDIA[key] = [];
        _MIDIA[key].push({tipo:'vid', src:ev.target.result, nome:f.name});
        midiaRenderPreview(key);
      };
      r.readAsDataURL(f);
    }
  });
  e.target.value = '';
}

function midiaRenderPreview(key) {
  var el = document.getElementById('midia-prev-'+key);
  if (!el) return;
  var arr = _MIDIA[key] || [];
  if (!arr.length) {
    el.innerHTML = '<div class="midia-empty">Nenhuma mídia adicionada</div>';
    return;
  }
  var html = '<div class="midia-thumbs">';
  for (var i = 0; i < arr.length; i++) {
    var m = arr[i];
    html += '<div class="midia-thumb">';
    if (m.tipo === 'img') {
      html += '<img src="'+m.src+'" onclick="midiaVerItem(\''+key+'\','+i+')" title="'+m.nome+'" class="midia-thumb-img">';
    } else {
      html += '<div class="midia-thumb-vid" onclick="midiaVerItem(\''+key+'\','+i+')" title="'+m.nome+'">'
        +'<span class="midia-play">▶</span>'
        +'<span class="midia-vidname">'+m.nome+'</span>'
        +'</div>';
    }
    html += '<button type="button" class="midia-del" onclick="midiaRemover(\''+key+'\','+i+')" title="Excluir">×</button>';
    html += '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

function midiaRemover(key, idx) {
  if (!_MIDIA[key]) return;
  _MIDIA[key].splice(idx, 1);
  midiaRenderPreview(key);
}

function midiaVerItem(key, idx) {
  var m = (_MIDIA[key]||[])[idx];
  if (!m) return;
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:12px';
  if (m.tipo === 'img') {
    d.innerHTML = '<img src="'+m.src+'" style="max-width:92vw;max-height:88vh;border-radius:8px;display:block"><span style="color:rgba(255,255,255,.5);font-size:12px">Toque para fechar</span>';
    d.onclick = function(){ d.remove(); };
  } else {
    d.innerHTML = '<video src="'+m.src+'" controls style="max-width:92vw;max-height:82vh;border-radius:8px;display:block"></video><span style="color:rgba(255,255,255,.5);font-size:12px">Toque fora para fechar</span>';
    d.onclick = function(ev){ if(ev.target.tagName!=='VIDEO') d.remove(); };
  }
  document.body.appendChild(d);
}

function calcProdutoPronto(){
  const p=ORC.params;
  const au18k_liq=p.au24k*p.conv18k*(1-p.perda/100);
  const pouro=parseFloat(document.getElementById('pp-pouro')?.value)||0;
  const custo_ouro=pouro*au18k_liq;
  const elco=document.getElementById('pp-couro');if(elco)elco.value=custo_ouro>0?fmt(custo_ouro):'—';
  const taxa_mo=p.taxa_mo||120;
  if(!ORC.b1._mdoManual){
    const autoMdo=Math.round(pouro*taxa_mo);
    ORC.b1.mao_obra=autoMdo;
    const mdoEl=document.getElementById('pp-mdo');if(mdoEl)mdoEl.value=autoMdo;
  }
  const mdo=parseFloat(document.getElementById('pp-mdo')?.value)||0;
  const outros=parseFloat(document.getElementById('pp-outros')?.value)||0;
  const custo_ins=(ORC.b1.insumos_orc||[]).reduce((a,it)=>a+it.qtd*(it.custo_unit||0),0);
  const custo_exp=(ORC.b2_items||[]).reduce((a,it)=>a+it.qtd*(it.custo_unit||0),0);
  const custo_total=custo_ouro+mdo+custo_ins+custo_exp+outros;
  const cartao=parseFloat(document.getElementById('pp-cartao')?.value)||0;
  const mkt=parseFloat(document.getElementById('pp-mkt')?.value)||0;
  const com=parseFloat(document.getElementById('pp-com')?.value)||0;
  const cash=parseFloat(document.getElementById('pp-cash')?.value)||0;
  const trib=parseFloat(document.getElementById('pp-trib')?.value)||0;
  const markup=parseFloat(document.getElementById('pp-markup')?.value)||3.2;
  const desc_max=parseFloat(document.getElementById('pp-desc')?.value)||10;
  const margem_alvo=parseFloat(document.getElementById('pp-margem-alvo')?.value)||25;
  const desp_pct=(cartao+mkt+com+cash+trib)/100;
  const preco_minimo=desp_pct<1?custo_total/(1-desp_pct):custo_total*2;
  const preco_ideal=custo_total*markup;
  const preco_vista=preco_ideal*(1-desc_max/100);
  const lucro=preco_ideal-custo_total-(preco_ideal*desp_pct);
  const margem=preco_ideal>0?(lucro/preco_ideal)*100:0;
  const status_ok=custo_total>0&&margem>=margem_alvo;
  window._orcCalc={custo_total,preco_final:preco_ideal,preco_vista_final:preco_vista,lucro_final:lucro,margem_final:margem,markup,status_ok};
  const el=document.getElementById('pp-prices');
  if(!el)return;
  if(custo_total===0){el.innerHTML='<p class="text-suave">Adicione insumos ou peso de ouro para calcular…</p>';return;}
  const nivelLabel=markup>=4?'Peça Especial':markup>=3.5?'Hero / Forte Desejo':markup>=3?'Desejo Médio':markup>=2.5?'Comercial':'Abaixo do Comercial';
  const nivelCor=markup>=3.5?'#b0a259':markup>=3?'#6fcf97':'#eb5757';
  const badge=status_ok
    ?`<div style="background:linear-gradient(135deg,#1a4a2e,#143820);border:2px solid #6fcf97;border-radius:10px;padding:14px 20px;display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <span style="font-size:28px">✅</span>
        <div><p style="font-size:13px;letter-spacing:.14em;color:#6fcf97;font-weight:700;text-transform:uppercase;margin:0">Venda Aprovada</p>
          <p style="font-size:12px;color:rgba(255,255,255,.75);margin:3px 0 0">Margem ${fmtN(margem,1)}% ≥ alvo ${fmtN(margem_alvo,0)}%</p></div>
        <span style="margin-left:auto;font-size:20px;font-weight:700;color:#6fcf97">${fmt(preco_ideal)}</span></div>`
    :`<div style="background:linear-gradient(135deg,#4a1a1a,#3a1010);border:2px solid #eb5757;border-radius:10px;padding:14px 20px;display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <span style="font-size:28px">⚠️</span>
        <div><p style="font-size:13px;letter-spacing:.14em;color:#eb5757;font-weight:700;text-transform:uppercase;margin:0">Rever Preço</p>
          <p style="font-size:12px;color:rgba(255,255,255,.75);margin:3px 0 0">Margem ${fmtN(margem,1)}% &lt; alvo ${fmtN(margem_alvo,0)}% — aumente o markup</p></div></div>`;
  const btnAprovar=status_ok
    ?`<button onclick="aprovarVenda()" style="width:100%;margin-top:14px;padding:14px;background:linear-gradient(135deg,#1a7a3e,#1a5a2e);border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:700;letter-spacing:.08em;cursor:pointer;font-family:Jost,sans-serif">✦ Autorizar e Registrar Venda</button>`:'';
  const btnCatalogo=custo_total>0
    ?`<button onclick="enviarParaCatalogo()" style="width:100%;margin-top:10px;padding:12px;background:transparent;border:1.5px solid var(--ouro);border-radius:8px;color:var(--ouro);font-size:14px;font-weight:600;cursor:pointer;font-family:Jost,sans-serif">📦 Enviar para o Catálogo</button>`:'';
  el.innerHTML=`${badge}
    <div class="price-row" style="opacity:.8"><span>Custo Total</span><span class="fw-600">${fmt(custo_total)}</span></div>
    <div class="price-row" style="opacity:.7;font-size:13px"><span>Preço Mínimo Viável</span><span>${fmt(preco_minimo)}</span></div>
    <div style="text-align:center;padding:16px 0;border-top:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.1);margin:10px 0">
      <p style="font-size:11px;letter-spacing:.12em;color:rgba(176,142,86,.7);margin-bottom:4px;text-transform:uppercase">Preço Ideal Sugerido</p>
      <p class="price-ideal">${fmt(preco_ideal)}</p>
      <p style="font-size:12px;color:${nivelCor};margin-top:4px;font-weight:600">${markup}× — ${nivelLabel}</p></div>
    <div class="price-row"><span>Preço à Vista / PIX</span><span class="fw-600">${fmt(preco_vista)}</span></div>
    <div class="price-row"><span>Lucro Líquido Estimado</span><span style="color:${lucro>0?'#6fcf97':'#eb5757'};font-weight:600">${fmt(lucro)}</span></div>
    <div class="price-row"><span>Margem Líquida Estimada</span><span style="color:${margem>=margem_alvo?'#6fcf97':'#eb5757'};font-weight:600">${fmtN(margem,1)}%</span></div>
    ${btnAprovar}${btnCatalogo}`;
}

function saveOrcamento(){
  const cl_el=document.getElementById('orc-cl');
  const desc_el=document.getElementById('orc-desc');
  // produto_pronto: usa novo formulário com insumos + markup
  if(ORC.tipo==='produto_pronto'){
    if(!desc_el||!desc_el.value){showToast('Descrição obrigatória','danger');return;}
    const calc=window._orcCalc||{};
    ORC.b1.peso_ouro=parseFloat(document.getElementById('pp-pouro')?.value)||0;
    ORC.b1.mao_obra=parseFloat(document.getElementById('pp-mdo')?.value)||0;

function editOrcamento(id){
  const o=DB.orcamentos.find(x=>x.id==id);if(!o)return;
  // Converter fotos antigas (strings) para formato novo {tipo,src,nome}
  var fotosConvertidas=(o.fotos||[]).map(function(f){
    if(typeof f==='string') return {tipo:'img',src:f,nome:'foto'};
    return f;
  });
  midiaInit('orc', fotosConvertidas);
  const desenhoConvert=(orc.desenhos||[]).map(f=>typeof f==='string'?{tipo:'img',src:f,nome:'desenho'}:f);
  midiaInit('orc_desenho', desenhoConvert);
  const b2saved = o.bloco2||{};
  ORC={tipo:o.tipo,params:{...o.params},
    b1:{...o.bloco1,gemas:[...(o.bloco1?.gemas||[])],insumos_orc:[...(o.bloco1?.insumos_orc||[])]},
    b2:{},b2_items:Array.isArray(b2saved.items)?[...b2saved.items]:[],
    b3:{...o.bloco3},fotos:[]};
  renderOrcForm();
  setTimeout(function(){
    _initOrcMidia();
    setTimeout(function(){
      const cl=document.getElementById('orc-cl');if(cl)cl.value=o.cliente_id;
      const desc=document.getElementById('orc-desc');if(desc)desc.value=o.descricao;
      if(ORC.tipo==='produto_pronto'){
        // produto_pronto: restore b1 insumos_orc and recalculate
        if(o.bloco1&&o.bloco1.insumos_orc) ORC.b1.insumos_orc=[...o.bloco1.insumos_orc];
        const ppPouro=document.getElementById('pp-pouro');if(ppPouro)ppPouro.value=o.bloco1?.peso_ouro||0;
        const ppMdo=document.getElementById('pp-mdo');if(ppMdo)ppMdo.value=o.bloco1?.mao_obra||0;
        const ppMarkup=document.getElementById('pp-markup');if(ppMarkup)ppMarkup.value=o.bloco3?.markup||3.2;
        const ppIns=document.getElementById('pp-ins-list');if(ppIns)ppIns.innerHTML=renderInsumosOrcForm();
        const ppB2=document.getElementById('pp-b2-list');if(ppB2)ppB2.innerHTML=renderExpForm();
        setTimeout(calcProdutoPronto,80);
        calcProdutoPronto();
      } else if(ORC.tipo==='joia_nova'){
        const insL=document.getElementById('ins-orc-list');if(insL)insL.innerHTML=renderInsumosOrcForm();
        const b2L=document.getElementById('b2-list');if(b2L)b2L.innerHTML=renderExpForm();
        calcOrc();
      } else if(ORC.tipo==='conserto'){
        // Restaurar campos do formulário de conserto a partir do ORC.b1 salvo
        const b1=ORC.b1;
        const emdo=document.getElementById('cons-mdo');if(emdo)emdo.value=b1.mao_obra||0;
        const emat=document.getElementById('cons-mat');if(emat)emat.value=b1.mao_obra2||0;
        const eout=document.getElementById('cons-out');if(eout)eout.value=b1.outros||0;
        const eprob=document.getElementById('cons-prob');if(eprob)eprob.value=b1.obs_conserto||'';
        // Restaurar checkboxes de intervenção
        if(b1.intervencoes&&b1.intervencoes.length){
          document.querySelectorAll('input[name="interv"]').forEach(el=>{
            el.checked=b1.intervencoes.includes(el.value);
          });
        }
        calcConserto();
      } else if(ORC.tipo==='ressignificar'){
        // Restaurar campos do formulário de ressignificação a partir do ORC.b1 salvo
        const b1=ORC.b1;
        const epbr=document.getElementById('res-pbr');if(epbr)epbr.value=b1.peso_bruto||0;
        const epliq=document.getElementById('res-pliq');if(epliq)epliq.value=b1.peso_liquido||0;
        const ecot=document.getElementById('res-cot');if(ecot)ecot.value=b1.cotacao_base||ORC.params.au24k;
        const emdo=document.getElementById('res-mdo');if(emdo)emdo.value=b1.mao_obra||0;
        const emat=document.getElementById('res-mat');if(emat)emat.value=b1.mao_obra2||0;
        const egem=document.getElementById('res-gem');if(egem)egem.value=b1.outros||0;
        const etrat=document.getElementById('res-trat');if(etrat&&b1.tratamento)etrat.value=b1.tratamento;
        const epub=document.getElementById('res-pur');if(epub&&b1.pureza)epub.value=b1.pureza;
        calcRessig();
      }
      midiaRenderPreview('orc');
    },60);
  },60);
}

function gerarPropostaDeOrc(id){
  const o=DB.orcamentos.find(x=>x.id==id);if(!o)return;
  const cl=DB.clientes.find(c=>c.id==o.cliente_id)||{};
  const saldo=calcSaldoCliente(o.cliente_id||0);
  // Para produto_pronto, o preço vem direto do campo
  if(o.tipo==='produto_pronto'){
    renderPropostaForm(o, o.preco_aprovado||o.preco_direto||0, cl, saldo);
    return;
  }
  const p=o.params||{au24k:757.05,conv18k:0.75,perda:10,dolar:5.85};
  const au18k_liq=p.au24k*p.conv18k*(1-p.perda/100);
  const b1=o.bloco1||{};const b2=o.bloco2||{};const b3=o.bloco3||{};
  const custo_ouro=(b1.peso_ouro||0)*au18k_liq;
  const custo_gemas=(b1.gemas||[]).reduce((a,g)=>a+g.qtd*g.custo*(g.moeda==='USD'?p.dolar:1),0);
  const custo_ins_saved=(b1.insumos_orc||[]).reduce((a,it)=>a+it.qtd*(it.custo_unit||0),0);
  const custo_b1=custo_ouro+(b1.mao_obra||0)+(b1.mao_obra2||0)+custo_gemas+custo_ins_saved+(b1.outros||0);
  const custo_b2=Array.isArray(b2.items)?b2.items.reduce((a,it)=>a+it.qtd*(it.custo_unit||0),0):Object.values(b2).reduce((a,v)=>a+(typeof v==='number'?v:0),0);
  const custo_total=custo_b1+custo_b2;
  const desp_pct=((b3.cartao||0)+(b3.marketing||0)+(b3.comissao||0)+(b3.cashback||0)+(b3.tributos||0))/100;
  const preco_ideal=o.preco_direto||(desp_pct<1?custo_total*(b3.markup||3.2)/(1-desp_pct):custo_total*(b3.markup||3.2));
  renderPropostaForm(o,preco_ideal,cl,saldo);
}

  const bonus=parseFloat(document.getElementById('ro-bonus')?.value)||p.bonus_pct;
  const cot18k_bruta=p.au24k*pur_f;
  const cot18k_liq=cot18k_bruta*(1-p.perda/100);
  const valor_base=pliq*cot18k_liq;
  const credito=valor_base*(1+bonus/100);
  const el=id=>document.getElementById(id);
  if(el('ro-credito-val'))el('ro-credito-val').textContent=fmt(credito);
  if(el('ro-cot-display'))el('ro-cot-display').textContent=`Cotação: ${fmt(cot18k_liq)}/g · Peso: ${fmtN(pliq,2)}g`;
  const rows=el('ro-calc-rows');
  if(rows)rows.innerHTML=`
    <div class="extrato-row"><span>Cotação Au 18k bruta</span><span>${fmt(cot18k_bruta)}/g</span></div>

    <div class="extrato-row"><span>Valor base (${fmtN(pliq,2)}g × ${fmt(cot18k_liq)})</span><span>${fmt(valor_base)}</span></div>
    <div class="extrato-row"><span>Bônus (+${bonus}%)</span><span class="extrato-credit">+ ${fmt(valor_base*bonus/100)}</span></div>
    <div class="extrato-row fw-600"><span>Crédito Total</span><span class="extrato-credit" style="font-size:16px">${fmt(credito)}</span></div>`;
}

function salvarEntradaOuro(){
  const p=DB.params_reserva;
  const pur_map={'18k':0.75,'14k':0.585,'24k':0.999};
  const pur_str=document.getElementById('ro-pur').value;
  const pur_f=pur_map[pur_str]||0.75;
  const pliq=parseFloat(document.getElementById('ro-pliq').value)||0;
  const pbr=parseFloat(document.getElementById('ro-pbr').value)||0;
  const bonus=parseFloat(document.getElementById('ro-bonus').value)||p.bonus_pct;
  const cot18k_liq=p.au24k*pur_f*(1-p.perda/100);
  const valor_base=pliq*cot18k_liq;
  const credito=valor_base*(1+bonus/100);
  if(!pliq||!credito){showToast('Preencha o peso líquido','danger');return;}
  const obj={id:DB.nextId('entradas_ouro'),
    cliente_id:parseInt(document.getElementById('ro-cl').value),
    data:document.getElementById('ro-data').value,
    qtd_pecas:parseInt(document.getElementById('ro-qtd').value)||1,
    peso_bruto:pbr,peso_liquido:pliq,
    pureza:pur_str,pureza_fator:pur_f,
    au24k_cot:p.au24k,dolar:p.dolar,perda:p.perda,bonus,
    cotacao_18k_liq:cot18k_liq,valor_base,credito,
    obs:document.getElementById('ro-obs').value};
  DB.entradas_ouro.push(obj);
  saveDB();
  showToast(`Crédito de ${fmt(credito)} registrado com sucesso!`);
  navTo('reserva_dash');
}

      </div>`).join('')||'<p class="text-suave text-center" style="padding:24px">Sem movimentações</p>'}
      <div style="padding:14px 0;border-top:2px solid var(--borda);display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <span class="fw-600">Saldo Final</span>
        <span class="extrato-credit fw-600" style="font-size:18px">${fmt(saldo)}</span>
      </div>
      <div style="margin-top:14px;padding:12px 14px;background:var(--fundo);border-radius:5px;font-size:12px;color:var(--texto-suave)">
        Limite de uso por venda: ${DB.params_reserva.limite_uso_pct}% do valor · Validade: ${DB.params_reserva.validade_meses} meses

    </div>

  document.body.appendChild(div);

const DESP_CATS = {
  utilities:    {label:'Água · Luz · Internet',  icon:'💡', cor:'#3498DB'},
  materiais:    {label:'Materiais e Insumos',     icon:'🔧', cor:'#8E44AD'},

  embalagens:   {label:'Embalagens / Expedição',  icon:'📦', cor:'#F39C12'},
  lanches:      {label:'Lanches e Alimentação',   icon:'☕', cor:'#795548'},
  outros:       {label:'Outros',                  icon:'📌', cor:'#607D8B'},
};

function _despStatus(d){
  if(d.status==='pago') return 'pago';
  if(!d.vencimento) return 'imediato';
  const dias = Math.ceil((new Date(d.vencimento)-new Date(today()))/(1000*86400));
  if(dias<0) return 'vencido';
  if(dias<=7) return 'vencendo';
  return 'pendente';
}

function _gerarRecorrentes(){
  if(!DB.despesas_recorrentes||!DB.despesas_recorrentes.length) return;
  const mesAtual = new Date().toISOString().substring(0,7);
  let geradas = 0;
  DB.despesas_recorrentes.filter(r=>r.ativo).forEach(r=>{
    if(r.ultima_geracao===mesAtual) return; // já gerou este mês
    const ano = parseInt(mesAtual.split('-')[0]);
    const mes = parseInt(mesAtual.split('-')[1]);
    const dia = Math.min(r.dia_vencimento, new Date(ano,mes,0).getDate());
    const venc = `${mesAtual}-${String(dia).padStart(2,'0')}`;
    // Verifica se já existe uma despesa deste recorrente neste mês
    const jaExiste = DB.despesas.some(d=>d.recorrente_id===r.id&&d.vencimento&&d.vencimento.startsWith(mesAtual));
    if(!jaExiste){
      DB.despesas.push({
        id:DB.nextId('despesas'),descricao:r.descricao+' — '+_mesLabel(mesAtual),
        categoria:r.categoria,valor:r.valor,tipo:'vencimento',
        vencimento:venc,status:'pendente',recorrente_id:r.id,
        obs:r.obs||'',lancado_por:'sistema',criado_em:today()
      });
      r.ultima_geracao=mesAtual;
      geradas++;
    }
  });
  if(geradas>0) saveDB();
}

function _mesLabel(ym){
  const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const [y,m]=ym.split('-');
  return meses[parseInt(m)-1]+'/'+y;
}

function renderDespesas(c){
  if(!DB.despesas)DB.despesas=[];
  if(!DB.despesas_recorrentes)DB.despesas_recorrentes=[];
  _gerarRecorrentes();

  const mesAtual=new Date().toISOString().substring(0,7);
  const selMes=localStorage.getItem('desp_mes')||mesAtual;
  const selCat=localStorage.getItem('desp_cat')||'';
  const selStatus=localStorage.getItem('desp_status')||'';

  // Meses disponíveis
  const meses=[...new Set(DB.despesas.map(d=>(d.vencimento||d.criado_em||'').substring(0,7)).filter(Boolean))].sort().reverse();
  if(!meses.includes(mesAtual)) meses.unshift(mesAtual);

  // Filtra despesas
  let lista=DB.despesas.filter(d=>{
    const dm=(d.vencimento||d.criado_em||'').substring(0,7);
    if(selMes&&dm!==selMes) return false;
    if(selCat&&d.categoria!==selCat) return false;
    const st=_despStatus(d);
    if(selStatus&&st!==selStatus) return false;
    return true;
  });

  // KPIs
  const todas=DB.despesas.filter(d=>(d.vencimento||d.criado_em||'').substring(0,7)===selMes);
  const totalMes=todas.reduce((a,d)=>a+d.valor,0);
  const pagas=todas.filter(d=>d.status==='pago').reduce((a,d)=>a+d.valor,0);
  const pendentes=todas.filter(d=>_despStatus(d)==='pendente').reduce((a,d)=>a+d.valor,0);
  const vencidas=todas.filter(d=>_despStatus(d)==='vencido');
  const vencendo=todas.filter(d=>_despStatus(d)==='vencendo');

  // Por categoria
  const porCat={};
  todas.forEach(d=>{if(!porCat[d.categoria])porCat[d.categoria]=0;porCat[d.categoria]+=d.valor;});

  c.innerHTML=`
  <div class="page-header">
    <div><p class="page-title">📋 Despesas</p>
      <p class="page-sub">${_mesLabel(selMes)} · ${todas.length} lançamento(s)</p>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline btn-sm" onclick="gerenciarRecorrentes()">↺ Recorrentes</button>
      <button class="btn btn-primary" onclick="novaDespesa()">+ Nova Despesa</button>
    </div>
  </div>

  <!-- Alertas -->
  ${vencidas.length>0?`<div style="background:rgba(235,87,87,.08);border:1.5px solid #eb5757;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px">
    <span style="font-size:20px">🚨</span>
    <div>
      <p style="font-weight:700;color:#eb5757;font-size:14px">${vencidas.length} despesa(s) VENCIDA(S)</p>
      <p style="font-size:12px;color:var(--texto-suave)">${vencidas.map(d=>d.descricao).join(' · ')}</p>
    </div>
  </div>`:''}
  ${vencendo.length>0?`<div style="background:rgba(243,156,18,.08);border:1.5px solid #F39C12;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px">
    <span style="font-size:20px">⏰</span>
    <div>
      <p style="font-weight:700;color:#F39C12;font-size:14px">${vencendo.length} vencendo nos próximos 7 dias</p>
      <p style="font-size:12px;color:var(--texto-suave)">${vencendo.map(d=>d.descricao+' ('+fmtDate(d.vencimento)+')').join(' · ')}</p>
    </div>
  </div>`:''}

  <!-- KPIs -->
  <div class="kpi-grid" style="margin-bottom:20px">
    <div class="kpi"><div class="kpi-label">Total do Mês</div><div class="kpi-value" style="font-size:18px">${fmt(totalMes)}</div></div>
    <div class="kpi verde"><div class="kpi-label">Pago</div><div class="kpi-value" style="font-size:18px">${fmt(pagas)}</div></div>
    <div class="kpi ouro"><div class="kpi-label">A Pagar</div><div class="kpi-value" style="font-size:18px">${fmt(pendentes)}</div></div>
    <div class="kpi" style="border-color:${vencidas.length?'#eb5757':'var(--borda)'}">
      <div class="kpi-label">Vencidas</div>
      <div class="kpi-value" style="font-size:18px;color:${vencidas.length?'#eb5757':'var(--texto-suave)'}">${vencidas.length}</div>
    </div>
  </div>

  <!-- Barra por categoria -->
  ${Object.keys(porCat).length>0?`<div class="card" style="margin-bottom:16px">
    <div class="card-header"><span class="card-title">Por Categoria</span></div>
    <div class="card-body">
      ${Object.entries(porCat).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{
        const cat=DESP_CATS[k]||{label:k,icon:'📌',cor:'#607D8B'};
        const pct=totalMes>0?((v/totalMes)*100).toFixed(0):0;
        return`<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">
            <span>${cat.icon} ${cat.label}</span>
            <span style="font-weight:600">${fmt(v)} <span style="color:var(--texto-suave);font-weight:400">(${pct}%)</span></span>
          </div>
          <div style="height:6px;background:var(--borda);border-radius:3px">
            <div style="height:100%;width:${pct}%;background:${cat.cor};border-radius:3px;transition:.3s"></div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`:''}

  <!-- Filtros -->
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
    <select onchange="localStorage.setItem('desp_mes',this.value);renderDespesas(document.getElementById('content'))"

      ${meses.map(m=>`<option value="${m}" ${m===selMes?'selected':''}>${_mesLabel(m)}</option>`).join('')}
    </select>

      style="padding:7px 10px;border:1.5px solid var(--borda);border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif;font-size:13px">
      <option value="">Todas as categorias</option>
      ${Object.entries(DESP_CATS).map(([k,v])=>`<option value="${k}" ${k===selCat?'selected':''}>${v.icon} ${v.label}</option>`).join('')}
    </select>
    <select onchange="localStorage.setItem('desp_status',this.value);renderDespesas(document.getElementById('content'))"
      style="padding:7px 10px;border:1.5px solid var(--borda);border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif;font-size:13px">
      <option value="">Todos os status</option>
      <option value="pendente" ${selStatus==='pendente'?'selected':''}>⏳ Pendente</option>
      <option value="vencendo" ${selStatus==='vencendo'?'selected':''}>⏰ Vencendo</option>
      <option value="vencido" ${selStatus==='vencido'?'selected':''}>🚨 Vencido</option>
      <option value="pago" ${selStatus==='pago'?'selected':''}>✅ Pago</option>
      <option value="imediato" ${selStatus==='imediato'?'selected':''}>⚡ Imediato</option>
    </select>
  </div>

  <!-- Lista de despesas -->
  <div class="card">
    <div class="card-body" style="padding:0">
      ${lista.length===0?`<p style="text-align:center;padding:32px;color:var(--texto-suave)">Nenhuma despesa neste período.</p>`:''}
      ${[...lista].sort((a,b)=>{
        const order={vencido:0,vencendo:1,pendente:2,imediato:3,pago:4};
        return (order[_despStatus(a)]||3)-(order[_despStatus(b)]||3);
      }).map(d=>{
        const st=_despStatus(d);
        const cat=DESP_CATS[d.categoria]||{label:d.categoria,icon:'📌',cor:'#607D8B'};
        const stBadge={
          pago:`<span class="badge badge-green">✅ Pago</span>`,
          pendente:`<span class="badge badge-gray">⏳ Pendente</span>`,
          vencendo:`<span style="background:#F39C12;color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600">⏰ Vence ${fmtDate(d.vencimento)}</span>`,
          vencido:`<span style="background:#eb5757;color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600">🚨 Vencido ${fmtDate(d.vencimento)}</span>`,
          imediato:`<span class="badge badge-blue">⚡ Pago</span>`,
        }[st]||'';
        return`<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--borda);${st==='vencido'?'background:rgba(235,87,87,.03)':st==='vencendo'?'background:rgba(243,156,18,.03)':''}">

function exportarCSV(nomeArquivo, cabecalho, linhas){
  // Converte array de arrays em CSV com separador ; (compatível com Excel BR)
  const esc = v => {
    if(v===null||v===undefined) return '';
    const s = String(v).replace(/"/g,'""');
    return s.includes(';')||s.includes('"')||s.includes('\n') ? '"'+s+'"' : s;
  };
  const rows = [cabecalho, ...linhas].map(row => row.map(esc).join(';')).join('\r\n');
  const bom = '\uFEFF'; // BOM para Excel reconhecer UTF-8
  const blob = new Blob([bom + rows], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = nomeArquivo + '_' + today() + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('📥 Exportado: '+a.download);
}

function exportarVendasCSV(){
  const de  = document.getElementById('vd-filtro-de')?.value  || '';
  const ate = document.getElementById('vd-filtro-ate')?.value || '';
  let vendas = DB.vendas.slice();
  if(de)  vendas = vendas.filter(v=>v.data>=de);
  if(ate) vendas = vendas.filter(v=>v.data<=ate);

  const cab = ['Data','Cliente','Descrição','Forma Pgto','Valor Total (R$)',
               'Valor em Caixa (R$)','Gold Credit (R$)','Cashback (R$)',
               'Colaboradora','Personal Styler','Origem'];
  const linhas = vendas.map(v=>[
    v.data, clienteNome(v.cliente_id), v.descricao||'',
    v.forma_pgto||'', fmtN(v.valor_total,2), fmtN(v.valor_em_caixa,2),
    fmtN(v.credito_ouro_aplic||0,2), fmtN(v.cashback_usado||0,2),
    v.colaborador||'', v.personal_styler_id?(DB.personal_stylers||[]).find(p=>p.id===v.personal_styler_id)?.nome||'':'',
    v.origem||'vendas'
  ]);
  exportarCSV('vendas_atelier', cab, linhas);
  auditLog('export_csv',{tipo:'vendas',registros:linhas.length});
}

function exportarFinanceiroCSV(){
  const de  = document.getElementById('fin-de')?.value  || '';
  const ate = document.getElementById('fin-ate')?.value || '';
  let fin = DB.financeiro.slice();
  if(de)  fin = fin.filter(f=>f.data>=de);

  const ini = mesEl+'-01';
  const fim = mesEl+'-31';

  const vendas = DB.vendas.filter(v=>v.data>=ini&&v.data<=fim);
  const colabs = DB.colaboradores.filter(c=>c.ativo&&!c.em_licenca);

  const cab = ['Colaboradora','Cargo','Vendas (qtd)','Valor Total Vendas (R$)',
               'Taxa Comissão (%)','Comissão (R$)'];
  const linhas = colabs.map(col=>{
    const vCol = vendas.filter(v=>v.colaborador===col.nome);
    const total = vCol.reduce((a,v)=>a+(v.valor_em_caixa||0),0);
    const taxa  = col.comissao_pct||0;
    const comis = total*(taxa/100);
    return [col.nome, col.cargo||'', vCol.length, fmtN(total,2), taxa, fmtN(comis,2)];
  });
  exportarCSV('comissoes_atelier', cab, linhas);
  auditLog('export_csv',{tipo:'comissoes',periodo:mesEl});
}

    else if(cid) html+='<div class="alert alert-warn" style="margin-top:8px;margin-bottom:4px;font-size:12px">⚠️ Sem saldo Gold Credit.</div>';
    if(saldoCB>0) html+=`<div style="margin-top:4px;padding:8px 12px;background:rgba(46,125,50,.07);border:1px solid rgba(46,125,50,.25);border-radius:6px;font-size:13px">↺ Cashback disponível: <strong style="color:#2e7d32">${fmt(saldoCB)}</strong></div>`;
    el.innerHTML=html;

  // Habilita/desabilita botão Gold Credit
  atualizarBotoesReserva('vd-btn-gc', saldo, 'vd-forma');
  // Habilita/desabilita botão Cashback
  const btnCB=document.getElementById('vd-btn-cb');
  if(btnCB){
