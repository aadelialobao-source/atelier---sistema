    btnCB.style.opacity=saldoCB>0?'1':'0.4';
    btnCB.style.cursor=saldoCB>0?'pointer':'not-allowed';
  }
  const forma=document.getElementById('vd-forma')?.value||'PIX';
  selecionarFormaPgto(forma);
}

// Centraliza a lógica de habilitar/desabilitar botão Gold Credit
// Calcula o limite máximo de uso do Gold Credit para uma venda
function calcLimiteReserva(totalVenda, saldoCliente){
  const pct=(DB.params_reserva&&DB.params_reserva.limite_uso_pct)||40;
  const limPct=totalVenda*(pct/100);
  return Math.min(limPct, saldoCliente);
}

// Clamps reserva input em tempo real — impede valor acima do limite
function clampReserva(el, totalId, saldo){
  if(!el)return;
  const total=parseFloat(document.getElementById(totalId)?.value)||0;
  const limite=calcLimiteReserva(total, saldo);
  let val=parseFloat(el.value)||0;
  if(val>limite){
    el.value=limite.toFixed(2);
    val=limite;
    el.style.borderColor='#eb5757';
    el.style.boxShadow='0 0 0 2px rgba(235,87,87,.25)';
    setTimeout(()=>{el.style.borderColor='#C4BDB4';el.style.boxShadow='';},1200);
    const pct=(DB.params_reserva&&DB.params_reserva.limite_uso_pct)||40;
    showToast('Limite: '+pct+'% do total ('+fmt(limite)+')','warn');
  } else {
    el.style.borderColor='#C4BDB4';
    el.style.boxShadow='';
  }
}

function atualizarBotoesReserva(btnId, saldo, formaId){
  const btn=document.getElementById(btnId);
  if(!btn)return;
  const temSaldo=saldo>0;
  btn.disabled=!temSaldo;
  btn.title=temSaldo?'Usar Gold Credit (saldo: '+fmt(saldo)+')':'Cliente sem saldo Gold Credit registrado';
  btn.style.opacity=temSaldo?'1':'0.4';
  btn.style.cursor=temSaldo?'pointer':'not-allowed';
  // Se Gold Credit estava selecionado e perdeu o saldo, volta para PIX
  if(!temSaldo&&document.getElementById(formaId)?.value==='Gold Credit'){
    document.getElementById(formaId).value='PIX';
  }
}


// ─── Regra: OS só vai para produção com aceite + sinal ───────────
function osLiberadaParaProducao(os){
  // OS sem cliente (atelier próprio) não precisa de aceite/sinal
  if(os.origem==='atelier') return {ok:true};
  // Se já está em producao ou além, considera liberada
  if(['producao','aprovado','concluido','entregue'].includes(os.status)) return {ok:true};

  const erros = [];
  if(!os.aceite_cliente){
    erros.push('Cliente ainda não aceitou o orçamento');
  }
  const formaCartao = ['Cartão','Cartão Crédito','cartao','cartão'];
  const pagoCartao  = formaCartao.some(f=>(os.sinal_forma||'').toLowerCase().includes(f.toLowerCase()));
  if(!os.sinal_pago){
    erros.push('Entrada de 50% não registrada');
  } else if(!pagoCartao){
    // Sinal pago mas não cartão — verifica se valor é >= 50% do orçamento
    const orc = os.orcamento_id ? DB.orcamentos.find(o=>o.id===os.orcamento_id) : null;
    const valorOrc = orc ? (orc.preco_aprovado||orc.preco_direto||0) : 0;
    if(valorOrc > 0 && (os.sinal_valor||0) < valorOrc*0.499){
      erros.push('Valor do sinal ('+fmt(os.sinal_valor||0)+') é inferior a 50% do orçamento ('+fmt(valorOrc*0.5)+')');
    }
  }
  if(erros.length) return {ok:false, erros};
  return {ok:true};
}

// ─── Helpers: cartão com parcelamento ───────────────────────────
const TAXA_CARTAO_PCT = 12; // 12% de taxa da operadora

// ══════════════════════════════════════════════════════════════════
// MOTOR CENTRAL DE VENDAS — registrarVenda(params)
// Único ponto de escrita para todas as origens de venda:
//   - Módulo Vendas    (saveVendaFinalizar)
//   - Módulo Orçamento (confirmarRealizarVenda)
//   - Caixa            (salvarVendaCaixa)
//
// params = {
//   cid, desc, valor_total, forma_pgto, colab, data, origem,
//   itens,           // [{pid,desc,preco,qtd}] — baixa estoque
//   reserva_gc,      // Gold Credit usado
//   cashback_usado,  // Cashback debitado
//   pgto_misto,      // breakdown {pix,cred,deb,din,gc}
//   parcelas,        // cartão crédito
//   forma_restante,  // forma do saldo após GC ou CB
//   orcamento_id,    // se vier de orçamento
//   personal_styler_id, ps_pct,
//   registrar_caixa  // true: grava também em DB.caixa.movimentos
// }
// Retorna: { ok, venda_id, cb_gerado, msg }
// ══════════════════════════════════════════════════════════════════
function registrarVenda(params){
  const {
    cid            = null,
    desc           = '',
    valor_total    = 0,
    forma_pgto     = 'PIX',
    colab          = '',
    data           = today(),
    origem         = 'vendas',
    itens          = [],
    reserva_gc     = 0,
    cashback_usado = 0,
    pgto_misto     = null,
    parcelas       = null,
    forma_restante = forma_pgto,
    orcamento_id   = null,
    personal_styler_id = null,
    ps_pct         = 10,
    registrar_caixa = false
  } = params;

  if(!desc)                    return {ok:false, msg:'Descrição obrigatória'};
  if(!valor_total)              return {ok:false, msg:'Valor obrigatório'};
  if(valor_total < 0)           return {ok:false, msg:'Valor da venda não pode ser negativo'};

  // ── 1. Cálculo do valor em caixa ─────────────────────────────────
  const isCartaoCredito = forma_pgto==='Cartão Crédito';
  const taxaCartao = isCartaoCredito
    ? Math.round(valor_total * TAXA_CARTAO_PCT / 100 * 100) / 100
    : 0;
  // No módulo Vendas a taxa é deduzida; no Caixa registra valor cheio
  const baseCalculo = (origem==='caixa') ? valor_total : (isCartaoCredito ? valor_total - taxaCartao : valor_total);
  const emCaixa = Math.max(0, baseCalculo - reserva_gc - cashback_usado);

  // ── 2. Cria o registro de venda ───────────────────────────────────
  const vendaId = DB.nextId('vendas');
  const psObj = personal_styler_id
    ? (DB.personal_stylers||[]).find(p=>p.id===personal_styler_id)
    : null;
  const venda = {
    id:               vendaId,
    data,
    cliente_id:       cid,
    descricao:        desc,
    valor_total,
    valor_em_caixa:   emCaixa,
    credito_ouro_aplic: reserva_gc,
    cashback_usado:   cashback_usado||0,
    forma_pgto,
    pgto_misto,
    colaborador:      colab,
    origem,
    orcamento_id,
    produto_id:       itens.length===1?(itens[0].pid||null):null,
    parcelas:         isCartaoCredito?parcelas:null,
    taxa_cartao:      isCartaoCredito?taxaCartao:null,
    valor_liquido:    isCartaoCredito?(valor_total-taxaCartao):null,
    personal_styler_id,
    comissao_ps_valor: personal_styler_id ? valor_total*(psObj?psObj.comissao_pct/100:ps_pct/100) : 0
  };

  // ── 3. Baixa estoque de todos os itens ───────────────────────────
  itens.forEach(it=>{
    if(it.pid){
      const prod = DB.colecao.find(x=>x.id===it.pid);
      if(prod) prod.estoque = Math.max(0, prod.estoque - (it.qtd||1));
    }
  });

  // ── 4. Registra uso de Gold Credit ───────────────────────────────
  if(reserva_gc > 0){
    if(!cid) return {ok:false, msg:'Cliente obrigatório para uso de Gold Credit'};
    const _saldoGC = calcSaldoCliente(cid);
    if(reserva_gc > _saldoGC + 0.5){
      return {ok:false, msg:'Saldo Gold Credit insuficiente (disponível: '+fmt(_saldoGC)+')'};
    }
    const entr = DB.entradas_ouro.filter(e=>e.cliente_id==cid);
    if(entr.length > 0){
      DB.vendas_credito.push({
        id: DB.nextId('vendas_credito'),
        cliente_id: cid, data,
        entrada_ouro_id: entr[0].id,
        valor_usado: reserva_gc,
        descricao: desc
      });
    }
  }

  // ── 5. Registra uso de Cashback ───────────────────────────────────
  if(cashback_usado > 0){
    if(!cid) return {ok:false, msg:'Cliente obrigatório para uso de cashback'};
    const _saldoCB = calcCashbackCliente(cid);
    if(cashback_usado > _saldoCB + 0.01){
      return {ok:false, msg:'Saldo de cashback insuficiente (disponível: '+fmt(_saldoCB)+')'};
    }
    usarCashbackCliente(cid, cashback_usado, desc, data);
    venda.cashback_usado = cashback_usado;
  }

  // ── 6. Persiste a venda ───────────────────────────────────────────
  DB.vendas.push(venda);

  // ── 7. Movimento de caixa (opcional, apenas origem='caixa') ──────
  if(registrar_caixa){
    if(!DB.caixa.movimentos) DB.caixa.movimentos=[];
    const hora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    DB.caixa.movimentos.push({
      id:vendaId, data, hora,
      descricao:desc, valor:valor_total,
      forma:forma_pgto, colab,
      cliente_id:cid, produto_id:venda.produto_id
    });
  }

  // ── 8. Financeiro ─────────────────────────────────────────────────
  if(emCaixa > 0){
    DB.financeiro.push({
      id: DB.nextId('financeiro'),
      data, tipo:'entrada', categoria:'Venda',
      descricao: desc,
      forma: forma_restante||forma_pgto,
      valor: emCaixa,
      taxa_cartao: isCartaoCredito?taxaCartao:null,
      parcelas:    isCartaoCredito?parcelas:null
    });
  }

  // ── 9. LTV do cliente ─────────────────────────────────────────────
  if(cid) recalcLTV(cid);

  // ── 10. Cashback automático (gerado sobre o que entrou em caixa) ──
  const cbGerado = (cid && emCaixa > 0)
    ? gerarCashbackAuto(cid, emCaixa, desc, data)
    : 0;
  // Vincula o venda_id ao último lançamento de cashback (para estorno preciso)
  if(cbGerado > 0 && cid){
    const cbObj = DB.cashback.find(x=>x.cliente_id==cid);
    if(cbObj && cbObj.historico && cbObj.historico.length){
      const lastEntry = cbObj.historico[cbObj.historico.length-1];
      if(!lastEntry.venda_id) lastEntry.venda_id = vendaId;
    }
  }

  // ── 11. Audit log ─────────────────────────────────────────────────
  auditLog('venda_registrada',{
    venda_id:vendaId, origem, valor_total, forma_pgto,
    reserva_gc, cashback_usado, cb_gerado:cbGerado
  });

  // ── 12. Persistência única ────────────────────────────────────────
  saveDB();

  return {ok:true, venda_id:vendaId, cb_gerado:cbGerado};
}

function calcCartaoInfo(total, parcelas){
  const taxa = total * (TAXA_CARTAO_PCT / 100);
  const liquido = total - taxa;
  const valorParcela = total / parcelas;
  return { total, parcelas, taxa, liquido, valorParcela };
}

const PARCELA_MIN = 1; // Valor mínimo por parcela em R$

function parcOpts(selectedId, selectedVal, total){
  return Array.from({length:10},(_,i)=>i+1).map(n=>{
    // Esconde opção se parcela ficaria abaixo do mínimo
    if(total>0 && n>1 && (total/n) < PARCELA_MIN) return '';
    let label;
    if(n===1) label='1× à vista';
    else if(total>0) label=`${n}× de ${fmt(total/n)}`;
    else label=`${n}×`;
    return `<option value="${n}" ${n===(selectedVal||1)?'selected':''}>${label}</option>`;
  }).join('');
}

function calcVenda(){
  const total=parseFloat(document.getElementById('vd-total')?.value)||0;
  const forma=document.getElementById('vd-forma')?.value||'PIX';
  const resumo=document.getElementById('vd-pgto-resumo');
  if(!resumo)return;
  if(total<=0){resumo.innerHTML='';return;}

  let reserva=0, emCaixa=0, detalhes=[], resto=0;

  if(forma==='Misto'){
    const pix=parseFloat(document.getElementById('mx-pix')?.value)||0;
    const cartao=parseFloat(document.getElementById('mx-cartao')?.value)||0;
    const dinheiro=parseFloat(document.getElementById('mx-dinheiro')?.value)||0;
    reserva=parseFloat(document.getElementById('mx-reserva')?.value)||0;
    const outro=parseFloat(document.getElementById('mx-outro')?.value)||0;
    const outroDesc=document.getElementById('mx-outro-desc')?.value||'Outro';
    const soma=pix+cartao+dinheiro+reserva+outro;
    emCaixa=pix+cartao+dinheiro+outro;
    resto=total-soma;
    if(pix>0)detalhes.push({label:'PIX',val:pix});
    if(cartao>0)detalhes.push({label:'Cartão',val:cartao});
    if(dinheiro>0)detalhes.push({label:'Dinheiro',val:dinheiro});
    if(reserva>0)detalhes.push({label:'Gold Credit',val:reserva});
    if(outro>0)detalhes.push({label:outroDesc,val:outro});
    const cor=Math.abs(resto)<0.01?'var(--verde)':'#eb5757';
    const msg=Math.abs(resto)<0.01?'✅ Pagamento completo':(resto>0?`⚠️ Faltam ${fmt(resto)}`:`⚠️ Excede ${fmt(Math.abs(resto))}`);
    resumo.innerHTML=`<div style="background:var(--fundo);border-radius:6px;padding:12px 14px;border:1px solid var(--borda)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:12px;color:${cor};font-weight:600">${msg}</span>
        <span style="font-weight:700">${fmt(total)}</span>
      </div>
      ${detalhes.map(d=>`<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--texto-suave);margin-bottom:3px"><span>${d.label}</span><span>${fmt(d.val)}</span></div>`).join('')}
    </div>`;
  } else if(forma==='Gold Credit'){
    reserva=parseFloat(document.getElementById('vd-reserva')?.value)||0;
    emCaixa=Math.max(0,total-reserva);
    const cidR=parseInt(document.getElementById('vd-cl')?.value)||0;
    const saldoR=calcSaldoCliente(cidR);
    const limR=calcLimiteReserva(total,saldoR);
    const pctR=(DB.params_reserva&&DB.params_reserva.limite_uso_pct)||40;
    const ultrapassaLimite=reserva>limR+0.5;
    resumo.innerHTML=`<div style="font-size:13px;padding:8px 12px;background:${ultrapassaLimite?'rgba(235,87,87,.08)':'var(--fundo)'};border-radius:6px;border:1px solid ${ultrapassaLimite?'#eb5757':'var(--borda)'}">
      ${ultrapassaLimite?`<p style="color:#eb5757;font-weight:600;margin-bottom:4px">⚠️ Excede o limite de ${pctR}% — máx. ${fmt(limR)}</p>`:''}
      <span style="color:${ultrapassaLimite?'#eb5757':'var(--texto-suave)'}">Gold Credit: <strong>${fmt(reserva)}</strong></span> · Em caixa: <strong>${fmt(emCaixa)}</strong>
      <br><span style="font-size:11px;color:var(--texto-suave)">Limite ${pctR}% de ${fmt(total)} = ${fmt(limR)}</span>
    </div>`;
  } else if(forma==='Cartão Crédito'){
    const parcelasVd=parseInt(document.getElementById('vd-cartao-parc')?.value)||1;
    const infoVd=calcCartaoInfo(total,parcelasVd);
    emCaixa=infoVd.liquido;
    renderCartaoDetalhe('vd-cartao','vd-total'); // atualiza painel + options
    resumo.innerHTML=''; // resumo já está dentro do painel
  } else if(forma==='Cartão Débito'){
    emCaixa=total;
    resumo.innerHTML='';
  } else if(forma==='Cashback'){
    const cbUsado=parseFloat(document.getElementById('vd-cashback')?.value)||0;
    const cbSaldoAtual=calcCashbackCliente(parseInt(document.getElementById('vd-cl')?.value)||0);
    emCaixa=Math.max(0,total-cbUsado);
    const cbOk=cbUsado<=cbSaldoAtual+0.01;
    resumo.innerHTML=`<div style="background:rgba(46,125,50,.07);border:1px solid rgba(46,125,50,.25);border-radius:6px;padding:10px 14px;font-size:13px">
      ${!cbOk?`<p style="color:#eb5757;font-weight:600;margin-bottom:4px">⚠️ Cashback excede o saldo disponível (${fmt(cbSaldoAtual)})</p>`:''}
      <div style="display:flex;justify-content:space-between"><span>↺ Cashback usado:</span><span style="color:#2e7d32;font-weight:700">${fmt(cbUsado)}</span></div>
      <div style="display:flex;justify-content:space-between;margin-top:4px"><span>Restante em caixa:</span><span style="font-weight:700">${fmt(emCaixa)}</span></div>
    </div>`;
  } else {
    emCaixa=total;
    resumo.innerHTML='';
  }
  // PS info
  const psId=parseInt(document.getElementById('vd-ps')?.value)||0;
  const psInfoEl=document.getElementById('vd-ps-info');
  if(psInfoEl&&psId&&total>0){
    const ps=(DB.personal_stylers||[]).find(p=>p.id===psId);
    if(ps)psInfoEl.innerHTML=`<span style="color:var(--ouro)">✦ ${ps.nome}: ${ps.comissao_pct}% = <strong>${fmt(total*(ps.comissao_pct/100))}</strong></span>`;
  } else if(psInfoEl){psInfoEl.textContent='';}
}

let _vdItens = []; // [{pid, desc, preco, qtd}]

function vdAutoFillItem(){

  if(!sel) return;

  const descEl=document.getElementById('vd-add-desc');

  if(preco&&precoEl) precoEl.value=preco;

function vdAddItem(){
  const pid=parseInt(document.getElementById('vd-add-produto')?.value)||null;
  const desc=(document.getElementById('vd-add-desc')?.value||'').trim();
  const preco=parseFloat(document.getElementById('vd-add-preco')?.value)||0;
  const qtd=Math.max(1,parseInt(document.getElementById('vd-add-qtd')?.value)||1);
  if(!desc){showToast('Informe a descrição do item','warn');return;}
  if(!preco){showToast('Informe o valor do item','warn');return;}
  // Valida produto do catálogo
  if(pid){
    const prod=DB.colecao.find(p=>p.id===pid);
    if(!prod||prod.estoque<qtd){showToast('Estoque insuficiente para essa quantidade','danger');return;}
    if(prod.origem_lote_id&&!prod.qc_aprovado){showToast('⛔ Produto bloqueado — QC não aprovado','danger');return;}
  }
  _vdItens.push({pid,desc,preco,qtd,subtotal:preco*qtd});
  // Limpa campos
  document.getElementById('vd-add-produto').value='';
  document.getElementById('vd-add-desc').value='';
  document.getElementById('vd-add-preco').value='';
  document.getElementById('vd-add-qtd').value='1';
  vdRenderItens();
}

function vdRemoveItem(idx){
  _vdItens.splice(idx,1);
  vdRenderItens();
}

function vdRenderItens(){
  const lista=document.getElementById('vd-itens-lista');
  const totalDisplay=document.getElementById('vd-total-valor');
  const hiddenTotal=document.getElementById('vd-total');
  const hiddenDesc=document.getElementById('vd-desc');
  if(!lista) return;
  const total=_vdItens.reduce((a,it)=>a+it.subtotal,0);
  if(_vdItens.length===0){
    lista.innerHTML='';
  } else {
    lista.innerHTML=`<div style="border:1px solid var(--borda);border-radius:8px;overflow:hidden;margin-bottom:4px">
      ${_vdItens.map((it,i)=>`
        <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;${i>0?'border-top:1px solid var(--borda)':''}">
          <div style="flex:1;min-width:0">
            <p style="font-size:13px;font-weight:600;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.desc}</p>
            <p style="font-size:11px;color:var(--texto-suave);margin:0">${it.qtd>1?it.qtd+'× de '+fmt(it.preco)+' = ':''}${fmt(it.subtotal)}</p>
          </div>
          <button onclick="vdRemoveItem(${i})" style="background:none;border:none;color:#eb5757;font-size:18px;cursor:pointer;padding:4px;flex-shrink:0">×</button>
        </div>`).join('')}
    </div>`;
  }
  if(totalDisplay) totalDisplay.textContent=fmt(total);
  if(hiddenTotal) {hiddenTotal.value=total; calcVenda();}
  // Descrição concatenada dos itens para o registro
  if(hiddenDesc) hiddenDesc.value=_vdItens.map(it=>it.qtd>1?it.qtd+'× '+it.desc:it.desc).join(' · ')||'';
}

function selecionarProdutoVenda(){
  const sel=document.getElementById('vd-produto');
  const pid=parseInt(sel?.value)||0;
  const info=document.getElementById('vd-estoque-info');
  if(!pid){if(info)info.textContent='';return;}
  const prod=DB.colecao.find(p=>p.id===pid);
  if(!prod)return;
  const descEl=document.getElementById('vd-desc');
  const totalEl=document.getElementById('vd-total');
  if(descEl)descEl.value=prod.nome+(prod.metal?' · '+prod.metal:'')+(prod.peso?' · '+fmtN(prod.peso,2)+'g':'');
  if(totalEl){totalEl.value=prod.preco||0;calcVenda();}
  const rest=prod.estoque-1;
  if(info)info.innerHTML=`<span style="color:${rest>0?'var(--verde)':'#eb5757'}">Estoque atual: <strong>${prod.estoque}</strong> → após venda: <strong>${rest}</strong>${rest===0?' <span style=\'color:#eb5757\'>⚠️ Último exemplar</span>':''}</span>`;
}

function saveVenda(){
  const cid=parseInt(document.getElementById('vd-cl')?.value)||null;
  const total=parseFloat(document.getElementById('vd-total')?.value)||0;
  const forma=document.getElementById('vd-forma')?.value||'PIX';
  const colab=document.getElementById('vd-colab')?.value||'';
  if(_vdItens.length===0){showToast('Adicione pelo menos um item à venda','warn');return;}
  if(!total){showToast('O total da venda é zero','danger');return;}
  // Validação de todos os itens do catálogo
  for(const it of _vdItens){
    if(it.pid){
      const prod=DB.colecao.find(p=>p.id===it.pid);
      if(!prod||prod.estoque<it.qtd){showToast('Estoque insuficiente: '+it.desc,'danger');return;}
      if(prod.origem_lote_id&&!prod.qc_aprovado){showToast('⛔ Item bloqueado — QC não aprovado: '+it.desc,'danger');return;}
    }
  }
  const desc=_vdItens.map(it=>it.qtd>1?it.qtd+'× '+it.desc:it.desc).join(' · ');
  const pid=_vdItens.length===1?(_vdItens[0].pid||null):null; // compatibilidade

  // Coleta detalhes do pagamento
  let reserva=0, emCaixa=0, pgtoDetalhes=null, cashbackUsado=0, pgtoMisto=null, formaRestante=forma;
  if(forma==='Misto'){
    const pix=parseFloat(document.getElementById('mx-pix')?.value)||0;
    const cartao=parseFloat(document.getElementById('mx-cartao')?.value)||0;
    const dinheiro=parseFloat(document.getElementById('mx-dinheiro')?.value)||0;
    reserva=parseFloat(document.getElementById('mx-reserva')?.value)||0;
    const outro=parseFloat(document.getElementById('mx-outro')?.value)||0;
    const outroDesc=document.getElementById('mx-outro-desc')?.value||'Outro';
    emCaixa=pix+cartao+dinheiro+outro;
    pgtoDetalhes={pix,cartao,dinheiro,reserva,outro,outro_desc:outroDesc};
    pgtoMisto={pix,cartao,dinheiro,reserva,outro};
    formaRestante='Misto';
    const soma=pix+cartao+dinheiro+reserva+outro;
    if(Math.abs(soma-total)>0.5){showToast('Soma dos pagamentos difere do total','danger');return;}
    // Valida uso de Gold Credit em Misto
    if(reserva>0){
      if(!cid){showToast('Selecione um cliente para usar Gold Credit','danger');return;}
      const saldoDisp=calcSaldoCliente(cid);
      if(saldoDisp<=0){showToast('Cliente sem saldo Gold Credit registrado','danger');return;}
      if(reserva>saldoDisp+0.5){showToast('Saldo insuficiente — disponível: '+fmt(saldoDisp),'danger');return;}
      const limiteReserva=calcLimiteReserva(total,saldoDisp);
      const pct=(DB.params_reserva&&DB.params_reserva.limite_uso_pct)||40;
      if(reserva>limiteReserva+0.5){
        // Requer autorização de override com senha
        solicitarOverrideReserva(reserva,limiteReserva,function(){saveVendaFinalizar();});
        return;
      }
    }
  } else if(forma==='Gold Credit'){
    reserva=parseFloat(document.getElementById('vd-reserva')?.value)||0;
    emCaixa=Math.max(0,total-reserva);
    formaRestante=document.getElementById('vd-forma-restante')?.value||'PIX';
  } else if(forma==='Cartão Crédito'){
    const parcelasVdS=parseInt(document.getElementById('vd-cartao-parc')?.value)||1;
    const infoVdS=calcCartaoInfo(total,parcelasVdS);
    emCaixa=infoVdS.liquido; // Atelier recebe total − 12%
    pgtoDetalhes={parcelas:parcelasVdS,taxa_pct:TAXA_CARTAO_PCT,taxa_valor:infoVdS.taxa,valor_liquido:infoVdS.liquido};
  } else if(forma==='Cartão Débito'){
    emCaixa=total;
    pgtoDetalhes={parcelas:1,taxa_pct:0,taxa_valor:0,valor_liquido:total};
  } else if(forma==='Cashback'){
    const cbUsar=parseFloat(document.getElementById('vd-cashback')?.value)||0;
    if(!cid){showToast('Selecione o cliente para usar cashback','danger');return;}
    const cbDisp=calcCashbackCliente(cid);
    if(cbUsar>cbDisp+0.01){showToast('Saldo de cashback insuficiente — disponível: '+fmt(cbDisp),'danger');return;}
    emCaixa=Math.max(0,total-cbUsar);
    pgtoDetalhes={cashback_usado:cbUsar};
    cashbackUsado=cbUsar;  // passa para _pendingVenda → registrarVenda faz o débito
    // NÃO chamar usarCashbackCliente aqui — registrarVenda o faz
  } else {
    emCaixa=total;
  }

  // Valida reserva (saldo + limite %)
  if(reserva>0&&cid){
    const saldo=calcSaldoCliente(cid);
    if(saldo<=0){showToast('Cliente sem saldo Gold Credit registrado','danger');return;}
    if(reserva>saldo+0.5){showToast('Saldo insuficiente — disponível: '+fmt(saldo),'danger');return;}
    const limReserva=calcLimiteReserva(total,saldo);
    const pct=(DB.params_reserva&&DB.params_reserva.limite_uso_pct)||40;
    if(reserva>limReserva+0.5){
      solicitarOverrideReserva(reserva,limReserva,function(){saveVendaFinalizar();});
      return;
    }
    const entr=DB.entradas_ouro.filter(e=>e.cliente_id==cid);
    if(entr.length>0){DB.vendas_credito.push({id:DB.nextId('vendas_credito'),cliente_id:cid,data:document.getElementById('vd-data').value,entrada_ouro_id:entr[0].id,valor_usado:reserva,descricao:desc});}
  }

  // Guarda dados para uso no finalizar (suporte ao override de Gold Credit)
  const psId=parseInt(document.getElementById('vd-ps')?.value)||null;
  const psObj=psId?(DB.personal_stylers||[]).find(p=>p.id===psId):null;
  const psPct=psObj?psObj.comissao_pct:0;
  window._pendingVenda={cid,desc,pid,total,emCaixa,reserva,forma,pgtoDetalhes,colab,
    psId,psPct,data:document.getElementById('vd-data').value,
    itens:[..._vdItens],       // cópia do carrinho
    cashbackUsado,             // valor de cashback a debitar (via registrarVenda)
    pgtoMisto,                 // breakdown misto
    formaRestante};            // forma do saldo após GC ou CB
  saveVendaFinalizar();
}


function saveVendaFinalizar(){
  const p=window._pendingVenda;if(!p)return;
  window._pendingVenda=null;
  const r=registrarVenda({
    cid:            p.cid,
    desc:           p.desc,
    valor_total:    p.total,
    forma_pgto:     p.forma,
    colab:          p.colab,
    data:           p.data,
    origem:         'vendas',
    itens:          p.itens||[],
    reserva_gc:     p.reserva||0,
    cashback_usado: p.cashbackUsado||0,
    pgto_misto:     p.pgtoMisto||null,
    parcelas:       p.pgtoDetalhes?.parcelas||null,
    forma_restante: p.formaRestante||p.forma,
    personal_styler_id: p.psId||null,
    ps_pct:         p.psPct||10
  });
  if(!r.ok){showToast(r.msg,'danger');return;}
  const msg='Venda registrada!'+(r.cb_gerado>0?` · 💎 Cashback ${fmt(r.cb_gerado)} gerado!`:'');
  closeModal('modal-venda');
  showToast(msg);
  renderVendas(document.getElementById('content'));
}

function salvarEdicaoVenda(id){
  if(!podeEditarVendas()){showToast('Sem permissão','danger');return;}
  const v=DB.vendas.find(x=>x.id==id);
  if(!v){showToast('Venda não encontrada','danger');return;}
  const total=parseFloat(document.getElementById('vd-total')?.value)||0;
  const caixa=parseFloat(document.getElementById('vd-caixa')?.value)||0;
  if(!total){showToast('Valor obrigatório','danger');return;}
  v.cliente_id=parseInt(document.getElementById('vd-cl')?.value)||v.cliente_id;
  v.data=document.getElementById('vd-data')?.value||v.data;
  v.descricao=document.getElementById('vd-desc')?.value||v.descricao;
  const totalAntigo=v.valor_total;

  // Alerta se valor editado cai abaixo do preço mínimo aprovado no orçamento
  if(v.preco_minimo_aprovado&&total<v.preco_minimo_aprovado-0.5&&SESS.role!=='admin'){
    showToast(`Valor abaixo do preço aprovado (${fmt(v.preco_minimo_aprovado)}). Apenas a administradora pode editar.`,'danger');
    return;
  }
  v.valor_total=total;
  v.valor_em_caixa=caixa;
  v.forma_pgto=document.getElementById('vd-forma')?.value||v.forma_pgto;
  v.colaborador=document.getElementById('vd-colab')?.value||v.colaborador;
  // Atualiza entrada no financeiro (procura pela descrição da venda)
  const finIdx=DB.financeiro.findIndex(f=>f.categoria==='Venda'&&Math.abs(f.valor-totalAntigo)<0.01&&f.data===v.data);
  if(finIdx>=0){DB.financeiro[finIdx].valor=caixa>0?caixa:total;DB.financeiro[finIdx].descricao=v.descricao;DB.financeiro[finIdx].forma=v.forma_pgto;}
  // Recalcula LTV do cliente
  recalcLTV(v.cliente_id);
  auditLog('venda_editada',{venda_id:id,valor_novo:total,forma:v.forma_pgto});
  saveDB();
  closeModal('modal-venda');
  showToast('Venda atualizada!');
  renderVendas(document.getElementById('content'));
}

function excluirVenda(id){
  if(!podeEditarVendas()){showToast('Sem permissão para excluir vendas','danger');return;}
  const v=DB.vendas.find(x=>x.id==id);
  if(!v)return;
  confirmarAcao(
    'Excluir venda?',
    (()=>{
      const cbVd=DB.cashback.find(x=>x.cliente_id==v.cliente_id);
      // Busca por venda_id (preciso) ou fallback por data+valor (compatibilidade)
      const entCBvd=cbVd?.historico?.find(h=>
        h.tipo==='credito'&&h.valor>0&&(
          h.venda_id===v.id ||
          (!h.venda_id && h.data===v.data && (h.descricao||'').includes((v.descricao||'').substring(0,20)))
        )
      );
      const cbAviso=entCBvd?`<br><span style="color:#E74C3C;font-size:12px">↺ Cashback de ${fmt(entCBvd.valor)} será estornado.</span>`:'';
      const gcAviso=v.credito_ouro_aplic>0?`<br><span style="color:#E74C3C;font-size:12px">💎 Gold Credit de ${fmt(v.credito_ouro_aplic)} será restituído.</span>`:'';
      return`<strong>${v.descricao}</strong> — ${fmt(v.valor_total)} em ${fmtDate(v.data)}${cbAviso}${gcAviso}<br><span style="color:#E74C3C;font-size:12px">Esta ação não pode ser desfeita.</span>`;
    })(),
    'Excluir',
    function(){
      // ── Snapshot antes de excluir (90 dias de histórico) ─────────
      if(!DB.vendas_excluidas) DB.vendas_excluidas=[];
      const snapshot={
        ...v,
        excluido_em: new Date().toISOString(),
        excluido_por: SESS?.usuario||'sistema',
        excluido_por_nome: SESS?.nome||'sistema'
      };
      DB.vendas_excluidas.push(snapshot);
      // Mantém só os últimos 90 dias
      const limite90=new Date(); limite90.setDate(limite90.getDate()-90);
      DB.vendas_excluidas=DB.vendas_excluidas.filter(x=>new Date(x.excluido_em)>=limite90);

      auditLog('venda_excluida',{venda_id:id,descricao:v.descricao,valor:v.valor_total,data:v.data});
      DB.vendas=DB.vendas.filter(x=>x.id!==id);

      // Restaura Gold Credit utilizado
      if(v.credito_ouro_aplic>0&&v.cliente_id){
        DB.vendas_credito=DB.vendas_credito.filter(vc=>
          !(vc.cliente_id==v.cliente_id&&
            Math.abs(vc.valor_usado-v.credito_ouro_aplic)<0.01&&
            vc.descricao===v.descricao));
      }

      // Restaura estoque do produto
      if(v.produto_id){
        const prod=DB.colecao.find(p=>p.id===v.produto_id);
        if(prod)prod.estoque+=1;
      }

      // Remove entrada financeira vinculada
      DB.financeiro=DB.financeiro.filter(f=>
        !(f.categoria==='Venda'&&Math.abs(f.valor-v.valor_em_caixa)<0.01&&
          f.data===v.data&&f.descricao===v.descricao));

      // ── Remove cashback da venda EXCLUÍDA do histórico ──────────
      if(v.cliente_id){
        const cb=DB.cashback.find(x=>x.cliente_id==v.cliente_id);
        if(cb&&cb.historico){
          const antes=cb.saldo;
          // Remove entradas positivas vinculadas a esta venda (mesma data + descrição)
          const removidas=cb.historico.filter(h=>
            h.valor>0 && h.data===v.data &&
            (h.descricao||'').includes((v.descricao||'').substring(0,20)));
          const totalRemovido=removidas.reduce((a,h)=>a+h.valor,0);
          // Filtra fora as entradas removidas
          cb.historico=cb.historico.filter(h=>
            !(h.valor>0 && h.data===v.data &&
              (h.descricao||'').includes((v.descricao||'').substring(0,20))));
          cb.saldo=Math.round(Math.max(0, cb.saldo-totalRemovido)*100)/100;
          const clCB=DB.clientes.find(c=>c.id==v.cliente_id);
        }
      }

      // Recalcula LTV
      recalcLTV(v.cliente_id);
      saveDB();
      showToast('Venda excluída · cashback removido · dados restaurados');
      renderVendas(document.getElementById('content'));
    }
  );
}

// Gera HTML da tabela de metas de equipe
function renderMetasEquipeHTML(){
  const rows=(DB.metas_equipe||[]).slice().sort((a,b)=>(b.data_ini||'').localeCompare(a.data_ini||'')).map(m=>{
    const eq=(DB.equipes||[]).find(e=>e.id==m.equipe_id)||{nome:'Equipe',membros:[]};
    const ini=m.data_ini; const fim=m.data_fim;
    const membrosAtivos=eq.membros.filter(nome=>{
      const co=DB.colaboradores.find(c=>c.nome==nome);
      return co&&co.ativo&&!co.em_licenca;
    });
    const real=DB.vendas.filter(v=>v.data>=ini&&v.data<=fim&&membrosAtivos.includes(v.colaborador)).reduce((a,v)=>a+v.valor_total,0);
    const realOS=DB.os.filter(o=>o.prazo&&o.prazo>=ini&&o.prazo<=fim&&(o.status==='concluido'||o.status==='entregue')).length;
    const pct=m.meta_vendas>0?Math.min(100,(real/m.meta_vendas*100)).toFixed(0):0;
    const ativa=today()>=ini&&today()<=fim;
    const atingiu=real>=m.meta_vendas;
    const bonusStr=m.bonus_valor>0?fmt(m.bonus_valor):m.bonus_pct>0?m.bonus_pct+'% vendas':'—';
    return `<tr style="${ativa?'background:rgba(176,142,86,.05)':''}">
      <td class="fw-600">${eq.nome}${ativa?'<span style="margin-left:6px;font-size:10px;background:var(--ouro);color:#fff;padding:1px 5px;border-radius:3px">ativa</span>':''}</td>
      <td style="font-size:13px">${fmtDate(ini)}</td>
      <td style="font-size:13px">${fmtDate(fim)}</td>
      <td>${fmt(m.meta_vendas)}</td>
      <td class="fw-600">${fmt(real)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="background:var(--borda);border-radius:10px;height:6px;width:70px">
            <div style="background:${pct>=100?'var(--verde)':pct>=70?'var(--ouro)':'#eb5757'};height:6px;border-radius:10px;width:${pct}%"></div>
          </div>
          <span class="fw-600" style="font-size:12px;color:${pct>=100?'var(--verde)':pct>=70?'var(--ouro)':'inherit'}">${pct}%</span>
        </div>
      </td>
      <td>${m.meta_os||0} <span style="font-size:11px;color:var(--texto-suave)">/ ${realOS} real.</span></td>
      <td style="font-size:12px;${atingiu&&(m.bonus_valor>0||m.bonus_pct>0)?'color:var(--verde);font-weight:600':''}">${bonusStr}${atingiu&&(m.bonus_valor>0||m.bonus_pct>0)?' ✓':''}</td>
      <td><button onclick="excluirMetaEquipe(${m.id})" style="background:none;border:none;color:#eb5757;cursor:pointer;font-size:14px" title="Excluir">✕</button></td>
    </tr>`;
  }).join('') || '<tr><td colspan="9" class="text-center text-suave" style="padding:32px">Nenhuma meta de equipe definida</td></tr>';
  return `<div class="table-wrap" style="margin-top:8px"><table>
    <thead><tr><th>Equipe</th><th>Início</th><th>Fim</th><th>Meta Vendas</th><th>Realizado</th><th>%</th><th>Meta OS</th><th>Bônus</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function saveMetaEquipe(){
  const eqId=parseInt(document.getElementById('mte-equipe')?.value)||null;
  const ini=document.getElementById('mte-ini')?.value;
  const fim=document.getElementById('mte-fim')?.value;
  const metaVendas=parseFloat(document.getElementById('mte-vendas')?.value)||0;
  const metaOS=parseInt(document.getElementById('mte-os')?.value)||0;
  const bonusVal=parseFloat(document.getElementById('mte-bonus-val')?.value)||0;
  const bonusPct=parseFloat(document.getElementById('mte-bonus-pct')?.value)||0;
  if(!eqId){showToast('Selecione uma equipe','danger');return;}
  if(!ini||!fim){showToast('Informe as datas de início e fim','danger');return;}
  if(fim<ini){showToast('Data fim deve ser posterior ao início','danger');return;}
  if(!metaVendas&&!metaOS){showToast('Defina pelo menos uma meta (vendas ou OS)','danger');return;}
  if(!DB.metas_equipe) DB.metas_equipe=[];
  DB.metas_equipe.push({
    id:DB.nextId('metas_equipe')||Date.now(),
    equipe_id:eqId,
    data_ini:ini,
    data_fim:fim,
    meta_vendas:metaVendas,
    meta_os:metaOS,
    bonus_valor:bonusVal,
    bonus_pct:bonusPct
  });
  saveDB();
  fecharModal();
  showToast('✅ Meta de equipe salva!');
  window._metaAba='equipe';
  renderMetas(document.getElementById('content'));
}

function excluirMetaEquipe(id){
  confirmarAcao('Excluir meta de equipe?','Esta ação não pode ser desfeita.','Excluir',function(){
    DB.metas_equipe=(DB.metas_equipe||[]).filter(m=>m.id!==id);
    saveDB();showToast('Meta excluída');
    renderMetas(document.getElementById('content'));
  });
}

function saveMeta(){
  const ini=document.getElementById('mt-ini').value;
  const fim=document.getElementById('mt-fim').value;
  if(!ini||!fim){showToast('Informe as datas de início e fim','danger');return;}
  if(fim<ini){showToast('Data fim deve ser posterior à data início','danger');return;}
  // Período derivado da data de início (YYYY-MM) para compatibilidade
  const periodo=ini.substring(0,7);
  const obj={
    id: DB.nextId('metas'),
    periodo,
    data_ini: ini,
    data_fim: fim,
    colaborador_id: parseInt(document.getElementById('mt-colab').value),
    meta_vendas: parseFloat(document.getElementById('mt-vendas').value)||0,
    meta_os: parseInt(document.getElementById('mt-os').value)||0
  };
  DB.metas.push(obj);
  saveDB();closeModal('modal-meta');showToast('Meta salva');
  renderMetas(document.getElementById('content'));
}

function renderComissoes(c){
  if(!DB.equipes)DB.equipes=[];
  const periodos=[
    {label:'Este mês', fn:v=>{const d=new Date(v.data),n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}},
    {label:'Mês anterior',fn:v=>{const d=new Date(v.data),n=new Date(new Date().getFullYear(),new Date().getMonth()-1,1);return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}},
    {label:'Este ano',fn:v=>new Date(v.data).getFullYear()===new Date().getFullYear()},
    {label:'Tudo',fn:()=>true},
  ];
  const sel=parseInt(localStorage.getItem('com_periodo')||'0');
  const filtro=periodos[sel].fn;
  const vendasPeriodo=DB.vendas.filter(filtro);

  // Calcula comissão por EQUIPE
  const blocoEquipes=DB.equipes.map(eq=>{
    const membrosColab=DB.colaboradores.filter(co=>eq.membros.includes(co.nome)&&co.ativo!==false);
    const membrosAtivos=membrosColab.filter(co=>!co.em_licenca);
    const membrosLicenca=membrosColab.filter(co=>co.em_licenca);

    const vendasEquipe=vendasPeriodo.filter(v=>eq.membros.includes(v.colaborador));
    const totalCaixa=vendasEquipe.reduce((a,v)=>a+(v.valor_em_caixa||0),0);
    const poolComissao=totalCaixa*(eq.comissao_pct/100);
    const comissaoPorMembro=membrosAtivos.length>0?poolComissao/membrosAtivos.length:0;
    const pctEfetivo=membrosAtivos.length>0?eq.comissao_pct/membrosAtivos.length:0;

    return{eq,membrosColab,membrosAtivos,membrosLicenca,
      vendasEquipe,totalCaixa,poolComissao,comissaoPorMembro,pctEfetivo};
  });

  // Colaboradores sem equipe (ex: produção com comissão individual)
  const todosNaEquipe=DB.equipes.flatMap(e=>e.membros);
  const semEquipe=DB.colaboradores.filter(co=>co.ativo&&!co.em_licenca&&!todosNaEquipe.includes(co.nome)&&co.comissao_pct>0).map(co=>{
    const vendas=vendasPeriodo.filter(v=>v.colaborador===co.nome);
    const totalCaixa=vendas.reduce((a,v)=>a+(v.valor_em_caixa||0),0);
    const comissao=totalCaixa*(co.comissao_pct/100);
    return{co,vendas:vendas.length,totalCaixa,comissao};
  });

  c.innerHTML=`
  <div class="page-header">
    <div><p class="page-title">Comissões</p><p class="page-sub">Modelo por equipe · divisão automática entre ativos</p></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" onclick="exportarComissoesCSV()">📥 CSV</button>
      <button class="btn btn-outline btn-sm" onclick="gerenciarEquipes()">⚙ Equipes</button>
    </div>
  </div>

  <!-- Filtro período -->
  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
    ${periodos.map((p,i)=>`<button onclick="localStorage.setItem('com_periodo','${i}');renderComissoes(document.getElementById('content'))"
      style="padding:8px 16px;border:1.5px solid ${i===sel?'var(--ouro)':'var(--borda)'};border-radius:6px;background:${i===sel?'var(--ouro)':'var(--fundo-input)'};color:${i===sel?'#fff':'var(--texto)'};font-family:Jost,sans-serif;font-size:13px;font-weight:${i===sel?700:400};cursor:pointer">${p.label}</button>`).join('')}
  </div>

  ${blocoEquipes.map(b=>`
  <div class="card" style="margin-bottom:20px">
    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <span class="card-title">${b.eq.nome}</span>
        <span style="font-size:12px;color:var(--texto-suave);margin-left:10px">${b.eq.comissao_pct}% total · ${b.membrosAtivos.length} ativo(s) · ${fmt(b.pctEfetivo.toFixed(1)+'% cada').replace('R$ ','').replace(',00','%')}</span>
      </div>
      <span style="font-weight:700;color:var(--ouro)">${fmt(b.poolComissao)}</span>
    </div>
    <div class="card-body">

      <!-- Membros em Licença -->
      ${b.membrosLicenca.length>0?`<div style="background:rgba(235,87,87,.06);border:1px solid rgba(235,87,87,.2);border-radius:6px;padding:10px 14px;margin-bottom:14px;font-size:13px">

      <td style="padding:10px 14px;font-weight:600">${r.co.nome}</td>
      <td style="padding:10px 10px;text-align:right">${r.co.comissao_pct}%</td>
      <td style="padding:10px 10px;text-align:right">${fmt(r.totalCaixa)}</td>
      <td style="padding:10px 14px;font-weight:700;color:var(--verde);text-align:right">${fmt(r.comissao)}</td>
    </tr>`).join('')}
    </tbody></table></div>
  </div>`:''}

  <!-- PERSONAL STYLERS -->
  ${_renderPSComissoes(vendasPeriodo,filtro,periodos[sel].label)}

  <!-- BÔNUS DE META -->
  ${_renderBonusMeta(vendasPeriodo,periodos[sel].label)}
  `;
}

function tipoLicencaLabel(tipo){
  const map={maternidade:'Licença Maternidade',medica:'Licença Médica',pessoal:'Licença Pessoal',paternidade:'Licença Paternidade'};
  return map[tipo]||tipo;
}

            <label style="font-size:13px">% Comissão equipe:</label>

      <select id="lic-tipo" style="width:100%;padding:9px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif">

    </div>
    <div class="form-group" style="margin-bottom:18px">
      <label>Observações</label>
      <input id="lic-obs" placeholder="Informações adicionais..." style="width:100%;padding:9px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif">
    </div>
    <div style="background:rgba(176,142,86,.08);border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--texto-suave)">

    </div>

function confirmarLicenca(nome){
  const co=DB.colaboradores.find(c=>c.nome===nome);if(!co)return;
  co.em_licenca=true;
  co.licenca={
    tipo:document.getElementById('lic-tipo')?.value||'pessoal',
    inicio:document.getElementById('lic-inicio')?.value||today(),
    previsao_retorno:document.getElementById('lic-retorno')?.value||'',
    obs:document.getElementById('lic-obs')?.value||'',
    registrado_por:SESS.usuario,
    registrado_em:new Date().toISOString()
  };
  // Remove dos dropdowns (em_licenca = true) mas NÃO inativa
  saveDB();
  auditLog('colaborador_em_licenca',{nome,tipo:co.licenca.tipo,inicio:co.licenca.inicio});
  showToast(nome+' em licença — comissão redistribuída à equipe');
  fecharModal();
  gerenciarEquipes();
}

function retornarDeLicenca(nome){
  const co=DB.colaboradores.find(c=>c.nome===nome);if(!co)return;
  if(!co.licenca){co.em_licenca=false;saveDB();return;}
  const tipo=tipoLicencaLabel(co.licenca.tipo);
  confirmarAcao('Confirmar retorno de licença?',
    `<strong>${nome}</strong> retornará da ${tipo}.<br>
     Início: ${fmtDate(co.licenca.inicio)} · Período: ${_diasLicenca(co.licenca.inicio)} dias<br><br>
     A comissão voltará a ser dividida em ${_membrosAtivosEquipe(nome)+1} membros.`,
    'Confirmar Retorno',
    function(){
      co.em_licenca=false;
      if(!co.historico_licencas)co.historico_licencas=[];
      co.historico_licencas.push({...co.licenca,retorno_real:today()});
      co.licenca=null;
      saveDB();
      auditLog('colaborador_retorno_licenca',{nome,data_retorno:today()});
      showToast(nome+' retornou! Comissão redistribuída.');
      gerenciarEquipes();
    });
}

function _diasLicenca(inicio){
  return Math.round((Date.now()-new Date(inicio).getTime())/(24*3600*1000));
}
function _membrosAtivosEquipe(nome){
  const eq=DB.equipes&&DB.equipes.find(e=>e.membros.includes(nome));
  if(!eq)return 0;
  return eq.membros.filter(n=>{const co=DB.colaboradores.find(c=>c.nome===n);return co&&!co.em_licenca&&co.ativo!==false;}).length;
}

function _renderPSComissoes(vendasPeriodo, filtro, periodoLabel){
  if(!DB.personal_stylers||!DB.personal_stylers.length)return'';
  const psList=DB.personal_stylers.filter(ps=>ps.ativo);
  const rows=psList.map(ps=>{
    const vendasPS=vendasPeriodo.filter(v=>v.personal_styler_id===ps.id);
    const totalVendas=vendasPS.reduce((a,v)=>a+(v.valor_total||0),0);
    const comissao=vendasPS.reduce((a,v)=>a+(v.comissao_ps_valor||0),0);
    const pago=(ps.historico_pagamentos||[]).filter(p=>{
      if(p.periodo_label)return p.periodo_label===periodoLabel;
      return filtro({data:p.data});
    }).reduce((a,p)=>a+(p.valor||0),0);
    const apagar=Math.max(0,comissao-pago);
    return{ps,vendas:vendasPS.length,totalVendas,comissao,pago,apagar};
  }).filter(r=>r.vendas>0||r.comissao>0||r.pago>0);
  if(!rows.length)return'';
  return`<div class="card" style="margin-bottom:20px;border-top:2px solid var(--ouro)">
    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
      <div><span class="card-title">✦ Personal Stylers</span>
        <span style="font-size:12px;color:var(--texto-suave);margin-left:10px">10% sobre valor total quando monta o look</span>
      </div>
      <button class="btn btn-outline btn-sm" onclick="gerenciarPS()">⚙ Gerenciar</button>
    </div>
    <div class="card-body" style="padding:0">
      <table style="width:100%;border-collapse:collapse"><thead><tr style="border-bottom:1px solid var(--borda)">
        <th style="padding:8px 14px;font-size:11px;color:var(--texto-suave)">Personal Styler</th>
        <th style="padding:8px 10px;font-size:11px;color:var(--texto-suave);text-align:right">Vendas</th>
        <th style="padding:8px 10px;font-size:11px;color:var(--texto-suave);text-align:right">Total Vendas</th>
        <th style="padding:8px 10px;font-size:11px;color:var(--texto-suave);text-align:right">Comissão (10%)</th>
        <th style="padding:8px 10px;font-size:11px;color:var(--texto-suave);text-align:right">Pago</th>
        <th style="padding:8px 14px;font-size:11px;color:var(--texto-suave);text-align:right">A Pagar</th>
        <th style="padding:8px 8px"></th>
      </tr></thead><tbody>
      ${rows.map(r=>`<tr style="border-bottom:1px solid var(--borda)">
        <td style="padding:10px 14px;font-weight:600">${r.ps.nome}</td>
        <td style="padding:10px 10px;text-align:right">${r.vendas}</td>
        <td style="padding:10px 10px;text-align:right">${fmt(r.totalVendas)}</td>
        <td style="padding:10px 10px;font-weight:600;color:var(--ouro);text-align:right">${fmt(r.comissao)}</td>
        <td style="padding:10px 10px;color:var(--verde);text-align:right">${fmt(r.pago)}</td>
        <td style="padding:10px 14px;font-weight:700;text-align:right">${fmt(r.apagar)}</td>
        <td style="padding:10px 8px">${r.apagar>0.01?`<button class="btn btn-xs btn-outline" style="border-color:var(--ouro);color:var(--ouro)" onclick="pagarPS(${r.ps.id},${r.apagar.toFixed(2)},'${periodoLabel}')">✓ Pagar</button>`:''}</td>
      </tr>`).join('')}
      </tbody></table>
    </div>
  </div>`;
}

function _renderBonusMeta(vendasPeriodo, periodoLabel){
  // Calcula se a meta foi batida no período
  const totalPeriodo=vendasPeriodo.reduce((a,v)=>a+(v.valor_total||0),0);
  // Pega a meta do período (primeiro mês do filtro como referência)
  const metaRef=DB.metas.find(m=>m.periodo===new Date().toISOString().substring(0,7));
  const metaValor=metaRef?metaRef.meta_vendas:0;
  if(!metaValor||periodoLabel==='Tudo')return'';

  const metaBatida=totalPeriodo>=metaValor;
  const bonusValor=metaBatida?totalPeriodo*0.01:0;
  const bonusPendente=metaRef&&metaRef.bonus_pago;

  return`<div class="card" style="margin-bottom:20px;border-top:2px solid ${metaBatida?'var(--verde)':'var(--borda)'}">
    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <span class="card-title">🎯 Bônus de Meta (+1%)</span>
        <span style="font-size:12px;color:var(--texto-suave);margin-left:10px">Retroativo ao mês quando meta é batida</span>
      </div>
      ${metaBatida&&!bonusPendente?`<span class="badge badge-green">Meta batida ✓</span>`:metaBatida?`<span class="badge badge-gold">Bônus pago</span>`:`<span class="badge badge-gray">Meta: ${fmt(metaValor)}</span>`}
    </div>
    <div class="card-body">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:14px">
        <div><p style="font-size:11px;color:var(--texto-suave)">Meta do período</p><p class="fw-600">${fmt(metaValor)}</p></div>
        <div><p style="font-size:11px;color:var(--texto-suave)">Realizado</p><p class="fw-600" style="color:${metaBatida?'var(--verde)':'var(--texto)'}">${fmt(totalPeriodo)}</p></div>
        <div><p style="font-size:11px;color:var(--texto-suave)">Bônus (1% retroativo)</p><p class="fw-600" style="color:${metaBatida?'var(--ouro)':'var(--texto-suave)'}">${metaBatida?fmt(bonusValor):'—'}</p></div>
      </div>
      ${metaBatida&&!bonusPendente?`
      <div style="background:rgba(39,174,96,.08);border:1px solid rgba(39,174,96,.3);border-radius:6px;padding:12px 14px;margin-bottom:12px;font-size:13px">
        <strong style="color:var(--verde)">✓ Meta batida!</strong> Bônus de ${fmt(bonusValor)} a distribuir entre membros ativos da equipe.
        ${_calcBonusPorMembro(bonusValor)}
      </div>
      <button class="btn btn-primary" onclick="pagarBonusMeta(${bonusValor.toFixed(2)},'${periodoLabel}')">✦ Registrar Pagamento do Bônus</button>`
      :metaBatida&&bonusPendente?`<p style="color:var(--verde);font-size:13px">✓ Bônus de ${fmt(bonusValor)} registrado e pago em ${fmtDate(metaRef.bonus_pago_data||today())}.</p>`
      :`<div style="background:var(--fundo);border-radius:6px;padding:10px 14px">
        <p style="font-size:13px;color:var(--texto-suave)">Faltam ${fmt(Math.max(0,metaValor-totalPeriodo))} para atingir a meta e desbloquear o bônus de +1%.</p>
        <div style="margin-top:8px;height:6px;background:var(--borda);border-radius:3px">
          <div style="height:100%;width:${Math.min(100,(totalPeriodo/metaValor)*100).toFixed(1)}%;background:var(--ouro);border-radius:3px;transition:.3s"></div>
        </div>
        <p style="font-size:11px;color:var(--texto-suave);margin-top:4px">${((totalPeriodo/metaValor)*100).toFixed(1)}% da meta</p>
      </div>`}
    </div>
  </div>`;
}

function _calcBonusPorMembro(total){
  if(!DB.equipes||!DB.equipes.length)return'';
  const eq=DB.equipes[0];
  const ativos=DB.colaboradores.filter(c=>eq.membros.includes(c.nome)&&c.ativo!==false&&!c.em_licenca);
  if(!ativos.length)return'';
  const porMembro=total/ativos.length;
  return`<br><span style="font-size:12px;color:var(--texto-suave)">${ativos.map(c=>c.nome).join(', ')} · ${fmt(porMembro)} cada</span>`;
}

function pagarPS(psId, valor, periodoLabel){
  const ps=(DB.personal_stylers||[]).find(p=>p.id===psId);
  if(!ps)return;
  confirmarAcao('Pagar comissão à Personal Styler?',
    `<strong>${ps.nome}</strong><br>Valor: <strong style="color:var(--ouro)">${fmt(valor)}</strong><br>Período: ${periodoLabel}`,
    'Confirmar Pagamento',function(){
      if(!ps.historico_pagamentos)ps.historico_pagamentos=[];
      ps.historico_pagamentos.push({data:today(),valor,periodo_label:periodoLabel,usuario:SESS.usuario});
      DB.financeiro.push({id:DB.nextId('financeiro'),data:today(),tipo:'saida',
        categoria:'Comissão PS',descricao:'Comissão Personal Styler — '+ps.nome,forma:'Transferência',valor});
      auditLog('comissao_ps_paga',{ps:ps.nome,valor,periodo:periodoLabel});
      saveDB();showToast('Comissão de '+fmt(valor)+' paga para '+ps.nome);
      renderComissoes(document.getElementById('content'));
    });
}

function pagarBonusMeta(valor, periodoLabel){
  confirmarAcao('Registrar pagamento do bônus de meta?',
    `Bônus: <strong style="color:var(--verde)">${fmt(valor)}</strong><br>Período: ${periodoLabel}<br>${_calcBonusPorMembro(valor)}`,
    'Confirmar',function(){
      // Registra como saída no financeiro
      DB.financeiro.push({id:DB.nextId('financeiro'),data:today(),tipo:'saida',
        categoria:'Bônus Meta',descricao:'Bônus meta equipe — '+periodoLabel,forma:'Transferência',valor});
      // Marca a meta como bônus pago
      const metaRef=DB.metas.find(m=>m.periodo===new Date().toISOString().substring(0,7));
      if(metaRef){metaRef.bonus_pago=true;metaRef.bonus_pago_data=today();metaRef.bonus_valor=valor;}
      auditLog('bonus_meta_pago',{valor,periodo:periodoLabel});
      saveDB();showToast('Bônus de meta registrado!');
      renderComissoes(document.getElementById('content'));
    });
}

  const html=`<div style="padding:20px">
    ${DB.personal_stylers.map((ps,i)=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--borda)">
      <div>
        <p style="font-weight:600">${ps.nome}</p>
        <p style="font-size:12px;color:var(--texto-suave)">${ps.comissao_pct}% · ${ps.ativo?'Ativa':'Inativa'}</p>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-xs btn-outline" onclick="editarPS(${i})">Editar</button>
        <button class="btn btn-xs ${ps.ativo?'btn-danger':'btn-outline'}" onclick="togglePS(${i})">${ps.ativo?'Inativar':'Ativar'}</button>

    </div>`).join('')}
    <div style="margin-top:16px;padding-top:16px">
      <p style="font-size:12px;font-weight:600;color:var(--texto-suave);margin-bottom:10px">Nova Personal Styler</p>
      <div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:end">
        <input id="ps-nome-new" placeholder="Nome da Personal Styler" style="padding:9px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif">
        <input id="ps-pct-new" type="number" value="10" step="0.5" style="width:70px;padding:9px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif;text-align:right">

    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-outline" onclick="fecharModal()">Fechar</button>
    </div>
  </div>`;
  abrirModalGenerico('Gerenciar Personal Stylers', html);
}

function adicionarPS(){
  const nome=document.getElementById('ps-nome-new')?.value.trim();
  const pct=parseFloat(document.getElementById('ps-pct-new')?.value)||10;
  if(!nome){showToast('Nome obrigatório','danger');return;}
  if(!DB.personal_stylers)DB.personal_stylers=[];
  DB.personal_stylers.push({id:DB.nextId('personal_stylers'),nome,comissao_pct:pct,ativo:true,historico_pagamentos:[]});
  saveDB();showToast(nome+' adicionada!');
  fecharModal();gerenciarPS();
}

function togglePS(idx){
  DB.personal_stylers[idx].ativo=!DB.personal_stylers[idx].ativo;
  saveDB();fecharModal();gerenciarPS();
}

function editarPS(idx){
  const ps=DB.personal_stylers[idx];
  abrirModalGenerico('Editar — '+ps.nome,`<div style="padding:20px">

    <div class="form-group" style="margin-bottom:12px"><label>% Comissão</label>
      <input id="ps-edit-pct" type="number" value="${ps.comissao_pct}" step="0.5" style="width:100%;padding:9px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif;text-align:right"></div>
    <div class="form-group" style="margin-bottom:16px"><label>Telefone/Contato</label>

function salvarEditPS(idx){
  DB.personal_stylers[idx].nome=document.getElementById('ps-edit-nome')?.value||DB.personal_stylers[idx].nome;

function pagarComissao(nomeColab, valor){
  const co=DB.colaboradores.find(c=>c.nome===nomeColab);
  if(!co)return;

// ── Reconciliação de Cashback ─────────────────────────────────────
// Varre o histórico de cashback e estorna entradas positivas
// que não têm venda correspondente no banco
function reconciliarCashback(){
  if(SESS?.role!=='admin'){showToast('Apenas a administradora pode reconciliar cashback','danger');return;}
  let totalLimpo=0;
  let clientesAfetados=0;

  DB.cashback.forEach(cb=>{
    if(!cb.historico||!cb.historico.length) return;

    const antes=cb.historico.length;
    const saldoAntes=cb.saldo;

    // Remove entradas positivas de cashback sem venda correspondente
    // E também entradas negativas de "estorno automático" que sobraram
    const historicoLimpo=cb.historico.filter(h=>{
      // Remove estornos automáticos antigos (resíduo da lógica anterior)
      if(h.valor<0 && (h.descricao||'').includes('Estorno')) return false;
      // Mantém entradas manuais e negativas legítimas (uso de cashback)
      if(!(h.descricao||'').startsWith('Cashback') || (h.descricao||'').includes('manual')) return true;
      if(h.valor<=0) return true;
      // Verifica se existe venda no mesmo dia para este cliente
      return DB.vendas.some(v=>v.cliente_id==cb.cliente_id && v.data===h.data && v.valor_em_caixa>0);
    });

    const removidas=cb.historico.filter(h=>!historicoLimpo.includes(h));
    const valorRemovido=removidas.filter(h=>h.valor>0).reduce((a,h)=>a+h.valor,0);

    if(removidas.length>0){
      cb.historico=historicoLimpo;
      // Recalcula saldo do zero a partir do histórico limpo
      cb.saldo=Math.round(Math.max(0,
        historicoLimpo.reduce((a,h)=>a+h.valor,0)
      )*100)/100;
      totalLimpo+=valorRemovido;
      clientesAfetados++;
      const cl=DB.clientes.find(c=>c.id==cb.cliente_id);
    }
  });

  saveDB();

  if(clientesAfetados>0){
    showToast(`✅ ${clientesAfetados} cliente(s) limpos · ${fmt(totalLimpo)} removidos`);
    auditLog('cashback_reconciliado',{total_limpo:totalLimpo,clientes:clientesAfetados});
  } else {
    showToast('✅ Cashback já está limpo — nenhum ajuste necessário');
  }
  renderCashback(document.getElementById('content'));
}

// Estorno direto de uma entrada específica do histórico
function estornarCashbackManual(clienteId, entradaIdx){
  const cb=DB.cashback.find(x=>x.cliente_id==clienteId);
  if(!cb||!cb.historico) return;
  const h=cb.historico[entradaIdx];
  if(!h||h.valor<=0){showToast('Entrada inválida para estorno','danger');return;}
  confirmarAcao(
    'Estornar cashback?',
    `<strong>${fmt(h.valor)}</strong> de ${fmtDate(h.data)}<br><span style="font-size:12px;color:var(--texto-suave)">${h.descricao||''}</span>`,
    'Estornar',
    function(){
      cb.saldo=Math.round(Math.max(0,cb.saldo-h.valor)*100)/100;
      cb.historico.push({data:today(),valor:-h.valor,
        descricao:`Estorno manual — ${h.descricao||fmtDate(h.data)}`});
      const cl=DB.clientes.find(c=>c.id==clienteId);
      auditLog('cashback_estorno_manual',{cliente_id:clienteId,valor:h.valor});
      saveDB();
      showToast(`Cashback de ${fmt(h.valor)} estornado`);
      renderCashback(document.getElementById('content'));
    }
  );
}

function calcCash(){
  const pct=parseFloat(document.getElementById('cb-pct')?.value)||3;
  const comp=parseFloat(document.getElementById('cb-comp')?.value)||0;

}
function saveCash(){
  const cid=parseInt(document.getElementById('cb-cl').value);
  const pct=parseFloat(document.getElementById('cb-pct').value)||3;
  const comp=parseFloat(document.getElementById('cb-comp').value)||0;
  const gerado=comp*pct/100;
  if(!gerado){showToast('Valor obrigatório','danger');return;}
  let cb=DB.cashback.find(x=>x.cliente_id==cid);
  const entry={data:document.getElementById('cb-data').value,valor:gerado,descricao:`Cashback compra ${fmt(comp)}`};
  if(cb){cb.saldo+=gerado;cb.historico.push(entry);}
  else DB.cashback.push({id:DB.nextId('cashback'),cliente_id:cid,percentual:pct,saldo:gerado,historico:[entry]});
  saveDB();closeModal('modal-cash');showToast(`Cashback de ${fmt(gerado)} registrado`);
  renderCashback(document.getElementById('content'));
}

// ── MOTOR DE CASHBACK ─────────────────────────────────────────────
// Calcula saldo disponível de cashback do cliente
function calcCashbackCliente(cid){
  if(!cid) return 0;
  const cb=DB.cashback.find(x=>x.cliente_id==cid);
  return cb?(cb.saldo||0):0;
}

// Gera cashback automaticamente ao fechar uma venda
// base = valor que entrou em caixa (exclui Gold Credit)
function gerarCashbackAuto(cid, base, descricao, data){
  if(!cid||!base||base<=0) return 0;
  const cl=DB.clientes.find(c=>c.id==cid);
  if(!cl) return 0;
  const pct=(cl.cashback_pct>=0?cl.cashback_pct:5);
  if(pct<=0) return 0;
  const valor=Math.round(base*(pct/100)*100)/100;
  if(valor<=0) return 0;
  const entry={data:data||today(),valor,descricao:`Cashback ${pct}% sobre ${fmt(base)} — ${descricao||'venda'}`,tipo:'credito',venda_id:null};
  let cb=DB.cashback.find(x=>x.cliente_id==cid);
  if(cb){ cb.saldo=Math.round((cb.saldo+valor)*100)/100; cb.historico=cb.historico||[]; cb.historico.push(entry); }
  else { DB.cashback.push({id:DB.nextId('cashback'),cliente_id:cid,percentual:pct,saldo:valor,historico:[entry]}); }
  auditLog('cashback_gerado',{cliente_id:cid,valor,pct,base});
  return valor;
}

// Consome cashback do cliente (uso na venda)
function usarCashbackCliente(cid, valorUsar, descricao, data){
  if(!cid||!valorUsar||valorUsar<=0) return false;
  const cb=DB.cashback.find(x=>x.cliente_id==cid);
  if(!cb||cb.saldo<valorUsar-0.01){ return false; }
  cb.saldo=Math.round(Math.max(0,cb.saldo-valorUsar)*100)/100;
  cb.historico=cb.historico||[];
  cb.historico.push({data:data||today(),valor:-valorUsar,descricao:`Uso de cashback — ${descricao||'venda'}`});
  const cl=DB.clientes.find(c=>c.id==cid);
  auditLog('cashback_usado',{cliente_id:cid,valor:valorUsar});
  return true;
}

function renderMontagem(c){
  if(!DB.lotes_montagem)DB.lotes_montagem=[];
  const pm=DB.params_montagem||{valor_pedra:30,valor_macrame:15,valor_outro:20};
  const abertos=DB.lotes_montagem.filter(l=>l.status==='em_montagem'||l.status==='em_conferencia');
  const pagos=DB.lotes_montagem.filter(l=>l.status==='pago');
  const totalPago=pagos.reduce((a,l)=>a+(l.total_pago||0),0);

  c.innerHTML=`
  <div class="page-header">
    <div><p class="page-title">⬡ Lotes de Montagem</p>
      <p class="page-sub">${DB.lotes_montagem.length} lote(s) · ${abertos.length} em aberto</p>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline btn-sm" onclick="configMontagem()">⚙ Valores</button>
      <button class="btn btn-primary" onclick="novoLoteMontagem()">+ Novo Lote</button>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid" style="margin-bottom:20px">
    <div class="kpi"><div class="kpi-label">Em Montagem</div><div class="kpi-value">${abertos.length}</div></div>
    <div class="kpi ouro"><div class="kpi-label">Total Pago</div><div class="kpi-value">${fmt(totalPago)}</div></div>
    <div class="kpi verde"><div class="kpi-label">Lotes Concluídos</div><div class="kpi-value">${pagos.length}</div></div>
  </div>

  <!-- Lotes em Aberto -->
  ${abertos.length>0?`<div class="card" style="margin-bottom:20px">
    <div class="card-header"><span class="card-title">🔶 Em Andamento</span></div>
    <div class="card-body" style="padding:0">
      ${abertos.map(l=>_renderLoteCard(l,pm)).join('')}
    </div>
  </div>`:''}

  <!-- Histórico -->
  <div class="card">
    <div class="card-header"><span class="card-title">Histórico de Lotes</span></div>
    <div class="card-body" style="padding:0">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="border-bottom:1px solid var(--borda)">
          <th style="padding:8px 14px;font-size:11px;color:var(--texto-suave);text-align:left">Lote</th>
          <th style="padding:8px 10px;font-size:11px;color:var(--texto-suave)">Montadora</th>
          <th style="padding:8px 10px;font-size:11px;color:var(--texto-suave)">Período</th>
          <th style="padding:8px 10px;font-size:11px;color:var(--texto-suave);text-align:right">Peças</th>
          <th style="padding:8px 10px;font-size:11px;color:var(--texto-suave);text-align:right">Aprovadas</th>
          <th style="padding:8px 10px;font-size:11px;color:var(--texto-suave);text-align:right">Valor</th>
          <th style="padding:8px 10px;font-size:11px;color:var(--texto-suave)">Status</th>
          <th style="padding:8px 8px"></th>
        </tr></thead>
        <tbody>
        ${[...DB.lotes_montagem].reverse().map(l=>{
          const tot=_calcLote(l,pm);
          return`<tr style="border-bottom:1px solid var(--borda)">
            <td style="padding:9px 14px;font-weight:600">#${String(l.id).padStart(3,'0')}</td>
            <td style="padding:9px 10px;font-size:13px">${l.colaborador}</td>
            <td style="padding:9px 10px;font-size:12px;color:var(--texto-suave)">${l.periodo_label||fmtDate(l.data_envio)}</td>
            <td style="padding:9px 10px;text-align:right">${(l.pecas_recebidas||[]).length}</td>
            <td style="padding:9px 10px;text-align:right;color:var(--verde)">${(l.pecas_recebidas||[]).filter(p=>p.qc==='aprovada').length}</td>
            <td style="padding:9px 10px;font-weight:600;text-align:right">${fmt(tot.totalPagar)}</td>
            <td style="padding:9px 10px"><span class="badge ${l.status==='pago'?'badge-green':l.status==='em_conferencia'?'badge-gold':'badge-yellow'}">${l.status==='pago'?'Pago':l.status==='em_conferencia'?'Em Conf.':'Em Montagem'}</span></td>
            <td style="padding:9px 8px"><button class="btn btn-xs btn-outline" onclick="verLote(${l.id})">Ver</button></td>
          </tr>`;
        }).join('')||'<tr><td colspan="8" style="padding:32px;text-align:center;color:var(--texto-suave)">Nenhum lote registrado</td></tr>'}
        </tbody>
      </table>
    </div>
  </div>`;
}

function _calcLote(l, pm){
  const pecas=l.pecas_recebidas||[];
  const aprov=pecas.filter(p=>p.qc==='aprovada');
  const totalPagar=aprov.reduce((a,p)=>a+(p.valor_unit*p.qtd),0);
  const reprov=pecas.filter(p=>p.qc==='reprovada').length;
  return{aprov:aprov.length,reprov,totalPagar,total:pecas.length};
}

function _renderLoteCard(l, pm){
  const calc=_calcLote(l,pm);
  return`<div style="padding:16px 20px;border-bottom:1px solid var(--borda)">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <p style="font-weight:700;font-size:15px">#${String(l.id).padStart(3,'0')} · ${l.colaborador}</p>
        <p style="font-size:12px;color:var(--texto-suave)">${l.periodo_label||''} · Enviado em ${fmtDate(l.data_envio)}</p>
      </div>
      <span class="badge badge-yellow">Em ${l.status==='em_conferencia'?'Conferência':'Montagem'}</span>
    </div>
    <div style="display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap">
      <div style="font-size:13px"><span style="color:var(--texto-suave)">Registradas: </span><strong>${calc.total}</strong></div>
      <div style="font-size:13px"><span style="color:var(--verde)">Aprovadas: </span><strong>${calc.aprov}</strong></div>
      ${calc.reprov>0?`<div style="font-size:13px"><span style="color:#eb5757">Reprovadas: </span><strong>${calc.reprov}</strong></div>`:''}
      <div style="font-size:13px"><span style="color:var(--ouro)">A Pagar: </span><strong>${fmt(calc.totalPagar)}</strong></div>

      ${calc.aprov>0&&l.status!=='pago'?`<button class="btn btn-sm" style="background:var(--verde);color:#fff;border:none;border-radius:5px;cursor:pointer;padding:6px 14px;font-family:Jost,sans-serif;font-size:13px;font-weight:600" onclick="pagarLote(${l.id})">✓ Pagar ${fmt(calc.totalPagar)}</button>`:''}
    </div>
  </div>`;
}

function salvarNovoLote(){
  const colab=document.getElementById('lm-colab')?.value;
  const periodo=document.getElementById('lm-periodo')?.value||'';
  const envio=document.getElementById('lm-envio')?.value||today();
  const retorno=document.getElementById('lm-retorno')?.value||'';
  const materiais=document.getElementById('lm-materiais')?.value||'';
  const obs=document.getElementById('lm-obs')?.value||'';
  if(!colab){showToast('Selecione a montadora','danger');return;}
  const lote={id:DB.nextId('lotes_montagem'),colaborador:colab,periodo_label:periodo,
    data_envio:envio,previsao_retorno:retorno,materiais_enviados:materiais,
    status:'em_montagem',pecas_recebidas:[],total_pago:0,obs,
    usuario_criacao:SESS.usuario,criado_em:new Date().toISOString()};
  if(!DB.lotes_montagem)DB.lotes_montagem=[];
  DB.lotes_montagem.push(lote);
  auditLog('lote_montagem_criado',{id:lote.id,colaborador:colab,periodo});
  saveDB();fecharModal();showToast('Lote #'+String(lote.id).padStart(3,'0')+' aberto!');
  renderMontagem(document.getElementById('content'));
}

      <p id="qc-resultado-texto" style="font-size:16px;font-weight:700;margin-bottom:4px"></p>
      <p id="qc-resultado-sub" style="font-size:13px;color:var(--texto-suave)"></p>

function setQCCriterio(idx, valor){
  window._qcRespostas[idx]=valor;
  const simBtn=document.getElementById('qc-sim-'+idx);
  const naoBtn=document.getElementById('qc-nao-'+idx);
  const obsBox=document.getElementById('qc-obs-box-'+idx);
  const item=document.getElementById('qc-item-'+idx);

  if(valor==='sim'){
    simBtn.style.background='var(--verde)';simBtn.style.color='#fff';simBtn.style.borderColor='var(--verde)';
    naoBtn.style.background='var(--fundo-input)';naoBtn.style.color='var(--texto)';naoBtn.style.borderColor='var(--borda)';
    obsBox.style.display='none';
    item.style.borderColor='var(--verde)';
  } else {
    naoBtn.style.background='#eb5757';naoBtn.style.color='#fff';naoBtn.style.borderColor='#eb5757';
    simBtn.style.background='var(--fundo-input)';simBtn.style.color='var(--texto)';simBtn.style.borderColor='var(--borda)';
    obsBox.style.display='block';
    item.style.borderColor='#eb5757';
  }

  // Verifica se todos foram respondidos
  const criterios=QC_CRITERIOS[window._qcPecaTipo]||QC_CRITERIOS.outro;
  const respondidos=window._qcRespostas.filter(r=>r!==null).length;
  if(respondidos===criterios.length){
    const aprovada=window._qcRespostas.every(r=>r==='sim');
    const falhas=window._qcRespostas.filter(r=>r==='nao').length;
    const box=document.getElementById('qc-resultado-box');
    const txt=document.getElementById('qc-resultado-texto');
    const sub=document.getElementById('qc-resultado-sub');
    const btn=document.getElementById('qc-confirmar-btn');
    if(box&&txt&&sub){
      box.style.display='block';
      box.style.background=aprovada?'rgba(39,174,96,.1)':'rgba(235,87,87,.08)';
      box.style.border=aprovada?'2px solid var(--verde)':'2px solid #eb5757';
      txt.textContent=aprovada?'✅ APROVADA PARA VENDA':'⚠️ REPROVADA — Precisa de ajustes';
      txt.style.color=aprovada?'var(--verde)':'#eb5757';
      sub.textContent=aprovada?'Todos os '+criterios.length+' critérios aprovados':falhas+' critério(s) não atendido(s)';
    }
    if(btn)btn.style.display='block';
  }
}

function confirmarQCPeca(loteId, vPedra, vMacrame, vOutro, tipo, qtd){
  const l=DB.lotes_montagem.find(x=>x.id===loteId);if(!l)return;
  const criterios=QC_CRITERIOS[tipo]||QC_CRITERIOS.outro;
  const respostas=window._qcRespostas||[];

  // Verifica se todos foram respondidos
  if(respostas.some(r=>r===null)){showToast('Responda todos os critérios','danger');return;}

  // Monta resultado detalhado
  const qcCriterios=criterios.map((c,i)=>({
    id:c.id, label:c.label,
    resultado:respostas[i],
    obs:respostas[i]==='nao'?(document.getElementById('qc-obs-'+i)?.value.trim()||''):''
  }));

  const aprovada=respostas.every(r=>r==='sim');
  const qcStatus=aprovada?'aprovada':'reprovada';

  // Gera obs automático dos critérios reprovados
  const falhas=qcCriterios.filter(c=>c.resultado==='nao');
  const obsGerado=falhas.map(c=>c.label+(c.obs?' — '+c.obs:'')).join(' · ');

  const valor_unit=tipo==='pedra'?vPedra:tipo==='macrame'?vMacrame:vOutro;

  if(!l.pecas_recebidas)l.pecas_recebidas=[];
  l.pecas_recebidas.push({
    id:Date.now(),
    descricao:window._qcPecaDesc,
    tipo, qtd, valor_unit,
    qc:qcStatus,
    qc_criterios:qcCriterios,
    obs:obsGerado,
    foto:window._qcFoto||null,
    data:today()
  });

  // Limpa temporários
  window._qcRespostas=null;
  window._qcFoto=null;
  window._rpFotoBase64=null;

  saveDB();
  fecharModal();

  showToast(qcStatus==='aprovada'?
    '✅ Peça aprovada nos '+criterios.length+' critérios!':
    '⚠️ Peça reprovada em '+falhas.length+' critério(s)');

  // Reabre o modal do lote
  setTimeout(()=>receberPecas(loteId),200);
}

      <a href="https://wa.me/${tel?'55'+tel:''}?text=${encodeURIComponent(msg)}" target="_blank"

function calcRecebimento(vPedra, vMacrame, vOutro){
  const tipo=document.getElementById('rp-tipo')?.value;
  const qtd=parseInt(document.getElementById('rp-qtd')?.value)||1;
  const val=tipo==='pedra'?vPedra:tipo==='macrame'?vMacrame:vOutro;
  const el=document.getElementById('rp-preview');
  if(el)el.innerHTML=`${qtd} × ${tipo==='pedra'?'Pedra Natural':tipo==='macrame'?'Macramê':'Outro'} = <strong>${fmt(val*qtd)}</strong>`;
}


function removerPecaLote(loteId, idx){
  const l=DB.lotes_montagem.find(x=>x.id===loteId);if(!l)return;
  l.pecas_recebidas.splice(idx,1);
  saveDB();
  const pm=DB.params_montagem||{valor_pedra:30,valor_macrame:15,valor_outro:20};
  const lista=document.getElementById('rp-lista');
  if(lista)lista.innerHTML=_renderPecasLote(l,pm);
  showToast('Peça removida');
}

function verLote(loteId){
  const l=DB.lotes_montagem.find(x=>x.id===loteId);if(!l)return;
  const pm=DB.params_montagem||{valor_pedra:30,valor_macrame:15,valor_outro:20};
  const calc=_calcLote(l,pm);
  const porTipo={pedra:{aprov:0,val:0},macrame:{aprov:0,val:0},outro:{aprov:0,val:0}};
  (l.pecas_recebidas||[]).filter(p=>p.qc==='aprovada').forEach(p=>{
    if(porTipo[p.tipo]){porTipo[p.tipo].aprov+=p.qtd;porTipo[p.tipo].val+=p.valor_unit*p.qtd;}
  });
  const html=`<div style="padding:20px">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">

      ${porTipo.macrame.aprov>0?`<div style="text-align:center;background:var(--fundo);border-radius:6px;padding:12px"><p style="font-size:11px;color:var(--texto-suave)">Macramê</p><p style="font-size:20px;font-weight:700">${porTipo.macrame.aprov} un</p><p style="font-size:13px;color:var(--ouro);font-weight:600">${fmt(porTipo.macrame.val)}</p></div>`:''}
      ${porTipo.outro.aprov>0?`<div style="text-align:center;background:var(--fundo);border-radius:6px;padding:12px"><p style="font-size:11px;color:var(--texto-suave)">Outros</p><p style="font-size:20px;font-weight:700">${porTipo.outro.aprov} un</p><p style="font-size:13px;color:var(--ouro);font-weight:600">${fmt(porTipo.outro.val)}</p></div>`:''}

      <span style="font-size:12px;color:var(--texto-suave)">${calc.aprov} aprovadas · ${calc.reprov} reprovadas</span>
    </div>
    ${_renderPecasLote(l,pm)}
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-outline" onclick="fecharModal()">Fechar</button>
      <button class="btn btn-outline" onclick="fecharModal();receberPecas(${loteId})">+ Adicionar Peça</button>
      ${l.status!=='pago'&&calc.aprov>0?`<button class="btn btn-primary" onclick="fecharModal();pagarLote(${loteId})">✓ Pagar ${fmt(calc.totalPagar)}</button>`:''}
    </div>

  abrirModalGenerico('Lote #'+String(loteId).padStart(3,'0')+' · '+l.colaborador, html);
}

function pagarLote(loteId){
  const l=DB.lotes_montagem.find(x=>x.id===loteId);if(!l)return;
  const pm=DB.params_montagem||{valor_pedra:30,valor_macrame:15,valor_outro:20};
  const calc=_calcLote(l,pm);
  if(calc.aprov===0){showToast('Nenhuma peça aprovada para pagar','danger');return;}
  const porTipo={};
  (l.pecas_recebidas||[]).filter(p=>p.qc==='aprovada').forEach(p=>{
    const k=p.tipo==='pedra'?'Pedra Natural':p.tipo==='macrame'?'Macramê':'Outro';
    if(!porTipo[k])porTipo[k]={qtd:0,val:0};
    porTipo[k].qtd+=p.qtd;porTipo[k].val+=p.valor_unit*p.qtd;
  });
  const breakdown=Object.entries(porTipo).map(([k,v])=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--borda)"><span>${k}: ${v.qtd} un</span><span style="font-weight:600">${fmt(v.val)}</span></div>`).join('');
  confirmarAcao('Confirmar Pagamento — '+l.colaborador,
    `${breakdown}<div style="margin-top:10px;display:flex;justify-content:space-between;font-size:15px;font-weight:700"><span>Total</span><span style="color:var(--ouro)">${fmt(calc.totalPagar)}</span></div>`,
    'Pagar',function(){
      l.status='pago';l.total_pago=calc.totalPagar;l.data_pagamento=today();l.pago_por=SESS.usuario;
      DB.financeiro.push({id:DB.nextId('financeiro'),data:today(),tipo:'saida',
        categoria:'Montagem',descricao:'Montagem lote #'+String(loteId).padStart(3,'0')+' — '+l.colaborador,
        forma:'Transferência',valor:calc.totalPagar});
      (l.pecas_recebidas||[]).filter(p=>p.qc==='aprovada').forEach(p=>{
        const existing=DB.colecao.find(c=>c.nome.toLowerCase()===p.descricao.toLowerCase()&&c.origem_lote_id===l.id);
        if(existing){
          existing.estoque+=p.qtd;
          existing.qc_aprovado=true;
        } else {
          DB.colecao.push({id:DB.nextId('colecao'),nome:p.descricao,metal:'',peso:0,
            estoque:p.qtd,preco:0,categoria:p.tipo==='pedra'?'Pedras Naturais':'Macrame',
            custo_montagem:p.valor_unit,ativo:true,
            qc_aprovado:true,
            origem_lote_id:l.id,
            origem_colaborador:l.colaborador});
        }
      });
      auditLog('lote_montagem_pago',{id:loteId,colaborador:l.colaborador,valor:calc.totalPagar,pecas:calc.aprov});
      saveDB();showToast('Pagamento de '+fmt(calc.totalPagar)+' registrado!');
      renderMontagem(document.getElementById('content'));
    });
}

function salvarRomaneio(id){
  const dest=document.getElementById('rom-dest')?.value.trim();
  if(!dest){showToast('Destino obrigatório','danger');return;}
  const pecasRaw=document.getElementById('rom-pecas')?.value||'';
  const pecas=pecasRaw.split('\n').map(s=>s.trim()).filter(Boolean);
  const obj={id:id||DB.nextId('romaneios'),destino:dest,
    data:document.getElementById('rom-data')?.value||today(),
    responsavel:document.getElementById('rom-resp')?.value||SESS.nome,
    pecas,obs:document.getElementById('rom-obs')?.value||'',
    status:'aberto',data_devolucao:null};
  if(id){const i=DB.romaneios.findIndex(r=>r.id===id);if(i>=0)DB.romaneios[i]=obj;else DB.romaneios.push(obj);}
  else{DB.romaneios.push(obj);auditLog('romaneio_criado',{id:obj.id,destino:dest});}
  saveDB();fecharModal();showToast('Romaneio salvo!');
  renderRomaneio(document.getElementById('content'));
}

function verRomaneio(id){
  const r=DB.romaneios.find(x=>x.id===id);if(!r)return;
  abrirModalGenerico('Romaneio #'+id,`<div style="padding:20px">
    <div style="background:var(--fundo);border-radius:6px;padding:12px 16px;margin-bottom:14px">
      <p style="font-weight:700">${r.destino}</p>
      <p style="font-size:13px;color:var(--texto-suave)">${fmtDate(r.data)} · ${r.responsavel} · <span class="badge ${r.status==='aberto'?'badge-yellow':'badge-green'}">${r.status}</span></p>

function devolverRomaneio(id){
  const r=DB.romaneios.find(x=>x.id===id);if(!r)return;
  confirmarAcao('Confirmar devolução?',`Romaneio de <strong>${r.destino}</strong> será marcado como devolvido.`,'Confirmar',function(){
    r.status='devolvido';r.data_devolucao=today();

    saveDB();showToast('Romaneio marcado como devolvido ✅');

  });
}

function excluirRomaneio(id){
  confirmarAcao('Excluir romaneio?','Esta ação não pode ser desfeita.','Excluir',function(){

    renderRomaneio(document.getElementById('content'));

}
