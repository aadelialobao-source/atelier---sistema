<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ana Lobão">
<meta name="theme-color" content="#0D1F2D">
<title>Ana Lobão Atelier · Sistema Interno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
--azul:#0D1F2D;--azul-medio:#1A2D47;--ouro:#B08E56;--ouro-claro:#C9A96A;--ouro-fosco:#9A7A42;
--fundo:#F2F0EB;--fundo-card:#FFFFFF;--fundo-input:#F7F5F1;
--texto:#1A2A3A;--texto-suave:#6A7B8A;--borda:#D8D4CB;--borda-ouro:rgba(176,142,86,0.35);
--vermelho:#A60000;--verde:#2A5C3F;--amarelo:#B7613B;
--sidebar-w:220px;--topbar-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Jost',sans-serif;font-size:15px;color:var(--texto);background:var(--fundo)}
h1,h2,h3,.display{font-family:'Cormorant Garamond',Georgia,serif}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100dvh;background:var(--azul);background-image:radial-gradient(ellipse at 30% 50%,rgba(176,142,86,0.08) 0%,transparent 60%)}
.login-box{background:#fff;border-radius:8px;padding:48px 44px;width:360px;max-width:94vw;box-shadow:0 24px 64px rgba(0,0,0,0.3)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo svg{width:120px;height:auto}
.login-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--azul);text-align:center;margin-bottom:6px;letter-spacing:.02em}
.login-sub{font-size:12px;color:var(--texto-suave);text-align:center;margin-bottom:28px;letter-spacing:.08em;text-transform:uppercase}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:11px;font-weight:600;color:var(--texto-suave);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.login-field input{width:100%;padding:12px 14px;font-size:15px;border:1.5px solid var(--borda);border-radius:5px;background:var(--fundo-input);font-family:'Jost',sans-serif;transition:border .2s}
.login-field input:focus{outline:none;border-color:var(--ouro)}
.btn-login{width:100%;padding:13px;background:var(--azul);color:#fff;border:none;border-radius:5px;font-family:'Jost',sans-serif;font-size:14px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:background .2s}
.btn-login:hover{background:var(--azul-medio)}
.login-err{color:var(--vermelho);font-size:13px;text-align:center;margin-top:10px;display:none}

/* ── APP LAYOUT ── */
#app{display:flex;height:100dvh;overflow:hidden}
#sidebar{width:var(--sidebar-w);background:var(--azul);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;z-index:200}
#sidebar::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb{background:rgba(176,142,86,0.3);border-radius:3px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--borda);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;z-index:100}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--fundo);padding:28px}

/* ── SIDEBAR INTERNALS ── */
.sb-logo{padding:24px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo svg{width:110px;height:auto;opacity:.95}
.sb-user{padding:12px 18px 10px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-user-name{font-size:13px;font-weight:600;color:#fff;letter-spacing:.02em}
.sb-user-role{font-size:11px;color:rgba(176,142,86,.8);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.sb-section{padding:10px 18px 4px;font-size:10px;font-weight:600;color:rgba(176,142,86,.6);letter-spacing:.14em;text-transform:uppercase;margin-top:4px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;color:rgba(255,255,255,.7);font-size:13px;transition:all .15s;border-left:3px solid transparent}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-item.active{background:rgba(176,142,86,.12);color:var(--ouro-claro);border-left-color:var(--ouro)}
.sb-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-logout{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.07)}
.sb-logout button{background:none;border:1px solid rgba(176,142,86,.3);color:rgba(176,142,86,.8);padding:8px 14px;border-radius:4px;font-size:12px;cursor:pointer;width:100%;font-family:'Jost',sans-serif;transition:all .2s;letter-spacing:.08em}
.sb-logout button:hover{border-color:var(--ouro);color:var(--ouro)}

/* ── TOPBAR ── */
#hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;font-size:20px;color:var(--texto)}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--azul);letter-spacing:.02em}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.topbar-user{font-size:12px;color:var(--texto-suave);letter-spacing:.04em}

/* ── PAGE HEADER ── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.page-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--azul);letter-spacing:.01em}
.page-sub{font-size:13px;color:var(--texto-suave);margin-top:3px}

/* ── CARDS ── */
.card{background:var(--fundo-card);border:1px solid var(--borda);border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-header{padding:16px 20px 14px;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--azul)}
.card-body{padding:20px;display:flex;flex-direction:column;gap:14px}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:var(--fundo-card);border:1px solid var(--borda);border-radius:6px;padding:18px 20px}
.kpi-label{font-size:11px;font-weight:600;color:var(--texto-suave);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.kpi-value{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;color:var(--azul);line-height:1}
.kpi-sub{font-size:12px;color:var(--texto-suave);margin-top:5px}
.kpi.ouro{border-left:3px solid var(--ouro)}
.kpi.verde{border-left:3px solid var(--verde)}
.kpi.alerta{border-left:3px solid var(--amarelo)}
.kpi.danger{border-left:3px solid var(--vermelho)}

/* ── GRID LAYOUTS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* ── FORMS ── */
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:11px;font-weight:600;color:var(--texto-suave);letter-spacing:.1em;text-transform:uppercase}
.form-group input,.form-group select,.form-group textarea{padding:10px 12px;font-size:16px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:'Jost',sans-serif;color:var(--texto);transition:border .2s;width:100%}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--ouro)}
.form-group textarea{resize:vertical;min-height:80px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.form-row{display:flex;gap:14px;align-items:flex-end}
fieldset{border:1px solid var(--borda-ouro);border-radius:6px;padding:16px 18px;margin-bottom:14px}
legend{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--ouro);padding:0 8px;font-weight:500}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:5px;font-family:'Jost',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none;letter-spacing:.06em;white-space:nowrap}
.btn-primary{background:var(--azul);color:#fff}.btn-primary:hover{background:var(--azul-medio)}
.btn-gold{background:var(--ouro);color:#fff}.btn-gold:hover{background:var(--ouro-fosco)}
.btn-outline{background:transparent;border:1.5px solid var(--borda);color:var(--texto)}.btn-outline:hover{border-color:var(--ouro);color:var(--ouro)}
.btn-danger{background:var(--vermelho);color:#fff}.btn-danger:hover{background:#800000}
.btn-green{background:var(--verde);color:#fff}.btn-green:hover{filter:brightness(1.1)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11px}

/* ── TABLES ── */
.table-wrap{overflow-x:auto;border-radius:6px;border:1px solid var(--borda)}
table{width:100%;border-collapse:collapse;background:#fff}
thead th{background:var(--azul);color:#fff;padding:10px 14px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;text-align:left;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--borda)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#faf9f6}
tbody td{padding:10px 14px;font-size:13px;color:var(--texto)}
.td-actions{display:flex;gap:6px;align-items:center}

/* ── BADGES ── */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.05em}
.badge-blue{background:rgba(13,31,45,.1);color:var(--azul)}
.badge-gold{background:rgba(176,142,86,.15);color:var(--ouro-fosco)}
.badge-green{background:rgba(42,92,63,.12);color:var(--verde)}
.badge-red{background:rgba(166,0,0,.1);color:var(--vermelho)}
.badge-yellow{background:rgba(183,97,59,.12);color:var(--amarelo)}
.badge-gray{background:rgba(106,123,138,.12);color:var(--texto-suave)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,30,.55);z-index:900;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:8px;width:100%;max-width:640px;max-height:90dvh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.25)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--azul)}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--texto-suave);line-height:1;padding:2px 6px}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--borda);display:flex;justify-content:flex-end;gap:10px;background:#fff;position:sticky;bottom:0}
.modal-lg{max-width:820px}
.modal-xl{max-width:1100px}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--borda);margin-bottom:20px}
.tab-btn{background:none;border:none;padding:10px 18px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;color:var(--texto-suave);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;letter-spacing:.04em}
.tab-btn.active{color:var(--azul);border-bottom-color:var(--ouro);font-weight:600}
.tab-btn:hover{color:var(--texto)}
.tab-pane{display:none}.tab-pane.active{display:block}

/* ── KANBAN ── */
.kanban{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px}
.kanban-col{min-width:230px;max-width:280px;flex-shrink:0}
.kanban-col-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--texto-suave);padding:10px 14px;background:var(--fundo);border-radius:6px 6px 0 0;border:1px solid var(--borda);border-bottom:none;display:flex;align-items:center;justify-content:space-between}
.kanban-col-body{border:1px solid var(--borda);border-radius:0 0 6px 6px;background:#faf9f6;padding:10px;display:flex;flex-direction:column;gap:8px;min-height:120px}
.kanban-card{background:#fff;border:1px solid var(--borda);border-radius:5px;padding:12px 14px;cursor:pointer;transition:box-shadow .15s}
.kanban-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.1);border-color:var(--borda-ouro)}
.kanban-card-title{font-weight:600;font-size:13px;color:var(--azul);margin-bottom:4px}
.kanban-card-sub{font-size:12px;color:var(--texto-suave)}

/* ── ORCAMENTO SPECIFIC ── */
.orc-tipo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.orc-tipo-card{border:2px solid var(--borda);border-radius:8px;padding:24px 18px;cursor:pointer;text-align:center;transition:all .2s;background:#fff}
.orc-tipo-card:hover,.orc-tipo-card.selected{border-color:var(--ouro);background:rgba(176,142,86,.05)}
.orc-tipo-icon{font-size:28px;margin-bottom:10px}
.orc-tipo-name{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--azul);margin-bottom:4px}
.orc-tipo-desc{font-size:12px;color:var(--texto-suave)}
.price-result{background:var(--azul);color:#fff;border-radius:8px;padding:20px 24px;margin-top:16px}
.price-ideal{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:var(--ouro-claro)}
.price-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.price-row:last-child{border-bottom:none}

/* ── RESERVA ── */
.reserva-card{background:linear-gradient(135deg,var(--azul) 0%,var(--azul-medio) 100%);color:#fff;border-radius:8px;padding:20px 22px}
.reserva-saldo{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;color:var(--ouro-claro)}
.extrato-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--borda);font-size:13px}
.extrato-row:last-child{border-bottom:none}
.extrato-credit{color:var(--verde);font-weight:600}
.extrato-debit{color:var(--vermelho);font-weight:600}

/* ── PROPOSTA PRINT ── */
@media print{
  #app,.modal-overlay{display:none!important}
  #print-proposta{display:block!important;margin:0;padding:0}
}
#print-proposta{display:none}
.proposta-doc{max-width:680px;margin:0 auto;padding:48px;font-family:'Jost',sans-serif;color:var(--texto)}
.proposta-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;padding-bottom:20px;border-bottom:2px solid var(--ouro)}
.proposta-num{font-size:12px;color:var(--texto-suave);letter-spacing:.1em;text-align:right}
.proposta-body p{margin-bottom:12px;line-height:1.7}
.proposta-valor{background:var(--azul);color:#fff;border-radius:6px;padding:20px 24px;margin:24px 0;text-align:center}
.proposta-valor-num{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;color:var(--ouro-claro)}

/* ── ALERTS ── */
.alert{padding:12px 16px;border-radius:5px;font-size:13px;border-left:4px solid}
.alert-info{background:rgba(13,31,45,.06);border-color:var(--azul);color:var(--azul)}
.alert-warn{background:rgba(183,97,59,.08);border-color:var(--amarelo);color:var(--amarelo)}
.alert-success{background:rgba(42,92,63,.08);border-color:var(--verde);color:var(--verde)}
.alert-danger{background:rgba(166,0,0,.07);border-color:var(--vermelho);color:var(--vermelho)}

/* ── MISC ── */
.divider{border:none;border-top:1px solid var(--borda);margin:16px 0}
.text-ouro{color:var(--ouro)}
.text-suave{color:var(--texto-suave)}
.text-right{text-align:right}
.text-center{text-align:center}
.fw-600{font-weight:600}
.mt-12{margin-top:12px}
.mb-16{margin-bottom:16px}
.flex{display:flex}.flex-1{flex:1}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.items-center{align-items:center}.justify-between{justify-content:space-between}
.empty-state{text-align:center;padding:48px 24px;color:var(--texto-suave)}
.empty-state-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px}
.separator-ouro{height:1px;background:linear-gradient(90deg,transparent,var(--ouro),transparent);margin:16px 0;opacity:.4}

/* ── MIDIA WIDGET ── */
.midia-widget{display:flex;flex-direction:column;gap:10px}
.midia-actions{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:10px 14px;background:var(--fundo-input);border:1.5px dashed var(--borda);border-radius:6px}
.midia-btn-add{background:var(--azul)!important;color:#fff!important;border:none!important;font-size:13px!important;padding:9px 18px!important;letter-spacing:.05em}
.midia-btn-add:hover{background:var(--azul-medio)!important}
.midia-hint{font-size:11px;color:var(--texto-suave);line-height:1.5}
.midia-empty{font-size:12px;color:var(--texto-suave);font-style:italic;padding:4px 0}
.midia-thumbs{display:flex;gap:10px;flex-wrap:wrap;padding:4px 0}
.midia-thumb{position:relative;display:inline-block}
.midia-thumb-img{width:88px;height:88px;object-fit:cover;border-radius:7px;border:1.5px solid var(--borda);cursor:pointer;display:block;transition:opacity .15s}
.midia-thumb-img:hover{opacity:.85}
.midia-thumb-vid{width:88px;height:88px;border-radius:7px;border:1.5px solid var(--borda);background:var(--azul);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:4px}
.midia-play{font-size:26px;color:#fff}
.midia-vidname{font-size:9px;color:rgba(255,255,255,.65);max-width:76px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.midia-del{position:absolute;top:-8px;right:-8px;background:var(--vermelho);color:#fff;border:2px solid #fff;border-radius:50%;width:22px;height:22px;font-size:13px;font-weight:700;cursor:pointer;line-height:1;z-index:2;display:flex;align-items:center;justify-content:center;padding:0;transition:background .15s}
.midia-del:hover{background:#800000}

/* ── PARAM BANNER ── */
.param-bar{background:rgba(176,142,86,.08);border:1px solid var(--borda-ouro);border-radius:6px;padding:10px 16px;display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin-bottom:18px}
.param-item{font-size:12px;color:var(--texto-suave)}.param-item strong{color:var(--azul)}

/* ── MOBILE ── */
@media(max-width:768px){
  #hamburger{display:flex}
  #sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:500;width:260px;transition:left .25s}
  #sidebar.open{left:0}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:499}
  .sidebar-overlay.visible{display:block}
  #content{padding:16px}
  .form-grid,.form-grid-3,.grid-2,.grid-3{grid-template-columns:1fr!important}
  .orc-tipo-grid{grid-template-columns:1fr!important}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .modal{position:fixed;bottom:0;left:0;right:0;border-radius:12px 12px 0 0;max-height:92dvh;max-width:100%}
  .modal-overlay{align-items:flex-end;padding:0}
  .kanban{padding-bottom:16px}
}
@media(max-width:420px){
  .kpi-grid{grid-template-columns:1fr}
}
</style>
  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════ -->
<!-- LOGIN                                          -->
<!-- ═══════════════════════════════════════════════ -->
<div id="login-screen">
<div class="login-box">
  <div class="login-logo">
    <img id="login-logo-img" style="width:160px;object-fit:contain" alt="Ana Lobão Atelier">
  </div>
  <p class="login-title">Sistema Interno</p>
  <p class="login-sub">Acesso restrito · Equipe Ana Lobão</p>
  <div class="login-field">
    <label>Usuário</label>
    <input type="text" id="l-user" placeholder="" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
  </div>

// ─── Audit log ───────────────────────────────────────────────────
// Registra eventos internos no DB.audit_log (não bloqueia)
function auditLog(evento, dados){
  try{
    if(!DB||!DB.audit_log) return;
    DB.audit_log.push({
      id: DB.nextId?DB.nextId('audit_log'):Date.now(),
      ts: new Date().toISOString(),
      usuario: (typeof SESS!=='undefined'&&SESS)?SESS.usuario:'sistema',
      evento,
      dados: dados||{}
    });
    // Mantém só os últimos 200 registros para não estourar storage
    if(DB.audit_log.length>200) DB.audit_log.splice(0, DB.audit_log.length-200);
  }catch(e){
    console.error('[loadDB] Erro ao carregar banco:', e);
    // Banco corrompido — mantém DB com valores padrão (não sobrescreve)
  }
}

function saveDB(){
  try{
    var snap={_ids:JSON.parse(JSON.stringify(DB._ids))};
    DB_KEYS.forEach(function(k){if(DB[k]!==undefined)snap[k]=DB[k];});
    DB_OBJ_KEYS.forEach(function(k){if(DB[k]!==undefined)snap[k]=DB[k];});
    const snapStr=JSON.stringify(snap);
    localStorage.setItem('atelier_db_v2', snapStr);
    // Grava hash de integridade (assíncrono — não bloqueia)
    _dbHash(snapStr).then(h=>localStorage.setItem('atelier_db_integrity',h)).catch(()=>{});
    // Verifica uso do storage após cada save (throttle: 1× a cada 10 saves)
    _saveCount=(_saveCount||0)+1;
    if(_saveCount%10===1) verificarStorageLimit();
  }catch(e){
    // Erro ao salvar — muito provavelmente storage cheio
    _alertaStorageCheioCritico();
  }
  // Sincroniza com Supabase se configurado
  if(_sb) syncToSupabase();
}

// Chamada emergencial quando localStorage lança exceção (storage cheio)
function _alertaStorageCheioCritico(){
  const old=document.getElementById('storage-warn-bar');
  if(old)old.remove();
  const bar=document.createElement('div');
  bar.id='storage-warn-bar';
  bar.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#A60000;color:#fff;padding:14px 16px;font-family:Jost,sans-serif;font-size:13px;font-weight:700;z-index:99999;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -2px 8px rgba(0,0,0,.3)';
  bar.innerHTML='<span>🔴 ARMAZENAMENTO CHEIO — Última operação NÃO foi salva. Faça o backup imediatamente!</span>'

// MONITOR DE STORAGE — verifica uso e alerta ao se aproximar do limite
// Limite real Safari iOS: ~5MB; alerta precoce em 70% (~3.5MB)
// ══════════════════════════════════════════════════════════════════
const _STORAGE_WARN_BYTES  = 3.5 * 1024 * 1024; // 3.5 MB — atenção
const _STORAGE_CRIT_BYTES  = 4.5 * 1024 * 1024; // 4.5 MB — crítico

function calcStorageUsado(){
  try{
    let total = 0;
    for(let k in localStorage){ if(localStorage.hasOwnProperty(k)) total += (localStorage[k]||'').length + k.length; }
    return total;
  }catch(e){ return 0; }
}

function calcStoragePct(bytes){ return Math.round(bytes / (5*1024*1024) * 100); }

function verificarStorageLimit(){
  const usado = calcStorageUsado();
  const pct   = calcStoragePct(usado);

  // Remove banner anterior se existir
  const old = document.getElementById('storage-warn-bar');
  if(old) old.remove();

  if(usado < _STORAGE_WARN_BYTES) return; // Tudo bem — sem alerta

  const critico = usado >= _STORAGE_CRIT_BYTES;
  const cor      = critico ? '#A60000' : '#B08E56';
  const icone    = critico ? '🔴' : '⚠️';
  const msg      = critico
    ? `${icone} Armazenamento crítico: ${pct}% usado (${(usado/1024/1024).toFixed(1)} MB). Faça o backup AGORA e apague dados antigos.`
    : `${icone} Armazenamento em ${pct}% (${(usado/1024/1024).toFixed(1)} MB). Recomendado: faça um backup em breve.`;

  const bar = document.createElement('div');
  bar.id = 'storage-warn-bar';
  bar.style.cssText = `position:fixed;bottom:0;left:0;right:0;background:${cor};color:#fff;`
    + `padding:10px 16px;font-family:Jost,sans-serif;font-size:12px;font-weight:600;`
    + `z-index:9998;display:flex;align-items:center;justify-content:space-between;gap:12px;`
    + `box-shadow:0 -2px 8px rgba(0,0,0,.2)`;
  bar.innerHTML = `<span>${msg}</span>`
    + `<div style="display:flex;gap:8px;flex-shrink:0">`
    + `<button onclick="exportarBackup()" style="padding:6px 14px;background:#fff;color:${cor};border:none;border-radius:5px;font-family:Jost,sans-serif;font-size:12px;font-weight:700;cursor:pointer">💾 Fazer Backup</button>`
    + `<button onclick="document.getElementById('storage-warn-bar').remove()" style="padding:6px 10px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:5px;font-family:Jost,sans-serif;font-size:12px;cursor:pointer">✕</button>`
    + `</div>`;
  document.body?.appendChild(bar);
}

function loadDB(){
  try{
    var raw=localStorage.getItem('atelier_db_v2');
    if(!raw)return;
    // Verifica integridade antes de carregar
    const storedHash=localStorage.getItem('atelier_db_integrity');
    if(storedHash){
      // Verificação assíncrona — bloqueia uso se hash não bater
      _dbHash(raw).then(h=>{
        _dbIntegrityOk=(h===storedHash);
        if(!_dbIntegrityOk){
          console.error('⚠️ Integridade do banco comprometida');
          const warn=document.createElement('div');
          warn.style.cssText='position:fixed;top:0;left:0;right:0;background:#A60000;color:#fff;padding:12px 16px;font-family:Jost,sans-serif;font-size:13px;font-weight:600;z-index:99999;text-align:center';
          warn.textContent='⚠️ Dados alterados externamente. Contate a administradora imediatamente.';
          document.body?.appendChild(warn);
        }
      }).catch(()=>{});
    }
    var snap=JSON.parse(raw);
    if(!snap||typeof snap!=='object')return;
    DB_KEYS.forEach(function(k){
      if(Array.isArray(snap[k]))DB[k]=snap[k];
    });
    DB_OBJ_KEYS.forEach(function(k){
      if(snap[k]&&typeof snap[k]==='object'&&!Array.isArray(snap[k])){
        Object.assign(DB[k],snap[k]);
        // Deep-restore arrays inside objects (e.g. caixa.movimentos, caixa.fechamentos)
        if(k==='caixa'){
          if(Array.isArray(snap[k].movimentos)) DB[k].movimentos=snap[k].movimentos;
          if(Array.isArray(snap[k].fechamentos)) DB[k].fechamentos=snap[k].fechamentos;
        }
      }
    });
    if(snap._ids&&typeof snap._ids==='object'){
      Object.keys(snap._ids).forEach(function(k){DB._ids[k]=snap._ids[k];});
    }
    // ── Migrações de dados ──────────────────────────────────────────
    // v1: bônus reserva alterado de 25% para 15%
    if(DB.params_reserva.bonus_pct===25){
      DB.params_reserva.bonus_pct=15;
      saveDB();
    }
    // v2: elimina cashback_saldo dos clientes (campo redundante — usa calcCashbackCliente())
    if(DB.clientes && DB.clientes.some(cl=>'cashback_saldo' in cl)){
      DB.clientes.forEach(cl=>{ delete cl.cashback_saldo; });
      saveDB();
    }
    // v3: garante categoria padrão em peças sem categoria
    if(DB.colecao && DB.colecao.some(p=>!p.categoria)){
      DB.colecao.forEach(p=>{ if(!p.categoria) p.categoria='outro'; });
      saveDB();
    }
    // v4: garante cashback_pct padrão em clientes sem o campo
    if(DB.clientes && DB.clientes.some(cl=>cl.cashback_pct===undefined||cl.cashback_pct===null)){
      DB.clientes.forEach(cl=>{ if(cl.cashback_pct===undefined||cl.cashback_pct===null) cl.cashback_pct=5; });
      saveDB();
    }
  }catch(e){}
}

// ═══════════════════════════════════════════════════════════════════
// SHA-256 — Web Crypto API (nativa no iOS Safari 11+)
// Senhas são armazenadas como "sha256:<hex>" — nunca em plaintext
// ═══════════════════════════════════════════════════════════════════
async function sha256(text){
  if(typeof crypto!=='undefined'&&crypto.subtle){
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  // Fallback sem crypto.subtle
  let h=0;for(let i=0;i<text.length;i++){h=(Math.imul(31,h)+text.charCodeAt(i))|0;}
  return 'fallback'+Math.abs(h).toString(16);
}

// ─── Fingerprint do dispositivo ─────────────────────────────────
// Combinação de características do browser/device → hash único por aparelho
async function getDeviceFingerprint(){
  const raw=[
    navigator.userAgent||'',
    navigator.language||'',
    (screen.width||0)+'x'+(screen.height||0),
    String(new Date().getTimezoneOffset()),
    navigator.platform||''
  ].join('||');
  return sha256(raw);
}

// ─── Integridade do banco ────────────────────────────────────────
const _DB_SALT='AnaLobao_Atelier_2026';

async function _dbHash(snapStr){
  return sha256(snapStr+_DB_SALT);
}

function isHashed(pass){
  return typeof pass==='string'&&pass.startsWith('sha256:');
}

// Salt fixo do sistema (aumenta custo de rainbow tables sem bcrypt)
// Combinado com o login do usuário para salt por-usuário
const _PASS_PEPPER = 'AnaLobao@Atelier2025#SistemaInterno';

async function hashPass(plain, userLogin){
  const salt = (userLogin||'') + _PASS_PEPPER;
  return 'sha256:'+(await sha256(salt + plain + salt));
}

async function verifyPass(input, stored, userLogin){
  if(!input||!stored)return false;
  if(isHashed(stored)){
    // Senha hasheada com salt — compara
    const salt = (userLogin||'') + _PASS_PEPPER;
    return ('sha256:'+(await sha256(input)))===stored;
  }
  // Migração: senha ainda em plaintext — compara direto e depois hasheia
  return input===stored;
}

let _sb = null;           // cliente Supabase

// Salva DB + USERS no Supabase
async function syncToSupabase(){
  if(_sbSyncing||!_sb)return;
  _sbSyncing=true;
  try{
    // Monta snapshot completo (igual ao localStorage)
    const snap={_ids:JSON.parse(JSON.stringify(DB._ids))};
    DB_KEYS.forEach(k=>{if(DB[k]!==undefined)snap[k]=DB[k];});
    DB_OBJ_KEYS.forEach(k=>{if(DB[k]!==undefined)snap[k]=DB[k];});

    const {error:e1}=await _sb.from('atelier_sync')
      .upsert({key:'database',payload:snap,updated_at:new Date().toISOString()});
    if(e1)throw e1;

    const {error:e2}=await _sb.from('atelier_sync')
      .upsert({key:'users',payload:USERS,updated_at:new Date().toISOString()});
    if(e2)throw e2;

    _sbLastSync=new Date();
    _sbUpdateIndicator('ok');
  }catch(err){
    console.warn('[Supabase] sync error:',err);
    _sbUpdateIndicator('error');
  }finally{_sbSyncing=false;}
}

// Carrega dados do Supabase e atualiza DB local
async function syncFromSupabase(silent){
  if(!_sb)return false;
  try{
    const {data,error}=await _sb.from('atelier_sync')
      .select('key,payload,updated_at')
      .in('key',['database','users']);
    if(error)throw error;
    if(!data||!data.length)return false;

    let dbUpdated=false;
    data.forEach(row=>{
      if(row.key==='database'&&row.payload){
        const snap=row.payload;
        // Verifica se Supabase tem dados mais recentes
        DB_KEYS.forEach(k=>{if(Array.isArray(snap[k]))DB[k]=snap[k];});
        DB_OBJ_KEYS.forEach(k=>{
          if(snap[k]&&typeof snap[k]==='object'&&!Array.isArray(snap[k])){
            Object.assign(DB[k],snap[k]);
            if(k==='caixa'){
              if(Array.isArray(snap[k].movimentos))DB[k].movimentos=snap[k].movimentos;
              if(Array.isArray(snap[k].fechamentos))DB[k].fechamentos=snap[k].fechamentos;
            }
          }
        });
        if(snap._ids)Object.keys(snap._ids).forEach(k=>{DB._ids[k]=snap._ids[k];});
        // Salva no localStorage local
        localStorage.setItem('atelier_db_v2',JSON.stringify(snap));
        dbUpdated=true;
      }
      if(row.key==='users'&&Array.isArray(row.payload)){
        USERS.length=0;
        row.payload.forEach(u=>USERS.push(u));
        migrateUsers();
        const _usersStr=JSON.stringify(USERS);
  const _usersSig=btoa(_usersStr.length+'|'+_usersStr.charCodeAt(0)+'|'+_usersStr.charCodeAt(_usersStr.length-1)).slice(0,16);
  localStorage.setItem('atelier_users',_usersStr);
  localStorage.setItem('atelier_users_sig',_usersSig);
      }
    });

    _sbLastSync=new Date();
    _sbUpdateIndicator('ok');
    if(dbUpdated&&!silent){
      // Recarrega o módulo atual silenciosamente
      if(CUR_MOD&&typeof renderModule==='function')renderModule(CUR_MOD);
    }
    return true;
  }catch(err){
    console.warn('[Supabase] load error:',err);
    _sbUpdateIndicator('error');
    return false;
  }
}

// ─── Proteção brute force ─────────────────────────────────────────
let _loginAttempts = 0;
let _loginBlockedUntil = 0;

async function doLogin(){
  // Verifica bloqueio temporário
  if(Date.now() < _loginBlockedUntil){
    const segs = Math.ceil((_loginBlockedUntil - Date.now()) / 1000);
    showToast('Muitas tentativas. Aguarde '+segs+' segundos.','danger');
    return;
  }

  try{
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value;
  if(!u||!p){document.getElementById('login-err').style.display='block';return;}

  // Encontra o usuário pelo login
  const userObj=USERS.find(x=>x.user===u);
  if(!userObj){
    _loginAttempts++;
    const el=document.getElementById('login-err');
    if(_loginAttempts>=5){
      _loginBlockedUntil=Date.now()+30000;
      _loginAttempts=0;
      if(el){el.style.display='block';el.textContent='Muitas tentativas. Aguarde 30 segundos.';}
    } else {
      if(el){el.style.display='block';el.textContent='Usuário ou senha incorretos ('+_loginAttempts+'/5).';}
    }
    return;
  }

  // Verifica se usuário está ativo
  if(userObj.ativo===false){
    document.getElementById('login-err').style.display='block';
    document.getElementById('login-err').textContent='Acesso bloqueado. Contacte a administradora.';
    return;
  }

  // Verifica senha (suporta plaintext legado e hash SHA-256)
  const ok=await verifyPass(p,userObj.pass,u);
  if(!ok){
    _loginAttempts++;
    const elWP=document.getElementById('login-err');
    if(_loginAttempts>=5){
      _loginBlockedUntil=Date.now()+30000;
      _loginAttempts=0;
      if(elWP){elWP.style.display='block';elWP.textContent='Muitas tentativas. Aguarde 30 segundos.';}
    } else {
      if(elWP){elWP.style.display='block';elWP.textContent='Usuário ou senha incorretos ('+_loginAttempts+'/5).';}
    }
    return;
  }

  // Migração automática: se senha ainda era plaintext, hasheia agora
  if(!isHashed(userObj.pass)){
    userObj.pass=await hashPass(p,u);
    saveUsers();
  }

  document.getElementById('login-err').style.display='none';
  _loginAttempts = 0; _loginBlockedUntil = 0;
  startSession(userObj);
  }catch(err){
    console.error('Login error:',err);
    const el=document.getElementById('login-err');
    if(el){el.style.display='block';el.textContent='Erro ao entrar. Tente novamente.';}
  }
}

// Escapa HTML em dados vindos do usuário antes de renderizar
function escapeHTML(str){
  if(str===null||str===undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

async function confirmarOverrideReserva(){
  // Rate limiting: máx 3 tentativas, bloqueio de 30s
  if(!window._overrideTentativas) window._overrideTentativas=0;
  if(!window._overrideBloqueioAte) window._overrideBloqueioAte=0;
  if(Date.now()<window._overrideBloqueioAte){
    const restante=Math.ceil((window._overrideBloqueioAte-Date.now())/1000);
    const erroEl=document.getElementById('override-erro');
    if(erroEl){erroEl.textContent=`Muitas tentativas. Aguarde ${restante}s.`;erroEl.style.display='block';}
    return;
  }

  const userLogin=document.getElementById('override-user')?.value;
  const senha=document.getElementById('override-pass')?.value;
  const user=USERS.find(u=>u.user===userLogin);
  if(!user){
    window._overrideTentativas++;
    const erroEl=document.getElementById('override-erro');
    if(erroEl){erroEl.style.display='block';}
    return;
  }
  const ok=await verifyPass(senha,user.pass,user.user);
  if(!ok||(user.role!=='admin'&&!user.pode_override_reserva)){
    window._overrideTentativas=(window._overrideTentativas||0)+1;
    const erroEl=document.getElementById('override-erro');
    if(erroEl){
      if(window._overrideTentativas>=3){
        window._overrideBloqueioAte=Date.now()+30000;
        window._overrideTentativas=0;
        erroEl.textContent='3 tentativas incorretas. Acesso bloqueado por 30 segundos.';
      } else {
        erroEl.textContent=`Senha incorreta. Tentativa ${window._overrideTentativas}/3.`;
      }
      erroEl.style.display='block';
    }
    document.getElementById('override-pass').value='';
    document.getElementById('override-pass').focus();
    return;
  }
  // Sucesso — reseta contadores
  window._overrideTentativas=0;
  window._overrideBloqueioAte=0;
  // Migração automática de senha se ainda plaintext
  if(!isHashed(user.pass)){
    user.pass=await hashPass(senha,user.user);
    saveUsers();
  }
  fecharModal();
  auditLog('override_reserva_autorizado',{autorizador:user.user,nome:user.nome});
  showToast('Exceção autorizada por '+user.nome,'warn');
  if(typeof _pendingOverrideCb==='function'){
    _pendingOverrideCb();
    _pendingOverrideCb=null;
  }
}

function buscarCotacaoOuro(mostrarFeedback){
  mostrarFeedback=mostrarFeedback!==false;
  const btn=document.getElementById('btn-atualizar-cotacao');
  if(btn){btn.disabled=true;btn.textContent='Buscando…';}
  const statusEl=document.getElementById('cotacao-status');
  if(statusEl)statusEl.textContent='Buscando cotação…';

  // jsDelivr CDN (fawazahmed0/currency-api) — sem CORS em qualquer ambiente iOS/Android/PWA
  // xau.json: { xau: { brl: <preço 1 troy oz em BRL> } }
  // usd.json: { usd: { brl: <câmbio 1 USD em BRL> } }
  function _aplicarCotacao(xauData, usdData, sufixo){
    const xauBrl = xauData?.xau?.brl;
    const usdBrl = usdData?.usd?.brl;
    if(!xauBrl || xauBrl<100) throw new Error('Valor XAU inválido');
    const au24k = parseFloat((xauBrl/31.1035).toFixed(2));
    const dolar = parseFloat((usdBrl||DB.params_reserva.dolar).toFixed(4));
    DB.params_reserva.au24k=au24k; DB.params_reserva.dolar=dolar;
    ORC.params.au24k=au24k; ORC.params.dolar=dolar;
    saveDB();
    const agora=new Date().toLocaleString('pt-BR')+(sufixo||'');
    try{localStorage.setItem('atelier_cotacao_ts',today());
        localStorage.setItem('atelier_cotacao_hora',agora);}catch(e){}
    _renderCotacaoWidget(au24k,dolar,agora,'online');
    if(mostrarFeedback)showToast('✦ Cotação atualizada · Au 24k = '+fmt(au24k)+'/g · Dólar = R$ '+fmtN(dolar,2),'success');
  }

  function _fetchDia(dia, sufixo){
    const base='https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@'+dia+'/v1/currencies/';
    return Promise.all([
      fetch(base+'xau.json').then(r=>r.json()),
      fetch(base+'usd.json').then(r=>r.json())
    ]).then(([x,u])=>_aplicarCotacao(x,u,sufixo));
  }

  const hoje=today();
  const ontem=new Date(Date.now()-86400000).toISOString().split('T')[0];

  _fetchDia(hoje,'')
    .catch(()=>_fetchDia(ontem,' (ontem)'))
    .catch(err=>{
      console.warn('Cotação automática falhou:',err);
      if(mostrarFeedback)showToast('Não foi possível buscar a cotação. Use o botão Manual.','warn');
      if(statusEl)statusEl.textContent='Falha ao buscar — use o botão Manual';
    })
    .finally(()=>{
      if(btn){btn.disabled=false;btn.textContent='↻ Atualizar agora';}
    });
}

// ── 2g: Tempo de ciclo por setor ─────────────────────────────────
function calcTempoCiclo(){
  const setores = ['ourivesaria','montagem','fundicao','laboratorio'];
  const resultado = {};
  setores.forEach(setor=>{
    const concluidas = DB.etapas.filter(e=>
      e.setor===setor &&
      e.status==='concluida' &&
      e.data_ini && e.data_fim
    );
    if(!concluidas.length){ resultado[setor]={media:0,total:0}; return; }
    const tempos = concluidas.map(e=>{
      const ini = new Date(e.data_ini+'T00:00:00');
      const fim = new Date(e.data_fim+'T00:00:00');
      return Math.max(0, Math.floor((fim-ini)/86400000));
    });
    const media = tempos.reduce((a,b)=>a+b,0) / tempos.length;
    resultado[setor] = {
      media: Math.round(media*10)/10,
      total: concluidas.length,
      min:   Math.min(...tempos),
      max:   Math.max(...tempos)
    };
  });
  return resultado;
}

function renderTempoCicloHTML(){
  const ciclo = calcTempoCiclo();
  const labels = {ourivesaria:'Ourivesaria', montagem:'Montagem'};
  const rows = Object.entries(ciclo).map(([setor,d])=>{
    if(!d.total) return '';
    const cor = d.media<=3?'var(--verde)':d.media<=7?'var(--ouro)':'#eb5757';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--borda)">'
      +'<div>'
      +'<p style="font-size:13px;font-weight:600;margin:0">'+labels[setor]+'</p>'
      +'<p style="font-size:11px;color:var(--texto-suave);margin:0">'+d.total+' etapas concluídas · mín '+d.min+'d / máx '+d.max+'d</p>'
      +'</div>'
      +'<div style="text-align:right">'
      +'<p style="font-size:20px;font-weight:700;color:'+cor+';margin:0;font-family:Cormorant Garamond,serif">'+d.media+'<span style="font-size:12px;font-weight:400"> dias</span></p>'
      +'<p style="font-size:10px;color:var(--texto-suave);margin:0">média</p>'
      +'</div>'
      +'</div>';
  }).join('');
  if(!rows.replace(/<[^>]+>/g,'').trim()) return '';
  return '<div class="card" style="margin-bottom:16px">'
    +'<div class="card-header"><span class="card-title">⏱ Tempo de Ciclo — Produção</span></div>'
    +'<div class="card-body" style="padding:4px 16px 8px">'
    +rows
    +'<p style="font-size:11px;color:var(--texto-suave);margin-top:8px">Calculado sobre etapas com data início e fim registradas.</p>'
    +'</div></div>';
}

function osBadge(s){const m={orcamento:'badge-gray',producao:'badge-yellow',concluido:'badge-green',entregue:'badge-gold',cancelado:'badge-red',aprovado:'badge-blue'};return`<span class="badge ${m[s]||'badge-gray'}">${s}</span>`;}
function calcSaldoCliente(cid){
  const valMeses=(DB.params_reserva&&DB.params_reserva.validade_meses)||24;
  const limiteMs=valMeses*30*24*3600*1000;
  const agora=Date.now();

  // Considera apenas entradas dentro da validade
  const entradas=DB.entradas_ouro.filter(e=>{
    if(e.cliente_id!=cid)return false;
    const idade=agora-new Date(e.data).getTime();
    return idade<=limiteMs;
  });
  const total_cred=entradas.reduce((a,e)=>a+e.credito,0);

  // Subtrai apenas usos vinculados a entradas válidas
  // (simplificado: subtrai todo uso do cliente se houver crédito válido)
  const total_usado=DB.vendas_credito.filter(v=>v.cliente_id==cid).reduce((a,v)=>a+v.valor_usado,0);

  return Math.max(0, total_cred-total_usado);
}

function calcSaldoClienteDetalhado(cid){
  // Retorna objeto com saldo, crédito bruto, expirado e aviso
  const valMeses=(DB.params_reserva&&DB.params_reserva.validade_meses)||24;
  const limiteMs=valMeses*30*24*3600*1000;
  const agora=Date.now();
  const alertaMs=valMeses*0.8*30*24*3600*1000; // alerta quando atingir 80% da validade

  const todasEntradas=DB.entradas_ouro.filter(e=>e.cliente_id==cid);
  const entradasValidas=todasEntradas.filter(e=>agora-new Date(e.data).getTime()<=limiteMs);
  const entradasExpirando=entradasValidas.filter(e=>agora-new Date(e.data).getTime()>=alertaMs);
  const creditoExpirado=todasEntradas.filter(e=>agora-new Date(e.data).getTime()>limiteMs)
    .reduce((a,e)=>a+e.credito,0);

  const creditoValido=entradasValidas.reduce((a,e)=>a+e.credito,0);
  const usado=DB.vendas_credito.filter(v=>v.cliente_id==cid).reduce((a,v)=>a+v.valor_usado,0);
  const saldo=Math.max(0,creditoValido-usado);

  return{saldo,creditoValido,creditoExpirado,expirando:entradasExpirando.length>0,
    proxVencimento:entradasValidas.length?new Date(new Date(entradasValidas[0].data).getTime()+limiteMs):null};
}
function calcSaldoTotal(){return DB.clientes.reduce((a,c)=>a+calcSaldoCliente(c.id),0);}

function proximosAniversarios(dias){
  const hoje=new Date();const result=[];
  DB.clientes.forEach(cl=>{
    if(!cl.aniversario)return;
    const [y,m,d]=cl.aniversario.split('-');
    const aniv=new Date(hoje.getFullYear(),+m-1,+d);
    if(aniv<hoje)aniv.setFullYear(hoje.getFullYear()+1);
    const diff=(aniv-hoje)/(1000*60*60*24);
    if(diff<=dias)result.push({nome:cl.apelido||cl.nome,data:`${d}/${m}`});
  });
  // Também verifica datas_importantes
  (DB.datas_importantes||[]).forEach(di=>{
    if(di.tipo!=='aniversario'||!di.data)return;
    const [y,m,d]=di.data.split('-');
    const aniv=new Date(hoje.getFullYear(),+m-1,+d);
    if(aniv<hoje)aniv.setFullYear(hoje.getFullYear()+1);
    const diff=(aniv-hoje)/(1000*60*60*24);
    const cl=DB.clientes.find(c=>c.id==di.cliente_id);
    if(diff<=dias&&cl)result.push({nome:`${di.nome_assoc} (${cl.apelido||cl.nome})`,data:`${d}/${m}`});
  });
  return result;
}

function excluirCliente(id){
  if(!podeExcluir()){showToast('Sem permissão','danger');return;}
  const cl=DB.clientes.find(c=>c.id==id);
  if(!cl)return;
  confirmarAcao(
    'Excluir '+cl.nome+'?',
    'Todos os dados vinculados (OS, orçamentos, vendas, reserva) serão removidos permanentemente.',
    'Excluir',
    function(){
      auditLog('cliente_excluido',{cliente_id:id,nome:cl.nome});
      DB.clientes=DB.clientes.filter(c=>c.id!==id);
      DB.recebimentos=DB.recebimentos.filter(r=>r.cliente_id!==id);
      DB.os=DB.os.filter(o=>o.cliente_id!==id);
      DB.orcamentos=DB.orcamentos.filter(o=>o.cliente_id!==id);
      DB.propostas=DB.propostas.filter(p=>p.cliente_id!==id);
      DB.vendas=DB.vendas.filter(v=>v.cliente_id!==id);
      DB.financeiro=DB.financeiro.filter(f=>f.cliente_id!==id);

// Estado do formulário de cliente — atualizado por oninput/onchange, nunca lido do DOM no save
let _cf = {};
function _cfSet(k,v){_cf[k]=v;}
function _cfToggle(k,v){
  if(!Array.isArray(_cf[k]))_cf[k]=[];
  const i=_cf[k].indexOf(v);
  if(i>=0)_cf[k].splice(i,1);else _cf[k].push(v);
  // Atualizar visual do botão
  document.querySelectorAll(`[data-toggle="${k}"][data-val="${v}"]`).forEach(el=>{
    el.classList.toggle('btn-gold',_cf[k].includes(v));
    el.classList.toggle('btn-outline',!_cf[k].includes(v));
  });
}

function _chipBtn(field,val,label,arr){
  const sel=Array.isArray(arr)&&arr.includes(val);
  return`<button type="button" class="btn btn-sm ${sel?'btn-gold':'btn-outline'}" style="margin:3px" data-toggle="${field}" data-val="${val}" onclick="_cfToggle('${field}','${val}')">${label}</button>`;
}

function saveCliente(id){
  if(!SESS){showToast('Sessão inválida','danger');return;}
  // Apenas admin e consultora podem salvar clientes
  if(!['admin','consultora','comercial'].includes(SESS.role)){
    showToast('Sem permissão para editar clientes','danger');return;
  }
  var nome=(_cf.nome||'').trim();
  if(!nome){showToast('Nome obrigatório','danger');return;}
  var existente=id?DB.clientes.find(function(c){return c.id==id;}):null;
  var obj={
    id:          id||DB.nextId('clientes'),
    nome:        nome,
    apelido:     (_cf.apelido||'').trim(),
    cpf_cnpj:    (_cf.cpf_cnpj||'').trim(),
    email:       (_cf.email||'').trim(),
    tel:         (_cf.tel||'').trim(),
    instagram:   (_cf.instagram||'').trim(),
    aniversario: _cf.aniversario||'',
    cidade:      (_cf.cidade||'').trim(),
    origem:      _cf.origem||'outro',
    classif:     _cf.classif||'Regular',
    ltv:         existente?(existente.ltv||0):0,
    ticket_estimado: parseFloat(_cf.ticket_estimado)||0,
    obs:         (_cf.obs||'').trim(),
    obs_estrategica:(_cf.obs_estrategica||'').trim(),
    estilo:      _cf.estilo||[],
    tipo_compra: _cf.tipo_compra||[],
    pecas_interesse:_cf.pecas_interesse||[],
    ouro_preferido:_cf.ouro_preferido||[],
    ocasioes:    _cf.ocasioes||[],
    sensibilidade_preco:_cf.sensibilidade_preco||'',
    pedras_favoritas:(_cf.pedras_favoritas||'').trim(),
    pedras_evita:(_cf.pedras_evita||'').trim(),
    perfil:      _cf.perfil||'',
    tempo_decisao:_cf.tempo_decisao||'',
    atendimento_ideal:(_cf.atendimento_ideal||'').trim(),
    cashback_pct:parseFloat(_cf.cashback_pct)>=0?parseFloat(_cf.cashback_pct):5,
    credito_ouro:existente?(existente.credito_ouro||0):0,
    historico:   existente?existente.historico:[],
    interacoes:  existente?existente.interacoes:[],
    data_cadastro: existente?(existente.data_cadastro||today()):today()
  };
  if(id){
    var i=DB.clientes.findIndex(function(c){return c.id==id;});
    if(i>=0)DB.clientes[i]=obj;else DB.clientes.push(obj);
  }else{
    DB.clientes.push(obj);
  }
  _cf={};
  saveDB();
  closeModal('modal-cliente');
  showToast(id?'Cliente atualizado ✓':'Cliente cadastrado ✓');
  renderClientes(document.getElementById('content'));
}

let _df={};
function _dfSet(k,v){_df[k]=v;}

function openDataModal(clienteId,dataId){
  closeModal('modal-data');
  const d=dataId?(DB.datas_importantes||[]).find(x=>x.id==dataId):null;
  _df={tipo:d?d.tipo:'aniversario',nome_assoc:d?d.nome_assoc:'',data:d?d.data:'',obs:d?d.obs:''};
  const div=document.createElement('div');div.className='modal-overlay';div.id='modal-data';
  div.innerHTML=`<div class="modal">
  <div class="modal-header"><span class="modal-title">${dataId?'Editar':'Nova'} Data Importante</span>
    <button class="modal-close" onclick="closeModal('modal-data')">×</button></div>
  <div class="modal-body">
    <div class="form-grid" style="gap:14px">
      <div class="form-group"><label>Tipo</label>
        <select onchange="_dfSet('tipo',this.value)">
          ${Object.entries(DATA_TIPO_LABEL).map(([k,v])=>`<option value="${k}"${_df.tipo===k?' selected':''}>${v}</option>`).join('')}
        </select></div>
      <div class="form-group"><label>Nome Associado</label>
        <input type="text" value="${(_df.nome_assoc||'').replace(/"/g,'&quot;')}" placeholder="Ex: Lucas (filho), Aniversário dela…" oninput="_dfSet('nome_assoc',this.value)"></div>
      <div class="form-group"><label>Data</label>
        <input type="date" value="${_df.data||''}" oninput="_dfSet('data',this.value)"></div>
      <div class="form-group"><label>Observações</label>
        <input type="text" value="${(_df.obs||'').replace(/"/g,'&quot;')}" placeholder="Ex: Sempre quer surpresa" oninput="_dfSet('obs',this.value)"></div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-outline" onclick="closeModal('modal-data')">Cancelar</button>
    <button class="btn btn-primary" onclick="saveData(${clienteId},${dataId||0})">Salvar</button>
  </div>
  </div>`;
  document.body.appendChild(div);
}

function saveData(clienteId,dataId){
  if(!DB.datas_importantes)DB.datas_importantes=[];
  const obj={id:dataId||DB.nextId('datas_importantes'),cliente_id:clienteId,
    tipo:_df.tipo||'aniversario',nome_assoc:(_df.nome_assoc||'').trim(),
    data:_df.data||'',obs:(_df.obs||'').trim()};
  if(dataId){
    const i=DB.datas_importantes.findIndex(x=>x.id==dataId);
    if(i>=0)DB.datas_importantes[i]=obj;else DB.datas_importantes.push(obj);
  }else{
    DB.datas_importantes.push(obj);
  }
  _df={};saveDB();closeModal('modal-data');
  // Atualiza a lista sem fechar o modal do cliente
  const listEl=document.getElementById('datas-list-'+clienteId);
  if(listEl)listEl.innerHTML=renderDatasList(clienteId);
  showToast('Data salva ✓');
}

function excluirData(dataId,clienteId){
  confirmarAcao('Excluir data?','',  'Excluir',function(){
    DB.datas_importantes=(DB.datas_importantes||[]).filter(d=>d.id!=dataId);
    saveDB();
    const listEl=document.getElementById('datas-list-'+clienteId);
    if(listEl)listEl.innerHTML=renderDatasList(clienteId);
    showToast('Data excluída');
  });
}
function switchTab(e,target){
  const modal=e.target.closest('.modal,.modal-body');
  if(!modal)return;
  modal.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  modal.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  e.target.classList.add('active');
  const pane=modal.querySelector('#'+target);
  if(pane)pane.classList.add('active');
}

// Helper: badge de QC no kanban de OS
function osQCBadge(o){
  const qcOS=DB.qc.filter(q=>q.os_id==o.id).sort((a,b)=>b.id-a.id)[0];
  const etapasConcluidas=DB.etapas.filter(e=>e.os_id==o.id&&e.status==='concluida').length;
  if(o.status==='concluido'||o.status==='entregue') return '';
  if(!qcOS&&etapasConcluidas>0){
    const osId=o.id;
    return '<div style="margin-top:8px;padding:6px 10px;background:rgba(235,87,87,.08);border:1px solid rgba(235,87,87,.3);border-radius:6px;display:flex;justify-content:space-between;align-items:center" onclick="event.stopPropagation();openQCModal();setTimeout(function(){var s=document.getElementById(\'qc-os\');if(s){s.value='+osId+';qcShowOsInfo();}},100)"><span style="font-size:11px;font-weight:600;color:#eb5757">🔍 QC pendente</span><span style="font-size:10px;color:#eb5757">Realizar ›</span></div>';
  }
  if(qcOS&&qcOS.resultado==='reprovado'){
    return '<div style="margin-top:8px;padding:6px 10px;background:rgba(235,87,87,.08);border:1px solid rgba(235,87,87,.3);border-radius:6px"><span style="font-size:11px;font-weight:600;color:#eb5757">⚠️ QC reprovado — retrabalho</span></div>';
  }
  if(qcOS&&qcOS.resultado==='aprovado'){
    return '<div style="margin-top:8px;padding:4px 8px;background:rgba(39,174,96,.08);border:1px solid rgba(39,174,96,.25);border-radius:6px"><span style="font-size:11px;font-weight:600;color:var(--verde)">✅ QC aprovado</span></div>';
  }
  return '';
}

function renderOS(c){
  const statuses=['orcamento','producao','aprovado','concluido','entregue','cancelado'];
  const labels={orcamento:'Orçamento',producao:'Em Produção',aprovado:'Aprovado',concluido:'Concluído',entregue:'Entregue',cancelado:'Cancelado'};
  c.innerHTML=`
  <div class="page-header">
    <div><p class="page-title">Ordens de Serviço</p><p class="page-sub">${DB.os.length} OS no total</p></div>
    <button class="btn btn-primary" onclick="openOSModal()">+ Nova OS</button>
  </div>
  <div class="kanban" id="os-kanban">
  ${statuses.map(s=>`
    <div class="kanban-col">
      <div class="kanban-col-title">${labels[s]}<span style="background:rgba(255,255,255,.15);padding:2px 7px;border-radius:10px;font-size:10px">${DB.os.filter(o=>o.status===s).length}</span></div>
      <div class="kanban-col-body" id="kan-${s}">
        ${DB.os.filter(o=>o.status===s).map(o=>`
          <div class="kanban-card" onclick="openOSModal(${o.id})">
            <div class="kanban-card-title">#${o.id} · ${o.descricao.substring(0,40)}${o.descricao.length>40?'…':''}</div>
            <div class="kanban-card-sub">${o.origem==='atelier'?`🏛 ${(DB.colecoes_atelier.find(c=>c.id==o.colecao_atelier_id)||{}).nome||'Coleção Atelier'}`:clienteNome(o.cliente_id)}</div>
            <div class="kanban-card-sub" style="margin-top:4px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
              ${o.origem==='atelier'?`<span class="badge badge-gold" style="font-size:10px">✦ Atelier</span>`:''}
              ${o.origem!=='atelier'&&o.status==='orcamento'&&(!o.aceite_cliente||!o.sinal_pago)?
                `<span style="font-size:10px;font-weight:700;color:#eb5757">⚠️ ${!o.aceite_cliente?'Aguard. aceite':'Aguard. sinal'}</span>`:''}
              ${o.origem!=='atelier'&&o.sinal_pago?
                `<span style="font-size:10px;color:var(--verde);font-weight:600">✓ Sinal</span>`:''}
              <span class="badge ${o.priority==='alta'?'badge-red':'badge-gray'}">${o.priority||'normal'}</span>
              ${o.prazo?(()=>{
                const dias=Math.floor((new Date(o.prazo+'T00:00:00')-new Date())/(86400000));
                const cor=dias<0?'#A60000':dias<=3?'#eb5757':dias<=7?'var(--ouro)':'var(--texto-suave)';
                const label=dias<0?`⚠️ Vencido há ${Math.abs(dias)}d`:dias===0?'⚠️ Vence hoje':dias<=3?`⏰ ${dias}d`:fmtDate(o.prazo);
                return `<span style="font-size:11px;color:${cor};font-weight:${dias<=3?'700':'400'}">${label}</span>`;
              })():''}
            </div>
            ${osQCBadge(o)}
          </div>`).join('')||`<p style="font-size:12px;color:var(--texto-suave);text-align:center;padding:16px">Vazio</p>`}
      </div>
    </div>`).join('')}
  </div>`;
}
// ── Helper: fieldset QC no modal da OS ────────────────────────────
function osQCFieldset(osId){
  const qcList=DB.qc.filter(q=>q.os_id==osId).sort((a,b)=>b.id-a.id);
  const qcUlt=qcList[0];
  const cor=qcUlt?(qcUlt.resultado==='aprovado'?'var(--verde)':'#eb5757'):'#C4BDB4';
  const bg=qcUlt?(qcUlt.resultado==='aprovado'?'rgba(39,174,96,.06)':'rgba(235,87,87,.06)'):'var(--fundo)';
  const borda=qcUlt?(qcUlt.resultado==='aprovado'?'rgba(39,174,96,.3)':'rgba(235,87,87,.3)'):'var(--borda)';
  let inner='';
  if(!qcUlt){
    inner='<div style="display:flex;justify-content:space-between;align-items:center;gap:10px">'
      +'<div><p style="font-size:13px;font-weight:600;color:#eb5757;margin:0">QC não realizado</p>'
      +'<p style="font-size:11px;color:var(--texto-suave);margin:4px 0 0">Obrigatório antes de concluir a OS</p></div>'
      +'<button class="btn btn-primary" style="font-size:12px;padding:8px 16px;flex-shrink:0"'
      +' onclick="abrirQCParaOS('+osId+')">'
      +'✦ Fazer QC</button></div>';
  } else {
    const label=qcUlt.resultado==='aprovado'?'✅ Aprovado':'⚠️ Reprovado — retrabalho necessário';
    const obsHtml=qcUlt.obs?('<p style="font-size:11px;color:var(--texto-suave);margin:2px 0 0">'+qcUlt.obs.substring(0,70)+'</p>'):'';
    inner='<div style="display:flex;justify-content:space-between;align-items:center;gap:10px">'
      +'<div><p style="font-size:14px;font-weight:700;color:'+cor+';margin:0">'+label+'</p>'
      +'<p style="font-size:11px;color:var(--texto-suave);margin:3px 0 0">'+fmtDate(qcUlt.data)+' · '+(qcUlt.responsavel||'—')+' · '+(qcUlt.tipo_peca||'—')+'</p>'
      +obsHtml+'</div>'
      +'<button class="btn btn-outline" style="font-size:11px;padding:6px 12px;flex-shrink:0"'
      +' onclick="abrirQCExistenteParaOS('+qcUlt.id+')">Ver QC</button>'
      +'</div>'+(qcList.length>1?'<p style="font-size:11px;color:var(--texto-suave);margin-top:6px">'+qcList.length+' análises registradas</p>':'');
  }
  return '<fieldset style="margin-top:14px;border:1.5px solid '+borda+';border-radius:8px;padding:12px 14px;background:'+bg+'">'
    +'<legend style="font-size:12px;font-weight:700;color:'+cor+';padding:0 6px">🔍 Controle de Qualidade</legend>'
    +inner+'</fieldset>';
}


function abrirQCParaOS(osId){
  closeModal('modal-os');
  setTimeout(function(){
    openQCModal();
    setTimeout(function(){
      var s=document.getElementById('qc-os');
      if(s){s.value=osId;qcShowOsInfo();}
    },100);
  },200);
}
function abrirQCExistenteParaOS(qcId){
  closeModal('modal-os');
  setTimeout(function(){openQCModal(qcId);},200);
}


// ─── Ações pós-QC na OS ────────────────────────────────────────────
function osAcoesPostQC(osId){
  const os = DB.os.find(o=>o.id==osId);
  if(!os) return '';
  const qcAprov = DB.qc.find(q=>q.os_id==osId&&q.tipo_qc==='final'&&q.resultado==='aprovado');
  if(!qcAprov) return '';

  const temLabPend = DB.etapas.some(e=>e.os_id==osId&&e.setor==='laboratorio'&&e.status!=='concluida');
  // Lab concluído E aprovado (resultado do Prime Gems deve ser 'aprovado')
  const temLabConc = DB.etapas.some(e=>
    e.os_id==osId && e.setor==='laboratorio' &&
    e.status==='concluida' && e.lab_resultado==='aprovado'
  );
  const temLabReprovado = DB.etapas.some(e=>
    e.os_id==osId && e.setor==='laboratorio' &&
    e.status==='concluida' && e.lab_resultado==='reprovado'
  );
  const labDispensado = os.lab_dispensado===true;
  const temRevPreco = DB.etapas.some(e=>e.os_id==osId&&e.setor==='revisao_preco'&&e.status==='concluida');
  const aprovadaVenda = os.aprovada_venda===true;

  let btns = '';

  // Botão Laboratório
  if(!temLabPend&&!temLabConc&&!labDispensado&&!aprovadaVenda){
    btns += `<button class="btn btn-outline" style="font-size:12px"
      onclick="enviarParaLaboratorio(${osId})">🔬 Enviar para Laboratório</button> `;
    if(podeDispensarLab()){
      btns += `<button class="btn btn-outline" style="font-size:12px;color:var(--texto-suave)"
        onclick="dispensarLaboratorio(${osId})">✕ Dispensar Lab</button> `;
    }
  }
  if(temLabPend){
    btns += `<span style="font-size:12px;color:var(--ouro);font-weight:600">🔬 Aguardando laudo Prime Gems…</span> `;
  }
  if(temLabReprovado){
    btns += `<div style="padding:8px 12px;background:rgba(166,0,0,.08);border:1.5px solid rgba(166,0,0,.3);
      border-radius:6px;font-size:12px;color:#A60000;font-weight:600">
      ⛔ Laudo Prime Gems reprovado — decisão necessária de Ana Lobão
    </div>`;
  }

  // Botão Revisão de Preço
  if((temLabConc||labDispensado)&&!temRevPreco&&!aprovadaVenda){
    btns += `<button class="btn btn-gold" style="font-size:12px"
      onclick="criarEtapaRevisaoPreco(${osId})">💲 Iniciar Revisão de Preço</button> `;
  }

  // Botão Aprovar para Venda
  if(temRevPreco&&!aprovadaVenda&&podeAprovarVenda()){
    btns += `<button class="btn btn-primary" style="font-size:12px;background:var(--verde)"
      onclick="aprovarParaVenda(${osId})">✦ Aprovar para Venda</button>`;
  }
  if(aprovadaVenda){
    btns += `<span style="font-size:12px;color:var(--verde);font-weight:700">✅ Aprovada para Venda</span>`;
  }

  if(!btns) return '';
  return `<div style="margin-top:12px;padding:12px 14px;background:rgba(176,142,86,.05);
    border:1.5px solid rgba(176,142,86,.25);border-radius:8px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
    <span style="font-size:11px;font-weight:700;color:var(--ouro);letter-spacing:.08em">PÓS-QC:</span>
    ${btns}
  </div>`;
}

function enviarParaLaboratorio(osId){
  confirmarAcao('Enviar para Laboratório?',
    'Será criada uma etapa de Laboratório (Prime Gems) para esta OS.',
    '🔬 Enviar',
    function(){
      const etapa = {
        id: DB.nextId('etapas'),
        os_id: osId,
        setor: 'laboratorio',
        descricao: 'Certificação — Prime Gems',
        responsavel: SESS.nome,
        status: 'aguardando',
        cobravel: true,
        data_ini: today(),
        data_fim: null,
        inclui_acabamento: false,
        obs_acabamento: '',
        origem_lab: true
      };
      DB.etapas.push(etapa);
      auditLog('lab_enviado',{os_id:osId});
      saveDB();
      showToast('🔬 Etapa de Laboratório criada');
      closeModal('modal-os');

function dispensarLaboratorio(osId){
  if(!podeDispensarLab()){
    showToast('⛔ Apenas Ana Lobão ou pessoa autorizada pode dispensar o laboratório','danger');
    return;
  }
  abrirModalGenerico('Dispensar Laboratório', `

      <p style="font-size:14px;margin-bottom:16px">
        Informe a justificativa para dispensar o envio ao laboratório.<br>
        <span style="font-size:12px;color:var(--texto-suave)">
          Apenas Ana Lobão ou pessoa autorizada pode dispensar.
        </span>
      </p>
      <textarea id="lab-disp-just" rows="3" placeholder="Ex: Peça de conserto simples, sem necessidade de certificação…"

          font-family:Jost,sans-serif;font-size:13px;background:var(--fundo-input)"></textarea>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">

}

function confirmarDispensarLab(osId){
  if(!podeDispensarLab()){showToast('Sem permissão para dispensar laboratório','danger');return;}
  const just = document.getElementById('lab-disp-just')?.value.trim();
  if(!just){showToast('Justificativa obrigatória','danger');return;}
  const os = DB.os.find(o=>o.id==osId);
  if(!os) return;
  os.lab_dispensado = true;
  os.lab_dispensado_por = SESS.nome;
  os.lab_dispensado_just = just;
  os.lab_dispensado_data = today();
  auditLog('lab_dispensado',{os_id:osId,por:SESS.nome,just});
  saveDB();
  fecharModal();
  showToast('Laboratório dispensado — '+SESS.nome);
  closeModal('modal-os');
  renderOS(document.getElementById('content'));
}

function criarEtapaRevisaoPreco(osId){
  // Cria diretamente a etapa de revisão sem depender de setTimeout
  const os = DB.os.find(o=>o.id==osId);
  if(!os){showToast('OS não encontrada','danger');return;}
  const etapa = {
    id:            DB.nextId('etapas'),
    os_id:         osId,
    setor:         'revisao_preco',
    descricao:     'Revisão de Preço — '+os.descricao.substring(0,50),
    responsavel:   SESS.nome,
    status:        'em_andamento',
    cobravel:      true,
    data_ini:      today(),
    data_fim:      null,
    inclui_acabamento: false,
    obs_acabamento: ''
  };
  DB.etapas.push(etapa);
  saveDB();
  showToast('💲 Etapa de Revisão de Preço criada');
  // Abre o modal da etapa para preenchimento dos campos de preço
  closeModal('modal-os');
  setTimeout(()=>openEtapaModal(etapa.id), 200);
}

function aprovarParaVenda(osId){

  const orc = os.orcamento_id ? DB.orcamentos.find(o=>o.id===os.orcamento_id) : null;
  const etapaRev = DB.etapas.filter(e=>e.os_id==osId&&e.setor==='revisao_preco'&&e.status==='concluida')
    .sort((a,b)=>(b.data_fim||'').localeCompare(a.data_fim||''))[0];

  const precoFinal = etapaRev?.rev_preco_final || orc?.preco_aprovado || 0;
  const fotos = [...(os.fotos||[]), ...(orc?.fotos||[])];

  abrirModalGenerico('✦ Aprovar para Venda', `
    <div style="padding:20px">
      <p style="font-size:14px;font-weight:600;color:var(--azul);margin-bottom:4px">OS #${osId} — ${os.descricao}</p>
      <p style="font-size:13px;color:var(--texto-suave);margin-bottom:16px">
        Confirme os dados do produto antes de lançar no catálogo.
      </p>
      <div class="form-grid" style="gap:12px">
        <div class="form-group" style="grid-column:1/-1">
          <label>Nome da Peça no Catálogo *</label>
          <input id="apv-nome" value="${os.descricao||''}" style="width:100%;padding:9px;border:1.5px solid #C4BDB4;border-radius:5px;font-family:Jost,sans-serif;font-size:14px;background:var(--fundo-input)">
        </div>
        <div class="form-group">
          <label>Preço de Venda (R$) *</label>
          <input id="apv-preco" type="number" step="10" value="${precoFinal||''}"
            style="width:100%;padding:9px;border:1.5px solid #C4BDB4;border-radius:5px;font-family:Jost,sans-serif;font-size:14px;background:var(--fundo-input)">
        </div>
        <div class="form-group">
          <label>Metal</label>
          <select id="apv-metal" style="width:100%;padding:9px;border:1.5px solid #C4BDB4;border-radius:5px;font-family:Jost,sans-serif;font-size:14px;background:var(--fundo-input)">
            ${['Ouro 18k Amarelo','Ouro 18k Rosé','Ouro 18k Branco','Prata 925'].map(m=>'<option>'+m+'</option>').join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Peso Final (g)</label>
          <input id="apv-peso" type="number" step="0.001" value="${os.peso_final||''}"
            placeholder="0.000"
            style="width:100%;padding:9px;border:1.5px solid #C4BDB4;border-radius:5px;font-family:Jost,sans-serif;font-size:14px;background:var(--fundo-input)">
        </div>
        <div class="form-group">
          <label>Estoque inicial</label>
          <input id="apv-estoque" type="number" value="1" min="1"
            style="width:100%;padding:9px;border:1.5px solid #C4BDB4;border-radius:5px;font-family:Jost,sans-serif;font-size:14px;background:var(--fundo-input)">
        </div>
        <div class="form-group">
          <label>Coleção</label>
          <select id="apv-colecao" style="width:100%;padding:9px;border:1.5px solid #C4BDB4;border-radius:5px;font-family:Jost,sans-serif;font-size:14px;background:var(--fundo-input)">
            <option value="">— Sem coleção —</option>
            ${DB.colecoes_atelier.map(c=>'<option value="'+c.id+'" '+(os.colecao_atelier_id==c.id?'selected':'')+'>'+c.nome+'</option>').join('')}
          </select>
        </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">

          ✦ Lançar no Catálogo
        </button>
      </div>
    </div>`);
}

function confirmarAprovarParaVenda(osId){
  if(!podeAprovarVenda()){showToast('Sem permissão para aprovar para venda','danger');return;}
  const nome  = document.getElementById('apv-nome')?.value.trim();
  const preco = parseFloat(document.getElementById('apv-preco')?.value)||0;
  const metal = document.getElementById('apv-metal')?.value||'';
  const peso  = parseFloat(document.getElementById('apv-peso')?.value)||0;
  const est   = parseInt(document.getElementById('apv-estoque')?.value)||1;
  const colId = parseInt(document.getElementById('apv-colecao')?.value)||null;

  if(!nome){showToast('Nome da peça obrigatório','danger');return;}
  if(!preco){showToast('Preço obrigatório','danger');return;}

  const os  = DB.os.find(o=>o.id==osId);
  const orc = os?.orcamento_id?DB.orcamentos.find(o=>o.id===os.orcamento_id):null;
  const fotos = [...(os?.fotos||[]),...(orc?.fotos||[])].slice(0,4);

  // Cria produto no catálogo
  const produto = {
    id:            DB.nextId('colecao'),
    nome,
    metal,
    peso,
    preco,
    estoque:       est,
    colecao_atelier_id: colId,
    origem_os_id:  osId,
    origem_orc_id: os?.orcamento_id||null,
    qc_aprovado:   true,
    fotos,
    data_cadastro: today(),
    categoria:     'outro'
  };
  DB.colecao.push(produto);

  // Marca OS como aprovada para venda
  os.aprovada_venda = true;
  os.aprovada_venda_por = SESS.nome;
  os.aprovada_venda_data = today();
  os.status = 'concluido';

  auditLog('produto_aprovado_venda',{os_id:osId,produto_id:produto.id,preco,por:SESS.nome});
  saveDB();
  fecharModal();
  showToast('✅ Peça lançada no catálogo — '+nome,'success');
  renderOS(document.getElementById('content'));
}

function osToggleOrigem(val){

function saveOS(id){
  if(!SESS){showToast('Sessão inválida','danger');return;}
  if(SESS.role==='producao'){
    if(!id){showToast('Produção não pode criar novas OS','danger');return;}
    // Producao pode atualizar etapas mas não pode alterar status para concluido/entregue
    const osExist = id ? DB.os.find(o=>o.id==id) : null;
    if(osExist && ['concluido','entregue','cancelado'].includes(osExist.status)){
      showToast('OS finalizada não pode ser editada pela produção','danger');return;
    }
  }
  const origemRadio=document.querySelector('input[name="os-origem"]:checked');
  const origem=origemRadio?origemRadio.value:'cliente';
  const novoStatusOS = document.getElementById('os-status')?.value||'orcamento';
  // Bloqueia mudança para producao sem aceite do cliente e sinal
  if(novoStatusOS==='producao' && origem==='cliente'){
    // Monta objeto parcial para verificação antes do save
    const osTemp = {
      origem,
      status: id ? (DB.os.find(o=>o.id==id)?.status||'orcamento') : 'orcamento',
      aceite_cliente: document.getElementById('os-aceite')?.checked || false,
      sinal_pago:     document.getElementById('os-sinal-pago')?.checked || false,
      sinal_forma:    document.getElementById('os-sinal-forma')?.value || '',
      sinal_valor:    parseFloat(document.getElementById('os-sinal-valor')?.value)||0,
      orcamento_id:   parseInt(document.getElementById('os-orc-id')?.value)||
                      (id?DB.os.find(o=>o.id==id)?.orcamento_id:null)||null,
    };
    const liberado = osLiberadaParaProducao(osTemp);
    if(!liberado.ok){
      showToast('⛔ '+liberado.erros[0],'danger');
      return;
    }
  }
  const desc=(document.getElementById('os-desc')?.value||'').trim();
  if(!desc){showToast('Descrição obrigatória','danger');return;}
  const colecaoId=origem==='atelier'?(parseInt(document.getElementById('os-colecao')?.value)||null):null;
  if(origem==='atelier'&&!colecaoId){showToast('Selecione uma coleção','danger');return;}
  const clienteId=origem==='cliente'?(parseInt(document.getElementById('os-cl')?.value)||null):null;
  const obj={
    id:id||DB.nextId('os'),
    origem,
    cliente_id:clienteId,
    colecao_atelier_id:colecaoId,
    status:document.getElementById('os-status')?.value||'orcamento',
    prazo:document.getElementById('os-prazo')?.value||'',
    priority:document.getElementById('os-prior')?.value||'normal',
    responsavel:document.getElementById('os-resp')?.value||'',
    descricao:desc,
    fotos:midiaGet('os').slice(),
    desenhos:midiaGet('os_desenho').slice(),
    // Aceite e sinal do cliente
    aceite_cliente: document.getElementById('os-aceite')?.checked || (id?DB.os.find(o=>o.id==id)?.aceite_cliente:false) || false,
    aceite_data:    document.getElementById('os-aceite-data')?.value || (id?DB.os.find(o=>o.id==id)?.aceite_data:'') || '',
    sinal_pago:     document.getElementById('os-sinal-pago')?.checked || (id?DB.os.find(o=>o.id==id)?.sinal_pago:false) || false,
    sinal_valor:    parseFloat(document.getElementById('os-sinal-valor')?.value)||0,
    sinal_forma:    document.getElementById('os-sinal-forma')?.value || '',
    sinal_data:     document.getElementById('os-sinal-data')?.value || '',
    // Preserva orcamento_id existente se select ficar em "Nenhum" sem intenção
    orcamento_id: (()=>{
      const sel = parseInt(document.getElementById('os-orc-id')?.value)||0;
      const prev = id ? (DB.os.find(o=>o.id==id)?.orcamento_id||null) : null;
      return sel > 0 ? sel : prev;  // só sobrescreve se selecionou explicitamente
    })(),
  };
  if(id){const i=DB.os.findIndex(o=>o.id==id);if(i>=0)DB.os[i]=obj;}else DB.os.push(obj);

  // ── QC obrigatório para concluir ─────────────────────────────────
  const statusFinalOS=obj.status;
  if(statusFinalOS==='concluido'||statusFinalOS==='entregue'){
    const osIdSave=obj.id;
    const qcOk=DB.qc.find(q=>q.os_id==osIdSave&&q.resultado==='aprovado');
    if(!qcOk){
      // Reverte para producao e alerta
      if(id){const i2=DB.os.findIndex(o=>o.id==id);if(i2>=0)DB.os[i2].status='producao';}
      else { const last=DB.os[DB.os.length-1]; if(last)last.status='producao'; }
      saveDB();closeModal('modal-os');
      showToast('⛔ QC não aprovado — OS mantida em Produção','danger');
      setTimeout(()=>{
        abrirModalGenerico('QC Obrigatório',`
          <div style="padding:20px;text-align:center">
            <p style="font-size:40px;margin-bottom:10px">🔍</p>
            <p style="font-size:16px;font-weight:700;color:#eb5757;margin-bottom:8px">Controle de Qualidade não aprovado</p>
            <p style="font-size:13px;color:var(--texto-suave);margin-bottom:20px">
              A OS <strong>#${osIdSave}</strong> só pode avançar para <strong>Concluído</strong> após o QC ser realizado e aprovado.
              O QC é uma etapa obrigatória da produção.
            </p>
            <div style="display:flex;gap:10px;justify-content:center">
              <button class="btn btn-outline" onclick="fecharModal()">Fechar</button>
              <button class="btn btn-primary" style="padding:12px 24px" 
                onclick="fecharModal();setTimeout(()=>{openQCModal();setTimeout(()=>{const s=document.getElementById('qc-os');if(s){s.value=${osIdSave};qcShowOsInfo();}},100);},200)">
                ✦ Realizar QC agora
              </button>
            </div>
          </div>`);
      },200);
      return;
    }
  }

  saveDB();closeModal('modal-os');showToast('OS salva');renderOS(document.getElementById('content'));
}
function excluirOS(id){
  if(!podeExcluir()){showToast('Sem permissão','danger');return;}
  const o=DB.os.find(x=>x.id==id);if(!o)return;
  confirmarAcao('Excluir OS #'+id+'?','Etapas e insumos vinculados também serão removidos.','Excluir',function(){
    DB.os=DB.os.filter(x=>x.id!==id);
    DB.etapas=DB.etapas.filter(e=>e.os_id!==id);
    DB.uso_insumos_os=DB.uso_insumos_os.filter(u=>u.os_id!==id);
    DB.qc=DB.qc.filter(q=>q.os_id!==id);
    // Desvincula referências em orçamentos e catálogo
    DB.orcamentos.forEach(orc=>{ if(orc.os_id===id) orc.os_id=null; });
    DB.colecao.forEach(prod=>{ if(prod.origem_os_id===id) prod.origem_os_id=null; });
    saveDB();closeModal('modal-os');showToast('OS excluída');
    renderOS(document.getElementById('content'));
  });
}

      +inp('et-rev-preco-final','Preço de Venda Revisado (R$)','number',e.rev_preco_final||'','0,00')

      +'<textarea id="et-rev-obs" rows="2" placeholder="Descreva o motivo da revisão em relação ao orçamento inicial…"'

      +(e.rev_obs||'')+'</textarea></div>'
      +'</div></fieldset>';
  } else if(setor==='ourivesaria'){
    area.innerHTML=
      '<fieldset style="border:1.5px solid rgba(176,142,86,.3);border-radius:8px;padding:12px 14px">'

      +inp('et-peso-depois','Peso Depois (g)','number',e.peso_depois||'','0.000')
      +'<div class="form-group" style="margin-bottom:10px;grid-column:1/-1">'

      const antes=document.getElementById('et-peso-antes');
      const depois=document.getElementById('et-peso-depois');
      const calc=document.getElementById('et-perda-calc');
      const update=()=>{
        const a=parseFloat(antes?.value)||0;
        const d=parseFloat(depois?.value)||0;
        if(!a||!d){if(calc)calc.textContent='—';return;}
        const perda=a-d;
        const pct=(perda/a*100).toFixed(1);
        const cor=perda<0?'var(--verde)':perda>a*0.15?'#eb5757':'var(--texto)';
        if(calc)calc.innerHTML='<span style="color:'+cor+';font-weight:600">'+(perda>0?'-':'+')+(Math.abs(perda)*1000/1000).toFixed(3)+'g ('+pct+'%)</span>';
      };
      if(antes)antes.addEventListener('input',update);
      if(depois)depois.addEventListener('input',update);
      update();
    },100);
  } else {
    area.innerHTML='';
  }
}
