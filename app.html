<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ana Lobão">
<meta name="theme-color" content="#0D1F2D">
<title>Ana Lobão Atelier · Sistema Interno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link crossorigin="anonymous" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
--azul:#0D1F2D;--azul-medio:#1A2D47;--ouro:#B08E56;--ouro-claro:#C9A96A;--ouro-fosco:#9A7A42;
--fundo:#F2F0EB;--fundo-card:#FFFFFF;--fundo-input:#F7F5F1;
--texto:#1A2A3A;--texto-suave:#6A7B8A;--borda:#D8D4CB;--borda-ouro:rgba(176,142,86,0.35);
--vermelho:#A60000;--verde:#2A5C3F;--amarelo:#B7613B;
--sidebar-w:220px;--topbar-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Jost',sans-serif;font-size:15px;color:var(--texto);background:var(--fundo)}
h1,h2,h3,.display{font-family:'Cormorant Garamond',Georgia,serif}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100dvh;background:var(--azul);background-image:radial-gradient(ellipse at 30% 50%,rgba(176,142,86,0.08) 0%,transparent 60%)}
.login-box{background:#fff;border-radius:8px;padding:48px 44px;width:360px;max-width:94vw;box-shadow:0 24px 64px rgba(0,0,0,0.3)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo svg{width:120px;height:auto}
.login-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--azul);text-align:center;margin-bottom:6px;letter-spacing:.02em}
.login-sub{font-size:12px;color:var(--texto-suave);text-align:center;margin-bottom:28px;letter-spacing:.08em;text-transform:uppercase}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:11px;font-weight:600;color:var(--texto-suave);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.login-field input{width:100%;padding:12px 14px;font-size:15px;border:1.5px solid var(--borda);border-radius:5px;background:var(--fundo-input);font-family:'Jost',sans-serif;transition:border .2s}
.login-field input:focus{outline:none;border-color:var(--ouro)}
.btn-login{width:100%;padding:13px;background:var(--azul);color:#fff;border:none;border-radius:5px;font-family:'Jost',sans-serif;font-size:14px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:background .2s}
.btn-login:hover{background:var(--azul-medio)}
.login-err{color:var(--vermelho);font-size:13px;text-align:center;margin-top:10px;display:none}

/* ── APP LAYOUT ── */
#app{display:flex;height:100dvh;overflow:hidden}
#sidebar{width:var(--sidebar-w);background:var(--azul);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;z-index:200}
#sidebar::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb{background:rgba(176,142,86,0.3);border-radius:3px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--borda);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;z-index:100}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--fundo);padding:28px}

/* ── SIDEBAR INTERNALS ── */
.sb-logo{padding:24px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo svg{width:110px;height:auto;opacity:.95}
.sb-user{padding:12px 18px 10px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-user-name{font-size:13px;font-weight:600;color:#fff;letter-spacing:.02em}
.sb-user-role{font-size:11px;color:rgba(176,142,86,.8);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.sb-section{padding:10px 18px 4px;font-size:10px;font-weight:600;color:rgba(176,142,86,.6);letter-spacing:.14em;text-transform:uppercase;margin-top:4px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;color:rgba(255,255,255,.7);font-size:13px;transition:all .15s;border-left:3px solid transparent}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-item.active{background:rgba(176,142,86,.12);color:var(--ouro-claro);border-left-color:var(--ouro)}
.sb-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-logout{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.07)}
.sb-logout button{background:none;border:1px solid rgba(176,142,86,.3);color:rgba(176,142,86,.8);padding:8px 14px;border-radius:4px;font-size:12px;cursor:pointer;width:100%;font-family:'Jost',sans-serif;transition:all .2s;letter-spacing:.08em}
.sb-logout button:hover{border-color:var(--ouro);color:var(--ouro)}

/* ── TOPBAR ── */
#hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;font-size:20px;color:var(--texto)}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--azul);letter-spacing:.02em}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.topbar-user{font-size:12px;color:var(--texto-suave);letter-spacing:.04em}

/* ── PAGE HEADER ── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.page-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--azul);letter-spacing:.01em}
.page-sub{font-size:13px;color:var(--texto-suave);margin-top:3px}

/* ── CARDS ── */
.card{background:var(--fundo-card);border:1px solid var(--borda);border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-header{padding:16px 20px 14px;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--azul)}
.card-body{padding:20px;display:flex;flex-direction:column;gap:14px}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:var(--fundo-card);border:1px solid var(--borda);border-radius:6px;padding:18px 20px}
.kpi-label{font-size:11px;font-weight:600;color:var(--texto-suave);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.kpi-value{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;color:var(--azul);line-height:1}
.kpi-sub{font-size:12px;color:var(--texto-suave);margin-top:5px}
.kpi.ouro{border-left:3px solid var(--ouro)}
.kpi.verde{border-left:3px solid var(--verde)}
.kpi.alerta{border-left:3px solid var(--amarelo)}
.kpi.danger{border-left:3px solid var(--vermelho)}

/* ── GRID LAYOUTS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* ── FORMS ── */
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:11px;font-weight:600;color:var(--texto-suave);letter-spacing:.1em;text-transform:uppercase}
.form-group input,.form-group select,.form-group textarea{padding:10px 12px;font-size:16px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:'Jost',sans-serif;color:var(--texto);transition:border .2s;width:100%}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--ouro)}
.form-group textarea{resize:vertical;min-height:80px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.form-row{display:flex;gap:14px;align-items:flex-end}
fieldset{border:1px solid var(--borda-ouro);border-radius:6px;padding:16px 18px;margin-bottom:14px}
legend{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--ouro);padding:0 8px;font-weight:500}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:5px;font-family:'Jost',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none;letter-spacing:.06em;white-space:nowrap}
.btn-primary{background:var(--azul);color:#fff}.btn-primary:hover{background:var(--azul-medio)}
.btn-gold{background:var(--ouro);color:#fff}.btn-gold:hover{background:var(--ouro-fosco)}
.btn-outline{background:transparent;border:1.5px solid var(--borda);color:var(--texto)}.btn-outline:hover{border-color:var(--ouro);color:var(--ouro)}
.btn-danger{background:var(--vermelho);color:#fff}.btn-danger:hover{background:#800000}
.btn-green{background:var(--verde);color:#fff}.btn-green:hover{filter:brightness(1.1)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11px}

/* ── TABLES ── */
.table-wrap{overflow-x:auto;border-radius:6px;border:1px solid var(--borda)}
table{width:100%;border-collapse:collapse;background:#fff}
thead th{background:var(--azul);color:#fff;padding:10px 14px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;text-align:left;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--borda)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#faf9f6}
tbody td{padding:10px 14px;font-size:13px;color:var(--texto)}
.td-actions{display:flex;gap:6px;align-items:center}

/* ── BADGES ── */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.05em}
.badge-blue{background:rgba(13,31,45,.1);color:var(--azul)}
.badge-gold{background:rgba(176,142,86,.15);color:var(--ouro-fosco)}
.badge-green{background:rgba(42,92,63,.12);color:var(--verde)}
.badge-red{background:rgba(166,0,0,.1);color:var(--vermelho)}
.badge-yellow{background:rgba(183,97,59,.12);color:var(--amarelo)}
.badge-gray{background:rgba(106,123,138,.12);color:var(--texto-suave)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,30,.55);z-index:900;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:8px;width:100%;max-width:640px;max-height:90dvh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.25)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--azul)}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--texto-suave);line-height:1;padding:2px 6px}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--borda);display:flex;justify-content:flex-end;gap:10px;background:#fff;position:sticky;bottom:0}
.modal-lg{max-width:820px}
.modal-xl{max-width:1100px}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--borda);margin-bottom:20px}
.tab-btn{background:none;border:none;padding:10px 18px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;color:var(--texto-suave);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;letter-spacing:.04em}
.tab-btn.active{color:var(--azul);border-bottom-color:var(--ouro);font-weight:600}
.tab-btn:hover{color:var(--texto)}
.tab-pane{display:none}.tab-pane.active{display:block}

/* ── KANBAN ── */
.kanban{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px}
.kanban-col{min-width:230px;max-width:280px;flex-shrink:0}
.kanban-col-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--texto-suave);padding:10px 14px;background:var(--fundo);border-radius:6px 6px 0 0;border:1px solid var(--borda);border-bottom:none;display:flex;align-items:center;justify-content:space-between}
.kanban-col-body{border:1px solid var(--borda);border-radius:0 0 6px 6px;background:#faf9f6;padding:10px;display:flex;flex-direction:column;gap:8px;min-height:120px}
.kanban-card{background:#fff;border:1px solid var(--borda);border-radius:5px;padding:12px 14px;cursor:pointer;transition:box-shadow .15s}
.kanban-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.1);border-color:var(--borda-ouro)}
.kanban-card-title{font-weight:600;font-size:13px;color:var(--azul);margin-bottom:4px}
.kanban-card-sub{font-size:12px;color:var(--texto-suave)}

/* ── ORCAMENTO SPECIFIC ── */
.orc-tipo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.orc-tipo-card{border:2px solid var(--borda);border-radius:8px;padding:24px 18px;cursor:pointer;text-align:center;transition:all .2s;background:#fff}
.orc-tipo-card:hover,.orc-tipo-card.selected{border-color:var(--ouro);background:rgba(176,142,86,.05)}
.orc-tipo-icon{font-size:28px;margin-bottom:10px}
.orc-tipo-name{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--azul);margin-bottom:4px}
.orc-tipo-desc{font-size:12px;color:var(--texto-suave)}
.price-result{background:var(--azul);color:#fff;border-radius:8px;padding:20px 24px;margin-top:16px}
.price-ideal{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:var(--ouro-claro)}
.price-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.price-row:last-child{border-bottom:none}

/* ── RESERVA ── */
.reserva-card{background:linear-gradient(135deg,var(--azul) 0%,var(--azul-medio) 100%);color:#fff;border-radius:8px;padding:20px 22px}
.reserva-saldo{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;color:var(--ouro-claro)}
.extrato-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--borda);font-size:13px}
.extrato-row:last-child{border-bottom:none}
.extrato-credit{color:var(--verde);font-weight:600}
.extrato-debit{color:var(--vermelho);font-weight:600}

/* ── PROPOSTA PRINT ── */
@media print{
  #app,.modal-overlay{display:none!important}
  #print-proposta{display:block!important;margin:0;padding:0}
}
#print-proposta{display:none}
.proposta-doc{max-width:680px;margin:0 auto;padding:48px;font-family:'Jost',sans-serif;color:var(--texto)}
.proposta-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;padding-bottom:20px;border-bottom:2px solid var(--ouro)}
.proposta-num{font-size:12px;color:var(--texto-suave);letter-spacing:.1em;text-align:right}
.proposta-body p{margin-bottom:12px;line-height:1.7}
.proposta-valor{background:var(--azul);color:#fff;border-radius:6px;padding:20px 24px;margin:24px 0;text-align:center}
.proposta-valor-num{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;color:var(--ouro-claro)}

/* ── ALERTS ── */
.alert{padding:12px 16px;border-radius:5px;font-size:13px;border-left:4px solid}
.alert-info{background:rgba(13,31,45,.06);border-color:var(--azul);color:var(--azul)}
.alert-warn{background:rgba(183,97,59,.08);border-color:var(--amarelo);color:var(--amarelo)}
.alert-success{background:rgba(42,92,63,.08);border-color:var(--verde);color:var(--verde)}
.alert-danger{background:rgba(166,0,0,.07);border-color:var(--vermelho);color:var(--vermelho)}

/* ── MISC ── */
.divider{border:none;border-top:1px solid var(--borda);margin:16px 0}
.text-ouro{color:var(--ouro)}
.text-suave{color:var(--texto-suave)}
.text-right{text-align:right}
.text-center{text-align:center}
.fw-600{font-weight:600}
.mt-12{margin-top:12px}
.mb-16{margin-bottom:16px}
.flex{display:flex}.flex-1{flex:1}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.items-center{align-items:center}.justify-between{justify-content:space-between}
.empty-state{text-align:center;padding:48px 24px;color:var(--texto-suave)}
.empty-state-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px}
.separator-ouro{height:1px;background:linear-gradient(90deg,transparent,var(--ouro),transparent);margin:16px 0;opacity:.4}

/* ── MIDIA WIDGET ── */
.midia-widget{display:flex;flex-direction:column;gap:10px}
.midia-actions{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:10px 14px;background:var(--fundo-input);border:1.5px dashed var(--borda);border-radius:6px}
.midia-btn-add{background:var(--azul)!important;color:#fff!important;border:none!important;font-size:13px!important;padding:9px 18px!important;letter-spacing:.05em}
.midia-btn-add:hover{background:var(--azul-medio)!important}
.midia-hint{font-size:11px;color:var(--texto-suave);line-height:1.5}
.midia-empty{font-size:12px;color:var(--texto-suave);font-style:italic;padding:4px 0}
.midia-thumbs{display:flex;gap:10px;flex-wrap:wrap;padding:4px 0}
.midia-thumb{position:relative;display:inline-block}
.midia-thumb-img{width:88px;height:88px;object-fit:cover;border-radius:7px;border:1.5px solid var(--borda);cursor:pointer;display:block;transition:opacity .15s}
.midia-thumb-img:hover{opacity:.85}
.midia-thumb-vid{width:88px;height:88px;border-radius:7px;border:1.5px solid var(--borda);background:var(--azul);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:4px}
.midia-play{font-size:26px;color:#fff}
.midia-vidname{font-size:9px;color:rgba(255,255,255,.65);max-width:76px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.midia-del{position:absolute;top:-8px;right:-8px;background:var(--vermelho);color:#fff;border:2px solid #fff;border-radius:50%;width:22px;height:22px;font-size:13px;font-weight:700;cursor:pointer;line-height:1;z-index:2;display:flex;align-items:center;justify-content:center;padding:0;transition:background .15s}
.midia-del:hover{background:#800000}

/* ── PARAM BANNER ── */
.param-bar{background:rgba(176,142,86,.08);border:1px solid var(--borda-ouro);border-radius:6px;padding:10px 16px;display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin-bottom:18px}
.param-item{font-size:12px;color:var(--texto-suave)}.param-item strong{color:var(--azul)}

/* ── MOBILE ── */
@media(max-width:768px){
  #hamburger{display:flex}
  #sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:500;width:260px;transition:left .25s}
  #sidebar.open{left:0}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:499}
  .sidebar-overlay.visible{display:block}
  #content{padding:16px}
  .form-grid,.form-grid-3,.grid-2,.grid-3{grid-template-columns:1fr!important}
  .orc-tipo-grid{grid-template-columns:1fr!important}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .modal{position:fixed;bottom:0;left:0;right:0;border-radius:12px 12px 0 0;max-height:92dvh;max-width:100%}
  .modal-overlay{align-items:flex-end;padding:0}
  .kanban{padding-bottom:16px}
}
@media(max-width:420px){
  .kpi-grid{grid-template-columns:1fr}
}
</style>
  <!-- Supabase: usa fetch puro, sem biblioteca JS externa -->
</head>
<body>

<!-- ═══════════════════════════════════════════════ -->
<!-- LOGIN                                          -->
<!-- ═══════════════════════════════════════════════ -->
<div id="login-screen">
<div class="login-box">
  <div class="login-logo">
    <img id="login-logo-img" style="width:160px;object-fit:contain" alt="Ana Lobão Atelier">
  </div>
  <p class="login-title">Sistema Interno</p>
  <p class="login-sub">Acesso restrito · Equipe Ana Lobão</p>
  <div class="login-field">
    <label>Usuário</label>
    <input type="text" id="l-user" placeholder="" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
  </div>

<script>
// ─── Variáveis sensíveis: let (não acessíveis via window) ──────
let _pendingOverrideCb = null; // Substitui window._overrideCallback
let _dbIntegrityOk     = true; // Flag de integridade do banco
let _sessFingerprint   = null; // Fingerprint do dispositivo na sessão ativa

// ─── Audit log ───────────────────────────────────────────────────
// Registra eventos internos no DB.audit_log (não bloqueia)
function auditLog(evento, dados){
  try{
    if(!DB||!DB.audit_log) return;
    DB.audit_log.push({
      id: DB.nextId?DB.nextId('audit_log'):Date.now(),
      ts: new Date().toISOString(),
      usuario: (typeof SESS!=='undefined'&&SESS)?SESS.usuario:'sistema',
      evento,
      dados: dados||{}
    });
    // Mantém só os últimos 200 registros para não estourar storage
    if(DB.audit_log.length>200) DB.audit_log.splice(0, DB.audit_log.length-200);
  }catch(e){
    console.error('[loadDB] Erro ao carregar banco:', e);
    // Banco corrompido — mantém DB com valores padrão (não sobrescreve)
  }
}

// Gera próximo ID para a coleção (incrementa _ids e retorna)
DB.nextId = function(key){
  if(!DB._ids) DB._ids = {};
  DB._ids[key] = (DB._ids[key]||0) + 1;
  return DB._ids[key];
};


function saveDB(){
  _lastSaveTs = Date.now(); // marca timestamp para detector de race condition
  try{
    var snap={_ids:JSON.parse(JSON.stringify(DB._ids))};
    DB_KEYS.forEach(function(k){if(DB[k]!==undefined)snap[k]=DB[k];});
    DB_OBJ_KEYS.forEach(function(k){if(DB[k]!==undefined)snap[k]=DB[k];});
    const snapStr=JSON.stringify(snap);
    localStorage.setItem('atelier_db_v2', snapStr);
    // Backup automático — segunda cópia com timestamp
    try{
      localStorage.setItem('atelier_db_backup', snapStr);
      localStorage.setItem('atelier_db_backup_ts', Date.now().toString());
    }catch(e){}
    // Grava hash de integridade (assíncrono — não bloqueia)
    _dbHash(snapStr).then(h=>localStorage.setItem('atelier_db_integrity',h)).catch(()=>{});
    // Verifica uso do storage após cada save (throttle: 1× a cada 10 saves)
    _saveCount=(_saveCount||0)+1;
    if(_saveCount%10===1) verificarStorageLimit();
  }catch(e){
    // Erro ao salvar — muito provavelmente storage cheio
    _alertaStorageCheioCritico();
  }
  // Sincroniza com Supabase se configurado
  if(_sbConfig()) syncToSupabase();
}

// Chamada emergencial quando localStorage lança exceção (storage cheio)
function _alertaStorageCheioCritico(){
  const old=document.getElementById('storage-warn-bar');
  if(old)old.remove();
  const bar=document.createElement('div');
  bar.id='storage-warn-bar';
  bar.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#A60000;color:#fff;padding:14px 16px;font-family:Jost,sans-serif;font-size:13px;font-weight:700;z-index:99999;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -2px 8px rgba(0,0,0,.3)';
  bar.innerHTML='<span>🔴 ARMAZENAMENTO CHEIO — Última operação NÃO foi salva. Faça o backup imediatamente!</span>'
    +'<button onclick="exportarBackupComMarca()" style="padding:8px 16px;background:#fff;color:#A60000;border:none;border-radius:5px;font-family:Jost,sans-serif;font-size:13px;font-weight:700;cursor:pointer">💾 BACKUP AGORA</button>';
  document.body?.appendChild(bar);
  showToast('⛔ Armazenamento cheio — dados não salvos!','danger');
}

// ══════════════════════════════════════════════════════════════════
// MONITOR DE STORAGE — verifica uso e alerta ao se aproximar do limite
// Limite real Safari iOS: ~5MB; alerta precoce em 70% (~3.5MB)
// ══════════════════════════════════════════════════════════════════
const _STORAGE_WARN_BYTES  = 3.5 * 1024 * 1024; // 3.5 MB — atenção
const _STORAGE_CRIT_BYTES  = 4.5 * 1024 * 1024; // 4.5 MB — crítico

function calcStorageUsado(){
  try{
    let total = 0;
    for(let k in localStorage){ if(localStorage.hasOwnProperty(k)) total += (localStorage[k]||'').length + k.length; }
    return total;
  }catch(e){ return 0; }
}

function calcStoragePct(bytes){ return Math.round(bytes / (5*1024*1024) * 100); }

function verificarStorageLimit(){
  const usado = calcStorageUsado();
  const pct   = calcStoragePct(usado);

  // Remove banner anterior se existir
  const old = document.getElementById('storage-warn-bar');
  if(old) old.remove();

  if(usado < _STORAGE_WARN_BYTES) return; // Tudo bem — sem alerta

  const critico = usado >= _STORAGE_CRIT_BYTES;
  const cor      = critico ? '#A60000' : '#B08E56';
  const icone    = critico ? '🔴' : '⚠️';
  const msg      = critico
    ? `${icone} Armazenamento crítico: ${pct}% usado (${(usado/1024/1024).toFixed(1)} MB). Faça o backup AGORA e apague dados antigos.`
    : `${icone} Armazenamento em ${pct}% (${(usado/1024/1024).toFixed(1)} MB). Recomendado: faça um backup em breve.`;

  const bar = document.createElement('div');
  bar.id = 'storage-warn-bar';
  bar.style.cssText = `position:fixed;bottom:0;left:0;right:0;background:${cor};color:#fff;`
    + `padding:10px 16px;font-family:Jost,sans-serif;font-size:12px;font-weight:600;`
    + `z-index:9998;display:flex;align-items:center;justify-content:space-between;gap:12px;`
    + `box-shadow:0 -2px 8px rgba(0,0,0,.2)`;
  bar.innerHTML = `<span>${msg}</span>`
    + `<div style="display:flex;gap:8px;flex-shrink:0">`
    + `<button onclick="exportarBackup()" style="padding:6px 14px;background:#fff;color:${cor};border:none;border-radius:5px;font-family:Jost,sans-serif;font-size:12px;font-weight:700;cursor:pointer">💾 Fazer Backup</button>`
    + `<button onclick="document.getElementById('storage-warn-bar').remove()" style="padding:6px 10px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:5px;font-family:Jost,sans-serif;font-size:12px;cursor:pointer">✕</button>`
    + `</div>`;
  document.body?.appendChild(bar);
}

// BACKUP AUTOMÁTICO SEMANAL
// Verifica na abertura do sistema; oferece download se > 7 dias
// ══════════════════════════════════════════════════════════════════
const _BACKUP_KEY      = 'atelier_last_backup';
const _BACKUP_DIAS_MAX = 7;

function marcarBackupFeito(){
  localStorage.setItem(_BACKUP_KEY, new Date().toISOString());
}

function verificarBackupSemanal(){
  if(SESS?.role !== 'admin') return; // Só a Ana vê o aviso
  const ultimo = localStorage.getItem(_BACKUP_KEY);
  if(!ultimo){ _mostrarAvisoBackup(null); return; }
  const diasDesde = Math.floor((Date.now() - new Date(ultimo).getTime()) / 86400000);
  if(diasDesde >= _BACKUP_DIAS_MAX) _mostrarAvisoBackup(diasDesde);
}

function _mostrarAvisoBackup(diasDesde){
  const msg = diasDesde === null
    ? 'Nenhum backup registrado. Recomendamos fazer um agora.'
    : `O último backup foi há ${diasDesde} dia(s). Recomendado: a cada 7 dias.`;
  setTimeout(()=>{
    abrirModalGenerico('💾 Backup Recomendado', `
      <div style="padding:20px">
        <div style="text-align:center;margin-bottom:20px">
          <p style="font-size:40px;margin-bottom:8px">💾</p>
          <p style="font-size:15px;font-weight:700;color:var(--azul);margin-bottom:6px">Hora de fazer um backup</p>
          <p style="font-size:13px;color:var(--texto-suave)">${msg}</p>
        </div>
        <div style="background:var(--fundo);border-radius:8px;padding:12px 14px;margin-bottom:20px;font-size:12px;color:var(--texto-suave)">
          O backup salva <strong>todos os dados</strong> do sistema (clientes, OS, vendas, financeiro) 
          em um arquivo JSON. Guarde em local seguro (Google Drive, e-mail, etc.).
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="btn btn-outline" onclick="fecharModal()">Lembrar depois</button>
          <button class="btn btn-primary" onclick="exportarBackupComMarca();fecharModal()" style="padding:11px 24px">
            💾 Fazer Backup Agora
          </button>
        </div>
      </div>`);
  }, 1200); // Pequeno delay para não sobrepor ao carregamento
}

function exportarBackupComMarca(){
  exportarBackup();
  marcarBackupFeito();
}

// ═══════════════════════════════════════════════════════════════════
// SHA-256 — Web Crypto API (nativa no iOS Safari 11+)
// Senhas são armazenadas como "sha256:<hex>" — nunca em plaintext
// ═══════════════════════════════════════════════════════════════════
async function sha256(text){
  if(typeof crypto!=='undefined'&&crypto.subtle){
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  // Fallback sem crypto.subtle
  let h=0;for(let i=0;i<text.length;i++){h=(Math.imul(31,h)+text.charCodeAt(i))|0;}
  return 'fallback'+Math.abs(h).toString(16);
}

// ─── Fingerprint do dispositivo ─────────────────────────────────
// Combinação de características do browser/device → hash único por aparelho
async function getDeviceFingerprint(){
  const raw=[
    navigator.userAgent||'',
    navigator.language||'',
    (screen.width||0)+'x'+(screen.height||0),
    String(new Date().getTimezoneOffset()),
    navigator.platform||''
  ].join('||');
  return sha256(raw);
}

// ─── Integridade do banco ────────────────────────────────────────
const _DB_SALT='AnaLobao_Atelier_2026';

async function _dbHash(snapStr){
  return sha256(snapStr+_DB_SALT);
}

function isHashed(pass){
  return typeof pass==='string'&&pass.startsWith('sha256:');
}

// Salt fixo do sistema (aumenta custo de rainbow tables sem bcrypt)
// Combinado com o login do usuário para salt por-usuário
const _PASS_PEPPER = 'AnaLobao@Atelier2025#SistemaInterno';

async function hashPass(plain, userLogin){
  const salt = (userLogin||'') + _PASS_PEPPER;
  return 'sha256:'+(await sha256(salt + plain + salt));
}

async function verifyPass(input, stored, userLogin){
  if(!input||!stored)return false;
  if(isHashed(stored)){
    // Tenta com salt (novo formato)
    const salt = (userLogin||'') + _PASS_PEPPER;
    const hashComSalt = 'sha256:'+(await sha256(salt + input + salt));
    if(hashComSalt===stored) return true;
    // Fallback: tenta sem salt (formato antigo)
    const hashSemSalt = 'sha256:'+(await sha256(input));
    return hashSemSalt===stored;
  }
  // Plaintext — compara direto
  return input===stored;
}

// ═══════════════════════════════════════════════════════════════════
// SUPABASE — Sincronização em Nuvem
// Usa fetch puro (sem biblioteca Supabase JS) para compatibilidade com Safari/iOS
// ═══════════════════════════════════════════════════════════════════
let _sbSyncing = false;
let _sbLastSync = null;
let _sbPollTimer = null;

function _sbConfig(){
  try{return JSON.parse(localStorage.getItem('atelier_sb_config')||'null');}catch(e){return null;}
}

// Headers para REST API do Supabase
function _sbHeaders(){
  const cfg=_sbConfig();
  if(!cfg)return null;
  return {
    'Content-Type':'application/json',
    'apikey': cfg.key,
    'Authorization': 'Bearer '+cfg.key,
    'Prefer': 'return=minimal'
  };
}

// URL base da API REST do Supabase
function _sbUrl(table){
  const cfg=_sbConfig();
  if(!cfg)return null;
  return cfg.url+'/rest/v1/'+table;
}

// Sobe dados locais para o Supabase via fetch puro
async function syncToSupabase(){
  if(_sbSyncing)return;
  const cfg=_sbConfig();
  if(!cfg)return;
  _sbSyncing=true;
  try{
    const snap={_ids:JSON.parse(JSON.stringify(DB._ids))};
    DB_KEYS.forEach(k=>{if(DB[k]!==undefined)snap[k]=DB[k];});
    DB_OBJ_KEYS.forEach(k=>{if(DB[k]!==undefined)snap[k]=DB[k];});

    const url=_sbUrl('atelier_sync');
    const headers=_sbHeaders();

    // Upsert database — sintaxe correta PostgREST
    const r1=await fetch(url,{
      method:'POST',
      headers:{...headers,'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({key:'database',payload:snap,updated_at:new Date().toISOString()})
    });
    if(!r1.ok){const t=await r1.text();throw new Error('DB upsert: '+r1.status+' '+t);}

    // Upsert users
    const r2=await fetch(url,{
      method:'POST',
      headers:{...headers,'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({key:'users',payload:USERS,updated_at:new Date().toISOString()})
    });
    if(!r2.ok){const t=await r2.text();throw new Error('Users upsert: '+r2.status+' '+t);}

    _sbLastSync=new Date();
    _sbUpdateIndicator('ok');
    console.log('[Supabase] sync OK');
  }catch(err){
    console.warn('[Supabase] syncTo error:',err.message||err);
    _sbUpdateIndicator('error');
  }finally{_sbSyncing=false;}
}

// Baixa dados do Supabase via fetch puro
async function syncFromSupabase(silent){
  const cfg=_sbConfig();
  if(!cfg)return false;
  try{
    const url=_sbUrl('atelier_sync')+'?key=in.(database,users)&select=key,payload,updated_at';
    const r=await fetch(url,{method:'GET',headers:_sbHeaders()});
    if(!r.ok){const t=await r.text();throw new Error('GET: '+r.status+' '+t);}
    const data=await r.json();

    // Tabela vazia = projeto novo = sobe dados locais
    if(!data||!data.length){
      _sbLastSync=new Date();
      _sbUpdateIndicator('ok');
      await syncToSupabase();
      return true;
    }

    let dbUpdated=false;
    data.forEach(row=>{
      if(row.key==='database'&&row.payload){
        const remote=row.payload;

        // MERGE: para cada array, une local + remoto por ID (sem duplicatas)
        // Prevalece o registro com maior ID (mais recente)
        DB_KEYS.forEach(k=>{
          if(!Array.isArray(remote[k]))return;
          const local=DB[k]||[];
          // Mapa de todos os IDs remotos
          const remoteMap={};
          remote[k].forEach(function(item){if(item&&item.id!=null)remoteMap[item.id]=item;});
          // Adiciona itens locais que não existem no remoto (novos criados offline)
          local.forEach(function(item){
            if(item&&item.id!=null&&!remoteMap[item.id]){
              remoteMap[item.id]=item;
            }
          });
          // Reconstrói array ordenado por ID
          DB[k]=Object.values(remoteMap).sort(function(a,b){return (a.id||0)-(b.id||0);});
        });

        // Merge de objetos (params, caixa etc): remote prevalece, mas preserva chaves locais ausentes
        DB_OBJ_KEYS.forEach(k=>{
          if(remote[k]&&typeof remote[k]==='object'&&!Array.isArray(remote[k])){
            // Preserva dados locais não presentes no remoto
            DB[k]=Object.assign({},DB[k],remote[k]);
            if(k==='caixa'){
              if(Array.isArray(remote[k].movimentos))DB[k].movimentos=remote[k].movimentos;
              if(Array.isArray(remote[k].fechamentos))DB[k].fechamentos=remote[k].fechamentos;
            }
          }
        });

        // Merge de _ids: pega o maior de cada contador
        if(remote._ids){
          Object.keys(remote._ids).forEach(function(k){
            DB._ids[k]=Math.max(DB._ids[k]||0, remote._ids[k]||0);
          });
        }

        const snapStr=JSON.stringify(DB);
        localStorage.setItem('atelier_db_v2',snapStr);
        _dbHash(snapStr).then(h=>localStorage.setItem('atelier_db_integrity',h)).catch(()=>{});
        dbUpdated=true;
      }
      if(row.key==='users'&&Array.isArray(row.payload)){
        USERS.length=0;
        row.payload.forEach(u=>USERS.push(u));
        migrateUsers();
        const _usersStr=JSON.stringify(USERS);
        const _usersSig=btoa(_usersStr.length+'|'+_usersStr.charCodeAt(0)+'|'+_usersStr.charCodeAt(_usersStr.length-1)).slice(0,16);
        localStorage.setItem('atelier_users',_usersStr);
        localStorage.setItem('atelier_users_sig',_usersSig);
      }
    });

    _sbLastSync=new Date();
    _sbUpdateIndicator('ok');

    // Após merge, sobe o resultado consolidado para o Supabase
    if(dbUpdated) await syncToSupabase();

    if(dbUpdated&&!silent){
      if(CUR_MOD&&typeof renderModule==='function')renderModule(CUR_MOD);
    }
    return true;
  }catch(err){
    console.warn('[Supabase] syncFrom error:',err.message||err);
    _sbUpdateIndicator('error');
    return false;
  }
}

// Indicador visual
function _sbUpdateIndicator(status){
  const el=document.getElementById('sb-sync-status');
  if(!el)return;
  const map={ok:'<span style="font-size:11px;color:var(--verde)">☁ Sincronizado '+( _sbLastSync?_sbLastSync.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'')+'</span>',
    error:'<span style="font-size:11px;color:#eb5757">⚠ Erro de sync</span>',
    syncing:'<span style="font-size:11px;color:var(--texto-suave)">↻ Sincronizando…</span>'};
  el.innerHTML=map[status]||'';
}

  const url=document.getElementById('sb-url-input')?.value.trim();

let _loginAttempts = 0;
let _loginBlockedUntil = 0;

async function doLogin(){
  // Verifica bloqueio temporário
  if(Date.now() < _loginBlockedUntil){
    const segs = Math.ceil((_loginBlockedUntil - Date.now()) / 1000);
    showToast('Muitas tentativas. Aguarde '+segs+' segundos.','danger');
    return;
  }

  try{
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value;
  if(!u||!p){document.getElementById('login-err').style.display='block';return;}

  // Encontra o usuário pelo login
  const userObj=USERS.find(x=>x.user===u);
  if(!userObj){
    _loginAttempts++;
    const el=document.getElementById('login-err');
    if(_loginAttempts>=5){
      _loginBlockedUntil=Date.now()+30000;
      _loginAttempts=0;
      if(el){el.style.display='block';el.textContent='Muitas tentativas. Aguarde 30 segundos.';}
    } else {
      if(el){el.style.display='block';el.textContent='Usuário ou senha incorretos ('+_loginAttempts+'/5).';}
    }
    return;
  }

  // Verifica se usuário está ativo
  if(userObj.ativo===false){
    document.getElementById('login-err').style.display='block';
    document.getElementById('login-err').textContent='Acesso bloqueado. Contacte a administradora.';
    return;
  }

  // Verifica senha (suporta plaintext legado e hash SHA-256)
  const ok=await verifyPass(p,userObj.pass,u);
  if(!ok){
    _loginAttempts++;
    const elWP=document.getElementById('login-err');
    if(_loginAttempts>=5){
      _loginBlockedUntil=Date.now()+30000;
      _loginAttempts=0;
      if(elWP){elWP.style.display='block';elWP.textContent='Muitas tentativas. Aguarde 30 segundos.';}
    } else {
      if(elWP){elWP.style.display='block';elWP.textContent='Usuário ou senha incorretos ('+_loginAttempts+'/5).';}
    }
    return;
  }

  // Migração automática: se senha ainda era plaintext, hasheia agora
  if(!isHashed(userObj.pass)){
    userObj.pass=await hashPass(p,u);
    saveUsers();
  }

  document.getElementById('login-err').style.display='none';
  _loginAttempts = 0; _loginBlockedUntil = 0;
  startSession(userObj);
  }catch(err){
    console.error('Login error:',err);
    const el=document.getElementById('login-err');
    if(el){el.style.display='block';el.textContent='Erro ao entrar. Tente novamente.';}
  }
}

async function confirmarOverrideReserva(){
  // Rate limiting: máx 3 tentativas, bloqueio de 30s
  if(!window._overrideTentativas) window._overrideTentativas=0;
  if(!window._overrideBloqueioAte) window._overrideBloqueioAte=0;
  if(Date.now()<window._overrideBloqueioAte){
    const restante=Math.ceil((window._overrideBloqueioAte-Date.now())/1000);
    const erroEl=document.getElementById('override-erro');
    if(erroEl){erroEl.textContent=`Muitas tentativas. Aguarde ${restante}s.`;erroEl.style.display='block';}
    return;
  }

  const userLogin=document.getElementById('override-user')?.value;
  const senha=document.getElementById('override-pass')?.value;
  const user=USERS.find(u=>u.user===userLogin);
  if(!user){
    window._overrideTentativas++;
    const erroEl=document.getElementById('override-erro');
    if(erroEl){erroEl.style.display='block';}
    return;
  }
  const ok=await verifyPass(senha,user.pass,user.user);
  if(!ok||(user.role!=='admin'&&!user.pode_override_reserva)){
    window._overrideTentativas=(window._overrideTentativas||0)+1;
    const erroEl=document.getElementById('override-erro');
    if(erroEl){
      if(window._overrideTentativas>=3){
        window._overrideBloqueioAte=Date.now()+30000;
        window._overrideTentativas=0;
        erroEl.textContent='3 tentativas incorretas. Acesso bloqueado por 30 segundos.';
      } else {
        erroEl.textContent=`Senha incorreta. Tentativa ${window._overrideTentativas}/3.`;
      }
      erroEl.style.display='block';
    }
    document.getElementById('override-pass').value='';
    document.getElementById('override-pass').focus();
    return;
  }
  // Sucesso — reseta contadores
  window._overrideTentativas=0;
  window._overrideBloqueioAte=0;
  // Migração automática de senha se ainda plaintext
  if(!isHashed(user.pass)){
    user.pass=await hashPass(senha,user.user);
    saveUsers();
  }
  fecharModal();
  auditLog('override_reserva_autorizado',{autorizador:user.user,nome:user.nome});
  showToast('Exceção autorizada por '+user.nome,'warn');
  if(typeof _pendingOverrideCb==='function'){
    _pendingOverrideCb();
    _pendingOverrideCb=null;
  }
}

// ── Detector de race condition entre abas ────────────────────────────
// Se outra aba ou dispositivo grava no banco enquanto esta aba está ativa,
// avisa a usuária para recarregar — evita sobrescrever dados mais novos
let _lastSaveTs = Date.now();
window.addEventListener('storage', function(e){
  if(!SESS) return;
  if(e.key === 'atelier_db_v2' && e.newValue && e.newValue !== e.oldValue){
    // Outra aba gravou — recarrega silenciosamente se não há alterações locais recentes
    const msSinceLastSave = Date.now() - _lastSaveTs;
    if(msSinceLastSave > 5000){
      // Recarrega dados do localStorage sem refreshar a página
      try{
        const snap = JSON.parse(e.newValue);
        if(snap && typeof snap === 'object'){
          DB_KEYS.forEach(function(k){ if(Array.isArray(snap[k])) DB[k]=snap[k]; });
          DB_OBJ_KEYS.forEach(function(k){
            if(snap[k] && typeof snap[k]==='object' && !Array.isArray(snap[k])) Object.assign(DB[k], snap[k]);
          });
          if(snap._ids) Object.keys(snap._ids).forEach(function(k){ DB._ids[k]=snap._ids[k]; });
          showToast('↻ Dados atualizados de outro dispositivo','info');
          if(CUR_MOD && typeof renderModule==='function') renderModule(CUR_MOD);
        }
      }catch(err){ console.warn('[Sync] Erro ao ler atualização de outra aba:', err); }
    } else {
      showToast('⚠ Outro dispositivo também está gravando — risco de conflito','warn');
    }
  }
});
// Marca timestamp a cada saveDB para o detector acima
// _lastSaveTs é atualizado diretamente dentro de saveDB() acima.
function canAccess(mod){
  if(!SESS) return false;
  const role=ROLES[SESS.role];
  if(!role||!role.modules.includes(mod)) return false;
  // Caixa: verificação dupla — role E permissão de usuário
  if(mod==='caixa') return podeAbrirCaixa();
  return true;
}

function buscarCotacaoOuro(mostrarFeedback){
  mostrarFeedback = mostrarFeedback !== false;
  var btn = document.getElementById('btn-atualizar-cotacao');
  var statusEl = document.getElementById('cotacao-status');
  if(btn){btn.disabled=true;btn.textContent='Buscando…';}
  if(statusEl) statusEl.textContent = 'Buscando cotação…';

  function _aplicar(au24k, dolar, fonte){
    if(!au24k||au24k<50) throw new Error('Au inválido: '+au24k);
    au24k = parseFloat(au24k.toFixed(2));
    dolar = parseFloat((dolar||DB.params_reserva.dolar).toFixed(4));
    DB.params_reserva.au24k = au24k;
    DB.params_reserva.dolar = dolar;
    ORC.params.au24k = au24k;
    ORC.params.dolar = dolar;
    saveDB();
    var agora = new Date().toLocaleString('pt-BR')+' ('+fonte+')';
    try{
      localStorage.setItem('atelier_cotacao_ts', today());
      localStorage.setItem('atelier_cotacao_hora', agora);
    }catch(e){}
    _renderCotacaoWidget(au24k, dolar, agora, 'online');
    if(mostrarFeedback)
      showToast('❆ Au 24k = '+fmt(au24k)+'/g · Dólar = R$ '+fmtN(dolar,2),'success');
    if(btn){btn.disabled=false;btn.textContent='↻ Atualizar cotação';}
  }

  // AwesomeAPI: 1 request retorna XAU e USD juntos — sem CORS em Chrome/Edge/Firefox
  // URL do proxy encapsula para resolver CORS no Safari/iOS/WebKit
  var API_URL = 'https://economia.awesomeapi.com.br/json/last/XAU-BRL,USD-BRL';
  var PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);

  function _parsear(data){
    var xau = data.XAUBRL || data['XAU-BRL'] || {};
    var usd = data.USDBRL || data['USD-BRL'] || {};
    var bidOz = parseFloat(xau.bid || xau.ask || 0);
    var dolar  = parseFloat(usd.bid || usd.ask || 0);
    if(!bidOz||bidOz<500) throw new Error('bidOz inválido: '+bidOz);
    if(!dolar||dolar<3)   throw new Error('dolar inválido: '+dolar);
    return {au24k: bidOz/31.1035, dolar: dolar};
  }

  // Tentativa 1: direto (funciona em Chrome/Edge/Firefox no desktop)
  fetch(API_URL)
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data){
      var v = _parsear(data);
      _aplicar(v.au24k, v.dolar, 'AwesomeAPI');
    })
    .catch(function(e1){
      console.warn('[Cotação] Direto falhou ('+e1.message+') — tentando proxy…');
      // Tentativa 2: via corsproxy.io (resolve CORS no Safari/iOS/WebKit)
      fetch(PROXY_URL)
        .then(function(r){ if(!r.ok) throw new Error('proxy HTTP '+r.status); return r.json(); })
        .then(function(data){
          var v = _parsear(data);
          _aplicar(v.au24k, v.dolar, 'AwesomeAPI/proxy');
        })
        .catch(function(e2){
          console.warn('[Cotação] Proxy também falhou ('+e2.message+') — abrindo manual');
          if(btn){btn.disabled=false;btn.textContent='✎ Inserir cotação';}
          if(statusEl) statusEl.textContent = '⚠ Sem conexão — insira manualmente';
          // Abre modal manual automaticamente
          setTimeout(function(){
            if(mostrarFeedback) abrirCotacaoManual();
          }, 400);
        });
    });
}

function calcCotacaoManual(){
  const usdOz=parseFloat(document.getElementById('cm-usd-oz')?.value)||0;
  const dolar=parseFloat(document.getElementById('cm-dolar')?.value)||DB.params_reserva.dolar;
  if(usdOz>0&&dolar>0){
    const calc=(usdOz/31.1035*dolar).toFixed(2);
    const elAu=document.getElementById('cm-au24k');
    if(elAu)elAu.value=calc;
    const prev=document.getElementById('cm-preview');
    if(prev){
      prev.style.display='block';
      const au18k=parseFloat(calc)*0.75*(1-DB.params_reserva.perda/100);
      prev.innerHTML=`Au 24k: <strong>${fmt(parseFloat(calc))}/g</strong> · Au 18k líq.: <strong>${fmt(au18k)}/g</strong>`;
    }
  }
}

function salvarCotacaoManual(){

  const dolar=parseFloat(document.getElementById('cm-dolar')?.value)||0;
  const bonus=parseFloat(document.getElementById('cm-bonus')?.value)||DB.params_reserva.bonus_pct;

function navTo(mod){
  if(!canAccess(mod)){showToast('Acesso não autorizado','danger');return;}
  // Limpa buffers de mídia do módulo anterior (evita vazamento de memória)
  Object.keys(_MIDIA).forEach(function(k){ _MIDIA[k]=[]; });
  // Reseta paginação do módulo anterior ao navegar para outro módulo
  if(CUR_MOD && CUR_MOD !== mod) _pagReset(mod);
  CUR_MOD=mod;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('nav-'+mod);
  if(el)el.classList.add('active');
  document.getElementById('topbar-title').textContent=PAGE_TITLES[mod]||mod;
  renderModule(mod);
  closeSidebar();
}

function fmtN(v,d=2){return Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtDate(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;}

// ── Paginação simples ──────────────────────────────────────────────
// Controla quantos itens estão visíveis por módulo.
// Uso: _PAG.get('modulo') → quantos itens mostrar atualmente
const _PAG = {};
const _PAG_TAMANHO = 50; // itens por página

function _pagGet(chave){ return _PAG[chave] || _PAG_TAMANHO; }
function _pagReset(chave){ _PAG[chave] = _PAG_TAMANHO; }

// Retorna HTML do botão "Ver mais" quando há itens ocultos.
// callbackFn: função JS a chamar (como string), que incrementa _PAG e re-renderiza.
function _pagBtnHTML(total, exibido, callbackFn){
  if(total <= exibido) return '';
  const restam = total - exibido;
  return `<tr><td colspan="99" style="text-align:center;padding:14px">
    <button class="btn btn-outline btn-sm" onclick="${callbackFn}" style="font-size:13px">
      ↓ Ver mais ${Math.min(restam, _PAG_TAMANHO)} de ${restam} restantes
    </button>
  </td></tr>`;
}
function showToast(msg,type='success'){
  const t=document.createElement('div');
  const bg={success:var_verde,danger:'#A60000',info:'#0D1F2D',warn:'#B7613B'};
  t.style.cssText=`position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:6px;background:${bg[type]||bg.info};color:#fff;font-size:13px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);font-family:Jost,sans-serif;max-width:320px`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3200);
}

  div.querySelector('.modal-overlay')?.remove();
  document.body.appendChild(div);
  return div;
}

function osBadge(s){const m={orcamento:'badge-gray',producao:'badge-yellow',concluido:'badge-green',entregue:'badge-gold',cancelado:'badge-red',aprovado:'badge-blue'};return`<span class="badge ${m[s]||'badge-gray'}">${s}</span>`;}
function calcSaldoCliente(cid){
  const entradas=DB.entradas_ouro.filter(e=>e.cliente_id==cid);
  const total_cred=entradas.reduce((a,e)=>a+(e.credito||0),0);
  const total_usado=DB.vendas_credito.filter(v=>v.cliente_id==cid).reduce((a,v)=>a+(v.valor_usado||0),0);
  return total_cred-total_usado;
}
function calcSaldoTotal(){return DB.clientes.reduce((a,c)=>a+calcSaldoCliente(c.id),0);}

// Calcula saldo de cashback de um cliente a partir de DB.cashback
function calcCashbackCliente(cid){
  const reg=DB.cashback.find(function(cb){return cb.cliente_id==cid;});
  return reg?(reg.saldo||0):0;
}

function proximosAniversarios(dias){
  const hoje=new Date();const result=[];
  DB.clientes.forEach(cl=>{
    if(!cl.aniversario)return;
    const [y,m,d]=cl.aniversario.split('-');
    const aniv=new Date(hoje.getFullYear(),+m-1,+d);
    if(aniv<hoje)aniv.setFullYear(hoje.getFullYear()+1);
    const diff=(aniv-hoje)/(1000*60*60*24);
    if(diff<=dias)result.push({nome:cl.apelido||cl.nome,data:`${d}/${m}`});
  });
  // Também verifica datas_importantes
  (DB.datas_importantes||[]).forEach(di=>{
    if(di.tipo!=='aniversario'||!di.data)return;
    const [y,m,d]=di.data.split('-');
    const aniv=new Date(hoje.getFullYear(),+m-1,+d);
    if(aniv<hoje)aniv.setFullYear(hoje.getFullYear()+1);
    const diff=(aniv-hoje)/(1000*60*60*24);
    const cl=DB.clientes.find(c=>c.id==di.cliente_id);
    if(diff<=dias&&cl)result.push({nome:`${di.nome_assoc} (${cl.apelido||cl.nome})`,data:`${d}/${m}`});
  });
  return result;
}

function filterClientes(){

  const cs=document.getElementById('cl-sens').value;

function excluirCliente(id){
  const cl=DB.clientes.find(c=>c.id==id);
  if(!cl)return;
  confirmarAcao(
    'Excluir '+cl.nome+'?',
    'Todos os dados vinculados (OS, orçamentos, vendas, reserva) serão removidos permanentemente.',
    'Excluir',
    function(){
      DB.clientes=DB.clientes.filter(c=>c.id!==id);
      DB.os=DB.os.filter(o=>o.cliente_id!==id);
      DB.orcamentos=DB.orcamentos.filter(o=>o.cliente_id!==id);
      DB.propostas=DB.propostas.filter(p=>p.cliente_id!==id);
      DB.entradas_ouro=DB.entradas_ouro.filter(e=>e.cliente_id!==id);
      DB.vendas_credito=DB.vendas_credito.filter(v=>v.cliente_id!==id);
      DB.vendas=DB.vendas.filter(v=>v.cliente_id!==id);
      DB.datas_importantes=(DB.datas_importantes||[]).filter(d=>d.cliente_id!==id);
      saveDB();
      showToast('Cliente excluído');
      renderClientes(document.getElementById('content'));
    }
  );
}

function saveCliente(id){
  var nome=(_cf.nome||'').trim();
  if(!nome){showToast('Nome obrigatório','danger');return;}
  var existente=id?DB.clientes.find(function(c){return c.id==id;}):null;
  var obj={
    id:          id||DB.nextId('clientes'),
    nome:        nome,
    apelido:     (_cf.apelido||'').trim(),
    cpf_cnpj:    (_cf.cpf_cnpj||'').trim(),
    email:       (_cf.email||'').trim(),
    tel:         (_cf.tel||'').trim(),
    instagram:   (_cf.instagram||'').trim(),
    aniversario: _cf.aniversario||'',
    cidade:      (_cf.cidade||'').trim(),
    origem:      _cf.origem||'outro',
    classif:     _cf.classif||'Regular',
    ltv:         existente?(existente.ltv||0):0,
    ticket_estimado: parseFloat(_cf.ticket_estimado)||0,
    obs:         (_cf.obs||'').trim(),
    obs_estrategica:(_cf.obs_estrategica||'').trim(),
    estilo:      _cf.estilo||[],
    tipo_compra: _cf.tipo_compra||[],
    pecas_interesse:_cf.pecas_interesse||[],
    ouro_preferido:_cf.ouro_preferido||[],
    ocasioes:    _cf.ocasioes||[],
    sensibilidade_preco:_cf.sensibilidade_preco||'',
    pedras_favoritas:(_cf.pedras_favoritas||'').trim(),
    pedras_evita:(_cf.pedras_evita||'').trim(),
    perfil:      _cf.perfil||'',
    tempo_decisao:_cf.tempo_decisao||'',
    atendimento_ideal:(_cf.atendimento_ideal||'').trim(),
    credito_ouro:existente?(existente.credito_ouro||0):0,
    historico:   existente?existente.historico:[],
    interacoes:  existente?existente.interacoes:[],
    data_cadastro: existente?(existente.data_cadastro||today()):today()
  };
  if(id){
    var i=DB.clientes.findIndex(function(c){return c.id==id;});
    if(i>=0)DB.clientes[i]=obj;else DB.clientes.push(obj);
  }else{
    DB.clientes.push(obj);
  }
  _cf={};
  saveDB();
  closeModal('modal-cliente');
  showToast(id?'Cliente atualizado ✓':'Cliente cadastrado ✓');
  renderClientes(document.getElementById('content'));
}

  </tr>`).join('')}
  </tbody></table></div>`;
}

function saveData(clienteId,dataId){
  if(!DB.datas_importantes)DB.datas_importantes=[];
  const obj={id:dataId||DB.nextId('datas_importantes'),cliente_id:clienteId,
    tipo:_df.tipo||'aniversario',nome_assoc:(_df.nome_assoc||'').trim(),
    data:_df.data||'',obs:(_df.obs||'').trim()};
  if(dataId){
    const i=DB.datas_importantes.findIndex(x=>x.id==dataId);
    if(i>=0)DB.datas_importantes[i]=obj;else DB.datas_importantes.push(obj);
  }else{
    DB.datas_importantes.push(obj);
  }
  _df={};saveDB();closeModal('modal-data');
  // Atualiza a lista sem fechar o modal do cliente
  const listEl=document.getElementById('datas-list-'+clienteId);
  if(listEl)listEl.innerHTML=renderDatasList(clienteId);
  showToast('Data salva ✓');
}

function excluirData(dataId,clienteId){
  confirmarAcao('Excluir data?','',  'Excluir',function(){
    DB.datas_importantes=(DB.datas_importantes||[]).filter(d=>d.id!=dataId);
    saveDB();
    const listEl=document.getElementById('datas-list-'+clienteId);
    if(listEl)listEl.innerHTML=renderDatasList(clienteId);
    showToast('Data excluída');
  });
}
function switchTab(e,target){
  const modal=e.target.closest('.modal,.modal-body');
  if(!modal)return;
  modal.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  modal.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  e.target.classList.add('active');
  const pane=modal.querySelector('#'+target);
  if(pane)pane.classList.add('active');
}

function osToggleOrigem(val){

function criarOSDeOrcamento(orcId){
  var orc=DB.orcamentos.find(function(x){return x.id==orcId;});
  if(!orc)return;
  var cl=orc.cliente_id?DB.clientes.find(function(c){return c.id==orc.cliente_id;}):null;
  var ov=document.createElement('div');
  ov.className='modal-overlay';ov.id='modal-os-cria';

  var box=document.createElement('div');box.className='modal modal-lg';

  // Header
  var hdr=document.createElement('div');hdr.className='modal-header';
  var htitle=document.createElement('span');htitle.className='modal-title';
  htitle.textContent='Nova OS — Orçamento #'+orcId;
  var hclose=document.createElement('button');hclose.className='modal-close';
  hclose.textContent='×';hclose.onclick=function(){closeModal('modal-os-cria');};
  hdr.appendChild(htitle);hdr.appendChild(hclose);

  // Body
  var body=document.createElement('div');body.className='modal-body';

  // Banner
  var banner=document.createElement('div');
  banner.style.cssText='background:rgba(176,142,86,.08);border:1px solid var(--borda-ouro);border-radius:6px;padding:10px 14px;margin-bottom:14px;font-size:13px';
  banner.innerHTML='<strong>Orçamento #'+orcId+'</strong>: '+esc(orc.descricao||orc.tipo||'')+(cl?' · '+esc(cl.nome):'');
  body.appendChild(banner);

  // Cliente select
  var cgr=document.createElement('div');cgr.className='form-group';cgr.style.marginBottom='14px';
  var clbl=document.createElement('label');clbl.textContent='Cliente';
  var csel=document.createElement('select');csel.id='os-cria-cl';
  var copt0=document.createElement('option');copt0.value='';copt0.textContent='— Sem cliente —';csel.appendChild(copt0);
  DB.clientes.forEach(function(c){
    var opt=document.createElement('option');opt.value=c.id;opt.textContent=c.nome;
    if(orc.cliente_id==c.id)opt.selected=true;
    csel.appendChild(opt);
  });
  cgr.appendChild(clbl);cgr.appendChild(csel);body.appendChild(cgr);

  // Orçamento select (pre-selected)
  var ogr=document.createElement('div');ogr.className='form-group';ogr.style.marginBottom='14px';
  var olbl=document.createElement('label');olbl.textContent='Orçamento vinculado';
  var osel=document.createElement('select');osel.id='os-cria-orc';
  var oopt0=document.createElement('option');oopt0.value='';oopt0.textContent='— Nenhum —';osel.appendChild(oopt0);
  DB.orcamentos.forEach(function(x){
    var opt=document.createElement('option');opt.value=x.id;
    opt.textContent='#'+x.id+' · '+(x.descricao||x.tipo||'')+(x.status?' ('+x.status+')':'');
    if(x.id==orcId)opt.selected=true;
    osel.appendChild(opt);
  });
  ogr.appendChild(olbl);ogr.appendChild(osel);body.appendChild(ogr);

  // Grid: status, prazo, prioridade, responsavel
  var grid=document.createElement('div');grid.className='form-grid';grid.style.gap='14px';

  function mkSel(id,lbl,opts,defVal){
    var g=document.createElement('div');g.className='form-group';
    var l=document.createElement('label');l.textContent=lbl;
    var s=document.createElement('select');s.id=id;
    opts.forEach(function(o){
      var op=document.createElement('option');op.value=o.v;op.textContent=o.t;
      if(o.v===defVal)op.selected=true;s.appendChild(op);
    });
    g.appendChild(l);g.appendChild(s);return g;
  }
  function mkInput(id,lbl,type,ph){
    var g=document.createElement('div');g.className='form-group';
    var l=document.createElement('label');l.textContent=lbl;
    var inp=document.createElement('input');inp.id=id;inp.type=type||'text';if(ph)inp.placeholder=ph;
    g.appendChild(l);g.appendChild(inp);return g;
  }

  grid.appendChild(mkSel('os-cria-status','Status',[
    {v:'orcamento',t:'Orçamento'},{v:'aprovado',t:'Aprovado'},{v:'producao',t:'Em Produção'}
  ],'aprovado'));
  grid.appendChild(mkInput('os-cria-prazo','Prazo','date',''));
  grid.appendChild(mkSel('os-cria-prior','Prioridade',[
    {v:'normal',t:'Normal'},{v:'alta',t:'Alta'},{v:'urgente',t:'Urgente'}
  ],'normal'));
  grid.appendChild(mkInput('os-cria-resp','Responsável','text','Colaborador responsável'));
  body.appendChild(grid);

  // Descrição
  var dg=document.createElement('div');dg.className='form-group mt-12';
  var dl=document.createElement('label');dl.textContent='Descrição *';
  var dt=document.createElement('textarea');dt.id='os-cria-desc';dt.rows=3;
  dt.value=orc.descricao||'';
  dg.appendChild(dl);dg.appendChild(dt);body.appendChild(dg);

  // Footer
  var footer=document.createElement('div');footer.className='modal-footer';
  var btnCancel=document.createElement('button');btnCancel.className='btn btn-outline';
  btnCancel.textContent='Cancelar';btnCancel.onclick=function(){closeModal('modal-os-cria');};
  var btnOk=document.createElement('button');btnOk.className='btn btn-primary';
  btnOk.textContent='✦ Criar OS';btnOk.onclick=salvarOSDeOrcamento;

  footer.appendChild(btnCancel);footer.appendChild(btnOk);
  box.appendChild(hdr);box.appendChild(body);box.appendChild(footer);
  ov.appendChild(box);
  ov.addEventListener('click',function(e){if(e.target===ov)closeModal('modal-os-cria');});
  document.body.appendChild(ov);
}

function salvarOSDeOrcamento(){
  var desc=(document.getElementById('os-cria-desc')?.value||'').trim();
  if(!desc){showToast('Descrição obrigatória','danger');return;}
  var obj={
    id:DB.nextId('os'),origem:'cliente',
    cliente_id:parseInt(document.getElementById('os-cria-cl')?.value)||null,
    colecao_atelier_id:null,
    status:document.getElementById('os-cria-status')?.value||'aprovado',
    prazo:document.getElementById('os-cria-prazo')?.value||'',
    priority:document.getElementById('os-cria-prior')?.value||'normal',
    responsavel:document.getElementById('os-cria-resp')?.value||'',
    descricao:desc,
    fotos:[],
    orcamento_id:parseInt(document.getElementById('os-cria-orc')?.value)||null
  };
  DB.os.push(obj);
  saveDB();closeModal('modal-os-cria');
  showToast('OS #'+obj.id+' criada e vinculada ao Orçamento #'+obj.orcamento_id+' ✅');
  navTo('os');
}
function osAtualizarOrcamentos(cidStr){
  var cid=parseInt(cidStr)||null;
  var sel=document.getElementById('os-orc');if(!sel)return;
  var prev=sel.value;
  var list=cid?DB.orcamentos.filter(function(x){return x.cliente_id==cid;}):DB.orcamentos;
  sel.innerHTML='<option value="">— Nenhum —</option>'
    +list.map(function(x){
      return '<option value="'+x.id+'"'+(String(prev)==String(x.id)?' selected':'')+'>#'+x.id+' · '+(x.descricao||x.tipo||'')+' ('+(x.status||'rascunho')+')</option>';
    }).join('');
}
function saveOS(id){
  const origemRadio=document.querySelector('input[name="os-origem"]:checked');
  const origem=origemRadio?origemRadio.value:'cliente';
  const desc=(document.getElementById('os-desc')?.value||'').trim();
  if(!desc){showToast('Descrição obrigatória','danger');return;}
  const colecaoId=origem==='atelier'?(parseInt(document.getElementById('os-colecao')?.value)||null):null;
  if(origem==='atelier'&&!colecaoId){showToast('Selecione uma coleção','danger');return;}
  const clienteId=origem==='cliente'?(parseInt(document.getElementById('os-cl')?.value)||null):null;
  const obj={
    id:id||DB.nextId('os'),
    origem,
    cliente_id:clienteId,
    colecao_atelier_id:colecaoId,
    status:document.getElementById('os-status')?.value||'orcamento',
    prazo:document.getElementById('os-prazo')?.value||'',
    priority:document.getElementById('os-prior')?.value||'normal',
    responsavel:document.getElementById('os-resp')?.value||'',
    descricao:desc,
    fotos:midiaGet('os').slice(),
    orcamento_id:parseInt(document.getElementById('os-orc')?.value)||null
  };
  if(id){const i=DB.os.findIndex(o=>o.id==id);if(i>=0)DB.os[i]=obj;}else DB.os.push(obj);
  saveDB();closeModal('modal-os');showToast('OS salva');renderOS(document.getElementById('content'));
}
function excluirOS(id){
  const o=DB.os.find(x=>x.id==id);if(!o)return;
  confirmarAcao('Excluir OS #'+id+'?','Etapas e insumos vinculados também serão removidos.','Excluir',function(){
    DB.os=DB.os.filter(x=>x.id!==id);
    DB.etapas=DB.etapas.filter(e=>e.os_id!==id);
    DB.uso_insumos_os=DB.uso_insumos_os.filter(u=>u.os_id!==id);
    DB.qc=DB.qc.filter(q=>q.os_id!==id);
    saveDB();closeModal('modal-os');showToast('OS excluída');
    renderOS(document.getElementById('content'));
  });
}

function renderEtapas(c){
  const setores=['ourivesaria','montagem'];
  const statusE=['aguardando','em_andamento','concluida'];
  const labelsE={aguardando:'Aguardando',em_andamento:'Em Andamento',concluida:'Concluída'};
  c.innerHTML=`
  <div class="page-header">
    <div><p class="page-title">Etapas de Produção</p><p class="page-sub">Kanban por setor</p></div>
    <button class="btn btn-primary" onclick="openEtapaModal()">+ Nova Etapa</button>
  </div>
  ${setores.map(setor=>`
    <div style="margin-bottom:24px">
      <h3 style="font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--azul);margin-bottom:12px;text-transform:capitalize;letter-spacing:.04em">${setor==='ourivesaria'?'⚒ Ourivesaria':'◈ Montagem'}</h3>
      <div class="kanban">
        ${statusE.map(s=>`
          <div class="kanban-col">
            <div class="kanban-col-title">${labelsE[s]}<span style="background:rgba(255,255,255,.15);padding:2px 7px;border-radius:10px;font-size:10px">${DB.etapas.filter(e=>e.setor===setor&&e.status===s).length}</span></div>
            <div class="kanban-col-body">
              ${DB.etapas.filter(e=>e.setor===setor&&e.status===s).map(e=>`
                <div class="kanban-card" onclick="openEtapaModal(${e.id})">
                  <div class="kanban-card-title">OS #${e.os_id} — ${(e.descricao||'').substring(0,36)}${(e.descricao||'').length>36?'…':''}</div>
                  <div class="kanban-card-sub">👤 ${e.responsavel||'—'}</div>
                  ${e.inclui_acabamento?`<div style="margin-top:4px"><span class="badge badge-gold" style="font-size:10px">Acabamento incluído</span></div>`:''}
                  ${e.data_ini?`<div style="font-size:10px;color:var(--texto-suave);margin-top:4px">Início: ${fmtDate(e.data_ini)}</div>`:''}
                  <!-- Botões de protocolo — stopPropagation para não abrir modal -->
                  <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap" onclick="event.stopPropagation()">
                    ${s==='aguardando'?`<button class="btn btn-xs btn-gold" onclick="etapaReceberDemanda(${e.id})" title="Marcar como recebida e imprimir protocolo">📋 Receber</button>`:''}
                    ${s==='em_andamento'?`<button class="btn btn-xs btn-green" onclick="etapaConcluirDemanda(${e.id})" title="Marcar como concluída e imprimir protocolo">✦ Concluir</button>`:''}
                    ${s==='concluida'?`<button class="btn btn-xs btn-outline" onclick="gerarProtocoloConclusaoEtapa(${e.id})" style="font-size:11px">🖨 Conclusão</button>`:''}
                    <button class="btn btn-xs btn-outline" onclick="gerarReciboRecebimentoEtapa(${e.id})" style="font-size:11px" title="Imprimir recibo de demanda">🖨 Demanda</button>
                  </div>
                </div>`).join('')||`<p style="font-size:12px;color:var(--texto-suave);text-align:center;padding:16px">Vazio</p>`}
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('')}`;
}

// Botão "Receber" — muda status para em_andamento e imprime protocolo de recebimento
function etapaReceberDemanda(id){
  var et=DB.etapas.find(function(e){return e.id==id;});
  if(!et)return;
  et.status='em_andamento';
  et.data_ini=today();
  saveDB();
  showToast('Demanda recebida por '+( et.responsavel||'responsável')+'  ✓');
  renderEtapas(document.getElementById('content'));
  setTimeout(function(){gerarReciboRecebimentoEtapa(id);},300);
}

function saveEtapa(id){
  var novoStatus=document.getElementById('et-status').value;
  var etAnterior=id?DB.etapas.find(function(e){return e.id==id;}):null;
  var dataIni=(etAnterior&&etAnterior.data_ini)||null;
  var dataFim=(etAnterior&&etAnterior.data_fim)||null;
  // Registra timestamps automaticamente na mudança de status
  if(novoStatus==='em_andamento'&&(!etAnterior||etAnterior.status==='aguardando')) dataIni=today();
  if(novoStatus==='concluida'&&(!etAnterior||etAnterior.status!=='concluida')) dataFim=today();
  const obj={
    id:id||DB.nextId('etapas'),
    os_id:parseInt(document.getElementById('et-os').value),
    setor:document.getElementById('et-setor').value,
    responsavel:document.getElementById('et-resp').value,
    status:novoStatus,
    descricao:document.getElementById('et-desc').value,
    inclui_acabamento:document.getElementById('et-acab').checked,
    obs_acabamento:document.getElementById('et-obs-acab').value,
    data_ini:dataIni,
    data_fim:dataFim
  };
  var isNovaConclusao=novoStatus==='concluida'&&(!etAnterior||etAnterior.status!=='concluida');
  if(id){const i=DB.etapas.findIndex(e=>e.id==id);if(i>=0)DB.etapas[i]=obj;}else DB.etapas.push(obj);
  saveDB();closeModal('modal-etapa');showToast('Etapa salva');
  renderEtapas(document.getElementById('content'));
  // Se acabou de marcar como concluída, oferece imprimir protocolo de conclusão
  if(isNovaConclusao){
    setTimeout(function(){gerarProtocoloConclusaoEtapa(obj.id);},400);
  }
}

function excluirEtapa(id){
  confirmarAcao('Excluir etapa?','Esta etapa será removida permanentemente.','Excluir',function(){
    DB.etapas=DB.etapas.filter(e=>e.id!==id);
    saveDB();closeModal('modal-etapa');showToast('Etapa excluída');
    renderEtapas(document.getElementById('content'));
  });
}

    secAcab2.style.cssText='margin-bottom:12px;background:#f0f9f4;border:1px solid #2A5C3F;border-radius:5px;padding:8px 12px';

      +'<div style="font-size:10.5pt;color:#1a3a25">'+et.obs_acabamento+'</div>';
    wrap.appendChild(secAcab2);
  }

  // Próxima etapa
  var secProx=document.createElement('div');
  secProx.style.cssText='margin-bottom:14px;border:1.5px solid '+(proximaEtapa?'#0D1F2D':'#ccc')+';border-radius:5px;padding:10px 14px';
  if(proximaEtapa){
    secProx.innerHTML='<div style="font-size:8pt;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#0D1F2D;margin-bottom:5px">Próxima Etapa</div>'
      +'<div style="font-size:10.5pt;font-weight:600">'+( SETOR_LABEL[proximaEtapa.setor]||proximaEtapa.setor)+'</div>'
      +'<div style="font-size:10pt;color:#444;margin-top:3px">'+proximaEtapa.descricao+'</div>'
      +(proximaEtapa.responsavel?'<div style="font-size:9pt;color:#777;margin-top:4px">👤 Responsável: <strong>'+proximaEtapa.responsavel+'</strong></div>':'');
  } else {
    secProx.innerHTML='<div style="font-size:8pt;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2A5C3F;margin-bottom:5px">✦ Todas as etapas concluídas</div>'
      +'<div style="font-size:10pt;color:#444">Esta foi a última etapa registrada para esta OS. Encaminhar para Controle de Qualidade.</div>';
  }
  wrap.appendChild(secProx);

  // Assinaturas
  var sigs=document.createElement('div');
  sigs.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:auto;padding-top:10px;border-top:1px solid #ddd';
  function sig2(lbl){
    var d=document.createElement('div');d.style.textAlign='center';
    var ln=document.createElement('div');ln.style.cssText='border-top:1.5px solid #0D1F2D;margin-bottom:5px;margin-top:30px';
    var lb=document.createElement('div');lb.style.cssText='font-size:8.5pt;color:#555';lb.textContent=lbl;
    d.appendChild(ln);d.appendChild(lb);return d;
  }
  sigs.appendChild(sig2((et.responsavel||'Executor')+ ' · Entregou'));
  sigs.appendChild(sig2(proximaEtapa?(proximaEtapa.responsavel||'Próximo responsável')+' · Recebeu':'Gerência · Recebeu para QC'));
  wrap.appendChild(sigs);

  // Rodapé
  var rod=document.createElement('div');
  rod.style.cssText='margin-top:10px;text-align:center;font-size:7pt;color:#bbb;border-top:1px solid #eee;padding-top:6px';
  rod.textContent=(at.nome_fantasia||'Atelier Ana Lobão')+' · Demanda Atendida · OS #'+et.os_id+' · '+fmtDate(et.data_fim||today());
  wrap.appendChild(rod);

  // Botões
  var btnBar=document.createElement('div');
  btnBar.style.cssText='position:sticky;bottom:0;background:rgba(0,0,0,.85);padding:12px 20px;display:flex;gap:10px;justify-content:center;margin-top:16px;border-radius:8px';
  var btnP=document.createElement('button');btnP.className='btn btn-primary';btnP.style.fontSize='15px';
  btnP.textContent='🖨 Imprimir / Salvar PDF';
  btnP.onclick=function(){
    var s=document.createElement('style');s.id='prc';
    s.textContent='@media print{body>*{display:none!important}#recibo-conclusao-print{display:block!important;position:static!important;box-shadow:none!important;width:148mm!important;min-height:210mm!important;margin:0!important;padding:13mm 12mm!important}}';
    document.head.appendChild(s);window.print();
    setTimeout(function(){var x=document.getElementById('prc');if(x)x.remove();},1000);
  };
  var btnF=document.createElement('button');btnF.className='btn btn-outline';
  btnF.style.cssText='color:#fff;border-color:#fff';btnF.textContent='× Fechar';
  btnF.onclick=function(){ov.remove();};
  btnBar.appendChild(btnP);btnBar.appendChild(btnF);
  ov.appendChild(wrap);ov.appendChild(btnBar);
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}
