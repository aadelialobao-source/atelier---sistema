function renderQC(c){
  c.innerHTML=`
  <div class="page-header">
    <div><p class="page-title">Controle de Qualidade</p><p class="page-sub">${DB.qc.length} registros</p></div>
    <button class="btn btn-primary" onclick="openQCModal()">+ Registrar QC</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Data</th><th>OS</th><th>Cliente</th><th>Resultado</th><th>Responsável</th><th>Retornar para</th><th>📎</th><th>Ações</th></tr></thead>
      <tbody>${DB.qc.length?DB.qc.slice().reverse().map(q=>{
        const os=DB.os.find(o=>o.id==q.os_id)||{};
        const fotos=(q.fotos||[]).filter(f=>f&&(typeof f==='string'||f.tipo==='img'));
        return`<tr>
          <td>${fmtDate(q.data)}</td>
          <td><strong>#${q.os_id}</strong><br><span style="font-size:11px;color:var(--texto-suave)">${(os.descricao||'').substring(0,28)}</span></td>
          <td style="font-size:12px">${clienteNome(os.cliente_id)}</td>
          <td><span class="badge ${q.resultado==='aprovado'?'badge-green':'badge-red'}">${q.resultado==='aprovado'?'✓ Aprovado':'✗ Reprovado'}</span></td>
          <td style="font-size:12px">${q.responsavel||'—'}</td>
          <td style="font-size:12px;color:${q.resultado==='reprovado'?'var(--vermelho)':'var(--texto-suave)'}">${q.resultado==='reprovado'?(q.retornar_para||'—'):'—'}</td>
          <td style="font-size:12px;color:var(--texto-suave)">${fotos.length?`${fotos.length} foto(s)`:'—'}</td>
          <td><div class="td-actions">
            <button class="btn btn-xs btn-outline" onclick="openQCModal(${q.id})">Ver/Editar</button>
            ${podeExcluir()?`<button class="btn btn-xs btn-danger" onclick="excluirQC(${q.id})">✕</button>`:''}
          </div></td>
        </tr>`;
      }).join(''):'<tr><td colspan="8" class="text-center text-suave" style="padding:32px">Nenhum registro de QC</td></tr>'}
      </tbody>
    </table>
  </div>`;
}

function openQCModal(id){
  const q=id?DB.qc.find(x=>x.id==id):null;
  midiaInit('qc', q?(q.fotos||[]).map(f=>typeof f==='string'?{tipo:'img',src:f,nome:'foto'}:f):[]);
  const osOpts=DB.os.map(o=>`<option value="${o.id}" ${q&&q.os_id==o.id?'selected':''}>#${o.id} — ${(o.descricao||'').substring(0,32)} (${clienteNome(o.cliente_id)})</option>`).join('');
  const isReprov=q&&q.resultado==='reprovado';
  const div=document.createElement('div');div.className='modal-overlay';div.id='modal-qc';
  div.innerHTML=`<div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title">${id?'Controle de Qualidade #'+id:'Novo Registro de QC'}</span>
      <button class="modal-close" onclick="closeModal('modal-qc')">×</button>
    </div>
    <div class="modal-body">

      <!-- OS e dados básicos -->
      <fieldset style="margin-bottom:14px">
        <legend>Dados do Registro</legend>
        <div class="form-grid" style="gap:14px">
          <div class="form-group" style="grid-column:1/-1"><label>Ordem de Serviço *</label>
            <select id="qc-os" onchange="qcShowOsInfo()">${osOpts}</select>
          </div>
          <div id="qc-os-info" style="grid-column:1/-1"></div>
          <div class="form-group"><label>Data</label>
            <input id="qc-data" type="date" value="${q?q.data:today()}">
          </div>
          <div class="form-group"><label>Resultado *</label>
            <select id="qc-res" onchange="qcToggleRetorno()">
              <option value="aprovado" ${!isReprov?'selected':''}>✓ Aprovado</option>
              <option value="reprovado" ${isReprov?'selected':''}>✗ Reprovado</option>
            </select>
          </div>
          <div class="form-group"><label>Responsável pelo QC</label>
            <input id="qc-resp" value="${q?q.responsavel:(SESS.nome||'')}">
          </div>
        </div>
        <div class="form-group mt-12"><label>Observações</label>
          <textarea id="qc-obs" rows="2" placeholder="Descreva o resultado da inspeção…">${q?q.obs||'':''}</textarea>
        </div>
      </fieldset>

      <!-- Seção reprovado (retorno) -->
      <fieldset id="qc-retorno-area" style="margin-bottom:14px;border-color:var(--vermelho);${isReprov?'':'display:none'}">
        <legend style="color:var(--vermelho)">↩ Retornar para Retrabalho</legend>
        <div class="form-grid" style="gap:14px">
          <div class="form-group"><label>Retornar para (responsável)</label>
            <input id="qc-retornar" value="${q?q.retornar_para||'':''}" placeholder="Nome do ourives/montador">
          </div>
          <div class="form-group"><label>Etapa a refazer</label>
            <input id="qc-etapa-ref" value="${q?q.etapa_retorno||'':''}" placeholder="ex: Cravação, Polimento…">
          </div>
        </div>
        <div class="form-group mt-12"><label>Instruções de retrabalho</label>
          <textarea id="qc-obs-ret" rows="2" placeholder="Descreva o que precisa ser corrigido…">${q?q.obs_retorno||'':''}</textarea>
        </div>
      </fieldset>

      <!-- Fotos e vídeos -->
      <fieldset style="margin-bottom:14px">
        <legend>📎 Fotos e Vídeos do QC</legend>
        <div id="qc-midia-container"></div>
      </fieldset>

    </div>
    <div class="modal-footer">
      ${id&&podeExcluir()?`<button class="btn btn-danger" onclick="excluirQC(${id})">Excluir</button>`:''}
      <button class="btn btn-outline" onclick="closeModal('modal-qc')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveQC(${id||0})">✦ Salvar</button>
    </div>
  </div>`;
  document.body.appendChild(div);
  // Inicializar widget de mídia
  const qcMc=document.getElementById('qc-midia-container');
  if(qcMc){qcMc.innerHTML=midiaWidget('qc',6,'Inserir Imagem / Vídeo');midiaRenderPreview('qc');}
  // Mostrar info da OS selecionada
  qcShowOsInfo();
}

function qcShowOsInfo(){
  const sel=document.getElementById('qc-os');
  const el=document.getElementById('qc-os-info');
  if(!sel||!el)return;
  const os=DB.os.find(o=>o.id==parseInt(sel.value));
  if(!os){el.innerHTML='';return;}
  const etapas=DB.etapas.filter(e=>e.os_id==os.id);
  el.innerHTML=`<div style="background:var(--fundo);border-radius:5px;padding:10px 14px;font-size:12px;color:var(--texto-suave)">
    <strong style="color:var(--azul)">OS #${os.id}</strong> · ${clienteNome(os.cliente_id)} · 
    Status: <span class="badge badge-blue" style="font-size:10px">${os.status}</span> · 
    ${etapas.length} etapa(s) · Prazo: ${fmtDate(os.prazo)||'—'}
    ${os.responsavel?`· Resp.: ${os.responsavel}`:''}
  </div>`;
}

function qcToggleRetorno(){
  const res=document.getElementById('qc-res')?.value;
  const area=document.getElementById('qc-retorno-area');
  if(area)area.style.display=res==='reprovado'?'block':'none';
}

function saveQC(id){
  const os_id=parseInt(document.getElementById('qc-os')?.value);
  const resultado=document.getElementById('qc-res')?.value;
  const data=document.getElementById('qc-data')?.value;
  if(!os_id){showToast('Selecione uma OS','danger');return;}
  if(!data){showToast('Data obrigatória','danger');return;}
  const obj={
    id:id||DB.nextId('qc'),
    os_id, data, resultado,
    responsavel:document.getElementById('qc-resp')?.value||'',
    obs:document.getElementById('qc-obs')?.value||'',
    retornar_para: resultado==='reprovado'?(document.getElementById('qc-retornar')?.value||''):'',
    etapa_retorno: resultado==='reprovado'?(document.getElementById('qc-etapa-ref')?.value||''):'',
    obs_retorno:   resultado==='reprovado'?(document.getElementById('qc-obs-ret')?.value||''):'',
    fotos: midiaGet('qc').slice()
  };
  if(id){const i=DB.qc.findIndex(q=>q.id==id);if(i>=0)DB.qc[i]=obj;else DB.qc.push(obj);}
  else DB.qc.push(obj);
  // Se reprovado, atualizar status da OS para 'producao' (retorno)
  if(resultado==='reprovado'&&obj.retornar_para){
    const os=DB.os.find(o=>o.id==os_id);
    if(os&&os.status==='concluido')os.status='producao';
  }
  saveDB();closeModal('modal-qc');
  showToast(resultado==='aprovado'?'QC aprovado ✓':'QC reprovado — enviado para retrabalho',resultado==='aprovado'?'success':'warn');
  renderQC(document.getElementById('content'));
}

function excluirQC(id){
  confirmarAcao('Excluir registro de QC?','Este registro será removido permanentemente.','Excluir',function(){
    DB.qc=DB.qc.filter(q=>q.id!==id);
    saveDB();showToast('Registro excluído');closeModal('modal-qc');
    renderQC(document.getElementById('content'));
  });
}

function openInsOSModal(){
  const div=document.createElement('div');div.className='modal-overlay';div.id='modal-ins-os';
  div.innerHTML=`<div class="modal">
    <div class="modal-header"><span class="modal-title">Registrar Consumo de Insumo</span><button class="modal-close" onclick="closeModal('modal-ins-os')">×</button></div>
    <div class="modal-body">
      <div class="form-grid" style="gap:14px">
        <div class="form-group"><label>OS</label><select id="ios-os">
          ${DB.os.map(o=>`<option value="${o.id}">#${o.id} — ${(o.descricao||'').substring(0,30)}</option>`).join('')}
        </select></div>
        <div class="form-group"><label>Insumo</label><select id="ios-ins" onchange="calcInsOS()">
          ${DB.insumos.map(i=>`<option value="${i.id}" data-cu="${i.custo_unit}" data-un="${i.unidade}">${i.nome} (${fmt(i.custo_unit)}/${i.unidade})</option>`).join('')}
        </select></div>
        <div class="form-group"><label>Quantidade</label><input id="ios-qtd" type="number" value="1" step="0.01" oninput="calcInsOS()"></div>
        <div class="form-group"><label>Custo Total</label><input id="ios-custo" type="number" step="0.01" placeholder="Calculado auto" readonly style="background:#eee"></div>
        <div class="form-group"><label>Data</label><input id="ios-data" type="date" value="${today()}"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('modal-ins-os')">Cancelar</button><button class="btn btn-primary" onclick="saveInsOS()">Salvar</button></div>
  </div>`;
  document.body.appendChild(div);
}
function calcInsOS(){
  const sel=document.getElementById('ios-ins');
  const cu=parseFloat(sel.options[sel.selectedIndex]?.dataset.cu)||0;
  const qtd=parseFloat(document.getElementById('ios-qtd').value)||0;
  document.getElementById('ios-custo').value=(cu*qtd).toFixed(2);
}
function saveInsOS(){
  const obj={id:DB.nextId('uso_insumos_os'),os_id:parseInt(document.getElementById('ios-os').value),
    insumo_id:parseInt(document.getElementById('ios-ins').value),
    qtd:parseFloat(document.getElementById('ios-qtd').value),
    custo_total:parseFloat(document.getElementById('ios-custo').value),
    data:document.getElementById('ios-data').value};
  if(!obj.qtd||obj.qtd<=0){showToast('Quantidade inválida','danger');return;}
  // Decrementar estoque do insumo
  const ins=DB.insumos.find(i=>i.id==obj.insumo_id);
  if(ins){
    if(obj.qtd>ins.estoque){showToast(`Estoque insuficiente — disponível: ${fmtN(ins.estoque)} ${ins.unidade}`,'danger');return;}
    ins.estoque=Math.max(0,parseFloat((ins.estoque-obj.qtd).toFixed(4)));
  }
  DB.uso_insumos_os.push(obj);saveDB();closeModal('modal-ins-os');showToast('Consumo registrado e estoque atualizado');
  renderInsumosOS(document.getElementById('content'));
}

function saveIns(id){
  const obj={id:id||DB.nextId('insumos'),nome:document.getElementById('ins-nome').value,
    categoria:document.getElementById('ins-cat').value,unidade:document.getElementById('ins-un').value,

  if(id){const i=DB.insumos.findIndex(x=>x.id==id);if(i>=0)DB.insumos[i]=obj;}else DB.insumos.push(obj);
  saveDB();closeModal('modal-ins');showToast('Insumo salvo');renderInsumos(document.getElementById('content'));

function excluirInsumo(id){
  const ins=DB.insumos.find(x=>x.id==id);if(!ins)return;
  const emUso=DB.uso_insumos_os.some(u=>u.insumo_id==id);
  const msg=emUso
    ?`<strong>${ins.nome}</strong> possui registros de consumo vinculados. Excluir mesmo assim?`
    :`O insumo <strong>${ins.nome}</strong> será removido permanentemente do estoque.`;
  confirmarAcao('Excluir insumo?',msg,'Excluir',function(){
    DB.insumos=DB.insumos.filter(x=>x.id!==id);
    saveDB();
    showToast('Insumo excluído');
    renderInsumos(document.getElementById('content'));
  });
}

          </select></div>

function saveColecaoAtelier(id){
  const nome=(document.getElementById('col-nome')?.value||'').trim();
  if(!nome){showToast('Nome da coleção obrigatório','danger');return;}
  const obj={
    id:id||DB.nextId('colecoes_atelier'),
    nome,
    temporada:document.getElementById('col-temporada')?.value||'',
    data_lancamento:document.getElementById('col-lancamento')?.value||'',
    status:document.getElementById('col-status')?.value||'planejamento',
    descricao:document.getElementById('col-desc')?.value||'',
    fotos:midiaGet('col_capa').slice()
  };
  if(id){const i=DB.colecoes_atelier.findIndex(x=>x.id==id);if(i>=0)DB.colecoes_atelier[i]=obj;else DB.colecoes_atelier.push(obj);}
  else DB.colecoes_atelier.push(obj);
  saveDB();closeModal('modal-colecao');showToast(id?'Coleção atualizada':'Coleção criada ✦');
  renderColecao(document.getElementById('content'));
}

function excluirColecaoAtelier(id){
  const col=DB.colecoes_atelier.find(x=>x.id==id);if(!col)return;
  const pecasCount=DB.colecao.filter(p=>p.colecao_atelier_id==id).length;
  confirmarAcao(
    'Excluir coleção "'+col.nome+'"?',
    pecasCount>0?`Esta coleção possui ${pecasCount} peça(s) vinculada(s). As peças não serão excluídas, apenas desvinculadas da coleção.`:'A coleção será removida permanentemente.',
    'Excluir',
    function(){
      DB.colecao.forEach(p=>{if(p.colecao_atelier_id==id)p.colecao_atelier_id=null;});
      DB.os.forEach(o=>{if(o.colecao_atelier_id==id){o.colecao_atelier_id=null;o.origem='atelier';}});
      DB.colecoes_atelier=DB.colecoes_atelier.filter(x=>x.id!==id);
      saveDB();closeModal('modal-colecao');showToast('Coleção excluída');
      renderColecao(document.getElementById('content'));
    }
  );
}

function switchTabById(e,target){
  const container=e.target.closest('.card-body');
  if(!container)return;
  container.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  container.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  e.target.classList.add('active');
  const pane=container.querySelector('#'+target);
  if(pane)pane.classList.add('active');
}
// ── Certificados de Peça (buffer dedicado) ───────────────────────
var _CERT_PROD = [];
function certProdAdicionarArquivos(e){
  var files = Array.from(e.target.files);
  var restam = 3 - _CERT_PROD.length;
  if(restam <= 0){showToast('Limite de 3 certificados atingido','warn');return;}
  files.slice(0, restam).forEach(function(f){
    if(f.size > 5*1024*1024){showToast(f.name+' excede 5 MB','warn');return;}
    var isPDF = f.type === 'application/pdf';
    var r = new FileReader();
    r.onload = function(ev){
      _CERT_PROD.push({tipo: isPDF?'pdf':'img', src: ev.target.result, nome: f.name});
      certProdRenderPreview();
      // Also refresh edit-modal preview if open
      var ecEl=document.getElementById('ec-cert-preview');
      if(ecEl) certProdRenderPreviewIn(ecEl);
    };
    r.readAsDataURL(f);
  });
  e.target.value = '';
}
function certProdRemover(i){
  _CERT_PROD.splice(i, 1);
  certProdRenderPreview();
}
function certProdRenderPreview(){
  // Render into whichever preview container is currently visible
  var el = document.getElementById('cert-prod-preview');
  if(el) certProdRenderPreviewIn(el);
  var el2 = document.getElementById('ec-cert-preview');
  if(el2) certProdRenderPreviewIn(el2);
}
function certProdZoom(i){
  var m = _CERT_PROD[i]; if(!m) return;
  var ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  ov.onclick = function(){ov.remove();};
  var img = document.createElement('img');
  img.src = m.src; img.style.cssText = 'max-width:92vw;max-height:92vh;border-radius:8px';
  ov.appendChild(img); document.body.appendChild(ov);
}
function certProdRenderPreviewIn(el){
  if(!el)return;
  if(!_CERT_PROD.length){
    el.innerHTML='<p style="font-size:12px;color:var(--texto-suave)">Nenhum certificado.</p>';return;
  }
  el.innerHTML=_CERT_PROD.map(function(m,i){
    if(m.tipo==='pdf'){
      return '<div style="display:flex;align-items:center;gap:8px;background:var(--fundo);border:1px solid var(--borda);border-radius:6px;padding:8px 12px;margin-bottom:6px">'
        +'<span style="font-size:22px">📄</span><div style="flex:1;min-width:0">'
        +'<p style="font-size:12px;font-weight:600;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(m.nome)+'</p>'
        +'<a href="'+m.src+'" target="_blank" style="font-size:11px;color:var(--ouro)">Abrir PDF</a></div>'
        +'<button type="button" onclick="certProdRemover('+i+');certProdRenderPreviewIn(document.getElementById(\'ec-cert-preview\')||document.getElementById(\'cert-prod-preview\'))" style="background:none;border:none;color:#eb5757;font-size:18px;cursor:pointer">×</button>'
        +'</div>';
    }
    return '<div style="position:relative;display:inline-block;margin:0 6px 6px 0">'
      +'<img src="'+m.src+'" onclick="certProdZoom('+i+')" style="width:90px;height:90px;object-fit:cover;border-radius:6px;cursor:zoom-in;border:1px solid var(--borda)">'
      +'<div style="font-size:10px;color:var(--texto-suave);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px">'+esc(m.nome)+'</div>'
      +'<button type="button" onclick="certProdRemover('+i+');certProdRenderPreviewIn(document.getElementById(\'ec-cert-preview\')||document.getElementById(\'cert-prod-preview\'))" style="position:absolute;top:-6px;right:-6px;background:#eb5757;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;line-height:1">×</button>'
      +'</div>';
  }).join('');
}
function certProdCarregar(arr){
  // Load existing certificados when editing a product

function saveProduto(){

function renderOrcamentos(c){

  const _oPag=_oOrdenados.slice(0,_pagGet('orcamentos'));
  c.innerHTML=`
  <div class="page-header">
    <div><p class="page-title">Orçamentos</p><p class="page-sub">${DB.orcamentos.length} orçamentos</p></div>
    <button class="btn btn-primary" onclick="novoOrcamento()">+ Novo Orçamento</button>
  </div>
  <div class="table-wrap">
    <table><thead><tr><th>Data</th><th>Tipo</th><th>Cliente</th><th>Descrição</th>${verCusto()?'<th>Custo</th><th>Preço Ideal</th>':''}<th>Status</th><th>Ações</th></tr></thead>
    <tbody>${_oPag.map(o=>{
      const params=o.params||{au24k:757.05,conv18k:0.75,perda:10};
      const au18k_liq=params.au24k*params.conv18k*(1-params.perda/100);
      const b1=o.bloco1||{};
      const b2=o.bloco2||{};
      const b3=o.bloco3||{};
      const custo_ouro=(b1.peso_ouro||0)*au18k_liq;
      const custo_gemas=(b1.gemas||[]).reduce((a,g)=>a+(g.qtd||0)*(g.custo||0)*(g.moeda==='USD'?(params.dolar||5.85):1),0);
      const custo_b1=custo_ouro+(b1.mao_obra||0)+(b1.mao_obra2||0)+custo_gemas+(b1.outros||0)+(b1.silicone||0);
      const custo_b2=Object.values(b2).reduce((a,v)=>a+(v||0),0);
      const custo_total=custo_b1+custo_b2;
      const desp_pct=((b3.cartao||0)+(b3.marketing||0)+(b3.comissao||0)+(b3.cashback||0)+(b3.tributos||0))/100;
      const preco_ideal=o.preco_direto||(desp_pct<1?custo_total*(b3.markup||3.2)/(1-desp_pct):custo_total*(b3.markup||3.2));
      const tipoBadge={joia_nova:'badge-gold',conserto:'badge-blue',ressignificar:'badge-green',produto_pronto:'badge-gray'};
      const tipoLabel={joia_nova:'✦ Joia Nova',conserto:'◈ Conserto',ressignificar:'◇ Ressignificar',produto_pronto:'◻ Produto Pronto'};
      return`<tr>
        <td>${fmtDate(o.data)}</td>
        <td><span class="badge ${tipoBadge[o.tipo]||'badge-gray'}">${tipoLabel[o.tipo]||o.tipo||'—'}</span></td>
        <td>${clienteNome(o.cliente_id)}</td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.descricao||'—'}</td>
        ${verCusto()?`<td>${fmt(custo_total)}</td><td class="fw-600" style="color:var(--verde)">${fmt(preco_ideal)}</td>`:''}
        <td><span class="badge ${o.status==='enviado'?'badge-blue':'badge-gray'}">${o.status||'rascunho'}</span></td>
        <td><div class="td-actions">
          <button class="btn btn-xs btn-outline" onclick="editOrcamento(${o.id})">Ver</button>
          <button class="btn btn-xs btn-outline" onclick="imprimirOrcamento(${o.id})">🖨 Imprimir</button>
          <button class="btn btn-xs btn-gold" onclick="openFichaTecnicaModal(${o.id})" title="Gerar Ficha Técnica">✦ Ficha</button>
          <button class="btn btn-xs btn-outline" onclick="gerarPropostaDeOrc(${o.id})">→ Proposta</button>
          ${(()=>{const osVinc=DB.os.filter(x=>x.orcamento_id==o.id);return osVinc.length?osVinc.map(x=>`<span onclick="openOSModal(${x.id})" style="font-size:10px;background:var(--azul);color:var(--ouro-claro);padding:2px 8px;border-radius:10px;cursor:pointer" title="OS vinculada">⚙ OS #${x.id}</span>`).join(''):`<button class="btn btn-xs btn-outline" onclick="criarOSDeOrcamento(${o.id})" title="Criar OS a partir deste orçamento">+ OS</button>`;})()}
          ${podeExcluir()?`<button class="btn btn-xs btn-danger" onclick="excluirOrcamento(${o.id})">✕</button>`:''}
        </div></td>
      </tr>`;
    }).join('')||'<tr><td colspan="8" class="text-center text-suave" style="padding:32px">Nenhum orçamento</td></tr>'}
    ${_pagBtnHTML(_oOrdenados.length,_oPag.length,'_pagMaisOrcamentos()')}
    </tbody></table>
  </div>`;
}
function _pagMaisOrcamentos(){
  _PAG['orcamentos']=(_PAG['orcamentos']||_PAG_TAMANHO)+_PAG_TAMANHO;
  renderOrcamentos(document.getElementById('content'));
}

function excluirOrcamento(id){
  const o=DB.orcamentos.find(x=>x.id==id);if(!o)return;
  confirmarAcao(
    'Excluir orçamento?',
    (o.descricao||'Orçamento #'+id)+' será removido permanentemente, junto com as propostas vinculadas.',
    'Excluir',
    function(){
      DB.orcamentos=DB.orcamentos.filter(x=>x.id!==id);
      DB.propostas=DB.propostas.filter(p=>p.orcamento_id!==id);
      saveDB();
      showToast('Orçamento excluído');
      renderOrcamentos(document.getElementById('content'));
    }
  );
}

function calcOrc(){
  const p=ORC.params;
  const au18k_liq=p.au24k*p.conv18k*(1-p.perda/100);
  const pouro=parseFloat(document.getElementById('b1-pouro')?.value)||0;
  const custo_ouro=pouro*au18k_liq;
  const el=document.getElementById('b1-couro');if(el)el.value=fmt(custo_ouro);
  // MO Ourives: auto por peso (pode ser sobrescrito manualmente)
  const taxa_mo=ORC.params.taxa_mo||120;
  if(!ORC.b1._mdoManual){
    const autoMdo=Math.round(pouro*taxa_mo);
    ORC.b1.mao_obra=autoMdo;
    const mdoEl=document.getElementById('b1-mdo');
    if(mdoEl)mdoEl.value=autoMdo;
  }
  const mdo=parseFloat(document.getElementById('b1-mdo')?.value)||0;
  const mdo2=parseFloat(document.getElementById('b1-mdo2')?.value)||0;
  const outros=parseFloat(document.getElementById('b1-outros')?.value)||0;
  const custo_gemas=ORC.b1.gemas.reduce((a,g)=>a+g.qtd*g.custo*(g.moeda==='USD'?p.dolar:1),0);
  const custo_b1=custo_ouro+mdo+mdo2+custo_gemas+outros;
  const b2_emb=parseFloat(document.getElementById('b2-emb')?.value)||0;
  const b2_saco=parseFloat(document.getElementById('b2-saco')?.value)||0;
  const b2_sacola=parseFloat(document.getElementById('b2-sacola')?.value)||0;
  const b2_flanela=parseFloat(document.getElementById('b2-flanela')?.value)||0;
  const b2_cert=parseFloat(document.getElementById('b2-cert')?.value)||0;
  const b2_tag=parseFloat(document.getElementById('b2-tag')?.value)||0;
  const custo_b2=b2_emb+b2_saco+b2_sacola+b2_flanela+b2_cert+b2_tag;
  const custo_total=custo_b1+custo_b2;

  const cartao=parseFloat(document.getElementById('b3-cartao')?.value)||0;
  const mkt=parseFloat(document.getElementById('b3-mkt')?.value)||0;
  const com=parseFloat(document.getElementById('b3-com')?.value)||0;
  const cash=parseFloat(document.getElementById('b3-cash')?.value)||0;
  const trib=parseFloat(document.getElementById('b3-trib')?.value)||0;
  const markup=parseFloat(document.getElementById('b3-markup')?.value)||3.2;
  const desc_max=parseFloat(document.getElementById('b3-desc')?.value)||10;
  const margem_alvo=parseFloat(document.getElementById('b3-margem-alvo')?.value)||25;
  const desp_pct=(cartao+mkt+com+cash+trib)/100;

  // ═══ FÓRMULA CORRETA (igual à planilha) ═══
  // Preço mínimo: cobre custo + despesas variáveis, margem zero
  const preco_minimo=desp_pct<1?custo_total/(1-desp_pct):custo_total*2;
  // Preço ideal: custo × markup (markup já embute a margem desejada)
  const preco_ideal=custo_total*markup;
  // Preço à vista: desconto sobre o ideal
  const preco_vista=preco_ideal*(1-desc_max/100);
  // Lucro e margem líquida
  const lucro=preco_ideal-custo_total-(preco_ideal*desp_pct);
  const margem=preco_ideal>0?(lucro/preco_ideal)*100:0;
  // Status automático
  const status_ok=custo_total>0&&margem>=margem_alvo;
  const status_zero=custo_total===0;

  // Preço manual (override)
  const manualChk=document.getElementById('orc-preco-manual');
  const useManual=manualChk&&manualChk.checked;
  const preco_final=useManual?(parseFloat(document.getElementById('orc-preco-manual-val')?.value)||preco_ideal):preco_ideal;
  const preco_vista_final=useManual?(parseFloat(document.getElementById('orc-preco-vista-val')?.value)||preco_vista):preco_vista;
  const lucro_final=preco_final-custo_total-(preco_final*desp_pct);
  const margem_final=preco_final>0?(lucro_final/preco_final)*100:0;
  const status_ok_final=!useManual?status_ok:(custo_total>0&&margem_final>=margem_alvo);

  const res=document.getElementById('orc-prices');
  if(!res)return;

  const statusHtml=status_zero?'':`
    <div style="text-align:center;margin-top:16px">
      ${status_ok_final
        ?`<div style="background:#1a4a2e;border:1.5px solid #6fcf97;border-radius:8px;padding:12px 20px;display:inline-flex;align-items:center;gap:10px">
            <span style="font-size:20px">✅</span>
            <div style="text-align:left">
              <p style="font-size:11px;letter-spacing:.14em;color:#6fcf97;font-weight:600;text-transform:uppercase">Venda Aprovada</p>
              <p style="font-size:12px;color:rgba(255,255,255,.7)">Margem ${fmtN(useManual?margem_final:margem,1)}% ≥ alvo ${fmtN(margem_alvo,0)}%</p>
            </div>
          </div>`
        :`<div style="background:#4a1a1a;border:1.5px solid #eb5757;border-radius:8px;padding:12px 20px;display:inline-flex;align-items:center;gap:10px">
            <span style="font-size:20px">⚠️</span>
            <div style="text-align:left">
              <p style="font-size:11px;letter-spacing:.14em;color:#eb5757;font-weight:600;text-transform:uppercase">Rever Preço</p>
              <p style="font-size:12px;color:rgba(255,255,255,.7)">Margem ${fmtN(useManual?margem_final:margem,1)}% &lt; alvo ${fmtN(margem_alvo,0)}% — aumente o markup</p>
            </div>
          </div>`}
    </div>`;

  res.innerHTML=`
    <div class="price-row"><span>Custo Total</span><span class="fw-600">${fmt(custo_total)}</span></div>
    <div class="price-row"><span>Despesas Variáveis</span><span>${fmtN(desp_pct*100,1)}%</span></div>
    <div class="price-row" style="opacity:.75"><span>Preço Mínimo Viável</span><span>${fmt(preco_minimo)}</span></div>
    <div style="text-align:center;padding:18px 0;border-top:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.1);margin:12px 0">
      <p style="font-size:11px;letter-spacing:.12em;color:rgba(176,142,86,.7);margin-bottom:4px;text-transform:uppercase">${useManual?'Preço Manual':'Preço Ideal Sugerido'}</p>
      <p class="price-ideal">${fmt(preco_final)}</p>
      <p style="font-size:13px;color:rgba(255,255,255,.6);margin-top:4px">${markup}× custo</p>
    </div>
    <div class="price-row"><span>Preço à Vista / PIX</span><span class="fw-600">${fmt(preco_vista_final)}</span></div>
    <div class="price-row"><span>Lucro Líquido Estimado</span><span style="color:${lucro_final>0?'#6fcf97':'#eb5757'};font-weight:600">${fmt(lucro_final)}</span></div>
    <div class="price-row"><span>Margem Líquida Estimada</span><span style="color:${(useManual?margem_final:margem)>=margem_alvo?'#6fcf97':'#eb5757'};font-weight:600">${fmtN(useManual?margem_final:margem,1)}%</span></div>
    ${statusHtml}`;
}

function calcRessig(){

  const mat=parseFloat(document.getElementById('res-mat')?.value)||0;
  const gem=parseFloat(document.getElementById('res-gem')?.value)||0;

// WIDGET DE MÍDIA — imagens + vídeos (reutilizável)
// ═══════════════════════════════════════════════════════════════════
var _MIDIA = {};

function midiaWidget(key, maxFiles, label) {
  maxFiles = maxFiles || 6;
  label = label || 'Adicionar Mídia';
  return '<div class="midia-widget" data-key="'+key+'" data-max="'+maxFiles+'">'
    +'<div class="midia-preview" id="midia-prev-'+key+'"></div>'
    +'<div class="midia-actions">'
    +'<input type="file" id="midia-input-'+key+'" accept="image/*,video/*" multiple style="display:none"'
    +' onchange="midiaAdicionarArquivos(event,\''+key+'\')">'
    +'<button type="button" class="btn btn-sm btn-outline midia-btn-add" onclick="document.getElementById(\'midia-input-'+key+'\').click()">📷 Inserir Imagem / Vídeo</button>'
    +'<span class="midia-hint">Imagens até 5 MB · Vídeos até 20 MB · máx. '+maxFiles+' arquivo(s)<br>Clique no <strong>×</strong> sobre a miniatura para excluir</span>'
    +'</div></div>';
}

function midiaInit(key, arr) {
  _MIDIA[key] = (arr && arr.length) ? arr.slice() : [];
}

function midiaGet(key) {
  return _MIDIA[key] || [];
}

function midiaAdicionarArquivos(e, key) {
  var files = Array.from(e.target.files);
  var widget = document.querySelector('.midia-widget[data-key="'+key+'"]');
  var max = widget ? parseInt(widget.getAttribute('data-max')) : 6;
  var atual = (_MIDIA[key]||[]).length;
  var restam = max - atual;
  if (restam <= 0) { showToast('Limite de '+max+' arquivos atingido','warn'); return; }
  files.slice(0, restam).forEach(function(f) {
    var tipo = f.type.startsWith('video/') ? 'vid' : 'img';
    var limMB = tipo === 'vid' ? 20 : 5;
    if (f.size > limMB * 1024 * 1024) { showToast(f.name+' excede '+limMB+'MB','warn'); return; }
    if (tipo === 'img') {
      var imgEl = new Image();
      var url = URL.createObjectURL(f);
      imgEl.onload = function() {
        URL.revokeObjectURL(url);
        var MAX = 800, w = imgEl.naturalWidth, h = imgEl.naturalHeight;
        if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
        var cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(imgEl, 0, 0, w, h);
        var b64 = cv.toDataURL('image/jpeg', 0.70);
        if (!_MIDIA[key]) _MIDIA[key] = [];
        _MIDIA[key].push({tipo:'img', src:b64, nome:f.name});
        midiaRenderPreview(key);
      };
      imgEl.src = url;
    } else {
      var r = new FileReader();
      r.onload = function(ev) {
        if (!_MIDIA[key]) _MIDIA[key] = [];
        _MIDIA[key].push({tipo:'vid', src:ev.target.result, nome:f.name});
        midiaRenderPreview(key);
      };
      r.readAsDataURL(f);
    }
  });
  e.target.value = '';
}

function midiaRenderPreview(key) {
  var el = document.getElementById('midia-prev-'+key);
  if (!el) return;
  var arr = _MIDIA[key] || [];
  if (!arr.length) {
    el.innerHTML = '<div class="midia-empty">Nenhuma mídia adicionada</div>';
    return;
  }
  var html = '<div class="midia-thumbs">';
  for (var i = 0; i < arr.length; i++) {
    var m = arr[i];
    html += '<div class="midia-thumb">';
    if (m.tipo === 'img') {
      html += '<img src="'+m.src+'" onclick="midiaVerItem(\''+key+'\','+i+')" title="'+m.nome+'" class="midia-thumb-img">';
    } else {
      html += '<div class="midia-thumb-vid" onclick="midiaVerItem(\''+key+'\','+i+')" title="'+m.nome+'">'
        +'<span class="midia-play">▶</span>'
        +'<span class="midia-vidname">'+m.nome+'</span>'
        +'</div>';
    }
    html += '<button type="button" class="midia-del" onclick="midiaRemover(\''+key+'\','+i+')" title="Excluir">×</button>';
    html += '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

function midiaRemover(key, idx) {
  if (!_MIDIA[key]) return;
  _MIDIA[key].splice(idx, 1);
  midiaRenderPreview(key);
}

function midiaVerItem(key, idx) {
  var m = (_MIDIA[key]||[])[idx];
  if (!m) return;
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:12px';
  if (m.tipo === 'img') {
    d.innerHTML = '<img src="'+m.src+'" style="max-width:92vw;max-height:88vh;border-radius:8px;display:block"><span style="color:rgba(255,255,255,.5);font-size:12px">Toque para fechar</span>';
    d.onclick = function(){ d.remove(); };
  } else {
    d.innerHTML = '<video src="'+m.src+'" controls style="max-width:92vw;max-height:82vh;border-radius:8px;display:block"></video><span style="color:rgba(255,255,255,.5);font-size:12px">Toque fora para fechar</span>';
    d.onclick = function(ev){ if(ev.target.tagName!=='VIDEO') d.remove(); };
  }
  document.body.appendChild(d);
}

function preencherProdutoColecao(){
  const sel = document.getElementById('pp-colecao');
  const opt = sel.options[sel.selectedIndex];
  if(opt && opt.dataset.preco){
    const preco = parseFloat(opt.dataset.preco)||0;
    const el = document.getElementById('pp-preco');
    if(el){ el.value = preco; }
    const vista = document.getElementById('pp-preco-vista');
    if(vista){ vista.value = Math.round(preco*0.95); } // 5% desconto à vista
    calcProdutoPronto();
  }
}

function calcProdutoPronto(){
  const preco = parseFloat(document.getElementById('pp-preco')?.value)||0;
  const vista = parseFloat(document.getElementById('pp-preco-vista')?.value)||0;
  const custo = parseFloat(document.getElementById('pp-custo')?.value)||0;
  const lucro = preco - custo;
  const margem = preco>0 ? (lucro/preco*100) : 0;
  const el = document.getElementById('pp-prices');
  if(!el||preco===0){if(el)el.innerHTML='<p class="text-suave">Informe o preço de venda para visualizar…</p>';return;}
  el.innerHTML = `
    <div class="price-row"><span>Preço de Venda</span><span class="fw-600">${fmt(preco)}</span></div>
    ${vista>0?`<div class="price-row"><span>À Vista / PIX</span><span>${fmt(vista)}</span></div>`:''}
    ${verCusto()&&custo>0?`<div class="price-row"><span>Custo</span><span>${fmt(custo)}</span></div>
    <div class="price-row"><span>Lucro Bruto</span><span style="color:${lucro>=0?'#7ec8a0':'#E74C3C'}">${fmt(lucro)}</span></div>
    <div class="price-row"><span>Margem</span><span style="color:${margem>=30?'#7ec8a0':'#E74C3C'}">${fmtN(margem,1)}%</span></div>`:''}
    <div style="text-align:center;padding:12px 0">
      <p style="font-size:11px;letter-spacing:.1em;color:rgba(176,142,86,.7);margin-bottom:4px">PREÇO IDEAL</p>
      <p class="price-ideal">${fmt(preco)}</p>
    </div>`;
}

function togglePrecoManual(){

function editOrcamento(id){
  const o=DB.orcamentos.find(x=>x.id==id);if(!o)return;
  // Converter fotos antigas (strings) para formato novo {tipo,src,nome}
  var fotosConvertidas=(o.fotos||[]).map(function(f){
    if(typeof f==='string') return {tipo:'img',src:f,nome:'foto'};
    return f;
  });
  midiaInit('orc', fotosConvertidas);
  ORC={tipo:o.tipo,params:{...o.params},b1:{...o.bloco1,gemas:[...(o.bloco1?.gemas||[])]},
    b2:{...o.bloco2},b3:{...o.bloco3},fotos:[]};
  renderOrcForm();
  setTimeout(function(){
    _initOrcMidia();
    setTimeout(function(){
      const cl=document.getElementById('orc-cl');if(cl)cl.value=o.cliente_id;
      const desc=document.getElementById('orc-desc');if(desc)desc.value=o.descricao;
      if(ORC.tipo==='produto_pronto'){
        const pp=document.getElementById('pp-preco');if(pp&&o.preco_direto)pp.value=o.preco_direto;
        const ppv=document.getElementById('pp-preco-vista');if(ppv&&o.preco_vista_direto)ppv.value=o.preco_vista_direto;
        const ppc=document.getElementById('pp-custo');if(ppc&&o.custo_direto)ppc.value=o.custo_direto;
        const ppo=document.getElementById('pp-obs');if(ppo&&o.obs_pp)ppo.value=o.obs_pp;
        calcProdutoPronto();
      } else if(ORC.tipo==='joia_nova'){
        calcOrc();
      } else if(ORC.tipo==='conserto'){
        // Restaurar campos do formulário de conserto a partir do ORC.b1 salvo
        const b1=ORC.b1;
        const emdo=document.getElementById('cons-mdo');if(emdo)emdo.value=b1.mao_obra||0;
        const emat=document.getElementById('cons-mat');if(emat)emat.value=b1.mao_obra2||0;
        const eout=document.getElementById('cons-out');if(eout)eout.value=b1.outros||0;
        const eprob=document.getElementById('cons-prob');if(eprob)eprob.value=b1.obs_conserto||'';
        // Restaurar checkboxes de intervenção
        if(b1.intervencoes&&b1.intervencoes.length){
          document.querySelectorAll('input[name="interv"]').forEach(el=>{
            el.checked=b1.intervencoes.includes(el.value);
          });
        }
        calcConserto();
      } else if(ORC.tipo==='ressignificar'){
        // Restaurar campos do formulário de ressignificação a partir do ORC.b1 salvo
        const b1=ORC.b1;
        const epbr=document.getElementById('res-pbr');if(epbr)epbr.value=b1.peso_bruto||0;
        const epliq=document.getElementById('res-pliq');if(epliq)epliq.value=b1.peso_liquido||0;
        const ecot=document.getElementById('res-cot');if(ecot)ecot.value=b1.cotacao_base||ORC.params.au24k;
        const emdo=document.getElementById('res-mdo');if(emdo)emdo.value=b1.mao_obra||0;
        const emat=document.getElementById('res-mat');if(emat)emat.value=b1.mao_obra2||0;
        const egem=document.getElementById('res-gem');if(egem)egem.value=b1.outros||0;
        const etrat=document.getElementById('res-trat');if(etrat&&b1.tratamento)etrat.value=b1.tratamento;
        const epub=document.getElementById('res-pur');if(epub&&b1.pureza)epub.value=b1.pureza;
        calcRessig();
      }
      midiaRenderPreview('orc');
    },60);
  },60);
}

function gerarPropostaDeOrc(id){
  const o=DB.orcamentos.find(x=>x.id==id);if(!o)return;
  const cl=DB.clientes.find(c=>c.id==o.cliente_id)||{};
  const saldo=calcSaldoCliente(o.cliente_id||0);
  // Para produto_pronto, o preço vem direto do campo
  if(o.tipo==='produto_pronto'){
    renderPropostaForm(o, o.preco_direto||0, cl, saldo);
    return;
  }
  const p=o.params||{au24k:757.05,conv18k:0.75,perda:10,dolar:5.85};
  const au18k_liq=p.au24k*p.conv18k*(1-p.perda/100);
  const b1=o.bloco1||{};const b2=o.bloco2||{};const b3=o.bloco3||{};
  const custo_ouro=(b1.peso_ouro||0)*au18k_liq;
  const custo_gemas=(b1.gemas||[]).reduce((a,g)=>a+g.qtd*g.custo*(g.moeda==='USD'?p.dolar:1),0);
  const custo_b1=custo_ouro+(b1.mao_obra||0)+(b1.mao_obra2||0)+custo_gemas+(b1.outros||0);
  const custo_b2=Object.values(b2).reduce((a,v)=>a+(typeof v==='number'?v:0),0);
  const custo_total=custo_b1+custo_b2;
  const desp_pct=((b3.cartao||0)+(b3.marketing||0)+(b3.comissao||0)+(b3.cashback||0)+(b3.tributos||0))/100;
  const preco_ideal=o.preco_direto||(desp_pct<1?custo_total*(b3.markup||3.2)/(1-desp_pct):custo_total*(b3.markup||3.2));
  renderPropostaForm(o,preco_ideal,cl,saldo);
}

function calcReserva(){
  const p=DB.params_reserva;
  const pur_map={'18k':0.75,'14k':0.585,'24k':0.999};
  const pur_str=document.getElementById('ro-pur')?.value||'18k';
  const pur_f=pur_map[pur_str]||0.75;
  const pliq=parseFloat(document.getElementById('ro-pliq')?.value)||0;
  const bonus=parseFloat(document.getElementById('ro-bonus')?.value)||p.bonus_pct;
  const cot18k_bruta=p.au24k*pur_f;
  const cot18k_liq=cot18k_bruta*(1-p.perda/100);
  const valor_base=pliq*cot18k_liq;
  const credito=valor_base*(1+bonus/100);
  const el=id=>document.getElementById(id);
  if(el('ro-credito-val'))el('ro-credito-val').textContent=fmt(credito);
  if(el('ro-cot-display'))el('ro-cot-display').textContent=`Cotação: ${fmt(cot18k_liq)}/g · Peso: ${fmtN(pliq,2)}g`;
  const rows=el('ro-calc-rows');
  if(rows)rows.innerHTML=`
    <div class="extrato-row"><span>Cotação Au 18k bruta</span><span>${fmt(cot18k_bruta)}/g</span></div>
    <div class="extrato-row"><span>Perda de fundição (${p.perda}%)</span><span>− ${fmt(cot18k_bruta*p.perda/100)}/g</span></div>
    <div class="extrato-row"><span>Cotação Au 18k líquida</span><span class="fw-600">${fmt(cot18k_liq)}/g</span></div>
    <div class="extrato-row"><span>Valor base (${fmtN(pliq,2)}g × ${fmt(cot18k_liq)})</span><span>${fmt(valor_base)}</span></div>
    <div class="extrato-row"><span>Bônus (+${bonus}%)</span><span class="extrato-credit">+ ${fmt(valor_base*bonus/100)}</span></div>
    <div class="extrato-row fw-600"><span>Crédito Total</span><span class="extrato-credit" style="font-size:16px">${fmt(credito)}</span></div>`;
}

function salvarEntradaOuro(){
  const p=DB.params_reserva;
  const pur_map={'18k':0.75,'14k':0.585,'24k':0.999};
  const pur_str=document.getElementById('ro-pur').value;
  const pur_f=pur_map[pur_str]||0.75;
  const pliq=parseFloat(document.getElementById('ro-pliq').value)||0;
  const pbr=parseFloat(document.getElementById('ro-pbr').value)||0;
  const bonus=parseFloat(document.getElementById('ro-bonus').value)||p.bonus_pct;
  const cot18k_liq=p.au24k*pur_f*(1-p.perda/100);
  const valor_base=pliq*cot18k_liq;
  const credito=valor_base*(1+bonus/100);
  if(!pliq||!credito){showToast('Preencha o peso líquido','danger');return;}
  const obj={id:DB.nextId('entradas_ouro'),
    cliente_id:parseInt(document.getElementById('ro-cl').value),
    data:document.getElementById('ro-data').value,
    qtd_pecas:parseInt(document.getElementById('ro-qtd').value)||1,
    peso_bruto:pbr,peso_liquido:pliq,
    pureza:pur_str,pureza_fator:pur_f,
    au24k_cot:p.au24k,dolar:p.dolar,perda:p.perda,bonus,
    cotacao_18k_liq:cot18k_liq,valor_base,credito,
    obs:document.getElementById('ro-obs').value};
  DB.entradas_ouro.push(obj);
  saveDB();
  showToast(`Crédito de ${fmt(credito)} registrado! Gerando recibo…`,'success');
  setTimeout(()=>gerarReciboOuro(obj.id),400);
  navTo('reserva_dash');
}

function imprimirReciboOuro(){
  var html=window._reciboOuroHTML||'';
  if(!html){showToast('Abra o recibo primeiro','warn');return;}
  var htmlComPrint=html.replace('</body>','<script>window.onload=function(){window.print();}<\/script></body>');
  var w=window.open('','_blank','width=600,height=800');
  if(w){w.document.write(htmlComPrint);w.document.close();}
  else{
    // Safari: cria iframe temporário para impressão
    var iframe=document.createElement('iframe');
    iframe.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px';
    document.body.appendChild(iframe);
    iframe.contentDocument.write(html);
    iframe.contentDocument.close();
    setTimeout(function(){iframe.contentWindow.print();document.body.removeChild(iframe);},300);
  }
}

function gerarPDFReciboOuro(){
  // Abre em nova aba para salvar como PDF via "Imprimir → Salvar como PDF"
  var html=window._reciboOuroHTML||'';
  if(!html){showToast('Gere o recibo primeiro','warn');return;}
  var blob=new Blob([html],{type:'text/html'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='recibo-ouro.html';a.click();
  URL.revokeObjectURL(url);
  showToast('Arquivo baixado. Abra e use Imprimir → Salvar como PDF','info');
}

function renderCarteiras(c){

  const movs=[...entr.map(e=>({data:e.data,tipo:'entrada',valor:e.credito,desc:`${e.qtd_pecas} peças · ${fmtN(e.peso_liquido,2)}g · cot. ${fmt(e.cotacao_18k_liq)}/g`})),
              ...usos.map(u=>({data:u.data,tipo:'uso',valor:u.valor_usado,desc:u.descricao}))].sort((a,b)=>b.data.localeCompare(a.data));
  const div=document.createElement('div');div.className='modal-overlay';div.id='modal-carteira';

        <p class="reserva-saldo">${fmt(saldo)}</p>
      </div>
      <h4 style="font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--azul);margin-bottom:12px">Extrato Completo</h4>
      ${movs.map(m=>`<div class="extrato-row">
        <div>
          <span class="badge ${m.tipo==='entrada'?'badge-green':'badge-yellow'}">${m.tipo==='entrada'?'Entrada de Ouro':'Utilizado'}</span>
          <span style="font-size:12px;margin-left:10px">${m.desc}</span>
          <br><span style="font-size:11px;color:var(--texto-suave);margin-left:60px">${fmtDate(m.data)}</span>
        </div>
        <span class="${m.tipo==='entrada'?'extrato-credit':'extrato-debit'} fw-600">${m.tipo==='entrada'?'+':'−'}${fmt(m.valor)}</span>
      </div>`).join('')||'<p class="text-suave text-center" style="padding:24px">Sem movimentações</p>'}
      <div style="padding:14px 0;border-top:2px solid var(--borda);display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <span class="fw-600">Saldo Final</span>
        <span class="extrato-credit fw-600" style="font-size:18px">${fmt(saldo)}</span>
      </div>
      <div style="margin-top:14px;padding:12px 14px;background:var(--fundo);border-radius:5px;font-size:12px;color:var(--texto-suave)">
        Limite de uso por venda: ${DB.params_reserva.limite_uso_pct}% do valor · Validade: ${DB.params_reserva.validade_meses} meses
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('modal-carteira')">Fechar</button></div>
  </div>`;
  document.body.appendChild(div);
}

  </div>`;

}
function saveFin(){
  const obj={id:DB.nextId('financeiro'),data:document.getElementById('fin-data').value,
    tipo:document.getElementById('fin-tipo').value,categoria:document.getElementById('fin-cat').value,
    descricao:document.getElementById('fin-desc').value,forma:document.getElementById('fin-forma').value,
    valor:parseFloat(document.getElementById('fin-valor').value)||0};
  if(!obj.valor||!obj.descricao){showToast('Preencha valor e descrição','danger');return;}
  DB.financeiro.push(obj);saveDB();closeModal('modal-fin');showToast('Lançamento salvo');
  renderFinanceiro(document.getElementById('content'));
}
function excluirFin(id){
  confirmarAcao('Excluir lançamento?','',  'Excluir',function(){
    DB.financeiro=DB.financeiro.filter(f=>f.id!==id);
    saveDB();
    renderFinanceiro(document.getElementById('content'));
  });
}

function calcVenda(){
  var total=parseFloat(document.getElementById('vd-total')?.value)||0;
  var forma=document.getElementById('vd-forma')?.value||'PIX';
  var el=document.getElementById('vd-resumo');if(!el)return;
  if(!total){if(el)el.innerHTML='Preencha o valor.';return;}

  if(forma==='Misto'){
    var pix=parseFloat(document.getElementById('mx-pix')?.value)||0;
    var cartao=parseFloat(document.getElementById('mx-cartao')?.value)||0;
    var din=parseFloat(document.getElementById('mx-dinheiro')?.value)||0;
    var res=parseFloat(document.getElementById('mx-reserva')?.value)||0;
    var out=parseFloat(document.getElementById('mx-outro')?.value)||0;
    var soma=pix+cartao+din+res+out;
    var resto=total-soma;
    var cor=Math.abs(resto)<0.01?'var(--verde)':'#eb5757';
    var msg=Math.abs(resto)<0.01?'✅ Completo':(resto>0?'⚠ Faltam '+fmt(resto):'⚠ Excede '+fmt(Math.abs(resto)));
    var partes=[];
    if(pix>0)partes.push('PIX: '+fmt(pix));
    if(cartao>0)partes.push('Cartão: '+fmt(cartao));
    if(din>0)partes.push('Dinheiro: '+fmt(din));
    if(res>0)partes.push('Reserva: '+fmt(res));
    if(out>0)partes.push((document.getElementById('mx-outro-desc')?.value||'Outro')+': '+fmt(out));
    el.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center">'
      +'<span style="color:'+cor+';font-weight:600">'+msg+'</span>'
      +'<span style="font-size:18px;font-weight:700;color:var(--ouro)">'+fmt(total)+'</span></div>'
      +'<div style="font-size:12px;color:var(--texto-suave);margin-top:4px">'+partes.join(' · ')+'</div>';
  } else if(forma==='Reserva'){
    var reserva=parseFloat(document.getElementById('vd-reserva')?.value)||0;
    var caixa=Math.max(0,total-reserva);
    el.innerHTML='<div style="display:flex;justify-content:space-between">'
      +'<span>Reserva: <strong>'+fmt(reserva)+'</strong> · Em caixa: <strong>'+fmt(caixa)+'</strong></span>'
      +'<span style="font-weight:700;color:var(--ouro)">'+fmt(total)+'</span></div>';
  } else {
    el.innerHTML='<div style="text-align:center"><span style="font-size:18px;font-weight:700;color:var(--ouro)">'+fmt(total)+'</span> <span style="font-size:14px">via '+forma+'</span></div>';
  }
}
function saveVenda(){
  var cid=parseInt(document.getElementById('vd-cl')?.value)||null;
  var total=parseFloat(document.getElementById('vd-total')?.value)||0;
  var forma=document.getElementById('vd-forma')?.value||'PIX';
  var desc=(document.getElementById('vd-desc')?.value||'').trim();
  var data=document.getElementById('vd-data')?.value||today();
  var colab=document.getElementById('vd-colab')?.value||'';
  var pid=parseInt(document.getElementById('vd-produto')?.value)||null;

  if(!total){showToast('Valor obrigatório','danger');return;}
  if(!desc){showToast('Descrição obrigatória','danger');return;}

  var reserva=0,emCaixa=total,pgtoDetalhes=null;

  if(forma==='Misto'){
    var pix=parseFloat(document.getElementById('mx-pix')?.value)||0;
    var cartao=parseFloat(document.getElementById('mx-cartao')?.value)||0;
    var din=parseFloat(document.getElementById('mx-dinheiro')?.value)||0;
    var res=parseFloat(document.getElementById('mx-reserva')?.value)||0;
    var out=parseFloat(document.getElementById('mx-outro')?.value)||0;
    var outDesc=document.getElementById('mx-outro-desc')?.value||'';
    var soma=pix+cartao+din+res+out;
    if(Math.abs(soma-total)>0.5){showToast('Valores do pagamento Misto não fecham com o total','danger');return;}
    reserva=res;
    emCaixa=pix+cartao+din+out;
    pgtoDetalhes={pix,cartao,dinheiro:din,reserva:res,outro:out,outro_desc:outDesc};
  } else if(forma==='Reserva'){
    reserva=parseFloat(document.getElementById('vd-reserva')?.value)||0;
    var saldo=calcSaldoCliente(cid||0);
    if(reserva>saldo){showToast('Saldo Reserva insuficiente','danger');return;}
    emCaixa=Math.max(0,total-reserva);
  }

  if(reserva>0&&cid){
    var limRes=calcLimiteReserva(total,calcSaldoCliente(cid));
    if(reserva>limRes+0.5&&!podeOverrideReserva()){
      showToast('Reserva excede o limite de '+(DB.params_reserva.limite_uso_pct||40)+'% (máx '+fmt(limRes)+')','danger');return;
    }
    var entr=DB.entradas_ouro.filter(function(e){return e.cliente_id==cid;});
    if(entr.length>0){
      DB.vendas_credito.push({id:DB.nextId('vendas_credito'),cliente_id:cid,data,entrada_ouro_id:entr[0].id,valor_usado:reserva,descricao:desc});
    }
  }

  var obj={id:DB.nextId('vendas'),data,cliente_id:cid,descricao:desc,produto_id:pid,
    valor_total:total,valor_em_caixa:emCaixa,credito_ouro_aplic:reserva,
    forma_pgto:forma,pgto_detalhes:pgtoDetalhes,colaborador:colab};
  DB.vendas.push(obj);

  if(pid){var prod=DB.colecao.find(function(x){return x.id===pid;});if(prod)prod.estoque=Math.max(0,prod.estoque-1);}
  if(emCaixa>0)DB.financeiro.push({id:DB.nextId('financeiro'),data,tipo:'entrada',categoria:'Venda',descricao:desc,forma:forma,valor:emCaixa});

  var _cl=DB.clientes.find(function(c){return c.id==cid;});
  if(_cl)_cl.ltv=DB.vendas.filter(function(v){return v.cliente_id==cid;}).reduce(function(a,v){return a+(v.valor_total||0);},0);

  saveDB();
  closeModal('modal-venda');
  showToast('✦ Venda registrada!','success');
  renderVendas(document.getElementById('content'));
}

function openCashModal(){
  const div=document.createElement('div');div.className='modal-overlay';div.id='modal-cash';
  div.innerHTML=`<div class="modal">
    <div class="modal-header"><span class="modal-title">Registrar Cashback</span><button class="modal-close" onclick="closeModal('modal-cash')">×</button></div>
    <div class="modal-body">
      <div class="form-grid" style="gap:14px">

          ${DB.clientes.map(cl=>`<option value="${cl.id}">${cl.nome}</option>`).join('')}

        <div class="form-group"><label>Valor da Compra (R$)</label><input id="cb-comp" type="number" step="10" value="0" oninput="calcCash()"></div>
        <div class="form-group"><label>Cashback Gerado</label><input id="cb-gerado" readonly style="background:#eee;font-size:15px"></div>
        <div class="form-group"><label>Data</label><input id="cb-data" type="date" value="${today()}"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('modal-cash')">Cancelar</button><button class="btn btn-primary" onclick="saveCash()">Registrar</button></div>
  </div>`;

function calcCash(){
  const pct=parseFloat(document.getElementById('cb-pct')?.value)||3;
  const comp=parseFloat(document.getElementById('cb-comp')?.value)||0;
  const el=document.getElementById('cb-gerado');if(el)el.value=fmt(comp*pct/100);
}
function saveCash(){
  const cid=parseInt(document.getElementById('cb-cl').value);
  const pct=parseFloat(document.getElementById('cb-pct').value)||3;
  const comp=parseFloat(document.getElementById('cb-comp').value)||0;
  const gerado=comp*pct/100;
  if(!gerado){showToast('Valor obrigatório','danger');return;}
  let cb=DB.cashback.find(x=>x.cliente_id==cid);
  const entry={data:document.getElementById('cb-data').value,valor:gerado,descricao:`Cashback compra ${fmt(comp)}`};
  if(cb){cb.saldo+=gerado;cb.historico.push(entry);}
  else DB.cashback.push({id:DB.nextId('cashback'),cliente_id:cid,percentual:pct,saldo:gerado,historico:[entry]});
  saveDB();closeModal('modal-cash');showToast(`Cashback de ${fmt(gerado)} registrado`);
  renderCashback(document.getElementById('content'));
}

  var osAtivas = DB.os.filter(function(o){return o.status!=='cancelado';});

    var etapas=DB.etapas.filter(function(e){return e.os_id==o.id;});
    var insumos=DB.uso_insumos_os.filter(function(u){return u.os_id==o.id;});
    var tdCliente = isProducao ? '' : '<td>'+clienteNome(o.cliente_id)+'</td>';
    return '<tr>'
      +'<td class="fw-600">#'+o.id+'</td>'
      +tdCliente
      +'<td><span class="badge badge-blue">'+etapas.length+' etapa(s)</span></td>'
      +'<td><span class="badge badge-gray">'+insumos.length+' insumo(s)</span></td>'
      +'<td><button class="btn btn-xs btn-outline" onclick="imprimirFicha('+o.id+')">⎙ Imprimir</button></td>'
      +'</tr>';
  }).join('');

function renderDatasClientes(c){
  const hoje=new Date();
  const todasDatas=(DB.datas_importantes||[]).filter(function(d){return d.data;}).map(function(d){
    const cl=DB.clientes.find(function(c){return c.id==d.cliente_id;})||{};
    const partes=d.data.split('-');
    if(partes.length<3)return null;
    const aniv=new Date(hoje.getFullYear(),+partes[1]-1,+partes[2]);
    if(aniv<hoje)aniv.setFullYear(hoje.getFullYear()+1);
    const diff=Math.ceil((aniv-hoje)/(1000*60*60*24));
    return{...d,cliente_nome:cl.nome||'—',dias:diff,data_fmt:partes[2]+'/'+partes[1]};
  }).filter(Boolean).sort(function(a,b){return a.dias-b.dias;});
  const proximos=todasDatas.filter(function(d){return d.dias<=30;});
  c.innerHTML=`
  <div class="page-header">
    <div><p class="page-title">Datas Importantes</p><p class="page-sub">${proximos.length} data(s) nos próximos 30 dias</p></div>
  </div>
  ${proximos.length?`<div class="alert alert-warn" style="margin-bottom:16px">
    📅 <strong>${proximos.length}</strong> data(s) próximas — oportunidade de contato proativo.
  </div>`:''}
  <div class="table-wrap"><table><thead><tr><th>Data</th><th>Tipo</th><th>Cliente</th><th>Nome Assoc.</th><th>Dias p/ data</th><th>Obs.</th></tr></thead>
  <tbody>${todasDatas.length?todasDatas.map(function(d){
    const urgente=d.dias<=7;
    const breve=d.dias<=30;

function exportarBackupJSON(){
  try{
    var snap={_ids:JSON.parse(JSON.stringify(DB._ids))};
    DB_KEYS.forEach(function(k){if(DB[k]!==undefined)snap[k]=DB[k];});
    DB_OBJ_KEYS.forEach(function(k){if(DB[k]!==undefined)snap[k]=DB[k];});
    var json=JSON.stringify(snap,null,2);
    var blob=new Blob([json],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var nomeArq='atelier-backup-'+today()+'.json';

    // iOS Safari (incluindo PWA): a.click() não dispara download —
    // abre em nova aba para o usuário salvar via Compartilhar → Arquivos
    var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
    if(isIOS){
      var win=window.open(url,'_blank');
      if(!win){
        // Pop-up bloqueado — exibe JSON em textarea para copiar
        var d=document.createElement('div');
        d.style.cssText='position:fixed;inset:0;z-index:99999;background:#fff;overflow:auto;padding:20px;font-family:monospace;font-size:11px';
        d.innerHTML='<div style="margin-bottom:12px;display:flex;gap:10px;align-items:center">'
          +'<strong style="font-size:14px">💾 Backup — copie o texto abaixo</strong>'
          +'<button onclick="this.parentNode.parentNode.remove()" style="padding:6px 12px;background:#0D1F2D;color:#fff;border:none;border-radius:4px;cursor:pointer">Fechar</button>'
          +'</div><textarea style="width:100%;height:80vh;font-size:10px;border:1px solid #ccc;border-radius:4px;padding:8px">'+json+'</textarea>';
        document.body.appendChild(d);
      }
      showToast('iOS: toque em Compartilhar → Salvar em Arquivos','info');
      setTimeout(function(){URL.revokeObjectURL(url);},30000);
      return;
    }

    // Desktop / Android — download normal via <a> adicionado ao DOM
    var a=document.createElement('a');
    a.href=url;
    a.download=nomeArq;
    a.style.display='none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},5000);
    showToast('✅ Backup exportado: '+nomeArq);
  }catch(e){
    console.error('[Backup]',e);
    showToast('Erro ao exportar: '+(e.message||e),'danger');
  }
}
// Alias — chamado pelo banner de storage e por exportarBackupComMarca()
var exportarBackup = exportarBackupJSON;
function importarBackupJSON(){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var r=new FileReader();
    r.onload=function(ev){
      try{
        var snap=JSON.parse(ev.target.result);
        if(!snap||typeof snap!=='object'){showToast('Arquivo inválido','danger');return;}
        var total=0;
        DB_KEYS.forEach(function(k){if(Array.isArray(snap[k])){DB[k]=snap[k];total+=snap[k].length;}});
        DB_OBJ_KEYS.forEach(function(k){if(snap[k]&&typeof snap[k]==='object'&&!Array.isArray(snap[k]))Object.assign(DB[k],snap[k]);});
        if(snap._ids)Object.keys(snap._ids).forEach(function(k){DB._ids[k]=snap._ids[k];});
        saveDB();
        showToast('✅ Backup importado! '+total+' registros restaurados.');
        navTo('dashboard');
      }catch(ex){showToast('Arquivo corrompido ou inválido','danger');}
    };
    r.readAsText(file);
  };
  inp.click();
}

function saveUser(idx){
  const login=document.getElementById('uu-user').value.trim();
  const nome=document.getElementById('uu-nome').value.trim();
  const pass=document.getElementById('uu-pass').value;
  const role=document.getElementById('uu-role').value;
  const podeExc=document.getElementById('uu-pode-excluir')?.checked||false;
  if(!login||!nome){showToast('Login e nome obrigatórios','danger');return;}
  if(idx<0&&USERS.find(u=>u.user===login)){showToast('Login já existe','danger');return;}
  if(idx<0){
    if(!pass){showToast('Senha obrigatória para novo usuário','danger');return;}
    USERS.push({user:login,pass,nome,role,pode_excluir:podeExc});
  } else {
    USERS[idx].user=login;USERS[idx].nome=nome;USERS[idx].role=role;
    if(USERS[idx].role!=='admin')USERS[idx].pode_excluir=podeExc;
    if(pass)USERS[idx].pass=pass;
  }
  saveUsers();
  closeModal('modal-user');showToast('Usuário salvo');
  renderAcessos(document.getElementById('content'));
}


function excluirUser(idx){
  const u=USERS[idx];
  if(!u||u.role==='admin'){showToast('Usuário administrador não pode ser excluído','danger');return;}
  confirmarAcao('Excluir usuário '+u.nome+'?','O acesso deste usuário será revogado imediatamente.','Excluir',function(){
    USERS.splice(idx,1);
    saveUsers();
    showToast('Usuário excluído');
    renderAcessos(document.getElementById('content'));
  });
}
