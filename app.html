    parcelamento: 'até 10× sem juros',
    tagline: 'Uma joia exclusiva, feita à mão para eternizar momentos.',
    orc_id: id
  };
  const div=document.createElement('div');div.className='modal-overlay';div.id='modal-ficha';
  div.innerHTML=`<div class="modal modal-xl" style="max-height:95dvh;overflow-y:auto">
  <div class="modal-header sticky" style="position:sticky;top:0;background:#fff;z-index:2">
    <span class="modal-title">✦ Gerar Ficha Técnica</span>
    <button class="modal-close" onclick="closeModal('modal-ficha')">×</button>
  </div>
  <div class="modal-body" style="padding:20px 24px">
    <div class="alert alert-info" style="margin-bottom:16px;font-size:12px">
      Preencha os detalhes da ficha. Os dados técnicos (peso, gemas, preço) são importados automaticamente do orçamento.
    </div>
    <!-- IDENTIFICAÇÃO -->
    <fieldset style="margin-bottom:14px"><legend>Identificação da Peça</legend>
      <div class="form-grid" style="gap:14px">
        <div class="form-group"><label>Tipo de Peça (ex: PINGENTE, ANEL)</label>
          <input type="text" value="${_ft.tipo_peca}" oninput="_ftSet('tipo_peca',this.value)"></div>
        <div class="form-group"><label>Nome / Subtítulo (ex: FLOR DE LUZ)</label>
          <input type="text" value="${_ft.subtitulo.replace(/"/g,'&quot;')}" oninput="_ftSet('subtitulo',this.value)"></div>
      </div>
    </fieldset>
    <!-- CONCEITO -->
    <fieldset style="margin-bottom:14px"><legend>Texto de Conceito</legend>
      <textarea rows="4" placeholder="Ex: Uma joia única que transforma uma madrepérola natural em uma flor sofisticada. O brilho dos diamantes e a pedra central trazem presença, elegância e emoção para momentos inesquecíveis." oninput="_ftSet('conceito',this.value)" style="width:100%;padding:10px;font-size:14px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif">${_ft.conceito}</textarea>
    </fieldset>
    <!-- ANOTAÇÕES DAS VISTAS -->
    <fieldset style="margin-bottom:14px"><legend>Anotações das Vistas (Callouts)</legend>
      <div class="form-grid" style="gap:12px">
        <div class="form-group"><label>Bail / Argola</label>
          <input type="text" value="${_ft.bail_desc.replace(/"/g,'&quot;')}" oninput="_ftSet('bail_desc',this.value)"></div>
        <div class="form-group"><label>Divisões Internas</label>
          <input type="text" value="${_ft.divisoes_desc.replace(/"/g,'&quot;')}" oninput="_ftSet('divisoes_desc',this.value)"></div>
        <div class="form-group"><label>Centro Elevado / Pedra Central</label>
          <input type="text" value="${_ft.centro_desc.replace(/"/g,'&quot;')}" oninput="_ftSet('centro_desc',this.value)"></div>
        <div class="form-group"><label>Descrição do Material Principal</label>
          <input type="text" value="${_ft.material_desc.replace(/"/g,'&quot;')}" oninput="_ftSet('material_desc',this.value)"></div>
        <div class="form-group" style="grid-column:1/-1"><label>Vista Posterior (texto lateral)</label>
          <input type="text" value="${_ft.posterior_desc.replace(/"/g,'&quot;')}" oninput="_ftSet('posterior_desc',this.value)"></div>
      </div>
    </fieldset>
    <!-- MEDIDAS -->
    <fieldset style="margin-bottom:14px"><legend>Medidas e Peso</legend>
      <div class="form-grid" style="gap:12px">
        <div class="form-group"><label>Altura total (com bail)</label>
          <input type="text" value="${_ft.alt_total}" oninput="_ftSet('alt_total',this.value)" placeholder="ex: 30,00 mm"></div>
        <div class="form-group"><label>Largura</label>
          <input type="text" value="${_ft.largura}" oninput="_ftSet('largura',this.value)" placeholder="ex: 26,00 mm"></div>
        <div class="form-group"><label>Espessura</label>
          <input type="text" value="${_ft.espessura}" oninput="_ftSet('espessura',this.value)" placeholder="ex: 3,80 mm"></div>
        <div class="form-group"><label>Espessura do Bail</label>
          <input type="text" value="${_ft.espessura_bail}" oninput="_ftSet('espessura_bail',this.value)" placeholder="ex: 5,20 mm"></div>
        <div class="form-group"><label>Peso Estimado</label>
          <input type="text" value="${_ft.peso_est}" oninput="_ftSet('peso_est',this.value)" placeholder="ex: 8,00 g"></div>
      </div>
    </fieldset>
    <!-- CONDIÇÕES -->
    <fieldset style="margin-bottom:14px"><legend>Condições Comerciais</legend>
      <div class="form-grid" style="gap:12px">
        <div class="form-group"><label>Prazo de Entrega</label>
          <input type="text" value="${_ft.prazo}" oninput="_ftSet('prazo',this.value)"></div>
        <div class="form-group"><label>Parcelamento</label>
          <input type="text" value="${_ft.parcelamento}" oninput="_ftSet('parcelamento',this.value)"></div>
        <div class="form-group" style="grid-column:1/-1"><label>Tagline inferior</label>
          <input type="text" value="${_ft.tagline.replace(/"/g,'&quot;')}" oninput="_ftSet('tagline',this.value)"></div>
      </div>
    </fieldset>
  </div>
  <div class="modal-footer" style="position:sticky;bottom:0;background:#fff;z-index:2">
    <button class="btn btn-outline" onclick="closeModal('modal-ficha')">Cancelar</button>
    <button class="btn btn-primary" onclick="gerarFichaTecnica()">✦ Gerar Ficha Técnica</button>
  </div>
  </div>`;
  document.body.appendChild(div);
}

function gerarFichaTecnica(){
  const id=_ft.orc_id;
  const o=DB.orcamentos.find(x=>x.id==id);
  if(!o)return;
  const cl=DB.clientes.find(c=>c.id==o.cliente_id)||{};
  const b1=o.bloco1||{};
  const b2=o.bloco2||{};
  const b3=o.bloco3||{};
  const p=o.params||{au24k:757.05,conv18k:0.75,perda:10,dolar:5.85};
  const au18k_liq=p.au24k*p.conv18k*(1-p.perda/100);
  const custo_ouro=(b1.peso_ouro||0)*au18k_liq;
  const custo_gemas=(b1.gemas||[]).reduce((a,g)=>a+g.qtd*g.custo*(g.moeda==='USD'?p.dolar:1),0);
  const custo_b1=custo_ouro+(b1.mao_obra||0)+(b1.mao_obra2||0)+custo_gemas+(b1.outros||0);
  const custo_b2=Object.values(b2).reduce((a,v)=>a+(v||0),0);
  const custo_total=custo_b1+custo_b2;
  const desp_pct=((b3.cartao||0)+(b3.marketing||0)+(b3.comissao||0)+(b3.cashback||0)+(b3.tributos||0))/100;
  const preco_ideal=o.preco_direto||(desp_pct<1?custo_total*(b3.markup||3.2)/(1-desp_pct):custo_total*(b3.markup||3.2));

  // Fotos — compatível com formato antigo (string) e novo ({tipo,src,nome})
  const fotos=(o.fotos||[]).map(f=>typeof f==='string'?f:(f&&f.tipo==='img'?f.src:null)).filter(Boolean);
  const fotoFrontal=fotos[0]||'';
  const fotoLateral=fotos[1]||'';
  const fotoPosterior=fotos[2]||'';

  // Specs técnicas
  const metal='Ouro 18k (amarelo)';
  const gemas_list=(b1.gemas||[]).filter(g=>g.nome).map(g=>`${g.nome} (${g.qtd}×)`).join(', ')||'—';
  const acab='Polido com cravação artesanal';

  // Seção de imagens
  function imgBox(src, label, widthStyle){
    if(src){
      return `<div style="${widthStyle};text-align:center">
        <div style="font-size:9px;letter-spacing:.2em;color:#8B7355;text-transform:uppercase;margin-bottom:8px">${label}</div>
        <img src="${src}" style="max-width:100%;max-height:220px;object-fit:contain;border-radius:4px">
      </div>`;
    }
    return `<div style="${widthStyle};text-align:center">
      <div style="font-size:9px;letter-spacing:.2em;color:#8B7355;text-transform:uppercase;margin-bottom:8px">${label}</div>
      <div style="height:200px;border:1.5px dashed #C8B99A;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#B8A88A;font-size:11px">Sem imagem</div>
    </div>`;
  }

  const html=`<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ficha Técnica — ${_ft.tipo_peca} ${_ft.subtitulo}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Jost',sans-serif;background:#F5F0E8;color:#2C2018;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .page{width:210mm;min-height:297mm;margin:0 auto;background:#FAF7F2;padding:16mm 14mm;position:relative}
  /* Corners */
  .corner{position:absolute;width:32px;height:32px;opacity:.55}
  .corner svg{width:100%;height:100%}
  .corner.tl{top:10mm;left:10mm}.corner.tr{top:10mm;right:10mm;transform:rotate(90deg)}
  .corner.bl{bottom:10mm;left:10mm;transform:rotate(-90deg)}.corner.br{bottom:10mm;right:10mm;transform:rotate(180deg)}
  /* Header */
  .logo-area{text-align:center;margin-bottom:10mm}
  .logo-img{height:56px;object-fit:contain}
  .logo-text{font-family:'Cormorant Garamond',serif;color:#0D1F2D}
  .logo-text .brand{font-size:22px;font-weight:500;letter-spacing:.25em;text-transform:uppercase;display:block}
  .logo-text .sub{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:#8B7355;display:block;margin-top:1px}
  /* Piece name */
  .piece-type{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;color:#0D1F2D;letter-spacing:.05em;text-transform:uppercase;line-height:1}
  .piece-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:#B08E56;letter-spacing:.18em;text-transform:uppercase;margin-top:3px}
  .gold-rule{height:1.5px;background:linear-gradient(90deg,transparent,#B08E56,transparent);margin:4px 0 10px}
  /* Sections */
  .section-title{font-family:'Jost',sans-serif;font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:#8B7355;margin-bottom:6px}
  .conceito-text{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;line-height:1.65;color:#3A2C1E}
  /* Vistas */
  .vistas-row{display:flex;gap:12px;align-items:flex-start;margin:10px 0}
  .vista-label{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:#8B7355;text-align:center;margin-bottom:6px}
  /* Callout */
  .callout{font-size:10px;color:#3A2C1E;line-height:1.4}
  .callout strong{font-family:'Jost',sans-serif;font-size:8px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:#0D1F2D;display:block;margin-bottom:2px}
  /* Specs */
  .specs-section{margin-top:8mm;border-top:1.5px solid #D4C8B0;padding-top:5mm}
  .specs-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;letter-spacing:.18em;text-transform:uppercase;color:#0D1F2D;margin-bottom:6mm}
  .specs-title::after{content:'';display:block;width:32px;height:1.5px;background:#B08E56;margin-top:4px}
  .specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:4mm}
  .spec-item{font-size:11px;color:#2C2018;margin-bottom:6px}
  .spec-item .label{font-family:'Jost',sans-serif;font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-size:9px}
  .spec-item em{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px}
  /* Medidas box */
  .medidas-box{border:1.5px solid #B08E56;border-radius:4px;padding:5mm;font-size:11px}
  .medidas-box .box-title{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#8B7355;margin-bottom:5px}
  .medidas-box li{list-style:none;margin-bottom:4px;font-family:'Cormorant Garamond',serif;font-size:12.5px;font-style:italic}
  /* Budget */
  .budget-wrap{margin-top:8mm;border:1.5px solid #B08E56;border-radius:6px;padding:6mm 7mm;background:#FFFDF9}
  .budget-label{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;letter-spacing:.18em;text-transform:uppercase;color:#0D1F2D;margin-bottom:1mm}
  .budget-label::after{content:'';display:block;width:24px;height:1.5px;background:#B08E56;margin-top:3px}
  .budget-row{display:flex;align-items:center;gap:6mm;margin-top:4mm;padding-top:4mm;border-top:1px solid #E8DDD0}
  .budget-price{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:500;color:#0D1F2D;min-width:150px}
  .budget-price .currency{font-size:18px;vertical-align:super;font-weight:300}
  .budget-divider{width:1px;height:40px;background:#D4C8B0}
  .budget-item{text-align:center;font-size:10px;color:#5A4A3A;line-height:1.4;flex:1}
  .budget-item .icon{font-size:14px;display:block;margin-bottom:2px;color:#B08E56}
  .budget-item strong{font-family:'Jost',sans-serif;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;display:block}
  .budget-tagline{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:#8B7355;margin-top:4mm}
  /* Footer logo */
  .footer-logo{text-align:center;margin-top:8mm;padding-top:5mm;border-top:1px solid #D4C8B0}
  /* Dimension lines */
  .dim-line{display:flex;align-items:center;gap:4px;font-size:10px;color:#5A4A3A;margin:3px 0}
  .dim-line::before,.dim-line::after{content:'';flex:1;height:1px;background:#C8B99A}
  @media print{body{background:none}.page{box-shadow:none;margin:0;min-height:auto}}
</style>
</head>
<body>
<div class="page">
  <!-- Corners -->
  <div class="corner tl"><svg viewBox="0 0 32 32" fill="none"><path d="M2 30 L2 2 L30 2" stroke="#B08E56" stroke-width="1.5" fill="none"/><circle cx="2" cy="2" r="2" fill="#B08E56"/></svg></div>
  <div class="corner tr"><svg viewBox="0 0 32 32" fill="none"><path d="M2 30 L2 2 L30 2" stroke="#B08E56" stroke-width="1.5" fill="none"/><circle cx="2" cy="2" r="2" fill="#B08E56"/></svg></div>
  <div class="corner bl"><svg viewBox="0 0 32 32" fill="none"><path d="M2 30 L2 2 L30 2" stroke="#B08E56" stroke-width="1.5" fill="none"/><circle cx="2" cy="2" r="2" fill="#B08E56"/></svg></div>
  <div class="corner br"><svg viewBox="0 0 32 32" fill="none"><path d="M2 30 L2 2 L30 2" stroke="#B08E56" stroke-width="1.5" fill="none"/><circle cx="2" cy="2" r="2" fill="#B08E56"/></svg></div>

  <!-- Header: Logo -->
  <div class="logo-area">
    <img src="${LOGO_B64}" class="logo-img" alt="Ana Lobão Atelier">
  </div>

  <!-- Piece name + conceito side by side -->
  <div style="display:flex;gap:12mm;align-items:flex-start;margin-bottom:8mm">
    <div style="min-width:120px">
      <div class="piece-type">${_ft.tipo_peca||'PEÇA'}</div>
      <div class="piece-name">${_ft.subtitulo||''}</div>
      <div class="gold-rule" style="margin-top:6px"></div>
      ${_ft.conceito ? `<div class="section-title">CONCEITO</div><p class="conceito-text">${(_ft.conceito).replace(/\n/g,'<br>')}</p>` : ''}
    </div>

    <!-- Vistas das fotos -->
    <div style="flex:1">
      <div style="display:flex;gap:8px;justify-content:flex-end">
        ${fotoFrontal||fotoLateral||fotoPosterior ? `
          ${fotoFrontal ? `<div style="text-align:center;flex:1.6">
            <div class="vista-label">Vista Frontal</div>
            <img src="${fotoFrontal}" style="max-width:100%;max-height:200px;object-fit:contain">
            <div style="margin-top:4px;display:flex;align-items:center;gap:3px;justify-content:center">
              <div style="font-size:9px;color:#5A4A3A">← ≈ ${_ft.largura} →</div>
            </div>
          </div>` : ''}
          ${fotoLateral ? `<div style="text-align:center;flex:1">
            <div class="vista-label">Vista Lateral</div>
            <img src="${fotoLateral}" style="max-width:100%;max-height:200px;object-fit:contain">
            <div style="margin-top:4px;font-size:8.5px;color:#5A4A3A;text-align:center">
              <div>↕ ${_ft.alt_total}</div>
              <div style="margin-top:2px">← ${_ft.espessura} →</div>
            </div>
          </div>` : ''}
          ${fotoPosterior ? `<div style="text-align:center;flex:1">
            <div class="vista-label">Vista Posterior</div>
            <img src="${fotoPosterior}" style="max-width:100%;max-height:200px;object-fit:contain">
            <div style="font-size:9px;color:#5A4A3A;margin-top:6px;font-style:italic;text-align:center;max-width:120px;margin-left:auto;margin-right:auto">${_ft.posterior_desc}</div>
          </div>` : ''}
        ` : `
          <div style="flex:1;border:1.5px dashed #C8B99A;border-radius:6px;min-height:180px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:#B8A88A">
            <div style="font-size:20px">◈</div>
            <div style="font-size:10px;letter-spacing:.1em">Adicione fotos ao orçamento</div>
            <div style="font-size:9px">para exibir as vistas aqui</div>
          </div>
        `}
      </div>
      <!-- Callouts summary when no lateral view -->
      ${!fotoLateral && (_ft.bail_desc||_ft.centro_desc) ? `
      <div style="display:flex;gap:8mm;margin-top:6px;padding-top:5px;border-top:1px dashed #D4C8B0">
        ${_ft.bail_desc ? `<div class="callout" style="flex:1"><strong>Bail</strong>${_ft.bail_desc}</div>` : ''}
        ${_ft.centro_desc ? `<div class="callout" style="flex:1"><strong>Centro</strong>${_ft.centro_desc}</div>` : ''}
        ${_ft.divisoes_desc ? `<div class="callout" style="flex:1"><strong>Divisões</strong>${_ft.divisoes_desc}</div>` : ''}
      </div>` : ''}
    </div>
  </div>

  <!-- Separador -->
  <div style="height:1px;background:linear-gradient(90deg,transparent,#B08E56 20%,#B08E56 80%,transparent);margin-bottom:5mm"></div>

  <!-- ESPECIFICAÇÕES TÉCNICAS -->
  <div class="specs-title">Especificações Técnicas ✦</div>
  <div class="specs-grid">
    <div>
      <ul style="list-style:none;font-size:11.5px">
        <li style="margin-bottom:5px"><span style="font-weight:600;letter-spacing:.06em;font-size:9.5px;text-transform:uppercase">Metal: </span><em style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px">${metal}</em></li>
        ${gemas_list!=='—' ? `<li style="margin-bottom:5px"><span style="font-weight:600;letter-spacing:.06em;font-size:9.5px;text-transform:uppercase">Pedras: </span><em style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px">${gemas_list}</em></li>` : ''}
        ${_ft.material_desc ? `<li style="margin-bottom:5px"><span style="font-weight:600;letter-spacing:.06em;font-size:9.5px;text-transform:uppercase">Material: </span><em style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px">${_ft.material_desc}</em></li>` : ''}
        <li style="margin-bottom:5px"><span style="font-weight:600;letter-spacing:.06em;font-size:9.5px;text-transform:uppercase">Acabamento: </span><em style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px">${acab}</em></li>
      </ul>
    </div>
    <div class="medidas-box">
      <div class="box-title">Medidas e Peso Estimado</div>
      <ul>
        <li>• Altura total (com bail): ≈ ${_ft.alt_total}</li>
        <li>• Largura: ≈ ${_ft.largura}</li>
        <li>• Espessura: ≈ ${_ft.espessura}</li>
        <li>• Peso estimado: ${_ft.peso_est}</li>
      </ul>
    </div>
  </div>

  <!-- ORÇAMENTO -->
  <div class="budget-wrap">
    <div class="budget-label">Orçamento</div>
    <div class="budget-row">
      <div class="budget-price">
        <span class="currency">R$</span> <strong>${preco_ideal.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}</strong>
      </div>
      <div class="budget-divider"></div>
      <div class="budget-item">
        <span class="icon">📅</span>
        <strong>Prazo de Entrega</strong>
        ${_ft.prazo}
      </div>
      <div class="budget-divider"></div>
      <div class="budget-item">
        <span class="icon">💳</span>
        <strong>Parcelamento</strong>
        ${_ft.parcelamento}
      </div>
    </div>
    <div class="budget-tagline">${_ft.tagline}</div>
  </div>

  <!-- Footer logo -->
  <div class="footer-logo">
    <img src="${LOGO_B64}" style="height:40px;object-fit:contain;opacity:.85" alt="Ana Lobão Atelier">
  </div>
</div>
<script>window.onload=()=>{setTimeout(()=>{window.print();},600);}<\/script>
</body>
</html>`;

  closeModal('modal-ficha');

  // Guardar HTML gerado para o botão de impressão/download
  _ft.generatedHtml = html;

  // Remover ficha anterior se existir
  const existing = document.getElementById('ficha-overlay');
  if(existing) existing.remove();
  const existingFr = document.getElementById('ficha-iframe');
  if(existingFr) existingFr.remove();

  // Criar overlay em tela cheia na própria página
  const overlay = document.createElement('div');
  overlay.id = 'ficha-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9990;background:#F5F0E8;overflow-y:auto;-webkit-overflow-scrolling:touch';

  // Barra de ações no topo
  const toolbar = document.createElement('div');
  toolbar.id = 'ficha-toolbar';
  toolbar.style.cssText = 'position:sticky;top:0;z-index:9991;background:#0D1F2D;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;gap:8px';
  toolbar.innerHTML = `
    <button onclick="document.getElementById('ficha-overlay').remove()" style="background:none;border:1px solid rgba(176,142,86,.4);color:rgba(176,142,86,.9);padding:8px 12px;border-radius:4px;font-family:Jost,sans-serif;font-size:12px;cursor:pointer;letter-spacing:.06em;flex-shrink:0">← Voltar</button>
    <span style="font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;color:#C9A96A;letter-spacing:.1em;text-align:center">Ficha Técnica</span>
    <button onclick="abrirFichaParaImprimir()" style="background:#B08E56;border:none;color:#fff;padding:9px 14px;border-radius:4px;font-family:Jost,sans-serif;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.06em;flex-shrink:0">🖨 Abrir PDF</button>`;

  // Extrair só o body do HTML gerado
  const bodyMatch = html.match(/<body>([\s\S]*?)<script>/);
  const bodyContent = bodyMatch ? bodyMatch[1] : html;

  const content = document.createElement('div');
  content.style.cssText = 'max-width:210mm;margin:0 auto;padding:8px';
  content.innerHTML = bodyContent;

  // Injetar estilos do HTML gerado
  const styleMatch = html.match(/<style>([\s\S]*?)<\/style>/);
  if(styleMatch){
    let st = document.getElementById('ficha-inline-style');
    if(!st){ st = document.createElement('style'); st.id='ficha-inline-style'; document.head.appendChild(st); }
    st.textContent = styleMatch[1];
  }

  overlay.appendChild(toolbar);
  overlay.appendChild(content);
  document.body.appendChild(overlay);
}

// Abre a ficha em uma "página limpa" via blob URL (funciona no iPhone sem pop-up)
function abrirFichaParaImprimir(){
  const html = _ft.generatedHtml;
  if(!html){ showToast('Gere a ficha primeiro','warn'); return; }
  try{
    const blob = new Blob([html], {type:'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    // Cria link e simula clique — dispara como gesto do usuário, sem bloqueio
    const a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 30000);
    showToast('Ficha aberta — use Compartilhar → Imprimir para salvar como PDF','info');
  }catch(e){
    // Fallback: navega na aba atual
    try{
      const blob = new Blob([html], {type:'text/html;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      window.location.href = url;
    }catch(e2){
      showToast('Use o botão Compartilhar do navegador para salvar como PDF','warn');
    }
  }
}

function imprimirOrcamento(id){

  if(!o){ showToast('Orçamento não encontrado','danger'); return; }
  const cl = DB.clientes.find(c => c.id == o.cliente_id) || {};
  const p  = o.params || { au24k:757.05, conv18k:0.75, perda:10, dolar:5.85, taxa_mo:120 };
  const b1 = o.bloco1 || {};
  const b2 = o.bloco2 || {};
  const b3 = o.bloco3 || {};
  const au18k_liq   = p.au24k * p.conv18k * (1 - p.perda/100);
  const custo_ouro  = (b1.peso_ouro||0) * au18k_liq;
  const custo_gemas = (b1.gemas||[]).reduce((a,g)=>a+g.qtd*g.custo*(g.moeda==='USD'?p.dolar:1),0);
  const custo_b1    = custo_ouro+(b1.mao_obra||0)+(b1.mao_obra2||0)+custo_gemas+(b1.outros||0);
  const custo_b2    = Object.values(b2).reduce((a,v)=>a+(v||0),0);
  const custo_total = custo_b1 + custo_b2;
  const desp_pct    = ((b3.cartao||0)+(b3.marketing||0)+(b3.comissao||0)+(b3.cashback||0)+(b3.tributos||0))/100;
  const preco_ideal = o.preco_direto || (desp_pct<1 ? custo_total*(b3.markup||3.2)/(1-desp_pct) : custo_total*(b3.markup||3.2));
  const preco_vista = o.preco_vista_direto || preco_ideal*(1-(b3.desconto_max||10)/100);
  const lucro       = preco_ideal - custo_total - preco_ideal*desp_pct;
  const margem      = preco_ideal>0 ? (lucro/preco_ideal)*100 : 0;
  const isAdmin     = verCusto();

  if(isIOS&&!isStandalone&&!localStorage.getItem('ios_banner_dismissed')){
    const b=document.createElement('div');
    b.style.cssText='position:fixed;bottom:0;left:0;right:0;background:var(--azul);color:#fff;padding:14px 18px;z-index:9999;font-size:13px;display:flex;align-items:center;justify-content:space-between;font-family:Jost,sans-serif';

    document.body.appendChild(b);
  }
}

document.addEventListener('DOMContentLoaded',()=>{

// CERT WIDGET — Anexar imagem/PDF de certificado
// ═══════════════════════════════════════════════════════════════════
var _CERT={};
function certWidget(key){
  return '<div id="cert-widget-'+key+'">'
    +'<div id="cert-prev-'+key+'" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px"></div>'
    +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
    +'<input type="file" id="cert-input-'+key+'" accept="image/*,.pdf" multiple style="display:none"'
    +' onchange="certAdicionarArquivos(event,\''+key+'\')">'
    +'<button type="button" class="btn btn-sm btn-outline"'
    +' onclick="document.getElementById(\'cert-input-'+key+'\').click()">📎 Anexar Certificado (imagem ou PDF)</button>'
    +'<span style="font-size:11px;color:var(--texto-suave)">JPG, PNG ou PDF · máx. 3 arquivos · 5 MB</span>'
    +'</div></div>';
}
function certInit(key,arr){_CERT[key]=(arr&&arr.length)?arr.slice():[];certRenderPreview(key);}
function certGet(key){return _CERT[key]||[];}
function certAdicionarArquivos(e,key){
  var files=Array.from(e.target.files);
  if(!_CERT[key])_CERT[key]=[];
  var restam=3-_CERT[key].length;
  if(restam<=0){showToast('Limite de 3 certificados atingido','warn');return;}
  files.slice(0,restam).forEach(function(f){
    if(f.size>5*1024*1024){showToast(f.name+' excede 5 MB','warn');return;}
    var isPDF=f.type==='application/pdf';
    var r=new FileReader();
    r.onload=function(ev){
      _CERT[key].push({tipo:isPDF?'pdf':'img',src:ev.target.result,nome:f.name});
      certRenderPreview(key);
    };
    r.readAsDataURL(f);
  });
  e.target.value='';
}
function certRenderPreview(key){
  var el=document.getElementById('cert-prev-'+key);if(!el)return;
  var arr=_CERT[key]||[];

        +'<button type="button" onclick="certRemover(\''+key+'\','+i+')" style="background:none;border:none;color:#eb5757;font-size:16px;cursor:pointer">×</button>'

      +'<img src="'+m.src+'" onclick="certVerImagem(\''+key+'\','+i+')" style="width:80px;height:80px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid var(--borda)" title="'+m.nome+'">'
      +'<button type="button" onclick="certRemover(\''+key+'\','+i+')" style="position:absolute;top:-6px;right:-6px;background:#eb5757;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;line-height:1">×</button>'
      +'</div>';

}
function certRemover(key,i){if(_CERT[key])_CERT[key].splice(i,1);certRenderPreview(key);}
function certVerImagem(key,i){
  var m=(_CERT[key]||[])[i];if(!m)return;

  ov.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;cursor:zoom-out';

}
function verCertificadoPeca(pid){
  var p=DB.colecao.find(function(x){return x.id==pid;});if(!p)return;

    +(p.lab_cert&&p.lab_cert!=='Nenhum'?' · '+esc(p.lab_cert):'')
    +(p.num_cert?' · Nº '+esc(p.num_cert):'')+'</p>'
    +'</div>';
  var closeBtn=document.createElement('button');
  closeBtn.textContent='×';
  closeBtn.style.cssText='background:none;border:none;font-size:28px;cursor:pointer;color:#999;line-height:1';
  closeBtn.onclick=function(){ov.remove();};
  header.appendChild(closeBtn);box.appendChild(header);
  certs.forEach(function(c,i){
    var item=document.createElement('div');
    item.style.marginBottom='12px';
    if(c.tipo==='pdf'){
      item.style.cssText='display:flex;align-items:center;gap:12px;background:var(--fundo);border:1px solid var(--borda);border-radius:8px;padding:14px 16px;margin-bottom:10px';
      item.innerHTML='<span style="font-size:32px">📄</span><div><p style="font-weight:600;margin-bottom:4px">'+esc(c.nome)+'</p>'
        +'<a href="'+c.src+'" target="_blank" style="color:var(--ouro);font-size:13px;font-weight:600">Abrir / Baixar PDF →</a></div>';
    } else {
      var img=document.createElement('img');
      img.src=c.src;img.style.cssText='width:100%;border-radius:8px;border:1px solid var(--borda);cursor:zoom-in';
      img.title=c.nome;
      img.onclick=function(){
        var z=document.createElement('div');
        z.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;cursor:zoom-out';
        z.onclick=function(){z.remove();};
        var zi=document.createElement('img');zi.src=c.src;
        zi.style.cssText='max-width:92vw;max-height:92vh;border-radius:8px';
        z.appendChild(zi);document.body.appendChild(z);
      };
      item.appendChild(img);
    }
    box.appendChild(item);
  });
  ov.appendChild(box);
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}

function calcLimiteReserva(totalVenda,saldoCliente){
  var pct=(DB.params_reserva&&DB.params_reserva.limite_uso_pct)||40;
  return Math.min(totalVenda*(pct/100),saldoCliente);
}
function atualizarBotoesReserva(btnId,saldo,formaId){
  var btn=document.getElementById(btnId);if(!btn)return;
  var tem=saldo>0;
  btn.disabled=!tem;
  btn.title=tem?'Usar crédito de Reserva (saldo: '+fmt(saldo)+')':'Cliente sem saldo de Reserva';
  btn.style.opacity=tem?'1':'0.4';
  btn.style.cursor=tem?'pointer':'not-allowed';
  if(!tem&&document.getElementById(formaId)&&document.getElementById(formaId).value==='Reserva'){
    document.getElementById(formaId).value='PIX';
  }
}

function renderCaixa(c){

        +'<button class="btn btn-primary" onclick="abrirCaixaModal()" style="padding:14px 32px;font-size:16px">⊡ Abrir Caixa Agora</button>'
      +'</div>'+renderUltimoFechamento()

        +'<div style="background:linear-gradient(135deg,var(--azul),var(--azul-medio));border-radius:10px;padding:20px;border:1px solid rgba(176,142,86,.2);grid-column:1/-1">'
          +'<p style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ouro);margin-bottom:6px">Saldo em Caixa</p>'
          +'<p style="font-family:\'Cormorant Garamond\',serif;font-size:38px;font-weight:300;color:#fff">'+fmt(saldo)+'</p>'
          +'<div style="display:flex;gap:20px;margin-top:10px">'
            +'<div><p style="font-size:11px;color:rgba(255,255,255,.5)">Abertura</p><p style="font-size:14px;color:rgba(255,255,255,.8)">'+fmt(cx.valor_abertura||0)+'</p></div>'
            +'<div><p style="font-size:11px;color:rgba(255,255,255,.5)">Entradas</p><p style="font-size:14px;color:#6fcf97">+'+fmt(totalMov)+'</p></div>'
            +'<div><p style="font-size:11px;color:rgba(255,255,255,.5)">Vendas</p><p style="font-size:14px;color:rgba(255,255,255,.8)">'+movHoje.length+'</p></div>'
          +'</div>'
        +'</div>'
        +Object.entries(formas).map(function(e){return '<div class="kpi"><div class="kpi-label">'+e[0]+'</div><div class="kpi-value">'+fmt(e[1])+'</div></div>';}).join('')
      +'</div>'

        +'<span style="font-size:26px">+</span> Registrar Venda'
      +'</button>'
      +'<div class="card"><div class="card-header"><span class="card-title">Movimentos de Hoje</span></div>'
        +'<div class="card-body" style="padding:0">'
          +(movHoje.length===0?'<p class="text-suave" style="padding:24px;text-align:center">Nenhum movimento ainda.</p>'
            :'<table style="width:100%;border-collapse:collapse">'
              +[...movHoje].reverse().map(function(m){
                return '<tr style="border-bottom:1px solid var(--borda)">'
                  +'<td style="padding:10px 14px;font-size:12px;color:var(--texto-suave);width:50px">'+m.hora+'</td>'
                  +'<td style="padding:10px 12px;font-size:14px">'+m.descricao+'</td>'
                  +'<td style="padding:10px 12px"><span class="badge badge-blue" style="font-size:10px">'+m.forma+'</span></td>'

function confirmarAbrirCaixa(){
  var val=parseFloat(document.getElementById('cx-abertura')?.value)||0;

  var hora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  DB.caixa={status:'aberto',data_abertura:today(),hora_abertura:hora,valor_abertura:val,responsavel:resp,movimentos:[],ultimo_fechamento:ult};

function selecionarProdutoCaixa(){
  var pid=parseInt(document.getElementById('cxv-produto')?.value)||0;
  var info=document.getElementById('cxv-estoque-info');
  if(!pid){if(info)info.textContent='';return;}
  var prod=DB.colecao.find(function(p){return p.id===pid;});if(!prod)return;
  var descEl=document.getElementById('cxv-desc');
  var valEl=document.getElementById('cxv-val');
  if(descEl)descEl.value=prod.nome+(prod.metal?' · '+prod.metal:'')+(prod.peso?' · '+fmtN(prod.peso,2)+'g':'');
  if(valEl){valEl.value=prod.preco||0;calcCaixaVista();}
  var rest=prod.estoque-1;
  if(info)info.innerHTML='<span style="color:'+(rest>0?'var(--verde)':'#eb5757')+'">Estoque: '+prod.estoque+' → após venda: <strong>'+rest+'</strong>'+(rest===0?' ⚠️ Último exemplar':'')+'</span>';
}

      }).join('')

      +'<input id="cxv-mx-reserva" type="number" step="10" value="0" min="0" max="'+calcLimiteReserva(parseFloat(document.getElementById('cxv-val')?.value)||0,saldoReserva)+'" oninput="calcCaixaVista()"'+(saldoReserva<=0?' disabled':'')+' style="width:100%;padding:8px 10px;font-size:15px;border:1.5px solid #C4BDB4;border-radius:5px;background:'+(saldoReserva<=0?'#eee':'var(--fundo-input)')+';font-family:Jost,sans-serif;text-align:right'+(saldoReserva<=0?';opacity:.5':'')+'"></div>'
      +'<div style="grid-column:1/-1"><label style="font-size:11px;color:var(--texto-suave);display:block;margin-bottom:3px">Outro (R$)</label>'

      +'<input id="cxv-mx-outro" type="number" step="10" value="0" min="0" oninput="calcCaixaVista()" style="width:80px;padding:8px 10px;font-size:15px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif;text-align:right">'
      +'<input id="cxv-mx-outro-desc" placeholder="Ex: Cheque, TED…" style="flex:1;padding:8px 10px;font-size:13px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif">'
      +'</div></div></div>';
  } else if(forma==='Reserva'){
    detalhe.innerHTML='<div><label style="font-size:11px;color:var(--texto-suave);display:block;margin-bottom:3px">Crédito Reserva (R$)'+(saldoReserva>0?' · Saldo: '+fmt(saldoReserva):'')+'</label>'
      +'<input id="cxv-reserva-val" type="number" step="10" value="'+saldoReserva+'" min="0" max="'+saldoReserva+'" oninput="calcCaixaVista()" style="width:100%;padding:9px 10px;font-size:16px;border:1.5px solid #C4BDB4;border-radius:5px;background:var(--fundo-input);font-family:Jost,sans-serif;text-align:right"></div>';
  } else {detalhe.innerHTML='';}

function calcCaixaVista(){
  var val=parseFloat(document.getElementById('cxv-val')?.value)||0;
  var forma=document.getElementById('cxv-forma')?.value||'PIX';
  var el=document.getElementById('cxv-info');if(!el)return;
  if(!val){el.innerHTML='Preencha o valor.';return;}
  if(forma==='Misto'){
    var pix=parseFloat(document.getElementById('cxv-mx-pix')?.value)||0;
    var cartao=parseFloat(document.getElementById('cxv-mx-cartao')?.value)||0;
    var din=parseFloat(document.getElementById('cxv-mx-dinheiro')?.value)||0;
    var res=parseFloat(document.getElementById('cxv-mx-reserva')?.value)||0;
    var out=parseFloat(document.getElementById('cxv-mx-outro')?.value)||0;
    var soma=pix+cartao+din+res+out;
    var resto=val-soma;
    var cor=Math.abs(resto)<0.01?'var(--verde)':'#eb5757';
    var msg=Math.abs(resto)<0.01?'✅ Completo':(resto>0?'⚠️ Faltam '+fmt(resto):'⚠️ Excede '+fmt(Math.abs(resto)));
    var partes=[];
    if(pix>0)partes.push('PIX: '+fmt(pix));
    if(cartao>0)partes.push('Cartão: '+fmt(cartao));
    if(din>0)partes.push('Dinheiro: '+fmt(din));
    if(res>0)partes.push('Reserva: '+fmt(res));
    if(out>0)partes.push((document.getElementById('cxv-mx-outro-desc')?.value||'Outro')+': '+fmt(out));
    el.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center">'
      +'<span style="color:'+cor+';font-weight:600">'+msg+'</span>'
      +'<span style="font-size:18px;font-weight:700;color:var(--ouro)">'+fmt(val)+'</span></div>'
      +'<div style="font-size:12px;color:var(--texto-suave);margin-top:4px">'+partes.join(' · ')+'</div>';
  } else {
    el.innerHTML='<div style="text-align:center"><span style="font-size:20px;font-weight:700;color:var(--ouro)">'+fmt(val)+'</span> <span style="font-size:14px">via '+forma+'</span></div>';
  }
}
function salvarVendaCaixa(){
  var desc=document.getElementById('cxv-desc')?.value||'';
  var val=parseFloat(document.getElementById('cxv-val')?.value)||0;
  var forma=document.getElementById('cxv-forma')?.value||'PIX';
  var colab=document.getElementById('cxv-colab')?.value||'';
  var cid=parseInt(document.getElementById('cxv-cl')?.value)||null;
  var pid=parseInt(document.getElementById('cxv-produto')?.value)||null;
  if(!desc){showToast('Descrição obrigatória','danger');return;}
  if(!val){showToast('Valor obrigatório','danger');return;}
  if(pid){var prod=DB.colecao.find(function(p){return p.id===pid;});if(!prod||prod.estoque<=0){showToast('Produto sem estoque','danger');return;}}
  var pgtoDetalhes=null,emCaixa=val,reserva=0;
  if(forma==='Misto'){
    var pix=parseFloat(document.getElementById('cxv-mx-pix')?.value)||0;
    var cartao=parseFloat(document.getElementById('cxv-mx-cartao')?.value)||0;
    var din=parseFloat(document.getElementById('cxv-mx-dinheiro')?.value)||0;
    reserva=parseFloat(document.getElementById('cxv-mx-reserva')?.value)||0;
    var out=parseFloat(document.getElementById('cxv-mx-outro')?.value)||0;
    var outDesc=document.getElementById('cxv-mx-outro-desc')?.value||'Outro';
    var soma=pix+cartao+din+reserva+out;
    if(Math.abs(soma-val)>0.5){showToast('Soma dos pagamentos difere do total','danger');return;}
    if(reserva>0){
      if(!cid){showToast('Selecione um cliente para usar Reserva','danger');return;}
      var saldoDisp=calcSaldoCliente(cid);
      if(saldoDisp<=0){showToast('Cliente sem saldo de Reserva','danger');return;}
      var limRes=calcLimiteReserva(val,saldoDisp);
      if(reserva>limRes+0.5){
        window._pendingCaixa={desc,val,forma,colab,cid,pid,pgtoDetalhes:{pix,cartao,dinheiro:din,reserva,outro:out,outro_desc:outDesc},emCaixa:pix+cartao+din+out,reserva};
        solicitarOverrideReserva(reserva,limRes,function(){salvarVendaCaixaFinalizar();});return;
      }
      emCaixa=pix+cartao+din+out;
      pgtoDetalhes={pix,cartao,dinheiro:din,reserva,outro:out,outro_desc:outDesc};
    } else {
      emCaixa=pix+cartao+din+out;
      pgtoDetalhes={pix,cartao,dinheiro:din,reserva:0,outro:out,outro_desc:outDesc};
    }
  } else if(forma==='Reserva'){
    reserva=parseFloat(document.getElementById('cxv-reserva-val')?.value)||0;
    if(reserva>0&&cid){
      var saldoR=calcSaldoCliente(cid);
      var limR=calcLimiteReserva(val,saldoR);
      if(reserva>limR+0.5){
        window._pendingCaixa={desc,val,forma,colab,cid,pid,pgtoDetalhes:null,emCaixa:Math.max(0,val-reserva),reserva};
        solicitarOverrideReserva(reserva,limR,function(){salvarVendaCaixaFinalizar();});return;
      }
    }
    emCaixa=Math.max(0,val-reserva);
  }
  window._pendingCaixa={desc,val,forma,colab,cid,pid,pgtoDetalhes,emCaixa,reserva};
  salvarVendaCaixaFinalizar();
}
function salvarVendaCaixaFinalizar(){
  var p=window._pendingCaixa;if(!p)return;window._pendingCaixa=null;
  var hora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if(!DB.caixa.movimentos)DB.caixa.movimentos=[];
  DB.caixa.movimentos.push({id:Date.now(),data:today(),hora,descricao:p.desc,valor:p.val,forma:p.forma,colab:p.colab,cliente_id:p.cid,produto_id:p.pid});
  var venda={id:DB.nextId('vendas'),data:today(),cliente_id:p.cid,descricao:p.desc,produto_id:p.pid,
    valor_total:p.val,valor_em_caixa:p.emCaixa,credito_ouro_aplic:p.reserva,
    forma_pgto:p.forma,pgto_detalhes:p.pgtoDetalhes,colaborador:p.colab,origem:'caixa'};
  DB.vendas.push(venda);
  if(p.reserva>0&&p.cid){
    var entr=DB.entradas_ouro.filter(function(e){return e.cliente_id==p.cid;});
    if(entr.length>0)DB.vendas_credito.push({id:DB.nextId('vendas_credito'),cliente_id:p.cid,data:today(),entrada_ouro_id:entr[0].id,valor_usado:p.reserva,descricao:p.desc});
  }
  if(p.pid){var prod=DB.colecao.find(function(x){return x.id===p.pid;});if(prod)prod.estoque=Math.max(0,prod.estoque-1);}
  if(p.emCaixa>0)DB.financeiro.push({id:DB.nextId('financeiro'),data:today(),tipo:'entrada',categoria:'Venda',descricao:p.desc,forma:p.forma,valor:p.emCaixa});
  if(p.cid){var cl=DB.clientes.find(function(c){return c.id==p.cid;});if(cl)cl.ltv=DB.vendas.filter(function(v){return v.cliente_id==p.cid;}).reduce(function(a,v){return a+(v.valor_total||0);},0);}
  saveDB();fecharModal();showToast('✅ '+fmt(p.val)+' registrado!');
  renderCaixa(document.getElementById('content'));
}
function excluirMovCaixa(movId){
  if(!podeExcluir()){showToast('Sem permissão','danger');return;}
  var mov=DB.caixa.movimentos.find(function(m){return m.id==movId;});if(!mov)return;
  confirmarAcao('Remover movimento?',mov.descricao+' — '+fmt(mov.valor),'Remover',function(){
    DB.caixa.movimentos=DB.caixa.movimentos.filter(function(m){return m.id!=movId;});
    DB.vendas=DB.vendas.filter(function(v){return !(v.origem==='caixa'&&v.data===mov.data&&Math.abs(v.valor_total-mov.valor)<0.01&&v.descricao===mov.descricao);});
    DB.financeiro=DB.financeiro.filter(function(f){return !(f.tipo==='entrada'&&f.data===mov.data&&Math.abs(f.valor-mov.valor)<0.01&&f.descricao===mov.descricao);});
    saveDB();showToast('Movimento removido');renderCaixa(document.getElementById('content'));
  });
}
function confirmarFecharCaixa(){
  var cx=DB.caixa;
  var movHoje=(cx.movimentos||[]).filter(function(m){return m.data===today();});
  var totalVendas=movHoje.reduce(function(a,m){return a+(m.valor||0);},0);
  var saldoFinal=(cx.valor_abertura||0)+totalVendas;
  confirmarAcao('Fechar Caixa?',
    movHoje.length+' venda(s) · Total: '+fmt(totalVendas)+'<br>Saldo final: '+fmt(saldoFinal),
    'Fechar Caixa',
    function(){
      var fech={data:today(),hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
        valor_abertura:cx.valor_abertura,total_vendas:totalVendas,saldo_final:saldoFinal,
        responsavel:cx.responsavel,qtd_vendas:movHoje.length};
      DB.caixa={status:'fechado',data_abertura:null,hora_abertura:null,valor_abertura:0,
        responsavel:'',movimentos:[],ultimo_fechamento:fech};
      saveDB();showToast('Caixa fechado!');
      renderCaixa(document.getElementById('content'));
    });
}

function saveVendaFinalizar(){

    cliente_id:p.cid,descricao:p.desc,produto_id:p.pid,
    valor_total:p.total,valor_em_caixa:p.emCaixa,credito_ouro_aplic:p.reserva,
    forma_pgto:p.forma,pgto_detalhes:p.pgtoDetalhes,colaborador:p.colab};
  DB.vendas.push(obj);
  if(p.pid){var prod=DB.colecao.find(function(x){return x.id===p.pid;});if(prod)prod.estoque=Math.max(0,prod.estoque-1);}

    var entr=DB.entradas_ouro.filter(function(e){return e.cliente_id==p.cid;});

  saveDB();closeModal('modal-venda');showToast('Venda registrada!');

}

    +'<div style="font-size:8.5pt;color:#666">Emitido em '+fmtDate(today())+'</div>';
  hdr.appendChild(hLeft);hdr.appendChild(hRight);
  wrap.appendChild(hdr);

  // ── Título faixa ──
  var faixa=document.createElement('div');
  faixa.style.cssText='background:#0D1F2D;color:#B08E56;padding:7px 14px;border-radius:4px;font-size:10pt;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center';
  faixa.innerHTML='<span>Recibo de Ordem de Serviço</span>'
    +'<span style="font-size:9pt;letter-spacing:.05em">'
    +(os.priority==='urgente'?'🔴 URGENTE':os.priority==='alta'?'⚠️ Alta Prioridade':'Prioridade Normal')
    +'</span>';
  wrap.appendChild(faixa);

  // ── Info grid ──
  function infoRow(label, value, full){
    var d=document.createElement('div');
    d.style.cssText='background:#f7f5f0;border-radius:4px;padding:7px 10px;'+(full?'grid-column:1/-1':'');
    d.innerHTML='<div style="font-size:7.5pt;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">'+label+'</div>'
      +'<div style="font-size:10.5pt;font-weight:500;color:#1a1a2e">'+(value||'-')+'</div>';
    return d;
  }

  var grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px';

  grid.appendChild(infoRow('Para',
    os.responsavel?('👤 '+os.responsavel):'Sem responsável definido',true));
  grid.appendChild(infoRow('Cliente / Origem',
    os.origem==='atelier'?('🏛 '+(col?col.nome:'Coleção Atelier')):(cl?cl.nome:'Sem cliente')));
  grid.appendChild(infoRow('Status', STATUS_LABEL[os.status]||os.status));
  grid.appendChild(infoRow('Prazo', os.prazo?fmtDate(os.prazo):'Sem prazo definido'));
  grid.appendChild(infoRow('Responsável', os.responsavel||'—'));
  if(orc) grid.appendChild(infoRow('Orçamento vinculado','#'+orc.id+' · '+(orc.descricao||orc.tipo||''),true));
  wrap.appendChild(grid);

  // ── Descrição do serviço ──
  var descSec=document.createElement('div');
  descSec.style.cssText='margin-bottom:14px';
  var descTitle=document.createElement('div');
  descTitle.style.cssText='font-size:9pt;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0D1F2D;border-bottom:1px solid #ddd;padding-bottom:4px;margin-bottom:8px';
  descTitle.textContent='Descrição do Serviço';
  var descBody=document.createElement('div');
  descBody.style.cssText='font-size:11pt;line-height:1.5;padding:10px 12px;border-left:3px solid #B08E56;background:#fdf9f3;border-radius:0 4px 4px 0';
  descBody.textContent=os.descricao||'';
  descSec.appendChild(descTitle);descSec.appendChild(descBody);
  wrap.appendChild(descSec);

  // ── Etapas de produção (se houver) ──
  if(etapasOS.length>0){
    var etSec=document.createElement('div');
    etSec.style.cssText='margin-bottom:14px';
    var etTitle=document.createElement('div');
    etTitle.style.cssText='font-size:9pt;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0D1F2D;border-bottom:1px solid #ddd;padding-bottom:4px;margin-bottom:8px';
    etTitle.textContent='Etapas de Produção';
    etSec.appendChild(etTitle);
    etapasOS.forEach(function(et){
      var row=document.createElement('div');
      row.style.cssText='display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:10pt';
      var chk=document.createElement('span');
      chk.style.cssText='width:14px;height:14px;border:1.5px solid #0D1F2D;border-radius:2px;flex-shrink:0;margin-top:2px;display:inline-block';
      var txt=document.createElement('span');
      txt.innerHTML='<strong>'+(et.setor||'').toUpperCase()+'</strong>: '+(et.descricao||'');
      row.appendChild(chk);row.appendChild(txt);
      etSec.appendChild(row);
    });
    wrap.appendChild(etSec);
  }

  // ── Fotos (se houver) ──
  var fotos=(os.fotos||[]).filter(function(f){return f&&(f.src||typeof f==='string');});
  if(fotos.length>0){
    var fotSec=document.createElement('div');
    fotSec.style.cssText='margin-bottom:14px';
    var fotTitle=document.createElement('div');
    fotTitle.style.cssText='font-size:9pt;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0D1F2D;border-bottom:1px solid #ddd;padding-bottom:4px;margin-bottom:8px';
    fotTitle.textContent='Referências Fotográficas';
    fotSec.appendChild(fotTitle);
    var fotRow=document.createElement('div');
    fotRow.style.cssText='display:flex;flex-wrap:wrap;gap:8px';
    fotos.slice(0,4).forEach(function(f){
      var src=typeof f==='string'?f:(f.src||'');
      if(!src)return;
      var img=document.createElement('img');
      img.src=src;
      img.style.cssText='width:60px;height:60px;object-fit:cover;border-radius:4px;border:1px solid #ddd';
      fotRow.appendChild(img);
    });
    fotSec.appendChild(fotRow);
    wrap.appendChild(fotSec);
  }

  // ── Observações box ──
  var obsSec=document.createElement('div');
  obsSec.style.cssText='margin-bottom:18px';
  var obsTitle=document.createElement('div');
  obsTitle.style.cssText='font-size:9pt;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0D1F2D;border-bottom:1px solid #ddd;padding-bottom:4px;margin-bottom:8px';
  obsTitle.textContent='Observações / Instruções Especiais';
  var obsBox=document.createElement('div');
  obsBox.style.cssText='border:1px solid #ccc;border-radius:4px;min-height:60px;padding:8px 10px;font-size:9pt;color:#aaa';
  obsBox.textContent='(espaço para anotações)';
  obsSec.appendChild(obsTitle);obsSec.appendChild(obsBox);
  wrap.appendChild(obsSec);

  // ── Assinaturas ──
  var sigGrid=document.createElement('div');
  sigGrid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:auto;padding-top:12px;border-top:1px solid #ddd';
  function sigBox(label){
    var d=document.createElement('div');
    d.style.cssText='text-align:center';
    var line=document.createElement('div');
    line.style.cssText='border-top:1.5px solid #0D1F2D;margin-bottom:6px;margin-top:32px';
    var lbl=document.createElement('div');
    lbl.style.cssText='font-size:9pt;color:#555';lbl.textContent=label;
    d.appendChild(line);d.appendChild(lbl);return d;
  }
  sigGrid.appendChild(sigBox('Responsável pela entrega'));
  sigGrid.appendChild(sigBox('Ourives / Montador(a)'));
  wrap.appendChild(sigGrid);

  // ── Rodapé ──
  var rod=document.createElement('div');
  rod.style.cssText='margin-top:14px;text-align:center;font-size:7.5pt;color:#aaa;border-top:1px solid #eee;padding-top:8px';
  rod.textContent=(at.nome_fantasia||'Atelier Ana Lobão')+' · Documento interno · OS #'+osId+' · '+fmtDate(today());
  wrap.appendChild(rod);

  // ── Botões de controle ──
  var btnBar=document.createElement('div');
  btnBar.style.cssText='position:sticky;bottom:0;background:rgba(0,0,0,.85);padding:12px 20px;display:flex;gap:10px;justify-content:center;margin-top:16px;border-radius:8px';

  var btnPrint=document.createElement('button');
  btnPrint.className='btn btn-primary';
  btnPrint.style.fontSize='15px';
  btnPrint.textContent='🖨 Imprimir / Salvar PDF';
  btnPrint.onclick=function(){
    var style=document.createElement('style');
    style.id='print-recibo-style';
    style.textContent='@media print{'
      +'body>*{display:none!important}'
      +'#recibo-os-print{display:block!important;position:static!important;box-shadow:none!important;width:148mm!important;min-height:210mm!important;margin:0!important;padding:14mm 12mm!important}'
      +'.no-print,.modal-overlay button{display:none!important}'
      +'}';
    document.head.appendChild(style);
    window.print();
    setTimeout(function(){var s=document.getElementById('print-recibo-style');if(s)s.remove();},1000);
  };

  var btnFechar=document.createElement('button');
  btnFechar.className='btn btn-outline';
  btnFechar.style.cssText='color:#fff;border-color:#fff';
  btnFechar.textContent='× Fechar';
  btnFechar.onclick=function(){ov.remove();};

  btnBar.appendChild(btnPrint);btnBar.appendChild(btnFechar);

  ov.appendChild(wrap);
  ov.appendChild(btnBar);
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}


// ═══════════════════════════════════════════════════════════════════
// MODULE: PROTOCOLO DE ENTRADA
// Uma visita → N peças → N OS → 1 recibo para a cliente
// ═══════════════════════════════════════════════════════════════════

var SERVICO_LABEL = {
  ressignificacao:'Ressignificação',
  conserto:'Conserto / Reparo',
  avaliacao:'Avaliação',
  limpeza:'Limpeza / Polimento',
  joia_nova:'Joia Nova',
  outro:'Outro'
};
var ESTADO_LABEL = {bom:'Bom estado',regular:'Estado regular',danificado:'Danificado / Com defeito'};
var PROTO_STATUS = {
  aguardando:'Aguardando análise',
  orcamento_entregue:'Orçamento entregue',
  em_producao:'Em produção',
  pronto:'Pronto para retirada',
  entregue:'Entregue'
};
var PROTO_STATUS_BADGE = {
  aguardando:'badge-yellow',
  orcamento_entregue:'badge-blue',
  em_producao:'badge-blue',
  pronto:'badge-green',
  entregue:'badge-gray'
};

function renderProtocolos(c){
  var list=DB.protocolos||[];
  var listOrdenada=[...list].reverse();
  var listPag=listOrdenada.slice(0,_pagGet('protocolos'));
  c.innerHTML=`
  <div class="page-header">
    <div>
      <p class="page-title">↧ Protocolo de Entrada</p>
      <p class="page-sub">${list.length} protocolo(s) registrado(s)</p>
    </div>
    <button class="btn btn-primary" onclick="openProtocoloModal()">+ Novo Protocolo</button>
  </div>
  ${list.length===0?`
  <div class="empty-state">
    <div class="empty-state-icon">↧</div>
    <p>Nenhum protocolo registrado</p>
    <p style="font-size:13px;color:var(--texto-suave);margin-top:8px">Registre a entrada de peças da cliente com um único protocolo.</p>
    <button class="btn btn-primary" style="margin-top:16px" onclick="openProtocoloModal()">+ Novo Protocolo</button>
  </div>`:
  `<div class="card">
    <div class="card-body" style="padding:0">
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="border-bottom:2px solid var(--borda)">
        <th style="padding:10px 14px;text-align:left;font-size:11px;color:var(--texto-suave)">Protocolo</th>
        <th style="padding:10px 14px;text-align:left;font-size:11px;color:var(--texto-suave)">Cliente</th>
        <th style="padding:10px 14px;text-align:left;font-size:11px;color:var(--texto-suave)">Peças</th>
        <th style="padding:10px 14px;text-align:left;font-size:11px;color:var(--texto-suave)">Data</th>
        <th style="padding:10px 14px;text-align:left;font-size:11px;color:var(--texto-suave)">Status</th>
        <th style="padding:10px 14px;text-align:left;font-size:11px;color:var(--texto-suave)">Ações</th>
      </tr></thead>
      <tbody>
        ${listPag.map(function(p){
          var cl=DB.clientes.find(function(c){return c.id==p.cliente_id;})||{};
          return '<tr style="border-bottom:1px solid var(--borda)">'
            +'<td style="padding:10px 14px"><strong style="color:var(--azul);font-family:\'Cormorant Garamond\',serif;font-size:15px">#'+p.numero+'</strong></td>'
            +'<td style="padding:10px 14px">'+esc(cl.nome||'—')+'</td>'
            +'<td style="padding:10px 14px"><span style="display:inline-flex;gap:4px;flex-wrap:wrap">'
              +(p.pecas||[]).map(function(pc){
                return '<span class="badge badge-gray" style="font-size:10px">'+esc(SERVICO_LABEL[pc.servico]||pc.servico)+'</span>';
              }).join('')
            +'</span></td>'
            +'<td style="padding:10px 14px;font-size:13px">'+fmtDate(p.data)+(p.hora?' '+p.hora:'')+'</td>'
            +'<td style="padding:10px 14px"><span class="badge '+(PROTO_STATUS_BADGE[p.status]||'badge-gray')+'">'+(PROTO_STATUS[p.status]||p.status)+'</span></td>'
            +'<td style="padding:10px 14px"><div class="td-actions">'
              +'<button class="btn btn-xs btn-outline" onclick="openProtocoloModal('+p.id+')">✎ Editar</button>'
              +'<button class="btn btn-xs btn-gold" onclick="gerarReciboProtocolo('+p.id+')">🖨 Recibo</button>'
              +(podeExcluir()?'<button class="btn btn-xs btn-danger" onclick="excluirProtocolo('+p.id+')">✕</button>':'')
            +'</div></td>'
          +'</tr>';
        }).join('')}
        ${_pagBtnHTML(listOrdenada.length,listPag.length,'_pagMaisProtocolos()')}
      </tbody>
    </table>
    </div>
  </div>`}`;
}
function _pagMaisProtocolos(){
  _PAG['protocolos']=(_PAG['protocolos']||_PAG_TAMANHO)+_PAG_TAMANHO;
  renderProtocolos(document.getElementById('content'));
}

// ── Número de protocolo formatado ──────────────────────────────────
function gerarNumeroProtocolo(){
  var ano=new Date().getFullYear();
  var seq=(DB._ids.protocolos||0)+1;
  return 'P-'+ano+'-'+String(seq).padStart(3,'0');
}

// ── Modal Protocolo ────────────────────────────────────────────────
var _PROTO_PECAS=[]; // peças do protocolo em edição

function openProtocoloModal(id){
  var p=id?DB.protocolos.find(function(x){return x.id==id;}):{};
  if(!p)return;
  _PROTO_PECAS=p.pecas?(p.pecas.map(function(x){return Object.assign({},x);})):[];
  if(_PROTO_PECAS.length===0) _PROTO_PECAS=[{id:1,descricao:'',servico:'conserto',peso:'',material:'18k',estado:'bom',obs:'',os_id:null}];

  var collabs=DB.colaboradores.filter(function(c){return c.ativo!==false;});
  var colOpts=collabs.map(function(c){return '<option value="'+c.nome+'"'+(p.atendente===c.nome?' selected':'')+'>'+c.nome+'</option>';}).join('');
  colOpts+='<option value="Ana Lobão"'+(p.atendente==='Ana Lobão'?' selected':'')+'>Ana Lobão</option>';

  var div=document.createElement('div');div.className='modal-overlay';div.id='modal-proto';
  div.innerHTML=`<div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title">${id?'Protocolo #'+p.numero:'Novo Protocolo de Entrada'}</span>
      <button class="modal-close" onclick="closeModal('modal-proto')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid" style="gap:14px;margin-bottom:20px">
        <div class="form-group"><label>Cliente *</label>
          <select id="proto-cl">
            <option value="">— Selecione —</option>
            ${DB.clientes.map(function(cl){return '<option value="'+cl.id+'"'+(p.cliente_id==cl.id?' selected':'')+'>'+esc(cl.nome)+'</option>';}).join('')}
          </select></div>
        <div class="form-group"><label>Atendente</label>
          <select id="proto-atendente">${colOpts}</select></div>
        <div class="form-group"><label>Data</label>
          <input type="date" id="proto-data" value="${p.data||today()}"></div>
        <div class="form-group"><label>Hora</label>
          <input type="time" id="proto-hora" value="${p.hora||new Date().toTimeString().slice(0,5)}"></div>
        <div class="form-group"><label>Status</label>
          <select id="proto-status">
            ${Object.entries(PROTO_STATUS).map(function(e){return '<option value="'+e[0]+'"'+(p.status===e[0]?' selected':'')+'>'+e[1]+'</option>';}).join('')}
          </select></div>
        <div class="form-group"><label>Prazo / Previsão de contato</label>
          <input type="date" id="proto-prazo" value="${p.prazo||''}"></div>
        <div class="form-group" style="grid-column:1/-1"><label>Observações gerais</label>
          <textarea id="proto-obs" rows="2" placeholder="Observações sobre a visita, combinados, etc.">${p.obs||''}</textarea></div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <p style="font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--azul);font-weight:500">Peças recebidas</p>
        <button class="btn btn-sm btn-outline" onclick="protocoloAdicionarPeca()">+ Adicionar peça</button>
      </div>
      <div id="proto-pecas-list"></div>
    </div>
    <div class="modal-footer">
      ${id&&podeExcluir()?'<button class="btn btn-danger" onclick="excluirProtocolo('+id+')">Excluir</button>':''}
      <button class="btn btn-outline" onclick="closeModal('modal-proto')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveProtocolo(${id||0})">✦ Salvar e Gerar OS</button>
    </div>
  </div>`;
  document.body.appendChild(div);
  protocoloRenderPecas();
}

function protocoloRenderPecas(){
  var el=document.getElementById('proto-pecas-list');if(!el)return;
  if(_PROTO_PECAS.length===0){
    el.innerHTML='<p style="font-size:13px;color:var(--texto-suave);text-align:center;padding:16px">Nenhuma peça adicionada.</p>';
    return;
  }
  el.innerHTML=_PROTO_PECAS.map(function(pc,i){
    var fotos=(pc.fotos||[]);
    var fotosHtml=fotos.length?fotos.map(function(f,fi){
      if(f.tipo==='pdf'){
        return '<div style="display:flex;align-items:center;gap:6px;background:#f0f0f0;border-radius:4px;padding:4px 8px;font-size:11px">'
          +'📄 '+esc(f.nome)
          +'<button type="button" onclick="protocoloRemoverFoto('+i+','+fi+')" style="background:none;border:none;color:#eb5757;font-size:14px;cursor:pointer;line-height:1;margin-left:4px">×</button>'
          +'</div>';
      }
      return '<div style="position:relative;display:inline-block">'
        +'<img src="'+f.src+'" onclick="protocoloZoomFoto(\''+f.src+'\')" style="width:64px;height:64px;object-fit:cover;border-radius:4px;cursor:zoom-in;border:1px solid var(--borda)">'
        +'<button type="button" onclick="protocoloRemoverFoto('+i+','+fi+')" style="position:absolute;top:-5px;right:-5px;background:#eb5757;color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;line-height:1">×</button>'
        +'</div>';
    }).join(' '):'<span style="font-size:11px;color:var(--texto-suave)">Sem fotos</span>';

    return '<div style="border:1px solid var(--borda);border-radius:8px;padding:14px 16px;margin-bottom:10px;background:var(--fundo)">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
        +'<span style="font-family:\'Cormorant Garamond\',serif;font-size:15px;color:var(--azul);font-weight:600">Peça '+(i+1)+'</span>'
        +(pc.os_id?'<span class="badge badge-blue" style="font-size:11px">OS #'+pc.os_id+' gerada</span>':'')
        +'<button type="button" onclick="protocoloRemoverPeca('+i+')" style="background:none;border:none;color:#eb5757;font-size:18px;cursor:pointer;line-height:1">×</button>'
      +'</div>'
      +'<div class="form-grid" style="gap:10px">'
        +'<div class="form-group" style="grid-column:1/-1"><label>Descrição da peça *</label>'
          +'<input id="pp-desc-'+i+'" value="'+esc(pc.descricao)+'" placeholder="Ex: Anel solitário 18k, Par de brincos argola..." '
          +'onchange="_PROTO_PECAS['+i+'].descricao=this.value"></div>'
        +'<div class="form-group"><label>Serviço</label>'
          +'<select id="pp-serv-'+i+'" onchange="_PROTO_PECAS['+i+'].servico=this.value">'
            +Object.entries(SERVICO_LABEL).map(function(e){return '<option value="'+e[0]+'"'+(pc.servico===e[0]?' selected':'')+'>'+e[1]+'</option>';}).join('')
          +'</select></div>'
        +'<div class="form-group"><label>Peso / Qtd</label>'
          +'<input id="pp-peso-'+i+'" value="'+esc(pc.peso)+'" placeholder="Ex: 4,2g ou 1 par" '
          +'onchange="_PROTO_PECAS['+i+'].peso=this.value"></div>'
        +'<div class="form-group"><label>Material</label>'
          +'<input id="pp-mat-'+i+'" value="'+esc(pc.material||'18k')+'" placeholder="18k, prata, outro" '
          +'onchange="_PROTO_PECAS['+i+'].material=this.value"></div>'
        +'<div class="form-group"><label>Estado</label>'
          +'<select id="pp-est-'+i+'" onchange="_PROTO_PECAS['+i+'].estado=this.value">'
            +Object.entries(ESTADO_LABEL).map(function(e){return '<option value="'+e[0]+'"'+(pc.estado===e[0]?' selected':'')+'>'+e[1]+'</option>';}).join('')
          +'</select></div>'
        +'<div class="form-group" style="grid-column:1/-1"><label>Obs. da peça</label>'
          +'<input id="pp-obs-'+i+'" value="'+esc(pc.obs||'')+'" placeholder="Defeito específico, pedido especial, detalhes..." '
          +'onchange="_PROTO_PECAS['+i+'].obs=this.value"></div>'
        // Photos section
        +'<div class="form-group" style="grid-column:1/-1">'
          +'<label>📎 Fotos / PDF da peça</label>'
          +'<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;align-items:center">'
            +fotosHtml
          +'</div>'
          +'<input type="file" id="pp-file-'+i+'" accept="image/*,.pdf" multiple style="display:none" '
            +'onchange="protocoloAdicionarFotos(event,'+i+')">'
          +'<button type="button" class="btn btn-sm btn-outline" '
            +'onclick="document.getElementById(\'pp-file-'+i+'\').click()">'
            +'📎 Anexar foto ou PDF'
          +'</button>'
          +'<span style="font-size:11px;color:var(--texto-suave);margin-left:8px">Máx. 5 arquivos · 5MB</span>'
        +'</div>'
      +'</div>'
    +'</div>';
  }).join('');
}


function protocoloAdicionarFotos(e, i){
  var files=Array.from(e.target.files);
  if(!_PROTO_PECAS[i].fotos) _PROTO_PECAS[i].fotos=[];
  var restam=5-_PROTO_PECAS[i].fotos.length;
  if(restam<=0){showToast('Limite de 5 arquivos por peça','warn');return;}
  files.slice(0,restam).forEach(function(f){
    if(f.size>5*1024*1024){showToast(f.name+' excede 5MB','warn');return;}
    var isPDF=f.type==='application/pdf';
    var r=new FileReader();
    r.onload=function(ev){
      _PROTO_PECAS[i].fotos.push({tipo:isPDF?'pdf':'img',src:ev.target.result,nome:f.name});
      protocoloRenderPecas();
    };
    r.readAsDataURL(f);
  });
  e.target.value='';
}
function protocoloRemoverFoto(i,fi){
  if(_PROTO_PECAS[i]&&_PROTO_PECAS[i].fotos) _PROTO_PECAS[i].fotos.splice(fi,1);
  protocoloRenderPecas();
}
function protocoloZoomFoto(src){
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  ov.onclick=function(){ov.remove();};
  var img=document.createElement('img');img.src=src;
  img.style.cssText='max-width:92vw;max-height:92vh;border-radius:8px';
  ov.appendChild(img);document.body.appendChild(ov);
}
function protocoloAdicionarPeca(){
  _PROTO_PECAS.push({id:Date.now(),descricao:'',servico:'conserto',peso:'',material:'18k',estado:'bom',obs:'',os_id:null});
  protocoloRenderPecas();
}

function protocoloRemoverPeca(i){
  _PROTO_PECAS.splice(i,1);
  protocoloRenderPecas();
}

function saveProtocolo(id){
  var cid=parseInt(document.getElementById('proto-cl')?.value)||null;
  if(!cid){showToast('Selecione a cliente','danger');return;}
  if(_PROTO_PECAS.length===0){showToast('Adicione ao menos uma peça','danger');return;}
  // Sync fields from DOM before save — para no primeiro erro encontrado
  for(var _i=0;_i<_PROTO_PECAS.length;_i++){
    var _pc=_PROTO_PECAS[_i];
    _pc.descricao=document.getElementById('pp-desc-'+_i)?.value||_pc.descricao;
    _pc.servico=document.getElementById('pp-serv-'+_i)?.value||_pc.servico;
    _pc.peso=document.getElementById('pp-peso-'+_i)?.value||_pc.peso;
    _pc.material=document.getElementById('pp-mat-'+_i)?.value||_pc.material;
    _pc.estado=document.getElementById('pp-est-'+_i)?.value||_pc.estado;
    _pc.obs=document.getElementById('pp-obs-'+_i)?.value||_pc.obs;
    if(!_pc.descricao){showToast('Preencha a descrição da peça '+(_i+1),'danger');return;}
  }
  var invalid=_PROTO_PECAS.some(function(pc){return !pc.descricao;});
  if(invalid)return;

  var pId=id||DB.nextId('protocolos');
  var numero=id?(DB.protocolos.find(function(x){return x.id==id;})||{}).numero||gerarNumeroProtocolo():gerarNumeroProtocolo();

  // Auto-generate OS for each piece that doesn't have one yet
  var atendente=document.getElementById('proto-atendente')?.value||'';
  _PROTO_PECAS.forEach(function(pc){
    if(!pc.os_id){
      var osId=DB.nextId('os');
      var osStatus=pc.servico==='avaliacao'?'orcamento':'aprovado';
      DB.os.push({
        id:osId,
        origem:'cliente',
        cliente_id:cid,
        colecao_atelier_id:null,
        status:osStatus,
        prazo:document.getElementById('proto-prazo')?.value||'',
        priority:'normal',
        responsavel:atendente,
        descricao:'[Proto #'+numero+'] '+pc.descricao+(pc.peso?' · '+pc.peso:'')+(pc.obs?' — '+pc.obs:''),
        fotos:[],
        orcamento_id:null,
        protocolo_id:pId
      });
      pc.os_id=osId;
    }
  });

  var obj={
    id:pId,
    numero:numero,
    data:document.getElementById('proto-data')?.value||today(),
    hora:document.getElementById('proto-hora')?.value||'',
    cliente_id:cid,
    atendente:atendente,
    status:document.getElementById('proto-status')?.value||'aguardando',
    prazo:document.getElementById('proto-prazo')?.value||'',
    obs:document.getElementById('proto-obs')?.value||'',
    pecas:_PROTO_PECAS.slice()
  };

  if(id){var idx=DB.protocolos.findIndex(function(x){return x.id==id;});if(idx>=0)DB.protocolos[idx]=obj;}
  else DB.protocolos.push(obj);

  saveDB();closeModal('modal-proto');
  showToast('✅ Protocolo '+numero+' salvo — '+_PROTO_PECAS.length+' OS gerada(s)!');
  navTo('protocolos');
  // Exibe recibo imediatamente — cliente está aguardando
  setTimeout(function(){ gerarReciboProtocolo(pId); }, 300);
}

function excluirProtocolo(id){
  if(!podeExcluir())return;
  var p=DB.protocolos.find(function(x){return x.id==id;});
  if(!p)return;
  confirmarAcao('Excluir Protocolo?','Protocolo #'+p.numero+' será removido (as OS vinculadas são mantidas).','Excluir',function(){
    DB.protocolos=DB.protocolos.filter(function(x){return x.id!==id;});
    saveDB();showToast('Protocolo excluído');
    renderProtocolos(document.getElementById('content'));
  });
}

// ── Recibo para a cliente ──────────────────────────────────────────
function gerarReciboProtocolo(pid){
  var p=DB.protocolos.find(function(x){return x.id==pid;});if(!p)return;
  var at=DB.atelier||{};
  var cl=DB.clientes.find(function(c){return c.id==p.cliente_id;})||{};

  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.75);display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px';

  var wrap=document.createElement('div');
  wrap.id='recibo-proto-print';
  wrap.style.cssText='background:#fff;width:148mm;min-height:210mm;padding:12mm 11mm;font-family:Jost,sans-serif;font-size:10.5pt;color:#1a1a2e;box-shadow:0 4px 32px rgba(0,0,0,.4);margin:auto';

  // Header
  var hdr=document.createElement('div');
  hdr.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #0D1F2D;padding-bottom:10px;margin-bottom:12px';
  var hL=document.createElement('div');
  hL.innerHTML='<div style="font-family:\'Cormorant Garamond\',serif;font-size:17pt;font-weight:600;color:#0D1F2D;line-height:1">'+(at.nome_fantasia||'Atelier Ana Lobão')+'</div>'
    +'<div style="font-size:8pt;color:#666;margin-top:2px">Showroom privativo · Joias autorais em ouro 18k</div>'
    +(at.endereco?'<div style="font-size:8pt;color:#555;margin-top:2px">'+at.endereco+(at.bairro?', '+at.bairro:'')+(at.cidade?' · '+at.cidade+'/'+at.uf:'')+'</div>':'')
    +(at.tel?'<div style="font-size:8pt;color:#555">'+at.tel+'</div>':'');
  var hR=document.createElement('div');
  hR.style.cssText='text-align:right;min-width:120px';
  hR.innerHTML='<div style="font-family:\'Cormorant Garamond\',serif;font-size:9pt;color:#888;letter-spacing:.06em;text-transform:uppercase">Protocolo de Entrada</div>'
    +'<div style="font-family:\'Cormorant Garamond\',serif;font-size:22pt;font-weight:700;color:#0D1F2D;line-height:1">#'+p.numero+'</div>'
    +'<div style="font-size:8pt;color:#666">'+fmtDate(p.data)+(p.hora?' às '+p.hora:'')+'</div>';
  hdr.appendChild(hL);hdr.appendChild(hR);wrap.appendChild(hdr);

  // Cliente block
  var clBlock=document.createElement('div');
  clBlock.style.cssText='background:#f7f5f0;border-radius:6px;padding:9px 12px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center';
  clBlock.innerHTML='<div>'
    +'<div style="font-size:7.5pt;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Cliente</div>'
    +'<div style="font-size:13pt;font-weight:600;color:#0D1F2D">'+esc(cl.nome||'—')+'</div>'
    +(cl.tel?'<div style="font-size:8.5pt;color:#555">'+cl.tel+'</div>':'')
    +'</div>'
    +'<div style="text-align:right">'
    +'<div style="font-size:7.5pt;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Atendente</div>'
    +'<div style="font-size:10.5pt;font-weight:500">'+esc(p.atendente||'—')+'</div>'
    +(p.prazo?'<div style="font-size:8pt;color:#888;margin-top:4px">Contato até '+fmtDate(p.prazo)+'</div>':'')
    +'</div>';
  wrap.appendChild(clBlock);

  // Pecas table
  var tTitle=document.createElement('div');
  tTitle.style.cssText='font-size:9pt;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0D1F2D;border-bottom:1px solid #ddd;padding-bottom:4px;margin-bottom:10px';
  tTitle.textContent='Peças recebidas';
  wrap.appendChild(tTitle);

  var table=document.createElement('table');
  table.style.cssText='width:100%;border-collapse:collapse;margin-bottom:14px;font-size:9.5pt';
  var thead=document.createElement('thead');
  thead.innerHTML='<tr style="background:#0D1F2D;color:#B08E56">'
    +'<th style="padding:6px 8px;text-align:left;font-size:8pt;font-weight:600;letter-spacing:.04em">Nº</th>'
    +'<th style="padding:6px 8px;text-align:left;font-size:8pt;font-weight:600;letter-spacing:.04em">Descrição</th>'
    +'<th style="padding:6px 8px;text-align:left;font-size:8pt;font-weight:600;letter-spacing:.04em">Serviço</th>'
    +'<th style="padding:6px 8px;text-align:left;font-size:8pt;font-weight:600;letter-spacing:.04em">Peso/Qtd</th>'
    +'<th style="padding:6px 8px;text-align:left;font-size:8pt;font-weight:600;letter-spacing:.04em">Estado</th>'
    +'<th style="padding:6px 8px;text-align:left;font-size:8pt;font-weight:600;letter-spacing:.04em">OS</th>'
    +'</tr>';
  table.appendChild(thead);
  var tbody=document.createElement('tbody');
  (p.pecas||[]).forEach(function(pc,i){
    var tr=document.createElement('tr');
    tr.style.cssText='border-bottom:1px solid #eee;'+(i%2===1?'background:#fafafa':'');
    tr.innerHTML='<td style="padding:7px 8px;font-weight:700;color:#0D1F2D">'+(i+1)+'</td>'
      +'<td style="padding:7px 8px"><strong>'+esc(pc.descricao)+'</strong>'+(pc.obs?'<br><span style="font-size:8pt;color:#888">'+esc(pc.obs)+'</span>':'')+'</td>'
      +'<td style="padding:7px 8px">'+esc(SERVICO_LABEL[pc.servico]||pc.servico)+'</td>'
      +'<td style="padding:7px 8px">'+esc(pc.peso||'—')+'</td>'
      +'<td style="padding:7px 8px">'+esc(ESTADO_LABEL[pc.estado]||pc.estado)+'</td>'
      +'<td style="padding:7px 8px;font-weight:600;color:#0D1F2D">'+(pc.os_id?'#'+pc.os_id:'—')+'</td>';
    // Photos row if any
    if((pc.fotos||[]).filter(function(f){return f.tipo==='img';}).length>0){
      var trFoto=document.createElement('tr');
      trFoto.style.cssText='background:#fdf9f3;border-bottom:1px solid #eee';
      var tdFoto=document.createElement('td');
      tdFoto.colSpan=6;tdFoto.style.cssText='padding:6px 8px';
      tdFoto.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">'
        +'<span style="font-size:7.5pt;color:#999;text-transform:uppercase;letter-spacing:.04em;margin-right:4px">Fotos:</span>'
        +(pc.fotos||[]).filter(function(f){return f.tipo==='img';}).map(function(f){
          return '<img src="'+f.src+'" style="width:50px;height:50px;object-fit:cover;border-radius:3px;border:1px solid #ddd">';
        }).join('')
        +(pc.fotos||[]).filter(function(f){return f.tipo==='pdf';}).map(function(f){
          return '<span style="font-size:8pt;color:#555">📄 '+esc(f.nome)+'</span>';
        }).join('')
        +'</div>';
      trFoto.appendChild(tdFoto);
      tbody.appendChild(tr);   // peça primeiro
      tbody.appendChild(trFoto); // foto depois
    } else {
      tbody.appendChild(tr);
    }
  });
  table.appendChild(tbody);
  wrap.appendChild(table);

  // Obs
  if(p.obs){
    var obsDiv=document.createElement('div');
    obsDiv.style.cssText='background:#fdf9f3;border-left:3px solid #B08E56;padding:8px 12px;border-radius:0 4px 4px 0;margin-bottom:14px;font-size:9pt';
    obsDiv.textContent=p.obs;
    wrap.appendChild(obsDiv);
  }

  // Próximos passos
  var prox=document.createElement('div');
  prox.style.cssText='margin-bottom:16px;border:1px solid #ddd;border-radius:6px;padding:10px 14px';
  prox.innerHTML='<div style="font-size:8pt;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#0D1F2D;margin-bottom:6px">Próximos passos</div>'
    +'<div style="font-size:9.5pt;color:#555">'+(PROTO_STATUS[p.status]||p.status)+'</div>'
    +(p.prazo?'<div style="font-size:8.5pt;color:#888;margin-top:4px">Prazo de contato: <strong>'+fmtDate(p.prazo)+'</strong></div>':'');
  wrap.appendChild(prox);

  // Assinaturas
  var sigs=document.createElement('div');
  sigs.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:auto;padding-top:12px;border-top:1px solid #ddd';
  function sig(lbl){
    var d=document.createElement('div');d.style.textAlign='center';
    var ln=document.createElement('div');ln.style.cssText='border-top:1.5px solid #0D1F2D;margin-bottom:6px;margin-top:36px';
    var lb=document.createElement('div');lb.style.cssText='font-size:8.5pt;color:#555';lb.textContent=lbl;
    d.appendChild(ln);d.appendChild(lb);return d;
  }
  sigs.appendChild(sig('Assinatura da cliente'));
  sigs.appendChild(sig((at.nome_fantasia||'Atelier Ana Lobão')));
  wrap.appendChild(sigs);

  // Rodapé
  var rod=document.createElement('div');
  rod.style.cssText='margin-top:12px;text-align:center;font-size:7pt;color:#bbb;border-top:1px solid #eee;padding-top:6px';
  rod.textContent='Documento gerado em '+fmtDate(today())+' · '+(at.nome_fantasia||'Atelier Ana Lobão')+' · Protocolo '+p.numero;
  wrap.appendChild(rod);

  // Botões
  var btnBar=document.createElement('div');
  btnBar.style.cssText='position:sticky;bottom:0;background:rgba(0,0,0,.85);padding:12px 20px;display:flex;gap:10px;justify-content:center;margin-top:16px;border-radius:8px';

  var btnPrint=document.createElement('button');
  btnPrint.className='btn btn-primary';btnPrint.style.fontSize='15px';
  btnPrint.textContent='🖨 Imprimir / Salvar PDF';
  btnPrint.onclick=function(){
    var s=document.createElement('style');s.id='prs';
    s.textContent='@media print{body>*{display:none!important}#recibo-proto-print{display:block!important;position:static!important;box-shadow:none!important;width:148mm!important;min-height:210mm!important;margin:0!important;padding:12mm 11mm!important}}';
    document.head.appendChild(s);window.print();
    setTimeout(function(){var x=document.getElementById('prs');if(x)x.remove();},1000);
  };

  var btnClose=document.createElement('button');
  btnClose.className='btn btn-outline';btnClose.style.cssText='color:#fff;border-color:#fff';
  btnClose.textContent='× Fechar';btnClose.onclick=function(){ov.remove();};

  btnBar.appendChild(btnPrint);btnBar.appendChild(btnClose);
  ov.appendChild(wrap);ov.appendChild(btnBar);
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}


</script>
