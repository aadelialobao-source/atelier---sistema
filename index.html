<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier Ana Lobão — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A96E;
    --gold-light: #E8D5A8;
    --gold-dark: #8B6914;
    --navy: #0D1B2A;
    --navy-mid: #162035;
    --navy-light: #1E2D45;
    --cream: #F7F2EB;
    --text-light: #C8BAA2;
    --danger: #D4635A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* background decoration */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 50%, rgba(201,169,110,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 80% 30%, rgba(14,34,60,0.8) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-wrap {
    width: 100%; max-width: 420px;
    padding: 24px;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .brand {
    text-align: center;
    margin-bottom: 40px;
  }
  .brand-ring {
    width: 64px; height: 64px;
    border: 1.5px solid rgba(201,169,110,0.4);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    position: relative;
  }
  .brand-ring::before {
    content: '';
    position: absolute; inset: 5px;
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 50%;
  }
  .brand-letter {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; color: var(--gold); font-weight: 500;
  }
  .brand h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 400; letter-spacing: 4px;
    color: var(--gold-light);
  }
  .brand p {
    font-size: 10px; letter-spacing: 5px; color: var(--text-light);
    margin-top: 4px;
  }

  .card {
    background: var(--navy-mid);
    border: 1px solid rgba(201,169,110,0.18);
    border-radius: 16px;
    padding: 36px 32px;
  }

  .card-title {
    font-size: 11px; letter-spacing: 3px; color: var(--gold);
    text-align: center; margin-bottom: 28px;
  }

  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 10px; letter-spacing: 2px; color: var(--text-light);
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,169,110,0.1);
  }
  .field input::placeholder { color: rgba(199,186,162,0.3); }

  .btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 100%);
    border: none; border-radius: 10px;
    color: var(--navy);
    font-family: 'Jost', sans-serif;
    font-size: 12px; font-weight: 600; letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    background: rgba(212,99,90,0.12);
    border: 1px solid rgba(212,99,90,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px; color: #e8857e;
    margin-bottom: 16px;
    display: none;
  }
  .error-msg.show { display: block; }

  .footer-note {
    text-align: center;
    font-size: 11px; color: rgba(199,186,162,0.35);
    margin-top: 24px; letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-ring">
      <span class="brand-letter">A</span>
    </div>
    <h1>ANA LOBÃO</h1>
    <p>ATELIER · SISTEMA INTERNO</p>
  </div>

  <div class="card">
    <p class="card-title">ACESSO RESTRITO</p>

    <div class="error-msg" id="error-msg"></div>

    <div class="field">
      <label>E-MAIL</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>SENHA</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') entrar()">
    </div>

    <button class="btn" id="btn-entrar" onclick="entrar()">ENTRAR</button>
  </div>

  <p class="footer-note">Acesso apenas para equipe autorizada</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Se já está logado, redireciona
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'app.html';
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
  }

  async function entrar() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const btn = document.getElementById('btn-entrar');

    if (!email || !senha) { showError('Preencha e-mail e senha.'); return; }

    btn.disabled = true;
    btn.textContent = 'ENTRANDO...';
    document.getElementById('error-msg').classList.remove('show');

    const { error } = await sb.auth.signInWithPassword({ email, password: senha });

    if (error) {
      showError('E-mail ou senha incorretos.');
      btn.disabled = false;
      btn.textContent = 'ENTRAR';
    } else {
      window.location.href = 'app.html';
    }
  }
</script>
</body>
</html>
